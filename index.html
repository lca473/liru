<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Favicon: 32x32 for browser tabs, 180x180 for iOS home-screen save -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Liru</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════════
   CSS VARIABLES & RESET
═══════════════════════════════════════════════════════════════ */
:root {
  --bg: #0F1A1F;
  --bg2: #162229;
  --card: #1C2F38;
  --card-hover: #22394A;
  --green: #58CC02;
  --green-dark: #46A302;
  --green-glow: rgba(88,204,2,0.18);
  --red: #FF4B4B;
  --red-glow: rgba(255,75,75,0.12);
  --gold: #FFC800;
  --gold-glow: rgba(255,200,0,0.15);
  --blue: #1CB0F6;
  --blue-glow: rgba(28,176,246,0.12);
  --purple: #CE82FF;
  --purple-glow: rgba(206,130,255,0.12);
  --text: #FFFFFF;
  --dim: #7A99A8;
  --mid: #A3BCC9;
  --border: #263A45;
  --input: #0B151B;
  --ok: #1E4A14;
  --bad: #4A1414;
  --radius: 16px;
  --font: 'Nunito', 'Baloo 2', system-ui, sans-serif;
  --display: 'Baloo 2', 'Nunito', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background:#0F1A1F; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; min-height:100dvh; overflow-x:hidden; }
button { font-family:var(--font); cursor:pointer; border:none; outline:none; color:#FFF; }
input, textarea, select { font-family:var(--font); outline:none; color:#FFF; }

/* ═══════════════════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════════════════ */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes pop { 0%{transform:scale(0.8);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes confetti { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-200px) rotate(720deg);opacity:0} }
@keyframes glow { 0%,100%{box-shadow:0 0 20px var(--green-glow)} 50%{box-shadow:0 0 40px var(--green-glow)} }
@keyframes slideResult { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes starField { from{transform:translateY(0)} to{transform:translateY(-50%)} }

.fade-up { animation: fadeUp 0.4s ease-out both; }
.fade-in { animation: fadeIn 0.3s ease-out both; }
.pop { animation: pop 0.35s ease-out both; }
.shake { animation: shake 0.4s ease-out; }
.float { animation: float 3s ease-in-out infinite; }

/* ═══════════════════════════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════════════════════════ */
.view { display:none; min-height:100vh; min-height:100dvh; background:var(--bg); }
.view.active { display:block; }

/* ═══════════════════════════════════════════════════════════════
   SHARED TOP NAV (all sub-pages)
═══════════════════════════════════════════════════════════════ */
.top-nav {
  position:sticky; top:0; z-index:200;
  display:flex; align-items:center; gap:12px;
  padding:14px 18px;
  background:rgba(15,26,31,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1.5px solid var(--border);
}
.top-nav-back {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; padding:8px 14px;
  color:var(--dim); font-size:13px; font-weight:800;
  display:flex; align-items:center; gap:6px;
  transition:all 0.15s; flex-shrink:0;
}
.top-nav-back:hover { color:var(--text); border-color:var(--mid); }
.top-nav-title {
  font-family:var(--display); font-size:18px; font-weight:800; color:#4A7A9E;
  flex:1; text-align:center;
}
.top-nav-spacer { width:72px; flex-shrink:0; }

/* ═══════════════════════════════════════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════════════════════════════════════ */
.progress-track { width:100%; height:14px; background:var(--input); border-radius:99px; overflow:hidden; }
.progress-fill { height:100%; border-radius:99px; transition:width 0.6s cubic-bezier(.34,1.56,.64,1); }
.badge { display:inline-flex; align-items:center; gap:5px; border-radius:99px; padding:4px 12px; font-size:13px; font-weight:800; }
.badge-xp { background:var(--gold-glow); border:1.5px solid var(--gold); color:var(--gold); }
.badge-streak { background:rgba(255,120,0,0.12); border:1.5px solid #FF7800; color:#FF7800; }
.badge-lessons { background:var(--blue-glow); border:1.5px solid var(--blue); color:var(--blue); }
.opt-btn { width:100%; padding:15px 18px; background:var(--card); border:2.5px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:16px; font-weight:700; text-align:left; transition:all 0.15s; position:relative; overflow:hidden; }
.opt-btn:active { transform:scale(0.97); }
.opt-btn.selected { background:var(--blue-glow); border-color:var(--blue); color:var(--text); box-shadow:0 0 16px var(--blue-glow); }
.opt-btn.correct { background:rgba(74,122,158,0.15); border-color:#4A7A9E; box-shadow:0 0 24px rgba(74,122,158,0.2); }
.opt-btn.wrong { background:var(--bad); border-color:var(--red); box-shadow:0 0 24px var(--red-glow); }
.opt-btn.faded { opacity:0.35; }
.match-btn { padding:12px 14px; border-radius:13px; font-size:14px; font-weight:700; border:2.5px solid var(--border); background:var(--card); color:var(--text); transition:all 0.15s; text-align:center; }
.match-btn.selected { background:var(--blue-glow); border-color:var(--blue); }
.match-btn.matched { background:rgba(74,122,158,0.15); border-color:#4A7A9E; opacity:0.5; }
.match-btn.wrong-match { background:var(--bad); border-color:var(--red); }
.word-chip { padding:9px 15px; border-radius:11px; font-size:15px; font-weight:700; border:2.5px solid var(--border); background:var(--card); color:var(--text); transition:all 0.12s; }
.word-chip:active { transform:scale(0.93); }
.word-chip.placed { background:var(--blue-glow); border-color:var(--blue); }
.lesson-card { width:100%; display:flex; align-items:center; gap:14px; padding:14px 16px; border:2.5px solid var(--border); border-radius:var(--radius); margin-bottom:10px; text-align:left; transition:all 0.15s; background:var(--card); }
.lesson-card:active { transform:scale(0.98); }
.lesson-card.completed { background:rgba(74,122,158,0.08); border-color:#4A7A9E; }
.lesson-card.locked { opacity:0.35; cursor:default; }
.lesson-icon { width:50px; height:50px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; background:var(--input); }
.lesson-card.completed .lesson-icon { background:rgba(74,122,158,0.18); border:2px solid #4A7A9E; }
.tab-bar { display:flex; border-bottom:1.5px solid var(--border); margin:8px 20px 0; }
.tab-btn { flex:1; padding:13px 0; background:none; color:var(--dim); font-size:13px; font-weight:800; letter-spacing:0.5px; border-bottom:3px solid transparent; transition:all 0.2s; }
.tab-btn.active { color:#4A7A9E; border-bottom-color:#4A7A9E; }
.lb-row { display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--card); border:1.5px solid var(--border); border-radius:14px; margin-bottom:8px; }
.lb-row.is-me { background:rgba(74,122,158,0.1); border:2px solid #4A7A9E; }
.btn-primary { width:100%; padding:16px; background:#4A7A9E; border-radius:var(--radius); color:#fff; font-size:17px; font-weight:800; letter-spacing:0.3px; box-shadow:0 4px 20px rgba(74,122,158,0.25), inset 0 1px 0 rgba(255,255,255,0.15); transition:all 0.15s; border:none; }
.btn-primary:active { transform:scale(0.97); background:#3D6585; }
.btn-primary:disabled { background:var(--border); box-shadow:none; cursor:default; }
.btn-secondary { width:100%; padding:14px; background:none; border:2px solid var(--border); border-radius:var(--radius); color:var(--dim); font-size:15px; font-weight:700; }
.check-bar { position:sticky; bottom:0; left:0; right:0; padding:16px 0 20px 0; padding-bottom:max(20px, env(safe-area-inset-bottom)); background:var(--bg); margin-top:24px; z-index:5; }
.confetti-piece { position:fixed; width:10px; height:10px; border-radius:2px; animation:confetti 1.2s ease-out forwards; pointer-events:none; }
.pronun { color:var(--blue); font-size:13px; font-style:italic; font-weight:600; margin-top:2px; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

/* ═══════════════════════════════════════════════════════════════
   LANDING PAGE
═══════════════════════════════════════════════════════════════ */
#view-home {
  position:relative;
  overflow:hidden;
}
.landing-stars {
  position:absolute; top:0; left:0; right:0; bottom:0;
  pointer-events:none; z-index:0; overflow:hidden;
}
.star {
  position:absolute; background:#FFF; border-radius:50%;
  animation:float linear infinite;
  opacity:0.15;
}
.landing-content {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; min-height:100dvh;
  padding:40px 20px;
}
.landing-hero {
  display:flex; flex-direction:column; align-items:center;
  padding:28px 0 20px;
  text-align:center;
}
.landing-globe {
  width:96px;
  height:96px;
  animation:float 3.5s ease-in-out infinite;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,0.35)) drop-shadow(0 0 24px rgba(88,204,2,0.18));
  margin-bottom:14px;
  display:block;
}
.liru-logo-img {
  display:block;
  object-fit:contain;
}
.landing-title {
  font-family:var(--display);
  font-size:clamp(32px, 10vw, 52px);
  font-weight:800;
  color:#4A7A9E;
  letter-spacing:-1px;
  line-height:1.1;
  margin-bottom:6px;
  text-shadow:0 0 60px rgba(74,122,158,0.3);
}
.landing-subtitle {
  font-size:16px; font-weight:600; color:var(--dim);
  margin-bottom:4px;
}
.landing-tagline {
  font-size:13px; color:var(--mid); font-weight:600;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:99px; padding:6px 16px; margin-top:14px;
  display:inline-block;
}
.landing-stats {
  display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
  margin:16px 0 20px;
}
.landing-stat {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:14px; padding:10px 8px; text-align:center;
  width:90px; height:90px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.landing-stat-num { font-family:var(--display); font-size:24px; font-weight:800; color:#4A7A9E; }
.landing-stat-label { font-size:12px; font-weight:700; color:var(--dim); margin-top:2px; }
.landing-cards {
  display:flex; flex-direction:column; gap:10px;
  width:100%; max-width:480px;
}
.landing-card {
  display:flex; align-items:center; gap:14px;
  padding:14px 18px;
  background:var(--card); border:2px solid var(--border);
  border-radius:var(--radius);
  text-align:left; width:100%;
  transition:all 0.2s;
  position:relative; overflow:hidden;
}
.landing-card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(88,204,2,0.04), transparent);
  opacity:0; transition:opacity 0.2s;
}
.landing-card:hover { border-color:#4A7A9E; transform:translateY(-2px); box-shadow:0 8px 32px rgba(74,122,158,0.18); }
.landing-card:hover::before { opacity:1; }
.landing-card:active { transform:scale(0.98); }
.landing-card-icon {
  width:46px; height:46px; border-radius:14px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
}
.landing-card-body { flex:1; min-width:0; }
.landing-card-title { font-family:var(--display); font-size:18px; font-weight:800; color:var(--text); margin-bottom:4px; }
.landing-card-desc { font-size:13px; font-weight:600; color:var(--dim); }
.landing-card-arrow { color:#4A7A9E; font-size:22px; flex-shrink:0; }
.landing-contact-link {
  margin-top:36px;
  color:var(--dim); font-size:13px; font-weight:700;
  display:flex; align-items:center; gap:6px;
  text-decoration:none; background:none; border:none; cursor:pointer;
  transition:color 0.15s;
}
.landing-contact-link:hover { color:var(--mid); }

/* ═══════════════════════════════════════════════════════════════
   GRAMMAR PAGE
═══════════════════════════════════════════════════════════════ */
.grammar-content {
  max-width:680px; margin:0 auto;
  padding:20px 18px 80px;
}
.grammar-intro {
  background:linear-gradient(135deg, rgba(88,204,2,0.06), rgba(28,176,246,0.04));
  border:1.5px solid var(--border); border-radius:var(--radius);
  padding:18px 20px; margin-bottom:20px;
  font-size:14px; font-weight:600; color:var(--mid); line-height:1.7;
}
.grammar-intro strong { color:var(--text); }
.lesson-intro-card {
  background:linear-gradient(135deg, rgba(88,204,2,0.08), rgba(28,176,246,0.06));
  border:1.5px solid var(--border); border-radius:var(--radius);
  padding:20px 22px; margin-bottom:4px;
  font-size:15px; font-weight:600; color:var(--mid); line-height:1.7;
}
.lesson-intro-card h3 {
  font-family:var(--display); font-size:20px; font-weight:800; color:var(--text);
  margin:0 0 12px 0;
}
.lesson-intro-card p { margin:0 0 10px 0; }
.lesson-intro-card p:last-child { margin-bottom:0; }
.lesson-intro-card strong { color:var(--text); }
.lesson-intro-card em {
  color:var(--text); font-style:italic; font-weight:700;
  background:rgba(255,255,255,0.04); padding:1px 5px; border-radius:4px;
}
.lesson-intro-card .example {
  display:block; margin:8px 0; padding:10px 14px;
  background:var(--bg2); border-radius:10px;
  font-size:14px; color:var(--text); font-weight:700;
}
.lesson-intro-card .example .gloss { color:var(--dim); font-weight:600; margin-left:8px; }
.grammar-section {
  margin-bottom:12px;
  border:1.5px solid var(--border); border-radius:var(--radius);
  overflow:hidden; background:var(--card);
}
.grammar-section-header {
  display:flex; align-items:center; gap:12px;
  padding:16px 18px; cursor:pointer;
  transition:background 0.15s;
  user-select:none;
}
.grammar-section-header:hover { background:var(--card-hover); }
.grammar-section-icon { font-size:20px; flex-shrink:0; }
.grammar-section-title { font-family:var(--display); font-size:16px; font-weight:800; color:var(--text); flex:1; }
.grammar-section-chevron {
  color:var(--dim); font-size:16px; flex-shrink:0;
  transition:transform 0.25s;
}
.grammar-section.open .grammar-section-chevron { transform:rotate(180deg); }
.grammar-section-body {
  display:none; padding:0 18px 18px;
  animation:fadeIn 0.2s ease-out both;
}
.grammar-section.open .grammar-section-body { display:block; }
.grammar-section-body p {
  font-size:14px; color:var(--mid); font-weight:600; line-height:1.7;
  margin-bottom:12px;
}
.grammar-section-body p strong { color:var(--text); }
.grammar-section-body em { color:var(--blue); font-style:italic; }
.grammar-section-body ul {
  list-style:none; margin-bottom:12px;
}
.grammar-section-body ul li {
  font-size:14px; color:var(--mid); font-weight:600; line-height:1.6;
  padding:4px 0 4px 18px; position:relative;
}
.grammar-section-body ul li::before {
  content:'•'; position:absolute; left:0; color:#4A7A9E;
}
.grammar-section-body ul li strong { color:var(--text); }
.grammar-section-body ul li em { color:var(--blue); font-style:italic; }
.grammar-table-wrap { overflow-x:auto; margin:12px 0; border-radius:12px; border:1.5px solid var(--border); }
.grammar-table { width:100%; border-collapse:collapse; font-size:13px; }
.grammar-table th {
  padding:10px 14px; background:var(--bg2);
  color:#4A7A9E; font-weight:800; text-align:left;
  font-size:12px; letter-spacing:0.3px; text-transform:uppercase;
  border-bottom:1px solid var(--border);
}
.grammar-table td {
  padding:10px 14px; color:var(--mid); font-weight:600;
  border-bottom:1px solid var(--border); line-height:1.5;
}
.grammar-table tr:last-child td { border-bottom:none; }
.grammar-table td:first-child { color:var(--text); font-weight:700; }
.grammar-table td em { color:var(--blue); font-style:italic; }
.grammar-callout {
  background:rgba(28,176,246,0.06); border:1.5px solid rgba(28,176,246,0.2);
  border-radius:12px; padding:12px 16px; margin:12px 0;
  font-size:13px; color:var(--mid); font-weight:600; line-height:1.6;
}
.grammar-callout strong { color:var(--blue); }
.grammar-section-divider {
  height:1px; background:var(--border); margin:12px 0;
}
.grammar-sub-header {
  font-size:13px; font-weight:800; color:#4A7A9E;
  letter-spacing:0.3px; text-transform:uppercase;
  margin:14px 0 8px;
}

/* ═══════════════════════════════════════════════════════════════
   DICTIONARY PAGE
═══════════════════════════════════════════════════════════════ */
.dict-content {
  max-width:640px; margin:0 auto;
  padding:16px 16px 80px;
}
.dict-stats {
  display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;
}
.dict-stat-chip {
  padding:5px 12px; border-radius:99px;
  font-size:12px; font-weight:800;
  background:var(--card); border:1.5px solid var(--border); color:var(--dim);
}
.dict-stat-chip.blue-bright { background:rgba(28,176,246,0.12); border-color:rgba(28,176,246,0.35); color:#1CB0F6; }
.dict-stat-chip.blue-mid    { background:rgba(74,122,158,0.18); border-color:rgba(74,122,158,0.45); color:#7AA5C4; }
.dict-stat-chip.blue-deep   { background:rgba(58,95,125,0.22);  border-color:rgba(58,95,125,0.5);  color:#9BBED9; }
.dict-panel {
  background:var(--card); border:2px solid var(--border);
  border-radius:var(--radius); padding:18px; margin-bottom:14px;
}
.dict-panel.lw-panel { border-color:rgba(74,122,158,0.35); }
.dict-panel-label {
  display:flex; align-items:center; gap:8px; margin-bottom:12px;
}
.dict-flag {
  width:32px; height:22px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:900; color:#FFF;
}
.dict-flag.flag-en { background:linear-gradient(135deg,#1CB0F6,#0d8ec7); }
.dict-flag.flag-lw { background:linear-gradient(135deg,#4A7A9E,#3a5f7d); }
.dict-panel-lang { font-size:14px; font-weight:800; color:var(--mid); }
.dict-input-wrap { position:relative; }
.dict-search-input {
  width:100%; padding:13px 40px 13px 16px;
  background:var(--input); border:2px solid var(--border);
  border-radius:12px; color:var(--text); font-size:16px; font-weight:700;
  transition:border-color 0.15s;
}
.dict-search-input:focus { border-color:var(--blue); }
.dict-clear-btn {
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--dim); font-size:16px;
  cursor:pointer; padding:4px; opacity:0; transition:opacity 0.15s;
}
.dict-clear-btn.visible { opacity:1; }
.dict-results { margin-top:10px; }
.dict-result-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 12px; border-radius:12px;
  background:var(--bg2); margin-bottom:6px;
  animation:slideResult 0.2s ease-out both;
}
.dict-result-arrow { color:#4A7A9E; font-weight:800; font-size:14px; margin-top:1px; flex-shrink:0; }
.dict-result-word { font-size:16px; font-weight:800; color:var(--text); }
.dict-result-translation { font-size:13px; font-weight:600; color:var(--mid); margin-top:2px; }
.dict-result-pos {
  font-size:11px; font-weight:800; color:var(--dim);

<script>
// ═══════════════════════════════════════════════════════════════
// LIRU LOGO (base64 PNG from user-provided .icns, 256x256, transparent corners)

const LIRU_LOGO = "liru-logo.png";

// ═══════════════════════════════════════════════════════════════
// VIEW ROUTER
// ═══════════════════════════════════════════════════════════════
let currentView = 'home';
let grammarRendered = false;
let dictRendered = false;
let contactRendered = false;

function showView(name) {

  if (name === 'dictionary' && !dictRendered) { renderDict(); dictRendered = true; }
  if (name === 'contact' && !contactRendered) { renderContact(); contactRendered = true; }
  if (name === 'app') { renderApp(); }
}

// STAR FIELD (landing bg)

// ═══════════════════════════════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════════════════════════════
// Firebase web API keys are public by design — security is enforced
// by the database rules configured in the Firebase console, not by
// key secrecy. Safe to commit to public repos.
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDadyHknaEiKIT9zSF1DnzXAkI6TBuPte0",
  authDomain: "liru-app-9aef5.firebaseapp.com",
  databaseURL: "https://liru-app-9aef5-default-rtdb.firebaseio.com",
  projectId: "liru-app-9aef5",
  storageBucket: "liru-app-9aef5.firebasestorage.app",
  messagingSenderId: "361553228536",
  appId: "1:361553228536:web:6954014bdd4b68348f410d"
};

// ═══════════════════════════════════════════════════════════════
// EMAILJS CONFIG
// ═══════════════════════════════════════════════════════════════
// EmailJS public keys are already exposed in the live page source —
// they identify the account but do not authenticate submissions.
// Safe to commit to public repos.
const EMAILJS_PUBLIC_KEY  = "5Zl8cU30xSzqTUKCr";
const EMAILJS_SERVICE_ID  = "service_z82mm6p";
const EMAILJS_TEMPLATE_ID = "template_nx5gfso";
const EMAILJS_TO_EMAIL    = "njprentiss@gmail.com";

let emailJSReady = false;
try {
  if (typeof emailjs !== 'undefined' && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY") {
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

// ═══════════════════════════════════════════════════════════════
// VOCABULARY (shared between App and Dictionary)
// ═══════════════════════════════════════════════════════════════
// NOTE: Lesson vocabulary (grouped by lesson id) will be populated when
// lessons are designed. Keep this object — the exercise generator pulls
// from it by lesson.vocabKey.
const V = {
  // ═══════════════════════════════════════════════════════════════
  // UNIT 1 — GREETINGS & FIRST WORDS (L1–L6)
  // ═══════════════════════════════════════════════════════════════
  // Per lesson_principles.md: max 4 new roots per lesson, 6–8 new words target.
  // Every entry verified against Dictionary.md (citations in unit1_build.md).
  //
  // Conventions:
  //   - Sentence-prompt tokens are PUNCTUATION-FREE. Periods, commas, and
  //     question marks live in the English gloss only. Punctuation in
  //     draggable tokens would leak word-order information to the learner.
  //   - Each prompt is a SINGLE Liru sentence. Multi-sentence dialogues are
  //     split into separate consecutive prompts.
  //
  // L1: l1_socials   — waimo, weriko, reiwa, elo (4 social expressions)
  // L2: l2_yesno     — ai, mai, "Su mo"
  // L3: l3_iam       — ne, su   (vocab; the pattern is exercised in L4 immediately)
  // L4: l4_yourname  — sentence-based; introduces te/teo, kiwa, nile
  // L5: l5_practice  — sentence-based; combines L1–L4, no new vocab
  //
  // Note: moa (please) was previously in L1 but has been deferred. moa is
  // a request-politeness particle ("please"); without verb constructions to
  // attach it to (introduced in later units), it has no natural place in
  // Unit 1. moa remains in Dictionary.md and the Grammar Guide; it will be
  // taught when imperatives or modal-request constructions are introduced.

  // L1 — Hello, Goodbye, Thanks, Sorry
  l1_socials: [
    {lw:"waimo",  en:"hello",                       pos:"social"},
    {lw:"weriko", en:"goodbye",                     pos:"social"},
    {lw:"reiwa",  en:"thank you",                   pos:"social"},
    {lw:"elo",    en:"sorry / excuse me",           pos:"social"},
  ],

  // L2 — Yes, No, and "Su mo"
  // mai is in SRS_PARTICLE_SKIP for sentence-content extraction, but this is
  // a vocab lesson — vocab branch enrolls regardless. "Su mo" is a phrase
  // (Dictionary.md L632: pos "phrase").
  l2_yesno: [
    {lw:"ai",     en:"yes",                         pos:"particle"},
    {lw:"mai",    en:"no / not",                    pos:"particle"},
    {lw:"Su mo",  en:"you're welcome / it's okay",  pos:"phrase"},
  ],

  // L3 — Saying Your Name (vocab; 2 flashcards)
  l3_iam: [
    {lw:"ne",     en:"I",                           pos:"pronoun"},
    {lw:"su",     en:"is / am / are / be",          pos:"verb"},
  ],

  // L4 — "What is your name?" (sentence-based)
  // 6 prompts, each a single Liru sentence, tokens punctuation-free.
  // Sentence-content SRS extraction will pull: te, teo, kiwa, nile, plus
  // already-enrolled ne/su. The inflection-stripper recognizes -eo → base,
  // so teo/neo/veo will all map back to their base pronouns for SRS.
  l4_yourname: [
    {lw:["Kiwa","su","teo","nile"],     en:"What is your name?"},
    {lw:["Ne","su","Yuna"],             en:"I am Yuna."},
    {lw:["Te","su","Kai"],              en:"You are Kai."},
    {lw:["Teo","nile","su","Yuna"],     en:"Your name is Yuna."},
    {lw:["Neo","nile","su","Kai"],      en:"My name is Kai."},
    {lw:["Kiwa","su","neo","nile"],     en:"What is my name?"},
  ],

  // L5 — Greeting Conversations (sentence-based; combines L1–L4; no new vocab)
  // 7 single-sentence prompts. The intro card frames these as the building
  // blocks of a real first meeting; the conversational arc lives in the
  // intro text, not in stitched-together prompts.
  l5_practice: [
    {lw:["Waimo","Yuna"],               en:"Hello, Yuna."},
    {lw:["Ne","su","Kai"],              en:"I am Kai."},
    {lw:["Kiwa","su","teo","nile"],     en:"What is your name?"},
    {lw:["Reiwa","Kai"],                en:"Thank you, Kai."},
    {lw:["Su","mo"],                    en:"You're welcome."},
    {lw:["Elo","Yuna"],                 en:"Sorry, Yuna."},
    {lw:["Weriko"],                     en:"Goodbye."},
  ],

  // ════════════════════════════════════════════════════════════════
  // UNIT 2 — PEOPLE & ACTIONS (L7–L12)
  // ════════════════════════════════════════════════════════════════
  // L7:  l7_pronouns  — ve (with nea, tea, vea as -a plurals)
  // L8:  l8_verbs1    — nawu (introduces the verb-form rule)
  // L9:  l9_verbs2    — tahu, shahu, senu
  // L10: l10_who      — sentence-based; introduces kipue
  // L11: l11_practice — sentence-based; combines Units 1+2
  //
  // Recurring characters: Yuna and Kai from Unit 1 plus Maya (Unit 2 addition).
  // Maya is registered in preflight.js's PROPER_NOUNS set.

  // L7 — Everyone in the Conversation
  // Teaches *ve* plus the three plural pronoun forms (nea, tea, vea) via the
  // -a plural pattern. All four are flashcards; the intro card explains the
  // pattern so the plurals read as a system, not as four separate words.
  l7_pronouns: [
    {lw:"ve",   en:"he / she / it / they (sg.)",  pos:"pronoun"},
    {lw:"nea",  en:"we",                          pos:"pronoun"},
    {lw:"tea",  en:"you (pl.)",                   pos:"pronoun"},
    {lw:"vea",  en:"they / them (pl.)",          pos:"pronoun"},
  ],

  // L8 — To Love (introduces verbs as a category)
  // Single flashcard. The intro card carries the conceptual lift (-u ending,
  // SVO, no person-conjugation, no su); exercises drill the pattern with
  // sentences in the lesson tail.
  l8_verbs1: [
    {lw:"nawu", en:"to love",                     pos:"verb"},
  ],

  // L9 — To Eat, To Drink, To Know
  // Three verbs reinforcing the L8 pattern. Only the verb (-u) form of each
  // canvas root is taught here per lesson_principles.md §5; noun and adj forms
  // remain in Dictionary.md for dictionary lookup.
  l9_verbs2: [
    {lw:"tahu", en:"to eat",                      pos:"verb"},
    {lw:"shahu",en:"to drink",                    pos:"verb"},
    {lw:"senu", en:"to know",                     pos:"verb"},
  ],

  // L10 — Who? (sentence-based; introduces kipue)
  // 7 single-sentence prompts. Sentence 7 (Kipue tahu?) demonstrates the
  // subject-empty case where the unknown is the subject. Maya appears here
  // for the first time.
  l10_who: [
    {lw:["Kipue","su","ve"],            en:"Who is he?"},
    {lw:["Ve","su","Maya"],             en:"She is Maya."},
    {lw:["Kipue","te","nawu"],          en:"Who do you love?"},
    {lw:["Ne","nawu","Kai"],            en:"I love Kai."},
    {lw:["Kipue","senu","Yuna"],        en:"Who knows Yuna?"},
    {lw:["Maya","senu","Yuna"],         en:"Maya knows Yuna."},
    {lw:["Kipue","tahu"],               en:"Who is eating?"},
  ],

  // L11 — People & Actions Practice (sentence-based; combines Units 1+2)
  // 7 single-sentence prompts. Sentence 5 (Kiwa te tahu?) pairs a Unit 1
  // question word with a Unit 2 verb to demonstrate the question-word
  // generalization across both units.
  l11_practice: [
    {lw:["Waimo","Maya"],               en:"Hello, Maya."},
    {lw:["Ne","su","Yuna"],             en:"I am Yuna."},
    {lw:["Kipue","su","ve"],            en:"Who is he?"},
    {lw:["Nea","nawu","Yuna"],          en:"We love Yuna."},
    {lw:["Kiwa","te","tahu"],           en:"What are you eating?"},
    {lw:["Vea","shahu"],                en:"They are drinking."},
    {lw:["Reiwa","Maya"],               en:"Thank you, Maya."},
  ],

  // ════════════════════════════════════════════════════════════════
  // UNIT 3 — FAMILY & PEOPLE (L13–L18)
  // ════════════════════════════════════════════════════════════════
  // L13: l13_family1     — mawe, pawe, wahe (immediate family + collective)
  // L14: l14_family2     — yoye, loye, piwe (siblings + child)
  // L15: l15_possessives — sentence-based; generalizes -eo / -eoa across nouns
  // L16: l16_friends     — wame
  // L17: l17_practice    — sentence-based; combines Units 1+2+3
  //
  // All seven new vocab entries are taught noun-only per lesson_principles §5.
  // The canvas adj/v forms (mawi, powu, etc.) remain in Dictionary.md but are
  // not drilled in this unit. wame's verb form wamu ("to like") is reserved
  // for a future feelings/wants unit.
  //
  // Possessives: Grammar.md §3 documents -eo on nouns (komeo "stone's") and
  // -eoa for plural possessor (komeoa "stones'"). Same pattern applies to
  // family roots: maweo, paweo, yoyeo, loyeo. Inflections are productive
  // (covered by preflight's checkNounInflection). No name-possessives in
  // sentences this unit — keeps things in the documented zone.

  // L13 — Mother, Father, Family
  l13_family1: [
    {lw:"mawe", en:"mother", pos:"n"},
    {lw:"pawe", en:"father", pos:"n"},
    {lw:"wahe", en:"family", pos:"n"},
  ],

  // L14 — Sister, Brother, Child
  l14_family2: [
    {lw:"yoye", en:"sister", pos:"n"},
    {lw:"loye", en:"brother", pos:"n"},
    {lw:"piwe", en:"child",  pos:"n"},
  ],

  // L15 — Whose? (sentence-based; -eo / -eoa generalization)
  // 7 single-sentence prompts. Possessive forms balanced across the productive
  // inflections: neo ×1, teo ×2, veo ×2, neoa ×1, veoa ×1. Every L13/L14
  // family root appears at least once. Verbs (senu, nawu, shahu, tahu) carry
  // forward from Unit 2 — sentences are real things a learner would say
  // about family, not predicate-pronoun contortions.
  l15_possessives: [
    {lw:["Yuna","su","neo","mawe"],       en:"Yuna is my mother."},
    {lw:["Veo","pawe","su","Kai"],        en:"Her father is Kai."},
    {lw:["Teo","yoye","nawu","Maya"],     en:"Your sister loves Maya."},
    {lw:["Maya","senu","veo","loye"],     en:"Maya knows her brother."},
    {lw:["Neoa","mawe","shahu"],          en:"Our mother is drinking."},
    {lw:["Veoa","wahe","tahu"],           en:"Their (plural) family is eating."},
    {lw:["Teo","piwe","nawu","te"],       en:"Your child loves you."},
  ],

  // L16 — Friends
  l16_friends: [
    {lw:"wame", en:"friend", pos:"n"},
  ],

  // L17 — Family & Friends Practice (sentence-based; combines Units 1+2+3)
  // 7 single-sentence prompts. Possessive forms balanced: neo ×1, teo ×2,
  // veo ×2, neoa ×2. Pulls greetings, verbs from Unit 2, and family vocab
  // into mixed practice. Sentence 6 exercises plural-possessor (-eoa) and
  // plural-noun (-ea) inflections in one prompt.
  l17_practice: [
    {lw:["Waimo","neo","wame"],           en:"Hello, my friend."},
    {lw:["Kipue","su","veo","mawe"],      en:"Who is her mother?"},
    {lw:["Yuna","su","teo","yoye"],       en:"Yuna is your sister."},
    {lw:["Maya","nawu","veo","wahe"],     en:"Maya loves her family."},
    {lw:["Neoa","pawe","senu","Kai"],     en:"Our father knows Kai."},
    {lw:["Tea","su","neoa","wamea"],      en:"You all are our friends."},
    {lw:["Teo","loye","tahu"],            en:"Your brother is eating."},
  ],

  // ════════════════════════════════════════════════════════════════
  // UNIT 4 — WANTS, NEEDS, FEELINGS (L19–L?)
  // ════════════════════════════════════════════════════════════════
  // L19 — Like, Want, Need (the three core modals + the canvas rule)
  // Three new verb forms paying off Unit 3's deferral of wamu and opening
  // the modal-chain unit. Two noun forms (tahe "food", shahe "drink")
  // derived from already-known L9 verbs (tahu, shahu) — included so the
  // lesson can teach the vowel canvas (Grammar.md §2) as a productive rule.
  // First time the canvas is named for the learner; future units lean on
  // this so derived forms don't need their own flashcards.
  l19_likewant: [
    {lw:"wamu", en:"to like",  pos:"verb"},
    {lw:"wanu", en:"to want",  pos:"verb"},
    {lw:"mihu", en:"to need",  pos:"verb"},
    {lw:"tahe", en:"food",     pos:"n"},
    {lw:"shahe",en:"drink",    pos:"n"},
  ],

  // L20 — Modal Chains (sentence-based)
  // Adds sahu (can) and shihu (should) — the two remaining modals.
  // Formalizes the verb-chain construction (modal + bare verb) per G§5.
  // 8 sentences instead of 7 so each of the 5 modals gets at least one
  // chained example. Distribution: wanu, mihu, sahu each at 2/8;
  // shihu and wamu at 1/8 each. Chained verbs split 4/4 between
  // tahu and shahu. Only mai (negation) appears in the negative slot;
  // tense particles wa/wu are reserved for Unit 5.
  l20_chains: [
    {lw:["Ne","wanu","tahu"],                        en:"I want to eat."},
    {lw:["Te","mihu","shahu"],                       en:"You need to drink."},
    {lw:["Ve","sahu","tahu","tahe"],                 en:"She can eat food."},
    {lw:["Ne","shihu","shahu"],                      en:"I should drink."},
    {lw:["Yuna","wamu","tahu"],                      en:"Yuna likes to eat."},
    {lw:["Kipue","wanu","tahu"],                     en:"Who wants to eat?"},
    {lw:["Nea","mihu","shahu"],                      en:"We need to drink."},
    {lw:["Ne","mai","sahu","shahu"],                 en:"I can't drink."},
  ],

  // L21 — Feeling, Happy, Sad (vocab)
  // Three new entries: ele (feeling, n.), houli (happy, adj.), mohouli
  // (sad, adj.). Intro card teaches predicate adjectives with su [G§6]
  // and introduces the mo- productive rule [G§18] using houli/mohouli
  // as the canonical example. ele's canvas siblings (eli, elu) remain
  // dictionary-only per §5 canvas discipline.
  l21_houli: [
    {lw:"ele",     en:"feeling",  pos:"n"},
    {lw:"houli",   en:"happy",    pos:"adj"},
    {lw:"mohouli", en:"sad",      pos:"adj"},
  ],

  // L22 — Angry, Afraid, Worried, Surprised (vocab)
  // Four feeling adjectives. tauki and kaumi are non-mo- roots; moyeri
  // and muhi(?) — moyeri contains mo-, reinforcing the rule from L21.
  // muhi gloss matches Dictionary.md exactly: "anxious (or worried)"
  // (post-2026-05-02 alignment). kaumi gloss: "surprised" (post-alignment).
  // Four adjectives is on the heavy side for one vocab lesson but they
  // share one grammatical pattern (X su FEELING) so reinforcement is
  // efficient.
  l22_feelings2: [
    {lw:"tauki",   en:"angry",                 pos:"adj"},
    {lw:"moyeri",  en:"afraid",                pos:"adj"},
    {lw:"muhi",    en:"anxious (or worried)",  pos:"adj"},
    {lw:"kaumi",   en:"surprised",             pos:"adj"},
  ],

  // L23 — Feelings & Modals Practice (sentence-based)
  // No new vocabulary. Combines L19 modals + L21/L22 feelings + Units 1-3.
  // Each sentence uses at least one Unit 4 piece. Distribution: predicate
  // adjective in 5/7 prompts; modal chain in 3/7. Each new modal/feeling
  // form appears at most twice across the 7 sentences.
  l23_practice: [
    {lw:["Ne","su","houli"],                          en:"I am happy."},
    {lw:["Maya","wanu","tahu"],                       en:"Maya wants to eat."},
    {lw:["Te","mai","su","mohouli"],                  en:"You are not sad."},
    {lw:["Yuna","sahu","shahu"],                      en:"Yuna can drink."},
    {lw:["Veo","mawe","su","tauki"],                  en:"Her mother is angry."},
    {lw:["Neoa","mawe","wanu","senu","te"],           en:"Our mother wants to know you."},
    {lw:["Kipue","su","muhi"],                        en:"Who is anxious?"},
  ],

  // ──────────────────────────────────────────────────────────────────
  // UNIT 5: TIME AND TENSE (L25–L31)
  // ──────────────────────────────────────────────────────────────────

  // L25 — Past Tense (sentence-based; introduces wa, liru)
  // First tense lesson. wa goes immediately before the verb. liru is the
  // verb-only form of root lire (per L8/L9 precedent — verb-only intro).
  l25_past: [
    {lw:["Ne","wa","tahu"],                en:"I ate."},
    {lw:["Ve","wa","shahu"],               en:"She drank."},
    {lw:["Te","wa","liru"],                en:"You spoke."},
    {lw:["Maya","wa","liru"],              en:"Maya spoke."},
    {lw:["Yuna","wa","nawu","Kai"],        en:"Yuna loved Kai."},
    {lw:["Nea","wa","senu","Maya"],        en:"We knew Maya."},
    {lw:["Vea","wa","liru"],               en:"They spoke."},
  ],

  // L26 — Future Tense (sentence-based; introduces wu)
  // Parallel structure to L25. wu before the verb.
  l26_future: [
    {lw:["Ne","wu","tahu"],                en:"I will eat."},
    {lw:["Te","wu","shahu"],               en:"You will drink."},
    {lw:["Ve","wu","liru"],                en:"She will speak."},
    {lw:["Maya","wu","shahu"],             en:"Maya will drink."},
    {lw:["Kai","wu","liru"],               en:"Kai will speak."},
    {lw:["Vea","wu","tahu"],               en:"They will eat."},
    {lw:["Tea","wu","senu","Maya"],        en:"You all will know Maya."},
  ],

  // L27 — Time Words (vocab; 4 flashcards)
  // Three nouns + one adverb. wuhi (adv. "soon") rather than wuhe (n.
  // "near-future") because adverbs are what learners actually need.
  // No canvas drills will run on wuhi (adv-only).
  l27_timewords: [
    {lw:"lawe",   en:"day",   pos:"n"},
    {lw:"none", en:"night", pos:"n"},
    {lw:"wele",   en:"time",  pos:"n"},
    {lw:"wuhi",   en:"soon",  pos:"adv"},
  ],

  // L28 — Today, Yesterday, Tomorrow (sentence-based)
  // Phrases (lo lawe, wa lawe, wu lawe) stored as single tokens in lw arrays
  // so they drag as units in word-order exercises and enroll as single SRS
  // cards. DICTIONARY_RAW already has these as pos:"phrase" entries.
  // Also introduces particles lole, wale, wule.
  l28_anchors: [
    {lw:["Ne","wa","tahu","lo lawe"],            en:"I ate today."},
    {lw:["Wa lawe","ve","wa","liru"],           en:"Yesterday, she spoke."},
    {lw:["Nea","wu","tahu","wu lawe"],           en:"We will eat tomorrow."},
    {lw:["Lole","ne","tahu"],                   en:"Now, I'm eating."},
    {lw:["Wale","ne","wa","senu","Maya"],       en:"Before, I knew Maya."},
    {lw:["Wule","ve","wu","liru"],              en:"After, she will speak."},
    {lw:["Kai","tahu","lo lawe"],                en:"Kai is eating today."},
  ],

  // L29 — Past & Future Negation (sentence-based; no new forms)
  // Combines mai (L2) with wa (L25) and wu (L26). Per Grammar.md §5,

  l29_negation: [

    {lw:["Ve","mai","wu","liru"],                       en:"She won't speak."},

    {lw:["Wu lawe","nea","mai","wu","tahu"],           en:"Tomorrow, we won't eat."},

    {lw:["Vea","mai","wu","liru","lo lawe"],            en:"They won't speak today."},
    {lw:["Ne","mai","wa","nawu","Kai"],                 en:"I didn't love Kai."},
  ],

  // L30 — Time and Tense Practice (sentence-based; no new forms)
  // Mixed practice combining tense particles, time anchors, negation, and
  // material from Units 1–4.
  l30_practice: [
    {lw:["Wa lawe","ne","wa","liru"],                  en:"Yesterday, I spoke."},
    {lw:["Lole","ve","tahu"],                          en:"Now, she's eating."},
    {lw:["Wu lawe","nea","wu","tahu"],                 en:"Tomorrow, we will eat."},
    {lw:["Te","mai","wa","shahu","lo lawe"],            en:"You didn't drink today."},
    {lw:["Kai","wu","liru","wuhi"],                     en:"Kai will speak soon."},
    {lw:["Maya","nawu","veo","mawe"],                   en:"Maya loves her mother."},
    {lw:["Wale","ne","mai","wa","senu","teo","nile"],  en:"Before, I didn't know your name."},
  ],

  // ── UNIT 6: CONNECTORS AND DEMONSTRATIVES (L32–L38) ────────────────

  // L32 — This and That (sentence-based)
  // Introduces lo and falo. Pairs demonstrative + noun in copula and

  l32_thisthat: [
    {lw:["Lo","piwe","su","Maya"],            en:"This child is Maya."},

    {lw:["Te","wa","tahu","falo","tahe"],     en:"You ate that food."},

  // L33 — Plurals: These and Those (sentence-based)

  l33_plurals: [

    {lw:["Te","wa","senu","faloa","piwea"],            en:"You knew those children."},

    {lw:["Loa","yoyea","su","moyeri"],                 en:"These sisters are afraid."},

  // L34 — And, But, Or, With (sentence-based)
  // Introduces sho, ma, au, ko. 12 sentences (3 per connector) since

  l34_andbutorwith: [

    {lw:["Ne","su","houli","ma","Maya","su","mohouli"],  en:"I'm happy, but Maya is sad."},
    {lw:["Ne","wamu","Yuna","ma","ne","mai","wamu","Kai"], en:"I like Yuna, but I don't like Kai."},
    {lw:["Ve","su","wame","ma","ve","mai","su","loye"],  en:"She's a friend, but she's not a brother."},
    {lw:["Ne","wanu","tahe","au","shahe"],                en:"I want food or a drink."},
    {lw:["Maya","wu","wamu","Yuna","au","Kai"],           en:"Maya will like Yuna or Kai."},
    {lw:["Te","shihu","tahu","au","shahu"],               en:"You should eat or drink."},
    {lw:["Ne","tahu","ko","Maya"],                        en:"I eat with Maya."},
    {lw:["Yuna","su","ko","veo","wahe"],                  en:"Yuna is with her family."},
    {lw:["Te","wu","liru","ko","ne"],                     en:"You will speak with me."},
  ],

  // L35 — Without, Very, Also (vocab)
  // Introduces moko (without), ori (very), vini (also). moko taught via

  l35_intensifiers: [

  // L36 — Asking Questions: Yes/No, When, How, Why (sentence-based)

  l36_questions: [

    {lw:["Ki","ve","wa","liru"],                  en:"Did she speak?"},
    {lw:["Kile","te","wa","tahu"],                en:"When did you eat?"},

    {lw:["Maya","vini","wa","tahu","lo lawe"],                           en:"Maya also ate today."},
    {lw:["Ki","ve","wanu","shahu"],                                      en:"Does she want to drink?"},
    {lw:["Faloa","wamea","su","muhi","ma","loa","wamea","su","houli"],  en:"Those friends are anxious, but these friends are happy."},
    {lw:["Te","shihu","tahu","moko","Kai"],                              en:"You should eat without Kai."},

  // ════════════════════════════════════════════════════════════════

  // L39: l39_goingcoming — sentence-based; introduces halu, vanu, movanu

  // L43 — Unit 7 Exam (sentence-based, isCheckpoint:true)

  l43_exam: [

  // ═══════════════════════════════════════════════════════════════
  // Highest grammar-payoff unit of the advanced track. Introduces the
  // particle *lai* — the case-that marker — which produces two distinct
  // clause types depending on position:
  //   • *lai* after a noun → relative clause (with a gap)
  //   • *lai* after a verb → complement clause (full embedded sentence)

  // blank). Sentences with a `cloze:{blanks:[...], bank:[...]}` field

  // (must include each blanked token + distractors). All blanks correct

  //         ambiguity). 8 sentences. Introduces: piruhu (plan), seuwu
  //         (allow), lenu (trust). 3 roots, 3 forms.
  //   L98 — Combined patterns synthesis. 8 sentences. 0 new roots.
  //   L99 — Unit exam (isCheckpoint:true). 12 sentences. 0 new roots.
  //
  // A20 vocabulary woven in (per A2 capability-unit convention):
  //   • L95: kavu, hairu, launu (concrete action verbs — good relative-
  //          clause heads for pictures of objects and people)
  //   • L96: waihu, moyeru, feihu, oihu (the four canonical complement-

  // Total unit lexical load: 10 A20 verbs + 1 particle = 11 roots / 31
  // new forms across the unit. Each lesson within the §2 cap (≤4 roots).
  // Forms registered in preflight.js sentenceLessonNewForms.

  // L95 — Relative clauses (sentence-based)

   unit:3,
   isSentence:true,
   intro:`<h3>🔗 Verb chains: "want to," "need to," "can," "should"</h3><p>You've already met three modal verbs: <em>wamu</em> (like), <em>wanu</em> (want), <em>mihu</em> (need). Two more complete the set:</p><ul><li><em>sahu</em> — to be able to (can)</li><li><em>shihu</em> — to ought to (should)</li></ul><p>All five behave the same way. They can take a noun:</p><span class="example">Ne wanu shahe. <span class="gloss">I want a drink.</span></span><p>Or they can take <em>another verb</em> in its base <em>-u</em> form:</p><span class="example">Ne wanu tahu. <span class="gloss">I want to eat.</span></span><span class="example">Te mihu shahu. <span class="gloss">You need to drink.</span></span><span class="example">Ve sahu tahu tahe. <span class="gloss">She can eat food.</span></span><span class="example">Te shihu shahu. <span class="gloss">You should drink.</span></span><p>The first verb tells you "want / need / can / should." The second verb tells you the action. To say "not," put <em>mai</em> before the modal:</p><span class="example">Ne mai sahu tahu. <span class="gloss">I can't eat.</span></span><span class="example">Te mai mihu shahu. <span class="gloss">You don't need to drink.</span></span>`},

  {id:"l21_houli",
   title:"Feeling, Happy, Sad",
   desc:"ele, houli, mohouli + the mo- rule",
   icon:"💛",
   vocabKey:"l21_houli",
   xp:18,
   unit:3,
   intro:`<h3>💛 Talking about feelings</h3><p>One new noun and two new adjectives:</p><ul><li><em>ele</em> — feeling (the noun)</li><li><em>houli</em> — happy</li><li><em>mohouli</em> — sad</li></ul><p>To say someone "is" a feeling, use <em>su</em> — the same copula you've been using for "I am Maya" sentences:</p><span class="example">Ne su houli. <span class="gloss">I am happy.</span></span><span class="example">Maya su mohouli. <span class="gloss">Maya is sad.</span></span><h3>🔄 The <em>mo-</em> rule</h3><p>Notice <em>mohouli</em> "sad" is just <em>houli</em> "happy" with <em>mo-</em> stuck on the front. That's a real Liru rule: <em>mo-</em> flips a word's meaning to its opposite or balancing pair. <em>houli</em> "happy" → <em>mohouli</em> "sad."</p><p>Not every word has a <em>mo-</em> partner, but when one does exist, the rule is reliable. You'll see more pairs as the course continues.</p>`},

  {id:"l22_feelings2",
   title:"Angry, Afraid, Worried, Surprised",
   desc:"tauki, moyeri, muhi, kaumi",
   icon:"😠",
   vocabKey:"l22_feelings2",
   xp:20,
   unit:3,
   intro:`<h3>😠 Four more feelings</h3><p>Four common feeling adjectives:</p><ul><li><em>tauki</em> — angry</li><li><em>moyeri</em> — afraid</li><li><em>muhi</em> — anxious (or worried)</li><li><em>kaumi</em> — surprised</li></ul><p>All four work the same way as <em>houli</em> and <em>mohouli</em> — use <em>su</em> to say someone is feeling them:</p><span class="example">Ne su tauki. <span class="gloss">I am angry.</span></span><span class="example">Maya su moyeri. <span class="gloss">Maya is afraid.</span></span><span class="example">Te su muhi. <span class="gloss">You are anxious.</span></span><span class="example">Yuna su kaumi. <span class="gloss">Yuna is surprised.</span></span><p>Notice <em>moyeri</em> starts with <em>mo-</em>, just like <em>mohouli</em> from the last lesson. The <em>mo-</em> rule again — its partner is the Liru word for "brave," which we'll meet later.</p>`},

  // ── UNIT 5: TIME AND TENSE (L25–L31) ─────────────────────────────────
  {id:"l25_past",
   title:"Past Tense",
   desc:"wa + liru",
   icon:"⏪",
   vocabKey:"l25_past",
   xp:20,
   unit:4,
   isSentence:true,
   intro:`<h3>⏪ Talking about the past</h3><p>Liru marks past tense with the particle <em>wa</em>, placed right before the verb. Verbs themselves never change form.</p><span class="example">Ne tahu. <span class="gloss">I eat.</span></span><span class="example">Ne wa tahu. <span class="gloss">I ate.</span></span><h3>🗣️ One new verb</h3><p>This unit also introduces <em>liru</em> — to speak, talk, or say.</p><span class="example">Te liru. <span class="gloss">You speak.</span></span><span class="example">Te wa liru. <span class="gloss">You spoke.</span></span>`},

  {id:"l26_future",
   title:"Future Tense",
   desc:"wu",
   icon:"⏩",
   vocabKey:"l26_future",
   xp:20,
   unit:4,
   isSentence:true,
   intro:`<h3>⏩ Talking about the future</h3><p>Future tense works the same way as past — just swap <em>wa</em> for <em>wu</em>.</p><span class="example">Ne tahu. <span class="gloss">I eat.</span></span><span class="example">Ne wa tahu. <span class="gloss">I ate.</span></span><span class="example">Ne wu tahu. <span class="gloss">I will eat.</span></span><p>Same particle position, same rule: right before the verb.</p>`},

  {id:"l27_timewords",
   title:"Day, Night, Time, Soon",
   desc:"lawe, none, wele, wuhi",
   icon:"🌗",
   vocabKey:"l27_timewords",
   xp:18,
   unit:4,
   intro:`<h3>🌗 Words for time</h3><p>Liru has clean roots for the basics of time:</p><ul><li><em>lawe</em> — day</li><li><em>none</em> — night</li><li><em>wele</em> — time</li><li><em>wuhi</em> — soon</li></ul><p>Each part of the day stands as its own root — <em>yauhe</em> (morning), <em>pouhe</em> (evening), and <em>none</em> (night). <em>wele</em> is the abstract noun for time itself, and <em>wuhi</em> means "soon."</p>`},

  {id:"l28_anchors",
   title:"Today, Yesterday, Tomorrow",
   desc:"lo lawe, wa lawe, wu lawe + lole, wale, wule",
   icon:"📅",
   vocabKey:"l28_anchors",
   xp:22,
   unit:4,
   isSentence:true,
   intro:`<h3>📅 The everyday time anchors</h3><p>Liru builds today, yesterday, and tomorrow transparently from words you already know:</p><ul><li><em>lo lawe</em> (this + day) → today</li><li><em>wa lawe</em> (past + day) → yesterday</li><li><em>wu lawe</em> (future + day) → tomorrow</li></ul><p>Three more particles round out the toolkit:</p><ul><li><em>lole</em> — now</li><li><em>wale</em> — before</li><li><em>wule</em> — after</li></ul><p><em>Note: these end in -e but they're particles, not nouns — the <strong>-le</strong> suffix marks them as time words.</em></p><span class="example">Ne wa tahu lo lawe. <span class="gloss">I ate today.</span></span><span class="example">Lole, ne tahu. <span class="gloss">Now, I'm eating.</span></span>`},

  {id:"l29_negation",
   title:"Past & Future Negation",
   desc:"mai wa, mai wu",
   icon:"🚫",
   vocabKey:"l29_negation",
   xp:20,
   unit:4,
   isSentence:true,
   intro:`<h3>🚫 "Didn't" and "won't"</h3><p>Negation works in both tenses — <em>mai</em> goes before the tense particle.</p><span class="example">Ne mai tahu. <span class="gloss">I don't eat.</span></span><span class="example">Ne mai wa tahu. <span class="gloss">I didn't eat.</span></span><span class="example">Ne mai wu tahu. <span class="gloss">I won't eat.</span></span><p>The order is always <em>mai</em> → tense particle → verb.</p>`},

  {id:"l30_practice",
   title:"Unit 5 Exam: Time and Tense",
   desc:"Three hearts. Show what you know.",
   icon:"🌊",
   vocabKey:"l30_practice",
   xp:22,
   unit:4,

   isCheckpoint:true,
   intro:`<h3>🌊 Unit 5 Exam</h3><p>This is your Unit 5 exam. <strong>Three hearts — show what you've learned.</strong> Pass it to complete the unit.</p><p>Everything from this unit — tense particles, time anchors, negation — is fair game, alongside what you know from Units 1–4. Read each sentence aloud in English first, then assemble.</p>`},

  // ── UNIT 6: CONNECTORS AND DEMONSTRATIVES (L32–L38) ──────────────────
  {id:"l32_thisthat",
   title:"This and That",
   desc:"lo, falo",
   icon:"👉",
   vocabKey:"l32_thisthat",
   xp:20,
   unit:5,
   isSentence:true,
   intro:`<h3>👉 Pointing things out</h3><p>Liru has two demonstratives — words for "this" and "that":</p><ul><li><em>lo</em> — this (close to me)</li><li><em>falo</em> — that (over there)</li></ul><p>They go right before the noun:</p><span class="example">lo piwe <span class="gloss">this child</span></span><span class="example">falo wame <span class="gloss">that friend</span></span><p>Liru has no equivalent of English "the" or "a." When you want to point to a specific one, use <em>lo</em> or <em>falo</em>. Without them, <em>piwe</em> on its own can mean "child," "the child," or "a child" depending on context.</p><p>You've been using <em>lo</em> already without realizing it — <em>lo lawe</em> (today) is literally "this day." That same <em>lo</em> can attach to any noun.</p>`},

  {id:"l33_plurals",
   title:"Plurals: These and Those",
   desc:"loa, faloa + the -a plural rule",
   icon:"👥",
   vocabKey:"l33_plurals",
   xp:22,
   unit:5,
   isSentence:true,
   intro:`<h3>👥 More than one</h3><p>You already know how to make a pronoun plural — add <em>-a</em>: <em>ne</em> → <em>nea</em>, <em>te</em> → <em>tea</em>, <em>ve</em> → <em>vea</em>.</p><p>The same rule works for any noun:</p><ul><li><em>piwe</em> → <em>piwea</em> (children)</li><li><em>wame</em> → <em>wamea</em> (friends)</li><li><em>mawe</em> → <em>mawea</em> (mothers)</li></ul><p>One rule for both. Pronouns and nouns pluralize the same way: just add <em>-a</em>.</p><h3>👈 Pointing at more than one</h3><p>Demonstratives also pluralize the same way:</p><ul><li><em>loa</em> — these (plural of <em>lo</em>)</li><li><em>faloa</em> — those (plural of <em>falo</em>)</li></ul><p>Use them with plural nouns:</p><span class="example">loa piwea <span class="gloss">these children</span></span><span class="example">faloa wamea <span class="gloss">those friends</span></span><h3>👪 Talking about a group's things</h3><p>You already know the plural possessives from earlier lessons: <em>neoa</em> (our), <em>veoa</em> (their). They're built the same way as everything else — start with the singular possessive (<em>neo</em>, <em>veo</em>) and add <em>-a</em>:</p><ul><li><em>neo</em> (my) → <em>neoa</em> (our)</li><li><em>veo</em> (his/her) → <em>veoa</em> (their)</li></ul><p>They work in front of plural nouns too — both pieces just add <em>-a</em>:</p><span class="example">neoa mawea <span class="gloss">our mothers</span></span><span class="example">veoa loyea <span class="gloss">their brothers</span></span><p>The pattern is consistent: anywhere you'd want to mark "more than one," add <em>-a</em>.</p>`},

  {id:"l34_andbutorwith",
   title:"And, But, Or, With",
   desc:"sho, ma, au, ko",
   icon:"🔗",
   vocabKey:"l34_andbutorwith",
   xp:24,
   unit:5,
   isSentence:true,
   intro:`<h3>🔗 Joining ideas</h3><p>Four short words let you join nouns, clauses, and people:</p><ul><li><em>sho</em> — and</li><li><em>ma</em> — but</li><li><em>au</em> — or</li><li><em>ko</em> — with</li></ul><h3><em>sho</em> (and)</h3><p><em>sho</em> joins two nouns or two clauses:</p><span class="example">Yuna sho Kai su wamea. <span class="gloss">Yuna and Kai are friends.</span></span><span class="example">Ne tahu sho ne shahu. <span class="gloss">I'm eating and drinking.</span></span><h3><em>ma</em> (but)</h3><p><em>ma</em> connects a contrast:</p><span class="example">Ne su houli, ma Maya su mohouli. <span class="gloss">I'm happy, but Maya is sad.</span></span><h3><em>au</em> (or)</h3><p><em>au</em> gives a choice between two things:</p><span class="example">Ne wanu tahe au shahe. <span class="gloss">I want food or a drink.</span></span><h3><em>ko</em> (with)</h3><p><em>ko</em> attaches to a noun or pronoun to mean "in the company of":</p><span class="example">Ne tahu ko Maya. <span class="gloss">I eat with Maya.</span></span><span class="example">Yuna su ko veo wahe. <span class="gloss">Yuna is with her family.</span></span>`},

  {id:"l35_intensifiers",
   title:"Without, Very, Also",
   desc:"moko, ori, vini",
   icon:"💪",
   vocabKey:"l35_intensifiers",
   xp:20,
   unit:5,
   intro:`<h3>🚫 Without — and the <em>mo-</em> rule again</h3><p><em>moko</em> means "without" — the opposite of <em>ko</em> "with." That's the <em>mo-</em> rule you've already met (in <em>mohouli</em> "sad" from <em>houli</em> "happy"): put <em>mo-</em> on the front of a word to flip it to its balancing partner.</p><span class="example">Ne tahu ko Maya. <span class="gloss">I eat with Maya.</span></span><span class="example">Ne tahu moko Maya. <span class="gloss">I eat without Maya.</span></span><h3>💪 Very and Also</h3><p>Two short adverbs add nuance to your sentences:</p><ul><li><em>ori</em> — very (or really, intensely)</li><li><em>vini</em> — also (or too, in addition)</li></ul><p><em>ori</em> comes before an adjective to intensify it:</p><span class="example">Ne su ori houli. <span class="gloss">I am very happy.</span></span><span class="example">Maya su ori tauki. <span class="gloss">Maya is very angry.</span></span><p><em>vini</em> comes before the verb to mean "also" or "too":</p><span class="example">Ve vini wa liru. <span class="gloss">She also spoke.</span></span><span class="example">Ne vini wamu Yuna. <span class="gloss">I also like Yuna.</span></span>`},

  {id:"l36_questions",
   title:"Asking Questions",
   desc:"ki, kile, kishe, kiwi",
   icon:"❓",
   vocabKey:"l36_questions",
   xp:22,
   unit:5,
   isSentence:true,
   intro:`<h3>❓ Asking yes/no questions</h3><p>Liru has one more question word — <em>ki</em>, the yes/no question particle. Put it at the front of any normal sentence to turn it into a yes/no question:</p><span class="example">Te wanu tahe. <span class="gloss">You want food.</span></span><span class="example">Ki te wanu tahe? <span class="gloss">Do you want food?</span></span><p>The answer is <em>ai</em> (yes) or <em>mai</em> (no) — words you've known since Unit 1.</p><h3>🗓️ Three more question words</h3><p>You already know <em>kiwa</em> (what) and <em>kipue</em> (who). Three more complete the WH-set:</p><ul><li><em>kile</em> — when</li><li><em>kishe</em> — how</li><li><em>kiwi</em> — why</li></ul><p>All three go at the front of the sentence, like <em>kiwa</em> and <em>kipue</em>:</p><span class="example">Kile te wa tahu? <span class="gloss">When did you eat?</span></span><span class="example">Kishe te su? <span class="gloss">How are you?</span></span><span class="example">Kiwi ve su tauki? <span class="gloss">Why is she angry?</span></span><p>The rest of the sentence stays in normal SVO order, with the unknown piece simply absent — same rule as before.</p>`},

   title:"Unit 6 Exam: Connectors and Demonstratives",

  // ── UNIT 7: PLACES AND GOING (L39–L43) ────────────────────────────────

  {id:"l39_goingcoming",
   title:"Going and Coming",
   desc:"halu, vanu, movanu",
   icon:"🚶",
   vocabKey:"l39_goingcoming",
   xp:18,
   unit:6,
   isSentence:true,
   intro:`<h3>🚶 Going and coming</h3><p>Two of the most-used verbs in any language. <em>halu</em> means <strong>to go</strong> and <em>vanu</em> means <strong>to come.</strong> Like every Liru verb, they end in <em>-u</em>.</p><span class="example">Ne halu. <span class="gloss">I go.</span></span><span class="example">Te vanu. <span class="gloss">You come.</span></span><h3>📍 Adding a destination</h3><p>A bare <em>halu</em> with no destination is fine ("I'm leaving / I'm going"), but most of the time you'll want to say where to. Liru uses small location-marking words for that — you'll meet them in the next two lessons.</p><h3>🔁 <em>movanu</em> — to leave</h3><p>Add <em>mo-</em> to <em>vanu</em> and you get <em>movanu</em> — the opposite of <em>vanu</em>. Where <em>vanu</em> is "come" or "arrive," <em>movanu</em> is "leave" or "depart."</p><span class="example">Ve wa movanu. <span class="gloss">She left.</span></span>`},

  {id:"l40_places",
   title:"Places",
   desc:"hiwe, kewe, yahe, tieme, senehiwe, kupetieme",
   icon:"🏠",
   vocabKey:"l40_places",
   xp:20,
   unit:6,
   intro:`<h3>🏠 Places people go</h3><p>Six places to anchor the rest of this unit.</p><h3>🏡 Home</h3><p><em>hiwe</em> — house, or home. The verb form <em>hiwu</em> means <strong>to live</strong> or <strong>to dwell</strong> somewhere.</p><h3>🧱 Productive compounds</h3><p><em>senehiwe</em> (school) is <em>sene</em> (knowledge) + <em>hiwe</em> (house) — literally "knowledge house." <em>kupetieme</em> (café) is <em>kupe</em> (coffee) + <em>tieme</em> (store). Liru builds compound nouns by sticking smaller words together — once you know the parts, the whole is transparent.</p><h3>📍 <em>yahe</em> — place</h3><p><em>yahe</em> is the generic word for "place" or "location" — useful when you don't have a more specific noun.</p>`},

  {id:"l41_locatives",
   title:"Locative Particles",
   desc:"ya, wo, mowo, so, fa",
   icon:"📍",
   vocabKey:"l41_locatives",
   xp:22,
   unit:6,
   isSentence:true,
   intro:`<h3>📍 Where things are</h3><p>Liru marks locations with small particles that go between the noun and the location. There's no equivalent of English <em>the</em> — just the noun and the particle.</p><h3>🧍 Static location: <em>ya</em>, <em>wo</em></h3><p>These say where something <strong>is.</strong></p><ul><li><em>ya</em> — at</li><li><em>wo</em> — in / inside</li></ul><span class="example">Ne su ya hiwe. <span class="gloss">I am at the house.</span></span><span class="example">Maya su wo kewe. <span class="gloss">Maya is in the room.</span></span><h3>🚪 <em>mowo</em> — outside</h3><p>Add <em>mo-</em> to <em>wo</em> and you flip it around — same productive <em>mo-</em> rule from Unit 4.</p><span class="example">Yuna su mowo hiwe. <span class="gloss">Yuna is outside the house.</span></span><h3>🏃 Motion: <em>so</em>, <em>fa</em></h3><p>These mark where motion is heading or coming from.</p><ul><li><em>so</em> — to / toward</li><li><em>fa</em> — from</li></ul><span class="example">Ne halu so kupetieme. <span class="gloss">I go to the café.</span></span><span class="example">Ve wa vanu fa hiwe. <span class="gloss">She came from the house.</span></span>`},

  {id:"l42_herethere",
   title:"Here, There, and Where",
   desc:"loya, faloya, kiya",
   icon:"👉",
   vocabKey:"l42_herethere",
   xp:22,
   unit:6,
   isSentence:true,
   intro:`<h3>👉 Here, there, where</h3><p>Three more locative words — two adverbs and one question word. They build on words you already know.</p><h3>📍 <em>loya</em> — here / <em>faloya</em> — there</h3><p>Remember <em>lo</em> (this) and <em>falo</em> (that) from Unit 6? Add <em>-ya</em> (the locative particle) and you get the matching place adverb:</p><ul><li><em>lo</em> (this) → <em>loya</em> (here, at this place)</li><li><em>falo</em> (that) → <em>faloya</em> (there, at that place)</li></ul><span class="example">Ne su loya. <span class="gloss">I am here.</span></span><span class="example">Maya su faloya. <span class="gloss">Maya is there.</span></span><p>These work like English "here" and "there" — they don't need a separate locative particle.</p><h3>❓ <em>kiya</em> — where</h3><p><em>kiya</em> is the question word for "where" — it joins the WH-set you learned in Unit 6 (<em>kiwa</em>, <em>kipue</em>, <em>kile</em>, <em>kishe</em>, <em>kiwi</em>).</p><span class="example">Kiya te su? <span class="gloss">Where are you?</span></span><span class="example">Kiya Maya halu? <span class="gloss">Where is Maya going?</span></span><h3>✂️ Particle drop in <em>kiya</em> questions</h3><p>When you ask "where to?" or "where from?", the locative particle (<em>so</em>, <em>fa</em>, <em>ya</em>) <strong>drops</strong> in the question. Context tells the listener what was meant.</p><span class="example">Kiya te halu? <span class="gloss">Where are you going? (no <em>so</em> needed)</span></span><span class="example">Kiya ve wa vanu? <span class="gloss">Where did she come from? (no <em>fa</em> needed)</span></span>`},

  {id:"l43_exam",
   title:"Unit 7 Exam: Places and Going",
   desc:"Three hearts. Show what you know.",
   icon:"🏠",
   vocabKey:"l43_exam",
   xp:24,

   intro:`<h3>🏠 Unit 7 Exam</h3><p>This is your Unit 7 exam. <strong>Three hearts — show what you've learned.</strong> Pass it to complete the unit.</p><p>Everything from this unit — going and coming, locative particles, places, here/there/where — is fair game, alongside what you know from Units 1–6.</p>`},

  // ── UNIT 8: ACTION VERBS (L44–L49) ───────────────────────────────────
  {id:"l44_sensory",
   title:"To See, To Hear",
   desc:"tiru, liwu — and two new friends",
   icon:"🐾",
   vocabKey:"l44_sensory",
   xp:20,
   unit:7,
   intro:`<h3>🐾 Sensory verbs and two new friends</h3><p><em>tiru</em> means <strong>to see</strong> and <em>liwu</em> means <strong>to hear</strong>. Both are action verbs — they go without <em>su</em>:</p><span class="example">Ne tiru Maya. <span class="gloss">I see Maya.</span></span><span class="example">Te liwu ne. <span class="gloss">You hear me.</span></span><h3>🐕 Two new nouns</h3><p>Two animals to drill them with. Useful as subjects, useful as objects.</p><ul><li><em>paipe</em> — dog</li><li><em>mewe</em> — cat</li></ul><span class="example">Paipe tiru ne. <span class="gloss">The dog sees me.</span></span><p>You'll put these together in sentences in the next lesson.</p>`},

  {id:"l45_sensesentences",
   title:"Verbs in Sentences",
   desc:"Drilling tiru, liwu, paipe, mewe",
   icon:"🐕",
   vocabKey:"l45_sensesentences",
   xp:18,
   unit:7,
   isSentence:true,
   intro:`<h3>🐕 Putting it together</h3><p>Now you've got <em>tiru</em> (see) and <em>liwu</em> (hear), plus two animals to drill them with. <strong>No new words this lesson</strong> — just sentences.</p><span class="example">Ne tiru paipe. <span class="gloss">I see the dog.</span></span><span class="example">Maya liwu mewe. <span class="gloss">Maya hears the cat.</span></span>`},

  {id:"l46_routine",
   title:"To Sleep, Work, Do",
   desc:"rau, fasu, puhu",
   icon:"💤",
   vocabKey:"l46_routine",
   xp:18,
   unit:7,
   intro:`<h3>💤 Daily-routine verbs</h3><p>Three high-frequency verbs for what people do all day:</p><ul><li><em>rau</em> — to sleep</li><li><em>fasu</em> — to work</li><li><em>puhu</em> — to do (or perform)</li></ul><p><em>puhu</em> is the general "to do" — useful for asking what someone is up to:</p><span class="example">Kiwa te puhu? <span class="gloss">What are you doing?</span></span>`},

  {id:"l47_exchange",
   title:"To Give, Take, Find",
   desc:"feru, moferu, riku",
   icon:"🎁",
   vocabKey:"l47_exchange",
   xp:18,
   unit:7,
   intro:`<h3>🎁 Exchange and finding</h3><p>Three more verbs:</p><ul><li><em>feru</em> — to give</li><li><em>moferu</em> — to take</li><li><em>riku</em> — to find (or meet)</li></ul><h3>🔁 The mo- pair</h3><p>Notice that <em>moferu</em> is built from <em>mo-</em> + <em>feru</em>, the same productive prefix you've seen on <em>moko</em> (after) and <em>mowo</em> (out). Giving and taking are opposites — the <em>mo-</em> rule captures that directly.</p><span class="example">Ne feru. <span class="gloss">I give.</span></span><span class="example">Ne moferu. <span class="gloss">I take.</span></span>`},

  {id:"l48_routinesentences",
   title:"Verbs in Sentences II",
   desc:"Drilling rau, fasu, puhu, feru, moferu, riku",
   icon:"🛌",
   vocabKey:"l48_routinesentences",
   xp:22,
   unit:7,
   isSentence:true,
   intro:`<h3>🛌 Drilling six more verbs</h3><p>You've got the routine verbs (<em>rau, fasu, puhu</em>) and the exchange verbs (<em>feru, moferu, riku</em>). <strong>No new words this lesson</strong> — just sentences.</p><h3>↔️ Give and take</h3><p>Watch for <em>feru</em> paired with <em>so</em> (to) and <em>moferu</em> paired with <em>fa</em> (from). Giving sends something <em>to</em> someone; taking pulls it <em>from</em> someone. The locatives match the direction.</p><span class="example">Ne feru lo so Yuna. <span class="gloss">I give this to Yuna.</span></span><span class="example">Kai wa moferu lo fa ne. <span class="gloss">Kai took this from me.</span></span>`},

  {id:"l49_exam",
   title:"Unit 8 Exam: Action Verbs",
   desc:"Three hearts. Show what you know.",
   icon:"✅",
   vocabKey:"l49_exam",
   xp:24,
   unit:7,
   isSentence:true,
   isCheckpoint:true,
   intro:`<h3>✅ Unit 8 Exam</h3><p>This is your Unit 8 exam. <strong>Three hearts — show what you've learned.</strong> Pass it to complete the unit.</p><p>Mixed practice across the eight new verbs (<em>tiru, liwu, rau, fasu, puhu, feru, moferu, riku</em>) and the two new animals (<em>paipe, mewe</em>). Past tense, locatives, questions — all fair game.</p>`},

  // ── UNIT 9: NUMBERS AND DAYS (L50–L54) ───────────────────────────────
  {id:"l50_numbers1",
   title:"Numbers 0–5",
   desc:"nuli, fani, runi, teni, shani, kani",
   icon:"🔢",
   vocabKey:"l50_numbers1",
   xp:18,
   unit:8,
   intro:`<h3>🔢 The first six numbers</h3><p>Numbers in Liru behave like adjectives. They precede the noun, and the noun takes the plural <em>-ea</em> when the count is more than one.</p><ul><li><em>nuli</em> — zero</li><li><em>fani</em> — one</li><li><em>runi</em> — two</li><li><em>teni</em> — three</li><li><em>shani</em> — four</li><li><em>kani</em> — five</li></ul><span class="example">Runi paipea. <span class="gloss">Two dogs.</span></span><span class="example">Fani wame. <span class="gloss">One friend.</span></span>`},

  {id:"l51_numbers2",
   title:"Numbers 6–10",
   desc:"veni, meni, oni, yani, hani",
   icon:"🔢",
   vocabKey:"l51_numbers2",
   xp:18,
   unit:8,
   intro:`<h3>🔢 The rest of the basics</h3><p>Five more numbers to round out single digits:</p><ul><li><em>veni</em> — six</li><li><em>meni</em> — seven</li><li><em>oni</em> — eight</li><li><em>yani</em> — nine</li><li><em>hani</em> — ten</li></ul><span class="example">Meni mewea. <span class="gloss">Seven cats.</span></span>`},

  {id:"l52_days",
   title:"Days of the Week",
   desc:"fanilawe through menilawe",
   icon:"📅",
   vocabKey:"l52_days",
   xp:20,
   unit:8,
   intro:`<h3>📅 Days as numbered days</h3><p>Liru day names are built from the numbers you just learned plus <em>lawe</em> (day). Sunday is day one, and the week counts from there.</p><ul><li><em>fanilawe</em> — Sunday (day 1)</li><li><em>runilawe</em> — Monday (day 2)</li><li><em>tenilawe</em> — Tuesday (day 3)</li><li><em>shanilawe</em> — Wednesday (day 4)</li><li><em>kanilawe</em> — Thursday (day 5)</li><li><em>venilawe</em> — Friday (day 6)</li><li><em>menilawe</em> — Saturday (day 7)</li></ul><p>Once you've learned the numbers, the day names build themselves.</p>`},

  {id:"l53_howmany",
   title:"How Many and How Old",
   desc:"kinai, haiwe, tau, ahu",
   icon:"🎂",
   vocabKey:"l53_howmany",
   xp:22,
   unit:8,
   isSentence:true,
   intro:`<h3>🎂 Counts, ages, and a new verb</h3><p><strong>A new verb: <em>ahu</em> — to have.</strong> Used like any other verb in SVO: <em>Ne ahu teni paipea</em> — "I have three dogs." Notice the noun is plural (<em>paipea</em>) when the count is more than one.</p><h3>❓ Asking quantities</h3><p><em>Kinai</em> means "how many" or "how much." Like other ki-words, it goes to the front of the sentence, with the plural noun in tow:</p><span class="example">Kinai paipea te ahu? <span class="gloss">How many dogs do you have?</span></span><h3>🎂 Talking about age</h3><p>Liru frames age as years completed, not as a length you've reached. <em>Kinai haiwea te wa tau?</em> literally asks "How many years have you completed?" The answer follows the same shape:</p><span class="example">Ne wa tau hani haiwea. <span class="gloss">I have completed ten years. (= I am ten.)</span></span><p><em>haiwe</em> = year. <em>tau</em> = to complete (from the root <em>tae</em> "totality, all").</p><h3>➕ Bigger numbers</h3><p>Liru builds larger numbers by stacking with hyphens: <em>runi-hani</em> (twenty), <em>teni-hani</em> (thirty), <em>runi-hani-fani</em> (twenty-one). You won't drill these in this lesson — single-digit ages only — but you'll see them in the wild.</p>`},

  {id:"l54_exam",
   title:"Unit 9 Exam: Numbers and Days",
   desc:"Three hearts. Show what you know.",
   icon:"✅",
   vocabKey:"l54_exam",
   xp:24,
   unit:8,
   isSentence:true,
   isCheckpoint:true,
   intro:`<h3>✅ Unit 9 Exam</h3><p>This is your Unit 9 exam. <strong>Three hearts — show what you've learned.</strong> Pass it to complete the unit.</p><p>Mixed practice across numbers (0–10), days of the week, the new verb <em>ahu</em>, the question word <em>kinai</em>, and the age idiom (<em>tau</em>, <em>haiwe</em>). Past tense, plurals, locatives — all fair game.</p>`},

  {id:"l56_food",
   title:"Food",
   desc:"houme, pome, mopome (+ bakery, fruit store)",

  {id:"l57_cooking",
   title:"Cooking",
   desc:"nahe, nahu",
   icon:"🍳",
   vocabKey:"l57_cooking",
   xp:18,
   unit:9,
   isSentence:true,
   intro:`<h3>🍳 A new verb: <em>nahu</em> — to cook</h3><p>You already know <em>tahu</em> "to eat." Its sibling is <em>nahu</em> "to cook." Both are everyday food verbs and they take food-noun objects:</p><span class="example">Ne nahu houme. <span class="gloss">I cook bread.</span></span><span class="example">Maya nahu pomea. <span class="gloss">Maya cooks fruits.</span></span><h3>🏠 The kitchen: <em>nahe</em></h3><p>The noun <em>nahe</em> means "kitchen" — the place where cooking happens. Use it with locatives <em>ya</em> (at) and <em>wo</em> (in) from Unit 7:</p><span class="example">Yuna su wo nahe. <span class="gloss">Yuna is in the kitchen.</span></span><h3>🔗 Stacking with modals</h3><p><em>nahu</em> stacks with <em>wanu</em>, <em>sahu</em>, and <em>shihu</em> just like any other verb:</p><span class="example">Maya sahu nahu mopomea. <span class="gloss">Maya can cook vegetables.</span></span>`},

  {id:"l59_money",
   title:"Money and Transactions",
   desc:"tone, hoyu, mohoyu, toke",

  {id:"l60_buyingselling",
   title:"Buying, Selling, Asking the Price",
   desc:"Transactional patterns; introduces nai",
   icon:"🛒",
   vocabKey:"l60_buyingselling",
   xp:24,
   unit:9,
   isSentence:true,
   intro:`<h3>💰 Asking the price</h3><p>Liru asks "how much" using the same <em>kinai</em> pattern you learned in Unit 9 — the noun pluralizes:</p><span class="example">Kinai tonea su lo houme? <span class="gloss">How much is this bread? (lit. how many monies is this bread?)</span></span><p>Notice <em>tone</em> ("money") pluralizes regularly to <em>tonea</em> — Liru treats money as a count noun, unlike English. The reply uses the same plural shape:</p><span class="example">Lo houme su hani tonea. <span class="gloss">This bread is ten monies.</span></span><h3>🛍️ Buying and selling</h3><p>Two verbs — <em>hoyu</em> (to buy) and its <em>mo-</em> partner <em>mohoyu</em> (to sell):</p><span class="example">Ne hoyu lo shae. <span class="gloss">I buy this tea.</span></span><span class="example">Maya hoyu pomea fa Kai. <span class="gloss">Maya buys fruits from Kai.</span></span><span class="example">Kai mohoyu houme so Maya. <span class="gloss">Kai sells bread to Maya.</span></span><p>The locatives <em>so</em> (to) and <em>fa</em> (from) from Unit 7 do the work English splits between "sell to" and "buy from."</p><h3>📦 A new quantifier: <em>nai</em></h3><p><em>nai</em> means "much" or "many" — used as an adjective with a plural noun:</p><span class="example">Ne ahu nai tonea. <span class="gloss">I have a lot of money.</span></span><span class="example">Maya hoyu nai pomea fa pometieme. <span class="gloss">Maya buys many fruits from the fruit store.</span></span><p><strong>A note on <em>kinai</em>:</strong> now that you know <em>nai</em>, the question word <em>kinai</em> decomposes transparently — <em>ki</em> (question particle) + <em>nai</em> (many/much) = "how many / how much." Same with <em>kile</em> (when), which is <em>ki</em> + <em>-le</em> (the time-particle ending you see in <em>lole</em> "now" and <em>fale</em> "then").</p>`},
