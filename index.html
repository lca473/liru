<style>
/* ═══════════════════════════════════════════════════════════════
   CSS VARIABLES & RESET
═══════════════════════════════════════════════════════════════ */
:root {
  --bg: #0F1A1F;
  --bg2: #162229;
  --card: #1C2F38;
  --card-hover: #22394A;
  --green: #58CC02;
  --green-dark: #46A302;
  --green-glow: rgba(88,204,2,0.18);
  --red: #FF4B4B;
  --red-glow: rgba(255,75,75,0.12);
  --gold: #FFC800;
  --gold-glow: rgba(255,200,0,0.15);
  --blue: #1CB0F6;
  --blue-glow: rgba(28,176,246,0.12);
  --purple: #CE82FF;
  --purple-glow: rgba(206,130,255,0.12);
  --text: #FFFFFF;
  --dim: #7A99A8;
  --mid: #A3BCC9;
  --border: #263A45;
  --input: #0B151B;
  --ok: #1E4A14;
  --bad: #4A1414;
  --radius: 16px;
  --font: 'Nunito', 'Baloo 2', system-ui, sans-serif;
  --display: 'Baloo 2', 'Nunito', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background:#0F1A1F; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; min-height:100dvh; overflow-x:hidden; }
button { font-family:var(--font); cursor:pointer; border:none; outline:none; color:#FFF; }
input, textarea, select { font-family:var(--font); outline:none; color:#FFF; }

/* ═══════════════════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════════════════ */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes pop { 0%{transform:scale(0.8);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes confetti { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-200px) rotate(720deg);opacity:0} }
@keyframes glow { 0%,100%{box-shadow:0 0 20px var(--green-glow)} 50%{box-shadow:0 0 40px var(--green-glow)} }
@keyframes slideResult { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes starField { from{transform:translateY(0)} to{transform:translateY(-50%)} }

.fade-up { animation: fadeUp 0.4s ease-out both; }
.fade-in { animation: fadeIn 0.3s ease-out both; }
.pop { animation: pop 0.35s ease-out both; }
.shake { animation: shake 0.4s ease-out; }
.float { animation: float 3s ease-in-out infinite; }

/* ═══════════════════════════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════════════════════════ */
.view { display:none; min-height:100vh; min-height:100dvh; background:var(--bg); }
.view.active { display:block; }

/* ═══════════════════════════════════════════════════════════════
   SHARED TOP NAV (all sub-pages)
═══════════════════════════════════════════════════════════════ */
.top-nav {
  position:sticky; top:0; z-index:200;
  display:flex; align-items:center; gap:12px;
  padding:14px 18px;
  background:rgba(15,26,31,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1.5px solid var(--border);
}
.top-nav-back {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; padding:8px 14px;
  color:var(--dim); font-size:13px; font-weight:800;
  display:flex; align-items:center; gap:6px;
  transition:all 0.15s; flex-shrink:0;
}
.top-nav-back:hover { color:var(--text); border-color:var(--mid); }
.top-nav-title {
  font-family:var(--display); font-size:18px; font-weight:800; color:var(--green);
  flex:1; text-align:center;
}
.top-nav-spacer { width:72px; flex-shrink:0; }

/* ═══════════════════════════════════════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════════════════════════════════════ */
.progress-track { width:100%; height:14px; background:var(--input); border-radius:99px; overflow:hidden; }
.progress-fill { height:100%; border-radius:99px; transition:width 0.6s cubic-bezier(.34,1.56,.64,1); }
.badge { display:inline-flex; align-items:center; gap:5px; border-radius:99px; padding:4px 12px; font-size:13px; font-weight:800; }
.badge-xp { background:var(--gold-glow); border:1.5px solid var(--gold); color:var(--gold); }
.badge-streak { background:rgba(255,120,0,0.12); border:1.5px solid #FF7800; color:#FF7800; }
.badge-lessons { background:var(--blue-glow); border:1.5px solid var(--blue); color:var(--blue); }
.opt-btn { width:100%; padding:15px 18px; background:var(--card); border:2.5px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:16px; font-weight:700; text-align:left; transition:all 0.15s; position:relative; overflow:hidden; }
.opt-btn:active { transform:scale(0.97); }
.opt-btn.selected { background:var(--blue-glow); border-color:var(--blue); color:var(--text); box-shadow:0 0 16px var(--blue-glow); }
.opt-btn.correct { background:var(--ok); border-color:var(--green); box-shadow:0 0 24px var(--green-glow); }
.opt-btn.wrong { background:var(--bad); border-color:var(--red); box-shadow:0 0 24px var(--red-glow); }
.opt-btn.faded { opacity:0.35; }
.match-btn { padding:12px 14px; border-radius:13px; font-size:14px; font-weight:700; border:2.5px solid var(--border); background:var(--card); color:var(--text); transition:all 0.15s; text-align:center; }
.match-btn.selected { background:var(--blue-glow); border-color:var(--blue); }
.match-btn.matched { background:var(--ok); border-color:var(--green); opacity:0.5; }
.match-btn.wrong-match { background:var(--bad); border-color:var(--red); }
.word-chip { padding:9px 15px; border-radius:11px; font-size:15px; font-weight:700; border:2.5px solid var(--border); background:var(--card); color:var(--text); transition:all 0.12s; }
.word-chip:active { transform:scale(0.93); }
.word-chip.placed { background:var(--blue-glow); border-color:var(--blue); }
.lesson-card { width:100%; display:flex; align-items:center; gap:14px; padding:14px 16px; border:2.5px solid var(--border); border-radius:var(--radius); margin-bottom:10px; text-align:left; transition:all 0.15s; background:var(--card); }
.lesson-card:active { transform:scale(0.98); }
.lesson-card.completed { background:rgba(88,204,2,0.06); border-color:var(--green); }
.lesson-card.locked { opacity:0.35; cursor:default; }
.lesson-icon { width:50px; height:50px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; background:var(--input); }
.lesson-card.completed .lesson-icon { background:var(--green-glow); border:2px solid var(--green); }
.tab-bar { display:flex; border-bottom:1.5px solid var(--border); margin:8px 20px 0; }
.tab-btn { flex:1; padding:13px 0; background:none; color:var(--dim); font-size:13px; font-weight:800; letter-spacing:0.5px; border-bottom:3px solid transparent; transition:all 0.2s; }
.tab-btn.active { color:var(--green); border-bottom-color:var(--green); }
.lb-row { display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--card); border:1.5px solid var(--border); border-radius:14px; margin-bottom:8px; }
.lb-row.is-me { background:rgba(88,204,2,0.06); border:2px solid var(--green); }
.btn-primary { width:100%; padding:16px; background:var(--green); border-radius:var(--radius); color:#fff; font-size:17px; font-weight:800; letter-spacing:0.3px; box-shadow:0 4px 20px var(--green-glow), inset 0 1px 0 rgba(255,255,255,0.15); transition:all 0.15s; border:none; }
.btn-primary:active { transform:scale(0.97); background:var(--green-dark); }
.btn-primary:disabled { background:var(--border); box-shadow:none; cursor:default; }
.btn-secondary { width:100%; padding:14px; background:none; border:2px solid var(--border); border-radius:var(--radius); color:var(--dim); font-size:15px; font-weight:700; }
.check-bar { position:sticky; bottom:0; left:0; right:0; padding:16px 0 20px 0; padding-bottom:max(20px, env(safe-area-inset-bottom)); background:var(--bg); margin-top:24px; z-index:5; }
.confetti-piece { position:fixed; width:10px; height:10px; border-radius:2px; animation:confetti 1.2s ease-out forwards; pointer-events:none; }
.pronun { color:var(--blue); font-size:13px; font-style:italic; font-weight:600; margin-top:2px; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }

/* ═══════════════════════════════════════════════════════════════
   LANDING PAGE
═══════════════════════════════════════════════════════════════ */
#view-home {
  position:relative;
  overflow:hidden;
}
.landing-stars {
  position:absolute; top:0; left:0; right:0; bottom:0;
  pointer-events:none; z-index:0; overflow:hidden;
}
.star {
  position:absolute; background:#FFF; border-radius:50%;
  animation:float linear infinite;
  opacity:0.15;
}
.landing-content {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; min-height:100dvh;
  padding:40px 20px;
}
.landing-hero {

// VIEW ROUTER
// ═══════════════════════════════════════════════════════════════
let currentView = 'home';
let grammarRendered = false;
let dictRendered = false;
let contactRendered = false;

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  window.scrollTo(0,0);
  currentView = name;

  if (name === 'grammar' && !grammarRendered) { renderGrammar(); grammarRendered = true; }
  if (name === 'dictionary' && !dictRendered) { renderDict(); dictRendered = true; }
  if (name === 'contact' && !contactRendered) { renderContact(); contactRendered = true; }
  if (name === 'app') { renderApp(); }
}

  {id:"moprefix",     title:"The mo- Prefix",            desc:"Every thing has its balancing partner",      icon:"☯️", vocabKey:"moprefix",     xp:20, unit:0, isSentence:true, intro:`<h3>☯️ The <em>mo-</em> Prefix</h3><p>In Liru, many opposites are built by adding <em>mo-</em> to the front of a word. You don't learn a separate word for the opposite — you just add <em>mo-</em>.</p><p>For example, you already know <em>lune</em> (light). To say <strong>darkness</strong>, just add <em>mo-</em>:</p><span class="example">lune <span class="gloss">light</span> → molune <span class="gloss">darkness</span></span><p>The same pattern works for the adjectives and verbs built from the root. <em>luni</em> means <strong>bright</strong>, so <em>moluni</em> means <strong>dark</strong>:</p><span class="example">luni <span class="gloss">bright</span> → moluni <span class="gloss">dark</span></span><p>This is one of the most important patterns in Liru. Once you know a word, you often already know its opposite — just add <em>mo-</em>.</p><p>In this lesson, you'll practice with <em>lune / molune</em> (light / darkness) and <em>waihe / mowaihe</em> (hope / despair).</p>`},

  {id:"adjectives2",  title:"Basic Adjectives II",       desc:"Beautiful, ugly, strong, weak",              icon:"✨",  vocabKey:"adjectives2",  xp:18, unit:0},

  {id:"svo",          title:"SVO + Love & Hate",         desc:"Subject-verb-object sentences",              icon:"💗",  vocabKey:"svo",          xp:22, unit:0},
  {id:"yesno",        title:"Yes/No Questions",          desc:"Asking 'is it?' with ki",                    icon:"❓",  vocabKey:"yesno",        xp:22, unit:0, isSentence:true, intro:`<h3>❓ Yes/No Questions</h3><p>To turn a statement into a yes-or-no question in Liru, just put <em>ki</em> at the front. The rest of the sentence stays exactly the same.</p><span class="example">Te su Neal. <span class="gloss">You are Neal.</span></span><span class="example">Ki te su Neal? <span class="gloss">Are you Neal?</span></span><p>That's it. No changing the word order, no adding extra words — just <em>ki</em> at the front.</p><p>In this lesson, you'll practice asking simple yes/no questions.</p>`},

  {id:"home1",           title:"Home I: Rooms & Furniture",  desc:"Rooms, tables, chairs, beds, walls",           icon:"🏠",  vocabKey:"home1",           xp:22, unit:1},
  {id:"home2",           title:"Home II: Kitchen & Dining",  desc:"Kitchen, plates, cups, forks, spoons",         icon:"🍽️", vocabKey:"home2",           xp:20, unit:1},
  {id:"nouninflection",  title:"Noun Plurals & Possession",  desc:"The -ea, -eo, -eoa suffixes on nouns",         icon:"📐",  vocabKey:"nouninflection",  xp:20, unit:1, isSentence:true, intro:`<h3>📐 Noun Plurals & Possession</h3><p>Liru uses three short endings on nouns to show plural and "belonging to." They attach right to the end of a noun.</p><p><em>-ea</em> makes a noun <strong>plural</strong>:</p><span class="example">paipe <span class="gloss">dog</span> → paipea <span class="gloss">dogs</span></span><p><em>-eo</em> means <strong>"of" that noun</strong> (possession):</p><span class="example">paipeo houme <span class="gloss">the dog's bread</span></span><p>And <em>-eoa</em> combines both — <strong>"of those plural things"</strong>:</p><span class="example">paipeoa houme <span class="gloss">the dogs' bread</span></span><p>The endings attach only to nouns (words ending in <em>-e</em>), never to adjectives or verbs.</p>`},
  {id:"demonstratives",  title:"Demonstratives",             desc:"This, these, that, those",                     icon:"👉",  vocabKey:"demonstratives",  xp:18, unit:1},
  {id:"tense",           title:"Past & Future Tense",        desc:"Saying what happened and what will happen",    icon:"⏳",  vocabKey:"tense",           xp:22, unit:1, isSentence:true, intro:`<h3>⏳ Past & Future Tense</h3><p>By default, a Liru verb has no tense — it could be happening now, or it could be a general truth. To make time clear, add one of two particles right before the verb.</p><p><em>wa</em> means <strong>past</strong>:</p><span class="example">Ne wa tahu. <span class="gloss">I ate.</span></span><p><em>wu</em> means <strong>future</strong>:</p><span class="example">Ne wu tahu. <span class="gloss">I will eat.</span></span><p>Without either particle, the verb is present or timeless:</p><span class="example">Ne tahu. <span class="gloss">I eat.</span></span><p>That's the whole system — no conjugations, no irregular forms, just these two tiny words.</p>`},
  {id:"negation",        title:"Negation",                   desc:"Saying no — mai with verbs",                   icon:"🚫",  vocabKey:"negation",        xp:20, unit:1, isSentence:true, intro:`<h3>🚫 Negation</h3><p>To negate a verb — to say <strong>not</strong> — put <em>mai</em> right before the verb.</p><span class="example">Ne tahu. <span class="gloss">I eat.</span></span><span class="example">Ne mai tahu. <span class="gloss">I don't eat.</span></span><p>It works the same way with past and future tense — <em>mai</em> comes before the tense particle:</p><span class="example">Ne mai wa tahu. <span class="gloss">I didn't eat.</span></span><span class="example">Ne mai wu tahu. <span class="gloss">I won't eat.</span></span><p>One word, always in the same spot. No "do" or "did" helpers needed.</p>`},

  {id:"unit2review",     title:"Unit 2 Review",              desc:"Review everything from Unit 2 so far",         icon:"🔁",  vocabKey:"_review",         xp:22, unit:1, isReview:true, reviewPool:["home1","home2","demonstratives","relational1","relational2","food1","food2","food3","animals1","animals2","animals3","nature1","nature2","nature3"]},
  {id:"modals",          title:"Modal Verbs",                desc:"Can, want, must, should — chaining verbs",     icon:"🗝️", vocabKey:"modals",          xp:22, unit:1, isSentence:true, intro:`<h3>🗝️ Modal Verbs</h3><p>Modal verbs express possibility, desire, necessity, and obligation. In Liru they work differently from English — instead of special helper words, they're just regular verbs that stack with other verbs.</p><p>The four main modals:</p><span class="example">sahu <span class="gloss">to be able to (can)</span></span><span class="example">wanu <span class="gloss">to want</span></span><span class="example">mihu <span class="gloss">to need (must)</span></span><span class="example">shihu <span class="gloss">to ought to (should)</span></span><p>Chain them together by putting the modal first, then the action verb right after:</p><span class="example">Ne wanu tahu. <span class="gloss">I want to eat.</span></span><span class="example">Ne sahu liru. <span class="gloss">I can speak.</span></span><p>That's the whole rule — modal + verb, no "to" in between.</p>`},

  // ── UNIT 3: CONNECTING WORDS (L38–L55) ──────────────────────────
  {id:"conjunctions1",   title:"Conjunctions I",             desc:"And, but, or — joining words",                 icon:"🔗",  vocabKey:"conjunctions1",   xp:22, unit:2, isSentence:true, intro:`<h3>🔗 Conjunctions: And, But, Or</h3><p>Three short words connect phrases and ideas:</p><span class="example">sho <span class="gloss">and</span></span><span class="example">ma <span class="gloss">but</span></span><span class="example">au <span class="gloss">or</span></span><p>They work just like in English — sitting between the two things they connect:</p><span class="example">Ne sho te <span class="gloss">me and you</span></span><span class="example">Ne nawu lune ma mai molune. <span class="gloss">I love light but not darkness.</span></span><span class="example">Te au ne? <span class="gloss">You or me?</span></span><p>These are the most common connectors you'll use in longer sentences.</p>`},
  {id:"questions2",      title:"Content Questions",          desc:"Who, what, where, when, why, how",             icon:"❓",  vocabKey:"questions2",      xp:22, unit:2, isSentence:true, intro:`<h3>❓ Content Questions</h3><p>To ask <strong>who, what, where, when, why, how</strong>, Liru uses a family of words that all start with <em>ki-</em>.</p><span class="example">kipue <span class="gloss">who</span></span><span class="example">kiwa <span class="gloss">what</span></span><span class="example">kiya <span class="gloss">where</span></span><span class="example">kime <span class="gloss">when</span></span><span class="example">kiwi <span class="gloss">why</span></span><span class="example">kishe <span class="gloss">how</span></span><span class="example">kifa <span class="gloss">how many</span></span><p>The rule is simple: the ki-word goes at the <strong>front</strong> of the question. The rest of the sentence stays in normal SVO order, with the unknown piece simply left out.</p><span class="example">Kiya te halu? <span class="gloss">Where are you going?</span></span><span class="example">Kipue lo su? <span class="gloss">Who is this?</span></span><p>If the unknown is a quantity of something — "how many years," "how many books" — the counted noun comes to the front with the ki-word:</p><span class="example">Kifa loiwea te ahu? <span class="gloss">How many books do you have?</span></span><p>When the question asks about a location, destination, or origin, the relational particle (<em>ya</em>, <em>so</em>, <em>fa</em>) drops — context tells the listener which is meant.</p>`},

  {id:"comparatives",          title:"Comparatives & Superlatives", desc:"More, less, as-as, most, least",            icon:"📊",  vocabKey:"comparatives",          xp:24, unit:3, isSentence:true, intro:`<h3>📊 Comparatives & Superlatives</h3><p>To compare two things, Liru uses three small particles after the adjective:</p><span class="example">ata <span class="gloss">than / more than</span></span><span class="example">moata <span class="gloss">less than</span></span><span class="example">ala <span class="gloss">as … as (equal)</span></span><span class="example">Te su liani ata ne. <span class="gloss">You are taller than me.</span></span><p>For superlatives — <strong>the most</strong> and <strong>the least</strong> — put the particle <em>before</em> the adjective:</p><span class="example">apa <span class="gloss">the most</span></span><span class="example">moapa <span class="gloss">the least</span></span><span class="example">Ne su apa liani. <span class="gloss">I am the tallest.</span></span><p>And to say "out of" a group, use <em>fa</em>:</p><span class="example">Ne su apa liani fa neoa wahe. <span class="gloss">I am the tallest in my family.</span></span>`},
  {id:"quantifiers1",          title:"Set Quantifiers",             desc:"All, some, many, any, none",                icon:"🔢",  vocabKey:"quantifiers1",          xp:24, unit:3, isSentence:true, intro:`<h3>🔢 Set Quantifiers</h3><p>These small words describe <strong>how much</strong> or <strong>how many</strong> of something there are. They sit right before the noun they describe.</p><span class="example">tai <span class="gloss">all</span></span><span class="example">nai <span class="gloss">many</span></span><span class="example">sai <span class="gloss">some</span></span><span class="example">fai <span class="gloss">any (free-choice)</span></span><span class="example">nuli <span class="gloss">zero / none</span></span><p>They pair naturally with <em>pue</em> (person) to make "everyone," "someone," "no one," and so on:</p><span class="example">Tai pue nawu houme. <span class="gloss">Everyone loves bread.</span></span><span class="example">Nuli pue su loya. <span class="gloss">No one is here.</span></span><p><em>fai</em> is the "free-choice" version — "any person at all, pick one," the kind you use in <em>"anyone can do it"</em>.</p>`},

  {id:"spatial",               title:"Spatial Position",            desc:"Here, there, above, below, between, around",icon:"📍",  vocabKey:"spatial",               xp:24, unit:3, isSentence:true, intro:`<h3>📍 Spatial Position</h3><p>A few short words describe where something is:</p><span class="example">loya <span class="gloss">here</span></span><span class="example">faloya <span class="gloss">there</span></span><span class="example">niwa <span class="gloss">between</span></span><span class="example">voi <span class="gloss">around</span></span><p>Liru also uses <strong>body-part words as positions</strong>, which gives the language a very visual feel:</p><span class="example">pohi <span class="gloss">in front of (literally "facing")</span></span><span class="example">poki <span class="gloss">behind</span></span><p>Use them with the copula <em>su</em>:</p><span class="example">Ne su loya. <span class="gloss">I am here.</span></span><span class="example">Paipe su pohi hiwe. <span class="gloss">The dog is in front of the house.</span></span>`},

  {id:"agentpue",              title:"The -pue Agent Suffix",       desc:"Teacher, student, doctor — people who do",  icon:"👩‍🏫", vocabKey:"agentpue",             xp:26, unit:4},
  {id:"diminutive",            title:"The -ile Diminutive",         desc:"Smaller versions: pebble, stream, canoe",   icon:"🔍",  vocabKey:"diminutive",            xp:22, unit:4, isSentence:true, intro:`<h3>🔍 The -ile Diminutive</h3><p>Adding <em>-ile</em> to the end of any noun makes it smaller, softer, or more affectionate. It's called a <strong>diminutive</strong>.</p><span class="example">kome <span class="gloss">stone</span> → komile <span class="gloss">pebble</span></span><span class="example">loiwe <span class="gloss">book</span> → loiwile <span class="gloss">booklet</span></span><span class="example">shafane <span class="gloss">river</span> → shafanile <span class="gloss">stream</span></span><p>You can even stack it for the tiniest of things:</p><span class="example">komile <span class="gloss">pebble</span> → komilele <span class="gloss">grain of sand</span></span><p>Many words you already know — <em>piwile</em> (baby), <em>weyile</em> (wristwatch), <em>tohile</em> (minute) — are diminutives of bigger things. Now that you know the pattern, you'll start spotting them everywhere.</p>`},
  {id:"weprefix",              title:"The we- Repetition Prefix",   desc:"Again, back, redo — productive we-",        icon:"🔄",  vocabKey:"weprefix",              xp:22, unit:4, isSentence:true, intro:`<h3>🔄 The we- Repetition Prefix</h3><p>Adding <em>we-</em> to the front of a verb means <strong>again</strong> or <strong>back</strong>. It works on almost any verb.</p><span class="example">tiru <span class="gloss">to see</span> → wetiru <span class="gloss">to see again</span></span><span class="example">vanu <span class="gloss">to come</span> → wevanu <span class="gloss">to come back</span></span><span class="example">liru <span class="gloss">to speak</span> → weliru <span class="gloss">to speak again / repeat</span></span><p>Alternatively, you can use the standalone adverb <em>weihi</em> (again) after the verb — same idea, different style:</p><span class="example">Ne wetiru te. <span class="gloss">I see you again.</span></span><span class="example">Ne tiru te weihi. <span class="gloss">I see you again.</span></span><p>Both are correct. The prefix is shorter; the adverb gives a bit more emphasis.</p>`},
  {id:"compoundpauwe",         title:"Compound: -pauwe (Devices)",  desc:"Washing machine, fridge, oven, airplane",   icon:"⚙️",  vocabKey:"compoundpauwe",         xp:26, unit:4},

  {id:"discourseadv",          title:"Discourse Adverbs",           desc:"Also, only, instead",                       icon:"💭",  vocabKey:"discourseadv",          xp:20, unit:4},
  {id:"frequency",             title:"Frequency Adverbs",           desc:"Always, often, sometimes, never",           icon:"🔁",  vocabKey:"frequency",             xp:22, unit:4},
  {id:"temporaladv",           title:"Temporal Adverbs",            desc:"Already, still, soon, eventually",          icon:"⏱️", vocabKey:"temporaladv",           xp:22, unit:4},
  {id:"unit5review1",          title:"Unit 5 Review (part 1)",      desc:"Review the first wave of Unit 5",           icon:"🔁",  vocabKey:"_review",               xp:26, unit:4, isReview:true, reviewPool:["agentpue","compoundpauwe","vehicles","discourseadv","frequency","temporaladv"]},
  {id:"conjunctions2",         title:"Conjunctions II: Time & Cause", desc:"Before, after, while, until, if, because", icon:"⏳",  vocabKey:"conjunctions2",         xp:26, unit:4, isSentence:true, intro:`<h3>⏳ Conjunctions II: Time & Cause</h3><p>These subordinating conjunctions build more complex sentences. They introduce a clause that depends on the main action.</p><p><strong>Time:</strong></p><span class="example">wale <span class="gloss">before</span></span><span class="example">wule <span class="gloss">after</span></span><span class="example">wole <span class="gloss">while / during</span></span><span class="example">file <span class="gloss">until</span></span><p><strong>Cause & condition:</strong></p><span class="example">nalai <span class="gloss">because / since</span></span><span class="example">vi <span class="gloss">if</span></span><span class="example">mavi <span class="gloss">although / even though</span></span><span class="example">maivi <span class="gloss">unless</span></span><p>They sit right before the clause they introduce:</p><span class="example">Ne loisu wale rau. <span class="gloss">I read before sleeping.</span></span><span class="example">Vi te vanu, ne wu houli. <span class="gloss">If you come, I will be happy.</span></span>`},
  {id:"intensifiers",          title:"Intensifiers & Near-States",  desc:"Very, really, almost, nearly",              icon:"💥",  vocabKey:"intensifiers",          xp:20, unit:4},
  {id:"ordinals",              title:"Ordinals & Positions",        desc:"First, second, third, next, previous",      icon:"🥇",  vocabKey:"ordinals",              xp:22, unit:4},
  {id:"abstract1",             title:"Abstract I: Life",            desc:"Life, death, birth, world, freedom",        icon:"🌍",  vocabKey:"abstract1",             xp:24, unit:4},
  {id:"abstract2",             title:"Abstract II: Mind",           desc:"Idea, meaning, belief, memory, imagination",icon:"🧠",  vocabKey:"abstract2",             xp:26, unit:4},
  {id:"abstract3",             title:"Abstract III: Challenge",     desc:"Difficulty, solution, harm, warning, result",icon:"⚠️", vocabKey:"abstract3",             xp:24, unit:4},
  {id:"abstract4",             title:"Abstract IV: Social",         desc:"Justice, importance, name, promise, music", icon:"⚖️", vocabKey:"abstract4",             xp:28, unit:4},
  {id:"relclauses",            title:"Relative Clauses",            desc:"Using lai to build 'the X that...'",        icon:"🔗",  vocabKey:"relclauses",            xp:26, unit:4, isSentence:true, intro:`<h3>🔗 Relative Clauses</h3><p>A relative clause is a mini-sentence that describes a noun. In English: <strong>"the book <u>that I read</u>"</strong>, <strong>"the person <u>who came</u>"</strong>.</p><p>Liru uses one word for all of these: <em>lai</em>. Put it right after the noun you're describing, then finish the mini-sentence.</p><span class="example">pue lai wa vanu <span class="gloss">the person who came</span></span><span class="example">loiwe lai ne wa loisu <span class="gloss">the book that I read</span></span><p>That's it — no "who" vs "that" vs "which" distinction, no gendered forms. Just <em>lai</em>.</p><p>The same word also works after a verb (like <em>piru</em> "think") to introduce a <strong>complement clause</strong> — "I think <u>that she sang</u>":</p><span class="example">Ne piru lai ve wa liru. <span class="gloss">I think that she sang.</span></span>`},
  {id:"unit5review2",          title:"Unit 5 Review (part 2)",      desc:"Review the second wave of Unit 5",          icon:"🔁",  vocabKey:"_review",               xp:28, unit:4, isReview:true, reviewPool:["intensifiers","ordinals","abstract1","abstract2","abstract3","abstract4"]},

  {id:"dailyactions2",         title:"Daily Actions II",            desc:"Break, repair, throw, catch, rest, dream",  icon:"🛠️", vocabKey:"dailyactions2",         xp:24, unit:4},

  // ── UNIT 6: FLUENCY (L104–L120) ─────────────────────────────────
  {id:"complementclauses",     title:"Complement Clauses",          desc:"Deeper lai-after-verb — think/plan/decide", icon:"💭",  vocabKey:"complementclauses",     xp:28, unit:5, isSentence:true, intro:`<h3>💭 Complement Clauses</h3><p>You already met <em>lai</em> in relative clauses. Here you'll use it after mental-state verbs — <strong>think, believe, remember, plan, decide, fear</strong> — to introduce a full sub-clause describing what you think or plan.</p><span class="example">Ne piru lai te su lohi. <span class="gloss">I think that you are good.</span></span><span class="example">Ne meru lai ve wa vanu. <span class="gloss">I remember that she came.</span></span><p>Two new verbs in this lesson:</p><span class="example">piruhu <span class="gloss">to plan</span></span><span class="example">seuhu <span class="gloss">to decide</span></span><p>When the subject of both parts is the same, English would use "to" — "I plan to eat." Liru uses <em>lai</em> the same way:</p><span class="example">Ne piruhu lai ne wu tahu. <span class="gloss">I plan to eat.</span></span><p>The tense of the sub-clause is always measured from the speaker's present, not the matrix verb.</p>`},
  {id:"embeddedqs",            title:"Embedded Questions",          desc:"ki-words in embedded position — no lai",    icon:"❓",  vocabKey:"embeddedqs",            xp:26, unit:5, isSentence:true, intro:`<h3>❓ Embedded Questions</h3><p>When a question gets folded inside another sentence — "I wonder <u>where she went</u>", "I don't remember <u>who came</u>" — the <em>ki-</em> words (<em>kipue, kiwa, kiya, kime, kiwi, kishe, kifa</em>) introduce the embedded question directly.</p><p><strong>No <em>lai</em> is needed.</strong> That's the key difference from complement clauses.</p><span class="example">Ne pioru kiya ve wa halu. <span class="gloss">I wonder where she went.</span></span><span class="example">Te meru kiwa ne wanu. <span class="gloss">You remember what I want.</span></span><p>Compare with the previous lesson, where <em>lai</em> introduced a statement:</p><span class="example">Ne piru lai ve wa liru. <span class="gloss">I think that she sang.</span></span><span class="example">Ne pioru kipue wa liru. <span class="gloss">I wonder who sang.</span></span><p>Rule of thumb: if the sub-clause is a <em>statement</em>, use <em>lai</em>. If it's a <em>question</em>, use a <em>ki-</em> word.</p>`},
  {id:"propernouns",           title:"Proper Nouns & Loanwords",    desc:"Names and borrowed words stay unchanged",   icon:"🌏",  vocabKey:"propernouns",           xp:22, unit:5, isSentence:true, intro:`<h3>🌏 Proper Nouns & Loanwords</h3><p>Names of people, places, brands, and borrowed words don't get reshaped into Liru — they stay in their original form, even when that form breaks Liru's usual sound rules.</p><span class="example">Tokyo, Paris, London <span class="gloss">place names — unchanged</span></span><span class="example">Maria, John <span class="gloss">personal names — unchanged</span></span><p>They slot into Liru sentences wherever a regular noun would go:</p><span class="example">Maria su kaisupue. <span class="gloss">Maria is a teacher.</span></span><span class="example">Nea halu so Paris. <span class="gloss">We go to Paris.</span></span><p>Liru speakers generally say foreign names with a Liru-flavored pronunciation, but the spelling stays faithful to the source. This keeps names recognizable across languages.</p>`},
  {id:"outcomes",              title:"Outcomes & Events",           desc:"Success, failure, win, loss, luck",         icon:"🎯",  vocabKey:"outcomes",              xp:24, unit:5},

  {id:"secondaryverbs1",       title:"Secondary Verbs I",           desc:"Hide, keep, lead, follow, lock, bond",      icon:"🔒",  vocabKey:"secondaryverbs1",       xp:26, unit:5},
  {id:"secondaryverbs2",       title:"Secondary Verbs II",          desc:"Mix, focus, visit, invite, depict, stop",   icon:"🎨",  vocabKey:"secondaryverbs2",       xp:26, unit:5},
  {id:"naturephenomena",       title:"Nature Phenomena",            desc:"Thunder, lightning, rainbow, ice, stars",   icon:"🌩️", vocabKey:"naturephenomena",       xp:24, unit:5},
  {id:"specialized",           title:"Specialized Vocabulary",      desc:"War, middle, half, part, wheel, edge",      icon:"🔧",  vocabKey:"specialized",           xp:26, unit:5},
  {id:"dictionaryphrases",     title:"Dictionary Phrases",          desc:"Together, alone, early, late, not yet",     icon:"📖",  vocabKey:"dictionaryphrases",     xp:24, unit:5, isSentence:true, intro:`<h3>📖 Dictionary Phrases</h3><p>Liru has a handful of multi-word expressions that act as single units. Each is built from words you already know, but they carry an idiomatic meaning as a pair.</p><span class="example">ko nea <span class="gloss">together (literally "with us")</span></span><span class="example">moko pue <span class="gloss">alone (no one else present)</span></span><span class="example">moko puea <span class="gloss">alone, in solitude (without people around)</span></span><span class="example">wale oihi <span class="gloss">early (before expected)</span></span><span class="example">wule oihi <span class="gloss">late (after expected)</span></span><span class="example">mai yauwi <span class="gloss">not yet</span></span><p>Use them like any adverb or phrase:</p><span class="example">Nea halu ko nea. <span class="gloss">We go together.</span></span><span class="example">Ne mai yauwi wa tahu. <span class="gloss">I have not yet eaten.</span></span><p>Once you know these, you'll sound a lot more like a native speaker.</p>`},

// EXERCISE GENERATOR
// ═══════════════════════════════════════════════════════════════
// Generates an array of exercise objects for a given lesson id.
// Exercise types: mc, tf, match, fill, wordOrder, revfill, errcorrect, freetext
function generateExercises(lessonId){
  const lesson=LESSONS.find(l=>l.id===lessonId);
  if(!lesson)return[];

  if(lesson.isFinalTest) return generateFinalTest();
  if(lesson.isFreeText) return generateFreeTextExercises(lesson);
  if(lesson.isParagraph) return generateParagraphExercises(lesson);
  if(lesson.isSentence) return generateSentenceExercises(lesson);
  if(lesson.isReview && lesson.reviewPool) return generateReviewExercises(lesson);
  return generateVocabExercises(lesson);
}

function generateVocabExercises(lesson){
  const items=V[lesson.vocabKey];
  if(!items||items.length===0)return[];

  // Normalize the current lesson's items.
  const wordItems=items.map(v=>({
    lw:Array.isArray(v.lw)?v.lw.join(" "):v.lw,
    en:v.en,
    pos:v.pos||null,
    note:v.note||null,
    canvas:v.canvas||null,
    pair:v.pair||null,
    plural:v.plural||null, plural_en:v.plural_en||null,
  }));

  // Build a pool of words from previous lessons to use as distractors when the
  // current lesson is small. Walk LESSONS up to (but not including) the current
  // lesson, collecting each non-review, non-checkpoint lesson's items.
  const distractorPool=[];
  const seenEn=new Set(wordItems.map(w=>w.en));
  const seenLw=new Set(wordItems.map(w=>w.lw));
  for(const L of LESSONS){
    if(L.id===lesson.id)break;
    if(L.isReview||L.isCheckpoint||L.isFinalTest)continue;
    const arr=V[L.vocabKey];
    if(!arr)continue;
    arr.forEach(v=>{
      if(Array.isArray(v.lw))return; // skip multi-word sentences
      if(seenEn.has(v.en)||seenLw.has(v.lw))return;
      distractorPool.push({lw:v.lw, en:v.en, pos:v.pos||null});
      seenEn.add(v.en);
      seenLw.add(v.lw);
    });
  }
  // Combined pool for distractor lookups (current + previous).
  const fullPool=[...wordItems, ...distractorPool];

  // Helper: get 3 wrong answers from fullPool that don't share the target's gloss/lw.
  const wrongEn=(target)=>pickUnique(fullPool.filter(v=>v.en!==target.en), 3, v=>v.en).map(v=>v.en);
  const wrongLw=(target)=>pickUnique(fullPool.filter(v=>v.lw!==target.lw), 3, v=>v.lw).map(v=>v.lw);

  const exercises=[];

  // ─── STAGE 1: Flashcard introductions ────────────────────────
  wordItems.forEach(item=>{
    exercises.push({type:"flashcard", item:item});
  });

  // ─── STAGE 2: Recognition (LW → EN) ─────────────────────────
  // One MC per item up to 5. Extra items get covered via top-up or match.
  shuffle([...wordItems]).slice(0, 5).forEach(item=>{
    const wrong=wrongEn(item);
    if(wrong.length<3)return;
    exercises.push({type:"mc", prompt:`What does "${item.lw}" mean?`, correct:item.en, options:shuffle([item.en,...wrong]), note:item.note, lwWord:item.lw});
  });

  // ─── STAGE 3: Production (EN → LW) ──────────────────────────
  // Skip particles and items whose gloss contains slashes / parentheticals —
  // these don't translate cleanly as "X in Liru is:".
  const cleanForProduction=v=>{
    if(v.pos==="particle")return false;
    if(v.en.includes("/") || v.en.includes("(") )return false;
    return true;
  };
  const prodPool=wordItems.filter(cleanForProduction);
  shuffle([...prodPool]).slice(0, 4).forEach(item=>{
    const wrong=wrongLw(item);
    if(wrong.length<3)return;
    exercises.push({type:"mc", prompt:`How do you say "${item.en}" in Liru?`, correct:item.lw, options:shuffle([item.lw,...wrong])});
  });
  shuffle([...prodPool]).slice(0,2).forEach(item=>{
    exercises.push({type:"fill", prompt:`"${item.en}" in Liru is:`, correct:item.lw.toLowerCase()});
  });

  // ─── STAGE 4: Canvas drill ───────────────────────────────────
  const canvasItems=wordItems.filter(v=>v.canvas);
  if(canvasItems.length>0){
    // Build a canvas-distractor pool from current + previous canvas items.
    const canvasDistractors=[];
    fullPool.forEach(v=>{
      if(v.canvas){
        if(v.canvas.adj)canvasDistractors.push(v.canvas.adj);
        if(v.canvas.v)canvasDistractors.push(v.canvas.v);
        canvasDistractors.push(v.lw);
      }
    });
    // Generate up to 2 canvas drills (one per random current-lesson canvas item).
    const drillSources=shuffle([...canvasItems]).slice(0,Math.min(2, canvasItems.length));
    drillSources.forEach(pick1=>{
      const directions=[
        {fromForm:pick1.lw,           fromEn:pick1.en,           to:"v",   toForm:pick1.canvas.v,   toEn:pick1.canvas.v_en},
        {fromForm:pick1.lw,           fromEn:pick1.en,           to:"adj", toForm:pick1.canvas.adj, toEn:pick1.canvas.adj_en},
        {fromForm:pick1.canvas.adj,   fromEn:pick1.canvas.adj_en, to:"v",   toForm:pick1.canvas.v,   toEn:pick1.canvas.v_en},
        {fromForm:pick1.canvas.v,     fromEn:pick1.canvas.v_en,   to:"n",   toForm:pick1.lw,         toEn:pick1.en},
      ].filter(d=>d.toForm && d.fromForm);
      if(directions.length===0)return;
      const dir=directions[Math.floor(Math.random()*directions.length)];
      const wrong=pick(canvasDistractors.filter(d=>d!==dir.toForm && d!==dir.fromForm), 3);
      if(wrong.length<3)return;
      const posLabel={n:"noun", adj:"adjective", v:"verb"}[dir.to];
      exercises.push({
        type:"canvasDrill",
        prompt:`"${dir.fromForm}" means "${dir.fromEn}". What is its ${posLabel} form?`,
        correct:dir.toForm,
        correctEn:dir.toEn,
        options:shuffle([dir.toForm, ...wrong])
      });
    });
  }

  // ─── STAGE 5: Consolidation match ────────────────────────────
  // Use current lesson words if possible, but mix in previous-lesson words if
  // the current lesson doesn't have enough to form 4 pairs.
  const matchCandidates=[...wordItems.filter(v=>v.pos!=="particle")];
  while(matchCandidates.length<4 && distractorPool.length>0){
    const extra=distractorPool.filter(v=>v.pos!=="particle" && !matchCandidates.find(m=>m.lw===v.lw));
    if(extra.length===0)break;
    matchCandidates.push(extra[Math.floor(Math.random()*extra.length)]);
  }
  if(matchCandidates.length>=3){
    const matchItems=pick(matchCandidates, Math.min(4, matchCandidates.length));
    exercises.push({type:"match", pairs:matchItems.map(v=>({left:v.lw, right:v.en}))});
  }

  // ─── STAGE 6: TOP-UP to reach target length ──────────────────
  // Scale target by lesson size. Small lessons (1-3 items) target 10; larger
  // lessons target flashcards+10, capped at 18. This avoids hammering a 1-item
  // lesson with 13 copies of the same drill.
  const flashcardCount=wordItems.length;
  const targetTotal=Math.min(18, Math.max(10, flashcardCount + 10));
  let padNeeded=targetTotal - exercises.length;

  // Track prompts we've already generated so top-up doesn't duplicate.
  const promptSignatures=new Set(exercises.map(e=>{
    if(e.type==="mc"||e.type==="canvasDrill")return e.type+"|"+e.prompt+"|"+e.correct;
    if(e.type==="fill")return "fill|"+e.correct;
    return e.type+"|"+(e.prompt||"");
  }));

  // Generate candidate top-up exercises, skip duplicates, stop if we run out.
  let guard=60;
  const topupItems=wordItems.filter(cleanForProduction); // use clean pool only
  if(topupItems.length===0)padNeeded=0; // e.g. particles-only lesson
  while(padNeeded>0 && guard-->0){
    const item=topupItems[Math.floor(Math.random()*topupItems.length)];
    // Pick an exercise type we haven't used for this item yet.
    const tryTypes=shuffle(["mc-lw2en","mc-en2lw","fill"]);
    let added=false;
    for(const t of tryTypes){
      let ex=null, sig=null;
      if(t==="mc-lw2en"){
        const wrong=wrongEn(item);
        if(wrong.length<3)continue;
        ex={type:"mc", prompt:`What does "${item.lw}" mean?`, correct:item.en, options:shuffle([item.en,...wrong]), note:item.note, lwWord:item.lw};
        sig="mc|"+ex.prompt+"|"+ex.correct;
      } else if(t==="mc-en2lw"){
        const wrong=wrongLw(item);
        if(wrong.length<3)continue;
        ex={type:"mc", prompt:`How do you say "${item.en}" in Liru?`, correct:item.lw, options:shuffle([item.lw,...wrong])};
        sig="mc|"+ex.prompt+"|"+ex.correct;
      } else { // fill
        ex={type:"fill", prompt:`"${item.en}" in Liru is:`, correct:item.lw.toLowerCase()};
        sig="fill|"+ex.correct;
      }
      if(promptSignatures.has(sig))continue;
      exercises.push(ex);
      promptSignatures.add(sig);
      added=true;
      padNeeded--;
      break;
    }
    if(!added){
      // All types for all items are already in the set — lesson is saturated.
      break;
    }
  }

  // Flashcards stay at the front in natural order; everything else shuffles.
  const flashcards=exercises.filter(e=>e.type==="flashcard");
  const drills=exercises.filter(e=>e.type!=="flashcard");
  return [...flashcards, ...shuffle(drills)];
}

function generateSentenceExercises(lesson){
  const items=V[lesson.vocabKey];
  if(!items||items.length===0)return[];
  const wordOrderPool=[];
  const fillPool=[];
  items.forEach(sent=>{
    const lwStr=Array.isArray(sent.lw)?sent.lw.join(" "):sent.lw;
    const lwArr=Array.isArray(sent.lw)?sent.lw:lwStr.split(" ");
    wordOrderPool.push({type:"wordOrder",prompt:`Translate: "${sent.en}"`,correctOrder:lwArr,correctOrderAlts:sent.alts||null,shuffled:shuffle([...lwArr])});
    fillPool.push({type:"fill",prompt:`Translate to Liru:\n"${sent.en}"`,correct:lwStr.toLowerCase()});
  });
  // Scaffold progression: word-order exercises first (learner sees the words,
  // just picks the order), then fill-translation (learner must recall and type
  // the words themselves). Total still capped at 14; split roughly half/half.
  const TOTAL_CAP=14;
  const woCap=Math.ceil(TOTAL_CAP/2);
  const fillCap=Math.floor(TOTAL_CAP/2);
  const wordOrderChosen=shuffle(wordOrderPool).slice(0,woCap);
  const fillChosen=shuffle(fillPool).slice(0,fillCap);
  const ordered=[...wordOrderChosen, ...fillChosen];
  // If the lesson declares an intro, prepend it (not shuffled, never capped).
  if(lesson.intro){
    return [{type:"lessonIntro",html:lesson.intro}].concat(ordered);
  }
  return ordered;
}

function generateReviewExercises(lesson){
  const allItems=[];
  (lesson.reviewPool||[]).forEach(key=>{
    const arr=V[key];
    if(arr)arr.forEach(v=>{if(!Array.isArray(v.lw))allItems.push({lw:v.lw,en:v.en,note:v.note||null});});
  });
  if(allItems.length===0)return[];
  const exercises=[];
  const used=new Set();

  // MC LW→EN
  pick(allItems.filter(v=>!used.has(v.lw)),6).forEach(item=>{
    used.add(item.lw);
    const wrong=pickUnique(allItems.filter(v=>v.en!==item.en),3,v=>v.en).map(v=>v.en);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`What does "${item.lw}" mean?`,correct:item.en,options:shuffle([item.en,...wrong])});
  });
  // MC EN→LW
  pick(allItems.filter(v=>!used.has(v.lw)),4).forEach(item=>{
    used.add(item.lw);
    const wrong=pick(allItems.filter(v=>v.lw!==item.lw),3).map(v=>v.lw);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`How do you say "${item.en}" in Liru?`,correct:item.lw,options:shuffle([item.lw,...wrong])});
  });
  // TF
  pick(allItems.filter(v=>!used.has(v.lw)),3).forEach(item=>{
    used.add(item.lw);
    const isTrue=Math.random()>0.5;
    let shownEn=item.en;
    if(!isTrue){const w=pick(allItems.filter(v=>v.en!==item.en),1);if(w.length)shownEn=w[0].en;}
    exercises.push({type:"tf",prompt:`"${item.lw}" means "${shownEn}"`,correct:isTrue,correctLabel:item.en});
  });
  // Match
  const matchItems=pick(allItems.filter(v=>!used.has(v.lw)),4);
  if(matchItems.length===4){
    matchItems.forEach(v=>used.add(v.lw));
    exercises.push({type:"match",pairs:matchItems.map(v=>({left:v.lw,right:v.en}))});
  }
  return shuffle(exercises).slice(0,12);
}

function generateParagraphExercises(lesson){
  const paras=V[lesson.vocabKey];
  if(!paras||paras.length===0)return[];
  const exercises=[];
  paras.forEach(para=>{
    // Paragraph intro screen
    exercises.push({type:"paraIntro",en:para.en,sentences:para.sentences});

    // Full paragraph translation
    const fullLw=para.sentences.map(s=>s.lw.join(" ")).join(" ").toLowerCase();
    const paraAlts=[];
    para.sentences.forEach((s,si)=>{
      if(s.alts){
        s.alts.forEach(altSent=>{
          const altFull=para.sentences.map((s2,si2)=>si2===si?altSent.join(" "):s2.lw.join(" ")).join(" ").toLowerCase();
          paraAlts.push(altFull);
        });
      }
    });
    exercises.push({type:"fill",prompt:`Translate this paragraph to Liru:\n"${para.en}"`,correct:fullLw,correctAlts:paraAlts.length>0?paraAlts:null,isParagraph:true});

    // Word order for each sentence
    para.sentences.forEach(s=>{
      exercises.push({type:"wordOrder",prompt:`Translate: "${s.en}"`,correctOrder:s.lw,correctOrderAlts:s.alts||null,shuffled:shuffle([...s.lw])});
    });

    // TF on first sentence
    const tfSent=para.sentences[0];
    const isTrue=Math.random()>0.5;
    let shownEn=tfSent.en;
    if(!isTrue&&para.sentences.length>1){shownEn=para.sentences[para.sentences.length-1].en;}
    exercises.push({type:"tf",prompt:`"${tfSent.lw.join(" ")}" means:\n"${shownEn}"`,correct:isTrue,correctLabel:tfSent.en});

    // Error correction
    const errSent=para.sentences[Math.min(1,para.sentences.length-1)];
    const errLw=[...errSent.lw];
    const errIdx=Math.max(1,Math.floor(Math.random()*(errLw.length-1)));
    const sub=["fa","na","la","ko","wo","so","ya"].filter(w=>w!==errLw[errIdx].toLowerCase())[0]||"lo";
    errLw[errIdx]=sub;
    exercises.push({type:"errcorrect",prompt:`Is this sentence correct?\n"${errLw.join(" ")}"`,sentenceEn:errSent.en,isCorrect:false,correctSent:errSent.lw.join(" ")});
  });
  return shuffle(exercises).slice(0,14);
}

function generateFreeTextExercises(lesson){
  const prompts=shuffle([...FREETEXT_PROMPTS]).slice(0,4);
  const exercises=[];
  prompts.forEach(p=>{exercises.push({type:"freetext",prompt:p.prompt,hint:p.hint});});
  return exercises;
}

function generateFinalTest(){
  // Draws from all lesson vocab once populated.
  const allKeys=Object.keys(V);
  const allItems=[];
  allKeys.forEach(key=>{const arr=V[key];if(arr)arr.forEach(v=>{if(!Array.isArray(v.lw))allItems.push({lw:v.lw,en:v.en,note:v.note||null});});});
  if(allItems.length===0)return[];
  const exercises=[];
  const used=new Set();

  pick(allItems.filter(v=>!used.has(v.lw)),5).forEach(item=>{
    used.add(item.lw);
    const wrong=pickUnique(allItems.filter(v=>v.en!==item.en),3,v=>v.en).map(v=>v.en);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`What does "${item.lw}" mean?`,correct:item.en,options:shuffle([item.en,...wrong])});
  });
  pick(allItems.filter(v=>!used.has(v.lw)),4).forEach(item=>{
    used.add(item.lw);
    const wrong=pick(allItems.filter(v=>v.lw!==item.lw),3).map(v=>v.lw);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`How do you say "${item.en}" in Liru?`,correct:item.lw,options:shuffle([item.lw,...wrong])});
  });
  pick(allItems.filter(v=>!used.has(v.lw)),3).forEach(item=>{
    used.add(item.lw);
    const isTrue=Math.random()>0.5;
    let shownEn=item.en;
    if(!isTrue){const w=pick(allItems.filter(v=>v.en!==item.en),1);if(w.length)shownEn=w[0].en;}
    exercises.push({type:"tf",prompt:`"${item.lw}" means "${shownEn}"`,correct:isTrue,correctLabel:item.en});
  });
  const matchItems=pick(allItems.filter(v=>!used.has(v.lw)),4);
  if(matchItems.length===4){
    matchItems.forEach(v=>used.add(v.lw));
    exercises.push({type:"match",pairs:matchItems.map(v=>({left:v.lw,right:v.en}))});
  }
  return shuffle(exercises).slice(0,20);
}

// UTILITY & USER DATA FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function shuffle(arr) {
  const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}
function pick(arr,n){return shuffle(arr).slice(0,n);}
// Like pick, but deduplicates by a key function so no two results share the same display value
function pickUnique(arr,n,keyFn){
  const seen=new Set();const result=[];
  for(const item of shuffle(arr)){const k=keyFn(item);if(!seen.has(k)){seen.add(k);result.push(item);if(result.length>=n)break;}}
  return result;
}
function saveLocal(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){}}
function loadLocal(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def}catch(e){return def}}
function getCurrentUsername(){return loadLocal("lw_current_user","");}
function setCurrentUsername(name){saveLocal("lw_current_user",name);}
function fbKey(u){return u.replace(/[.#$\/\[\]]/g,"_");}
function applyStreakLogic(data){
  if(data.lastActiveDate){
    const today=new Date().toDateString();
    const yesterday=new Date(Date.now()-86400000).toDateString();
    if(data.lastActiveDate!==today&&data.lastActiveDate!==yesterday)data.streak=0;
  }
  return data;
}
function loadUserData(username){
  if(!username)return{username:"",xp:0,streak:0,lessonsCompleted:[],lastActiveDate:null};
  const data=loadLocal("lw_user_"+username,{username,xp:0,streak:0,lessonsCompleted:[],lastActiveDate:null});
  data.username=username;
  return applyStreakLogic(data);
}
async function loadUserDataCloud(username){
  if(!username)return{username:"",xp:0,streak:0,lessonsCompleted:[],lastActiveDate:null};
  if(firebaseReady&&db){
    try{
      const key=fbKey(username);
      const snap=await db.ref("users/"+key).once("value");
      if(snap.exists()){
        const data=snap.val();
        data.username=username;
        data.lessonsCompleted=data.lessonsCompleted||[];
        const updated=applyStreakLogic(data);
        saveLocal("lw_user_"+username,updated);
        return updated;
      }
    }catch(e){console.warn("Firebase load error:",e);}
  }
  return loadUserData(username);
}
function saveUserData(data){
  if(!data.username)return;
  saveLocal("lw_user_"+data.username,data);
  if(firebaseReady&&db){
    const key=fbKey(data.username);
    db.ref("users/"+key).set({...data,updatedAt:Date.now()}).catch(e=>console.warn("Firebase save error:",e));
  }
}
async function pushToLeaderboard(data){
  if(!firebaseReady||!db||!data.username)return;
  if(data.username.toLowerCase()==="admin")return;
  try{await db.ref("leaderboard/"+fbKey(data.username)).set({name:data.username,xp:data.xp,streak:data.streak,lessons:data.lessonsCompleted.length,updatedAt:Date.now()});}
  catch(e){console.warn("Firebase push error:",e);}
}
async function fetchLeaderboard(){
  if(!firebaseReady||!db)return[];
  try{const snap=await db.ref("leaderboard").orderByChild("xp").limitToLast(50).once("value");const entries=[];snap.forEach(c=>{entries.push(c.val());});return entries.sort((a,b)=>b.xp-a.xp);}
  catch(e){console.warn("Firebase fetch error:",e);return[];}
}
async function savePassword(u,pw){if(firebaseReady&&db){try{await db.ref("passwords/"+fbKey(u)).set(pw);}catch(e){}}}
async function loadPassword(u){if(firebaseReady&&db){try{const s=await db.ref("passwords/"+fbKey(u)).once("value");return s.exists()?s.val():null;}catch(e){}}return null;}
async function adminDeleteUser(u){if(!firebaseReady||!db)return;const k=fbKey(u);try{await db.ref("users/"+k).remove();await db.ref("leaderboard/"+k).remove();await db.ref("passwords/"+k).remove();}catch(e){console.warn(e);}}

async function finishLogin(name){
  const user=await loadUserDataCloud(name);
  saveUserData(user);
  state.user=user;
  state.screen="home";
  renderApp();
  fetchLeaderboard().then(lb=>{state.leaderboard=lb;renderApp();});
}

// ═══════════════════════════════════════════════════════════════
const app=document.getElementById("app");
let state={
  screen:"loading",
  user:{username:"",xp:0,streak:0,lessonsCompleted:[],lastActiveDate:null},
  tab:"learn",lesson:null,exercises:[],exIdx:0,correct:0,hearts:3,accXP:0,leaderboard:[],
  mcSelected:null,mcAnswered:false,
  matchSelectedLeft:null,matchMatched:[],matchWrong:null,matchShuffledRight:[],matchShuffledLeft:[],
  fillInput:"",fillAnswered:false,fillCorrect:false,
  woSelected:[],woAvailable:[],woAnswered:false,woCorrect:false,woOrderHint:false,
  tfAnswered:false,tfSelected:null,
  revfillSelected:null,revfillAnswered:false,
  errcorrectSelected:null,errcorrectAnswered:false,
  freetextInput:"",freetextSubmitted:false,
  waitingContinue:false,
  unitToggleOverrides:{},
};

function setState(partial){Object.assign(state,partial);renderApp();}

setTimeout(async()=>{
  const savedName=getCurrentUsername();
  if(savedName){
    const pw=await loadPassword(savedName);
    state.screen="password";state.pwName=savedName;state.pwMode=pw?"verify":"create";state.pwFirst=null;
    renderApp();
  } else {
    state.screen="username";
    renderApp();
  }
},400);

function renderApp(){
  if(currentView!=='app')return;
  const viewApp=document.getElementById('view-app');
  if(viewApp)viewApp.classList.toggle('in-lesson',state.screen==='lesson');
  switch(state.screen){
    case"loading":renderLoading();break;
    case"username":renderUsername();break;
    case"home":renderHome();break;
    case"lesson":renderLesson();break;
    case"complete":renderComplete();break;
    case"password":renderPassword();break;
  }
}

function renderUsername(){
  app.innerHTML=`<div style="min-height:calc(100vh - 61px);display:flex;align-items:center;justify-content:center;padding:24px">

function renderPassword(){
  const name=state.pwName;
  const m=state.pwMode;
  const title=m==="verify"?"Welcome back":m==="create"?"Create a password":"Confirm password";
  const sub=m==="verify"?`Enter password for <strong>${name}</strong>`:m==="create"?`Create a 4–8 character password for <strong>${name}</strong>`:`Retype the password to confirm`;
  app.innerHTML=`<div style="min-height:calc(100vh - 61px);display:flex;align-items:center;justify-content:center;padding:24px">
    <div style="text-align:center;max-width:360px;width:100%">
      <img class="float liru-logo-img" src="${LIRU_LOGO}" alt="Liru" style="width:96px;height:96px;margin:0 auto 16px">
      <div style="font-family:var(--display);font-size:24px;color:var(--green);font-weight:800;margin-bottom:4px">${title}</div>
      <div style="color:var(--dim);font-size:14px;margin-bottom:24px">${sub}</div>
      <input id="pwInput" type="password" maxlength="8" placeholder="Password"
        style="width:100%;padding:16px;background:var(--input);border:2.5px solid var(--border);border-radius:var(--radius);
        color:var(--text);font-size:17px;font-weight:700;text-align:center;margin-bottom:8px;letter-spacing:2px">
      <div id="pwErr" style="color:var(--red);font-size:13px;font-weight:700;min-height:18px;margin-bottom:12px"></div>
      <button id="pwBtn" class="btn-primary" style="margin-bottom:10px">${m==="verify"?"LOG IN":m==="create"?"NEXT":"CONFIRM"}</button>
      <button id="pwBack" class="btn-secondary">← Switch user</button>
    </div>
  </div>`;
  const inp=document.getElementById("pwInput");const btn=document.getElementById("pwBtn");const err=document.getElementById("pwErr");
  inp.focus();
  const go=async()=>{
    const v=inp.value;err.textContent="";
    if(m==="verify"){
      const real=await loadPassword(name);
      if(v===real){finishLogin(name);}
      else{inp.classList.remove("shake");void inp.offsetWidth;inp.classList.add("shake");err.textContent="Wrong password";inp.value="";}
    }
    else if(m==="create"){
      if(v.length<4||v.length>8){err.textContent="Must be 4–8 characters";return;}
      setState({pwMode:"confirm",pwFirst:v});
    }
    else{
      if(v!==state.pwFirst){err.textContent="Passwords don't match";inp.value="";return;}
      await savePassword(name,v);finishLogin(name);
    }
  };
  btn.addEventListener("click",go);
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  document.getElementById("pwBack").addEventListener("click",()=>{setCurrentUsername("");setState({screen:"username"});});
}

async function doSetUsername(val){
  const name=val.trim();if(!name)return;
  setCurrentUsername(name);
  setState({screen:"loading"});
  const pw=await loadPassword(name);
  setState({screen:"password",pwName:name,pwMode:pw?"verify":"create",pwFirst:null});
}

    const unitLessons=LESSONS.slice(start,end);
    const unitComplete=unitLessons.every(l=>completedSet.has(l.id))&&unitLessons.length>0;
    const override=state.unitToggleOverrides[ui];
    const currentlyCollapsed=(override===undefined)?unitComplete:!override;

      const parentUnitIdx=UNITS.findIndex((u,ui)=>{
        const uStart=u.start;
        const uEnd=(ui+1<UNITS.length)?UNITS[ui+1].start:LESSONS.length;
        return idx>=uStart && idx<uEnd;

      });

function startLesson(idx){
  const lesson=LESSONS[idx];
  const exercises=generateExercises(lesson.id);
  if(!exercises||exercises.length===0){alert("No exercises available for this lesson.");return;}
  const ex=exercises[0];
  const isFinal=lesson.isFinalTest;
  setState({
    screen:"lesson",lesson,exercises,exIdx:0,correct:0,
    hearts:isFinal?999:3,
    isFinalTest:isFinal,finalFailed:false,
    accXP:0,
    mcSelected:null,mcAnswered:false,
    matchSelectedLeft:null,matchMatched:[],matchWrong:null,
    matchShuffledRight:ex.type==="match"?shuffle(ex.pairs.map(p=>p.right)):[],
    matchShuffledLeft:ex.type==="match"?shuffle(ex.pairs.map(p=>p.left)):[],
    fillInput:"",fillAnswered:false,fillCorrect:false,
    woSelected:[],woAvailable:ex.type==="wordOrder"?[...ex.shuffled]:[],woAnswered:false,woCorrect:false,woOrderHint:false,
    tfAnswered:false,tfSelected:null,
    revfillSelected:null,revfillAnswered:false,
    errcorrectSelected:null,errcorrectAnswered:false,
    freetextInput:"",freetextSubmitted:false,
    waitingContinue:false,
  });
}

function renderLesson(){
  const ex=state.exercises[state.exIdx];
  const pct=state.exIdx/state.exercises.length*100;
  const isFinal=state.isFinalTest;

  let heartsHTML="";
  const heartsActive=(state.lesson&&state.lesson.isCheckpoint)||isFinal;
  if(isFinal){
    heartsHTML=`<span style="color:var(--gold);font-size:13px;font-weight:800">🎓 FINAL TEST</span>`;
  } else if(state.lesson&&state.lesson.isCheckpoint){
    heartsHTML=[...Array(3)].map((_,i)=>`<span style="font-size:20px;opacity:${i<state.hearts?1:0.2}">❤️</span>`).join("");
  } else {
    // Regular lesson — no hearts, retry-until-right mode.
    // Show running XP tally once > 0; before that, stay blank.
    const xpLabel = state.accXP > 0 ? `+${state.accXP} XP` : "";
    heartsHTML=`<span style="color:var(--dim);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em">${xpLabel}</span>`;
  }

  let exHTML="";
  if(ex.type==="mc")exHTML=renderMC(ex);
  else if(ex.type==="match")exHTML=renderMatch(ex);
  else if(ex.type==="fill")exHTML=renderFill(ex);
  else if(ex.type==="wordOrder")exHTML=renderWordOrder(ex);
  else if(ex.type==="tf")exHTML=renderTF(ex);
  else if(ex.type==="revfill")exHTML=renderRevFill(ex);
  else if(ex.type==="errcorrect")exHTML=renderErrCorrect(ex);
  else if(ex.type==="freetext")exHTML=renderFreeText(ex);
  else if(ex.type==="paraIntro")exHTML=renderParaIntro(ex);
  else if(ex.type==="lessonIntro")exHTML=renderLessonIntro(ex);
  else if(ex.type==="flashcard")exHTML=renderFlashcard(ex);
  else if(ex.type==="canvasDrill")exHTML=renderCanvasDrill(ex);

  let continueHTML="";
  if(state.waitingContinue){
    continueHTML=`<div class="check-bar"><button id="continueBtn" class="btn-primary" style="background:var(--red);box-shadow:0 4px 20px var(--red-glow)">CONTINUE</button></div>`;
  }

  app.innerHTML=`<div class="lesson-shell">
    <div class="lesson-header">
      <button id="closeBtn" style="background:none;color:var(--dim);font-size:24px;padding:4px">✕</button>
      <div style="flex:1" class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${isFinal?'var(--gold)':'var(--green)'}"></div></div>
      <div style="display:flex;gap:2px">${heartsHTML}</div>
    </div>
    <div class="lesson-body"><div style="max-width:480px;margin:0 auto" class="fade-up">${exHTML}${continueHTML}</div></div>
  </div>`;

  document.getElementById("closeBtn").addEventListener("click",()=>setState({screen:"home",scrollToLessonId:state.lesson.id}));
  const contBtn=document.getElementById("continueBtn");if(contBtn)contBtn.addEventListener("click",()=>advanceAfterAnswer());

  if(ex.type==="mc")bindMC(ex);
  else if(ex.type==="match")bindMatch(ex);
  else if(ex.type==="fill")bindFill(ex);
  else if(ex.type==="wordOrder")bindWordOrder(ex);
  else if(ex.type==="tf")bindTF(ex);
  else if(ex.type==="revfill")bindRevFill(ex);
  else if(ex.type==="errcorrect")bindErrCorrect(ex);
  else if(ex.type==="freetext")bindFreeText(ex);
  else if(ex.type==="paraIntro")bindParaIntro(ex);
  else if(ex.type==="lessonIntro")bindLessonIntro(ex);
  else if(ex.type==="flashcard")bindFlashcard(ex);
  else if(ex.type==="canvasDrill")bindCanvasDrill(ex);
}

// ─── Multiple Choice ─────────────────────────────────────────
function renderMC(ex){
  const optsHTML=ex.options.map((opt,i)=>{
    let cls="opt-btn";
    if(state.mcAnswered){
      if(opt===ex.correct)cls+=" correct";
      else if(opt===state.mcSelected)cls+=" wrong";
      else cls+=" faded";
    } else if(state.mcSelected===opt){cls+=" selected";cls=cls.replace("opt-btn","opt-btn");}
    return `<button class="${cls}" data-opt="${escapeHTML(opt)}" ${state.mcAnswered?'disabled':''}>${escapeHTML(opt)}</button>`;
  }).join("");
  const noteHTML=ex.note?`<div style="color:var(--blue);font-size:13px;font-weight:700;margin-top:10px">🧩 ${ex.note}</div>`:"";

// ─── Match pairs ─────────────────────────────────────────────
function renderMatch(ex){
  const lefts=state.matchShuffledLeft.length?state.matchShuffledLeft:ex.pairs.map(p=>p.left);
  const rights=state.matchShuffledRight.length?state.matchShuffledRight:ex.pairs.map(p=>p.right);
  const matchedLeft=new Set(state.matchMatched.map(m=>m.left));
  const matchedRight=new Set(state.matchMatched.map(m=>m.right));
  // All tiles share a fixed min-height sized for 2 lines of wrapped text.
  // This prevents any tile from being taller than the others, which would
  // otherwise leak the pairing (a long English translation making its Liru
  // match tile taller too).
  const tileStyle = "min-height:64px;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px 14px";
  const leftColHTML=lefts.map(l=>{
    let cls="match-btn";
    if(matchedLeft.has(l))cls+=" matched";
    else if(state.matchSelectedLeft===l)cls+=" selected";
    if(state.matchWrong&&state.matchWrong.left===l)cls+=" wrong-match";
    return `<button class="${cls}" style="${tileStyle}" data-left="${escapeHTML(l)}" ${matchedLeft.has(l)?'disabled':''}>${escapeHTML(l)}</button>`;
  }).join("");
  const rightColHTML=rights.map(r=>{
    let cls="match-btn";
    if(matchedRight.has(r))cls+=" matched";
    if(state.matchWrong&&state.matchWrong.right===r)cls+=" wrong-match";
    return `<button class="${cls}" style="${tileStyle}" data-right="${escapeHTML(r)}" ${matchedRight.has(r)?'disabled':''}>${escapeHTML(r)}</button>`;
  }).join("");
  return `<div style="font-family:var(--display);font-size:20px;font-weight:800;margin-bottom:22px">Match the pairs</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start">
      <div style="display:flex;flex-direction:column;gap:10px">${leftColHTML}</div>
      <div style="display:flex;flex-direction:column;gap:10px">${rightColHTML}</div>
    </div>`;
}
function bindMatch(ex){
  document.querySelectorAll(".match-btn[data-left]").forEach(b=>b.addEventListener("click",()=>{
    if(b.disabled)return;
    setState({matchSelectedLeft:b.dataset.left,matchWrong:null});
  }));
  document.querySelectorAll(".match-btn[data-right]").forEach(b=>b.addEventListener("click",()=>{
    if(b.disabled||!state.matchSelectedLeft)return;
    const right=b.dataset.right;
    const pair=ex.pairs.find(p=>p.left===state.matchSelectedLeft);
    if(pair&&pair.right===right){
      const newMatched=[...state.matchMatched,{left:state.matchSelectedLeft,right}];
      if(newMatched.length===ex.pairs.length){
        handleAnswer(true);
      }
      setState({matchMatched:newMatched,matchSelectedLeft:null,matchWrong:null});
    } else {
      setState({matchWrong:{left:state.matchSelectedLeft,right}});
      setTimeout(()=>setState({matchWrong:null,matchSelectedLeft:null}),600);
    }
  }));
}

// ─── Fill-in (type the answer) ───────────────────────────────
function renderFill(ex){
  const normalize=s=>s.toLowerCase().replace(/[.,!?;:"']/g,"").replace(/\s+/g," ").trim();
  const userNorm=normalize(state.fillInput||"");
  const correctNorm=normalize(ex.correct);
  const altsNorm=(ex.correctAlts||[]).map(a=>normalize(a));
  const isCorrect=state.fillAnswered?(userNorm===correctNorm||altsNorm.includes(userNorm)):false;
  const resultHTML=state.fillAnswered?renderResultBanner(isCorrect,ex.correct):"";
  const checkHTML=!state.fillAnswered?`<div class="check-bar"><button id="checkBtn" class="btn-primary" ${state.fillInput.trim()?'':'disabled'}>CHECK</button></div>`:"";
  const inputStyle=state.fillAnswered?(isCorrect?"border-color:var(--green);background:rgba(88,204,2,0.08)":"border-color:var(--red);background:rgba(255,75,75,0.08)"):"";
  const isParagraph=ex.isParagraph;
  return `<div style="font-family:var(--display);font-size:20px;font-weight:800;margin-bottom:22px;line-height:1.4;white-space:pre-wrap">${escapeHTML(ex.prompt)}</div>
    <div style="margin-bottom:16px">${isParagraph
      ?`<textarea id="fillInput" rows="4" placeholder="Type your translation..." ${state.fillAnswered?'disabled':''} style="display:block;width:100%;padding:14px 16px;background:var(--bg2);border:2.5px solid var(--blue);border-radius:var(--radius);color:var(--text);font-size:16px;font-weight:600;line-height:1.6;resize:vertical;min-height:100px;box-sizing:border-box;${inputStyle}">${escapeHTML(state.fillInput)}</textarea>`
      :`<input id="fillInput" type="text" placeholder="Type here..." ${state.fillAnswered?'disabled':''} value="${escapeHTML(state.fillInput)}" style="display:block;width:100%;padding:16px;background:var(--bg2);border:2.5px solid var(--blue);border-radius:var(--radius);color:var(--text);font-size:18px;font-weight:700;box-sizing:border-box;${inputStyle}" autocomplete="off" autocapitalize="off" spellcheck="false">`
    }</div>
    ${resultHTML}${checkHTML}`;
}
function bindFill(ex){
  const inp=document.getElementById("fillInput");
  if(!inp)return;
  if(!state.fillAnswered){
    inp.focus();
    const len=inp.value.length;
    try{inp.setSelectionRange(len,len);}catch(e){}
    inp.addEventListener("input",e=>{state.fillInput=e.target.value;const chk=document.getElementById("checkBtn");if(chk)chk.disabled=!state.fillInput.trim();});
    inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey&&!ex.isParagraph){e.preventDefault();const chk=document.getElementById("checkBtn");if(chk&&!chk.disabled)chk.click();}});
  }
  const chk=document.getElementById("checkBtn");
  if(chk)chk.addEventListener("click",()=>{
    const normalize=s=>s.toLowerCase().replace(/[.,!?;:"']/g,"").replace(/\s+/g," ").trim();
    const userNorm=normalize(state.fillInput||"");
    const correctNorm=normalize(ex.correct);
    const altsNorm=(ex.correctAlts||[]).map(a=>normalize(a));
    const isCorrect=userNorm===correctNorm||altsNorm.includes(userNorm);
    handleAnswer(isCorrect);
    setState({fillAnswered:true,fillCorrect:isCorrect});
  });
}

// ─── Word Order (tap to build sentence) ──────────────────────
function renderWordOrder(ex){
  const placedHTML=state.woSelected.map((w,i)=>`<button class="word-chip placed" data-placed="${i}">${escapeHTML(w)}</button>`).join("");
  const availHTML=state.woAvailable.map((w,i)=>`<button class="word-chip" data-avail="${i}">${escapeHTML(w)}</button>`).join("");
  const correctStr=ex.correctOrder.join(" ");
  let resultHTML="";
  if(state.woAnswered){
    resultHTML=renderResultBanner(state.woCorrect, correctStr);
    // If the user had the right words in the wrong order, add a gentle hint below.
    if(state.woCorrect && state.woOrderHint){
      resultHTML+=`<div style="margin-top:10px;padding:12px 14px;background:rgba(28,176,246,0.06);border:1.5px solid var(--blue);border-radius:12px;color:var(--blue);font-size:13px;font-weight:700" class="fade-in">📝 Right words! The natural order is: <strong>${escapeHTML(correctStr)}</strong></div>`;
    }
  }
  const checkHTML=!state.woAnswered?`<div class="check-bar"><button id="checkBtn" class="btn-primary" ${state.woSelected.length>0?'':'disabled'}>CHECK</button></div>`:"";
  return `<div style="font-family:var(--display);font-size:20px;font-weight:800;margin-bottom:22px;line-height:1.4">${escapeHTML(ex.prompt)}</div>
    <div style="min-height:60px;padding:12px;background:var(--input);border:2px dashed var(--border);border-radius:var(--radius);margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start">${placedHTML||'<span style="color:var(--dim);font-size:13px">Tap words below to build your answer</span>'}</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">${availHTML}</div>
    ${resultHTML}${checkHTML}`;
}
function bindWordOrder(ex){
  document.querySelectorAll("[data-avail]").forEach(b=>b.addEventListener("click",()=>{
    if(state.woAnswered)return;
    const i=parseInt(b.dataset.avail);
    const w=state.woAvailable[i];
    setState({woSelected:[...state.woSelected,w],woAvailable:state.woAvailable.filter((_,j)=>j!==i)});
  }));
  document.querySelectorAll("[data-placed]").forEach(b=>b.addEventListener("click",()=>{
    if(state.woAnswered)return;
    const i=parseInt(b.dataset.placed);
    const w=state.woSelected[i];
    setState({woSelected:state.woSelected.filter((_,j)=>j!==i),woAvailable:[...state.woAvailable,w]});
  }));
  const chk=document.getElementById("checkBtn");
  if(chk)chk.addEventListener("click",()=>{
    const userStr=state.woSelected.join(" ").toLowerCase();
    const correctStr=ex.correctOrder.join(" ").toLowerCase();
    const alts=(ex.correctOrderAlts||[]).map(a=>a.join(" ").toLowerCase());
    const exactMatch=userStr===correctStr||alts.includes(userStr);
    // Leniency: if words match as a multiset (same words, different order), accept
    // and show a hint about the natural ordering.
    let lenientMatch=false;
    if(!exactMatch){
      const norm=arr=>arr.map(s=>s.toLowerCase()).sort().join("|");
      const userMultiset=norm(state.woSelected);
      const correctMultiset=norm(ex.correctOrder);
      if(userMultiset===correctMultiset){
        lenientMatch=true;
      } else {
        // Also check alt orderings' multisets
        for(const alt of (ex.correctOrderAlts||[])){
          if(norm(alt)===userMultiset){lenientMatch=true;break;}
        }
      }
    }
    const isCorrect=exactMatch||lenientMatch;
    handleAnswer(isCorrect);
    setState({woAnswered:true, woCorrect:isCorrect, woOrderHint:lenientMatch});
  });
}

// ─── Flashcard (introduction stage — always passes) ──────────
function renderFlashcard(ex){
  const item=ex.item;
  // Build the card based on item type.
  let mainHTML="";
  const lw=item.lw;
  const en=item.en;

  if(item.canvas){
    // Full canvas root — show all three forms stacked.
    const rows=[
      {form:lw,              pos:"noun",       en:en},
      item.canvas.adj ? {form:item.canvas.adj, pos:"adjective", en:item.canvas.adj_en} : null,
      item.canvas.v   ? {form:item.canvas.v,   pos:"verb",      en:item.canvas.v_en  } : null,
    ].filter(Boolean);
    mainHTML=rows.map(r=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg2);border-radius:14px;border:1.5px solid var(--border)">
        <div>
          <div style="font-family:var(--display);font-size:26px;font-weight:900;color:var(--text);letter-spacing:-0.02em">${escapeHTML(r.form)}</div>
          <div style="color:var(--dim);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px">${r.pos}</div>
        </div>
        <div style="color:var(--mid);font-size:15px;font-weight:700;text-align:right;max-width:55%">${escapeHTML(r.en)}</div>
      </div>`).join("");
  } else if(item.plural){
    // Pronoun system — show singular + plural.
    mainHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg2);border-radius:14px;border:1.5px solid var(--border)">
        <div><div style="font-family:var(--display);font-size:28px;font-weight:900;color:var(--text)">${escapeHTML(lw)}</div>
        <div style="color:var(--dim);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px">singular</div></div>
        <div style="color:var(--mid);font-size:15px;font-weight:700;text-align:right;max-width:55%">${escapeHTML(en)}</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg2);border-radius:14px;border:1.5px solid var(--border);margin-top:8px">
        <div><div style="font-family:var(--display);font-size:28px;font-weight:900;color:var(--text)">${escapeHTML(item.plural)}</div>
        <div style="color:var(--dim);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px">plural</div></div>
        <div style="color:var(--mid);font-size:15px;font-weight:700;text-align:right;max-width:55%">${escapeHTML(item.plural_en)}</div>
      </div>`;
  } else {
    // Simple noun, particle, social expression — single big card.
    const posLabel=item.pos==="social"?"social expression":(item.pos==="particle"?"particle":(item.pos==="pronoun"?"pronoun":(item.pos==="n"?"noun":(item.pos==="v"?"verb":(item.pos==="number"?"number":item.pos||"")))));
    mainHTML=`
      <div style="text-align:center;padding:20px 20px;background:var(--bg2);border-radius:16px;border:1.5px solid var(--border)">
        <div style="font-family:var(--display);font-size:36px;font-weight:900;color:var(--text);letter-spacing:-0.02em">${escapeHTML(lw)}</div>
        ${posLabel?`<div style="color:var(--dim);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;margin-top:4px">${posLabel}</div>`:""}
        <div style="color:var(--mid);font-size:18px;font-weight:700;margin-top:10px">${escapeHTML(en)}</div>
      </div>`;
  }

  // Pair preview: if this word has a balancing mo- partner, show a little hint.
  let pairHTML="";
  if(item.pair&&item.pair.mo){
    pairHTML=`<div style="margin-top:14px;padding:12px 14px;background:rgba(28,176,246,0.06);border:1.5px solid var(--blue);border-radius:12px;color:var(--blue);font-size:13px;font-weight:700">☯️ Balancing partner: <strong>${escapeHTML(item.pair.mo)}</strong> (${escapeHTML(item.pair.mo_en)}) — you'll meet it next.</div>`;

  const noteHTML=item.note?`<div style="margin-top:12px;color:var(--dim);font-size:13px;font-weight:600;line-height:1.5">💡 ${escapeHTML(item.note)}</div>`:"";

  return `<div style="font-family:var(--display);font-size:15px;font-weight:800;margin-bottom:12px;color:var(--mid)">📖 New word</div>

  const chk=document.getElementById("checkBtn");
  if(chk)chk.addEventListener("click",()=>{handleAnswer(true);});

// ─── Canvas drill (given one form, pick the requested form) ──
function renderCanvasDrill(ex){
  const optsHTML=ex.options.map(opt=>{
    let cls="opt-btn";
    if(state.mcAnswered){
      if(opt===ex.correct)cls+=" correct";
      else if(opt===state.mcSelected)cls+=" wrong";

  const checkHTML=!state.mcAnswered?`<div class="check-bar"><button id="checkBtn" class="btn-primary" ${state.mcSelected?'':'disabled'}>CHECK</button></div>`:"";
  const resultLabel=`${ex.correct} — ${ex.correctEn}`;
  const resultHTML=state.mcAnswered?renderResultBanner(state.mcSelected===ex.correct, resultLabel):"";
  return `<div style="font-family:var(--display);font-size:14px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">🎨 Canvas drill</div>
