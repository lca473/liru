// ─── One-time targeted reset for user "LondonGP" ─────────────
// Context: LondonGP's deck contained a mix of v1-course cards (from the
// pre-rebuild course that taught a different vocabulary set) and v2-course
// cards. The stale-card pruner only kills cards whose lw is no longer in
// DICTIONARY_RAW, so v1 words still in the v2 dictionary survived pruning.
// This one-shot wipes his entire deck (local + cloud) and re-enrolls cards
// from scratch by walking his lessonsCompleted ∩ current LESSONS — yielding
// exactly the cards he should have for the v2 lessons he has finished.
//
// Gated by state.londonGpResetDone. Runs once for that user, then never
// again. No-op for everyone else (username check). Safe to keep in the
// codebase indefinitely — same retention pattern as the kauhe/leye migrations.
//
// Important: this does NOT touch lessonsCompleted, XP, streak, or any other
// non-SRS data. The Firebase wipe targets only users/<key>/srs/.
async function srsResetLondonGpIfNeeded(username,user,LESSONS,V,DICTIONARY_RAW){
  if(!username)return 0;
  if(username.toLowerCase()!=="londongp")return 0;
  const s=srsLoadState(username);
  if(s.londonGpResetDone)return 0;
  // Wipe local
  localStorage.removeItem(srsStoreKey(username));
  localStorage.removeItem(srsStateKey(username));
  // Wipe cloud (await so the subsequent backfill push doesn't race the delete)
  if(firebaseReady&&db){
    try{await db.ref("users/"+fbKey(username)+"/srs").remove();}
    catch(e){console.warn("[SRS] LondonGP cloud wipe error:",e);}
  }
  // Re-enroll from current LESSONS ∩ lessonsCompleted. srsBackfillIfNeeded
  // walks LESSONS (so v1-only IDs in lessonsCompleted are silently skipped)
  // and sets state.backfilled=true at the end.
  const added=srsBackfillIfNeeded(username,user,LESSONS,V,DICTIONARY_RAW);
  // Mark this one-shot done. Re-load state because backfill replaced it.
  const s2=srsLoadState(username);
  s2.londonGpResetDone=true;
  srsSaveState(username,s2);
  srsSyncState(username,s2);
  console.log("[SRS] LondonGP one-shot reset complete; re-enrolled",added,"cards");
  return added;
}

// ─── One-time recoinage migration: kauhe → mouleyahe ─────────
// When a root is renamed in Liru (recoinage rather than retirement), users
// who already learned the old form would lose their repetition history if
// the stale-card pruner just deleted their *kauhe* cards. This migration
// preserves their work: it rewrites any card with lw === "kauhe" to use the
// new form "mouleyahe", keeping interval/ease/due/lapses/reps/addedAt intact.
//
// Gated by state.kauheToMouleyaheDone; runs once per user on next login,
// then never again. Safe to keep in the codebase indefinitely — the flag
// prevents repeated work, and a future user with no *kauhe* cards just
// gets a no-op.
//
// This pattern (recoinage migration) parallels srsPruneMechanicalIfNeeded
// and srsMigrateAddedAtIfNeeded — one-shot guarded transformations that
// fix a specific historical issue without touching unaffected cards.
function srsMigrateKauheToMouleyaheIfNeeded(username){
  if(!username)return 0;
  const s=srsLoadState(username);
  if(s.kauheToMouleyaheDone)return 0;
  const cards=srsLoadCards(username);
  const migratedNew={};   // new card id → card (to write)
  const oldIds=[];         // old card ids (to delete)
  const newGloss="forest"; // matches V/DICTIONARY_RAW gloss for mouleyahe
  for(const id in cards){
    const c=cards[id];
    if(!c||c.lw!=="kauhe")continue;
    // Build new id with the new lw, keeping the same direction.
    const dir=c.dir||(id.endsWith("::lw_en")?"lw_en":"en_lw");
    const newId=srsCardId("mouleyahe",dir);
    // Preserve all state; rewrite identity fields only.
    migratedNew[newId]={...c,lw:"mouleyahe",en:newGloss};
    oldIds.push(id);
  }
  if(oldIds.length===0){
    s.kauheToMouleyaheDone=true;
    srsSaveState(username,s);
    srsSyncState(username,s);
    return 0;
  }
  // Apply: delete old, add new. If a new id somehow already exists (rare
  // edge case where the user had both kauhe and mouleyahe cards), the
  // existing mouleyahe card wins — don't overwrite a card with active
  // history.
  for(const oldId of oldIds)delete cards[oldId];
  for(const newId in migratedNew){
    if(!cards[newId])cards[newId]=migratedNew[newId];
  }
  srsSaveCards(username,cards);
  // Cloud sync: delete old paths, write new ones.
  if(firebaseReady&&db){
    for(const oldId of oldIds){
      try{db.ref(srsCardFbPath(username,oldId)).remove();}
      catch(e){/* ignore — local is authoritative until next sync */}
    }
    for(const newId in migratedNew){
      // Only sync if we actually wrote it locally (not skipped due to collision).
      if(cards[newId]===migratedNew[newId]){
        try{
          db.ref(srsCardFbPath(username,newId))
            .set({...cards[newId],lastSync:Date.now()})
            .catch(e=>console.warn("[SRS] kauhe migration sync error:",e));
        }catch(e){console.warn("[SRS] kauhe migration sync error:",e);}
      }
    }
  }
  console.log("[SRS] migrated",oldIds.length,"kauhe cards to mouleyahe for",username);
  s.kauheToMouleyaheDone=true;
  srsSaveState(username,s);
  srsSyncState(username,s);
  return oldIds.length;
}

// ─── One-time recoinage migration: leye → tone ───────────────
// Recoinage of the L59 root for "money" because the plural *leyea* — drilled
// across L60's price-asking pattern (Kinai leyea su X?) — had an awkward
// glide-vowel hiatus. Replaced with *tone* / *toni* / *tonu*, plural *tonea*.
//
// Unlike kauhe→mouleyahe (single-form compound recoinage), leye carried a
// full canvas, so this migration handles three lw-rewrites: leye→tone,
// leyi→toni, leyu→tonu. Each card type (n., adj., v.) gets the corresponding
// new gloss from V/DICTIONARY_RAW.
//
// Same one-shot guarded pattern as srsMigrateKauheToMouleyaheIfNeeded.
// Gated by state.leyeToToneDone; runs once per user on next login, then
// never again. Safe to keep indefinitely — the flag prevents repeated work,
// and a future user with no leye cards just gets a no-op.
//
// MUST run before the stale-card pruner, since leye/leyi/leyu are no longer
// in DICTIONARY_RAW and would otherwise be deleted before being migrated.
function srsMigrateLeyeToToneIfNeeded(username){
  if(!username)return 0;
  const s=srsLoadState(username);
  if(s.leyeToToneDone)return 0;
  const cards=srsLoadCards(username);
  // Map of old lw → {newLw, newGloss}. Glosses match V entries for the
  // tone canvas (see V.l59_money) and DICTIONARY_RAW entries.
  const renameMap={
    "leye":{newLw:"tone", newGloss:"money (or payment)"},
    "leyi":{newLw:"toni", newGloss:"monetary"},
    "leyu":{newLw:"tonu", newGloss:"to pay"},
  };
  const migratedNew={};   // new card id → card (to write)
  const oldIds=[];         // old card ids (to delete)
  for(const id in cards){
    const c=cards[id];
    if(!c)continue;
    const rename=renameMap[c.lw];
    if(!rename)continue;
    // Build new id with the new lw, keeping the same direction.
    const dir=c.dir||(id.endsWith("::lw_en")?"lw_en":"en_lw");
    const newId=srsCardId(rename.newLw,dir);
    // Preserve all state; rewrite identity fields only.
    migratedNew[newId]={...c,lw:rename.newLw,en:rename.newGloss};
    oldIds.push(id);
  }
  if(oldIds.length===0){
    s.leyeToToneDone=true;
    srsSaveState(username,s);
    srsSyncState(username,s);
    return 0;
  }
  // Apply: delete old, add new. If a new id somehow already exists (rare
  // edge case where the user had both leye and tone cards), the existing
  // tone card wins — don't overwrite a card with active history.
  for(const oldId of oldIds)delete cards[oldId];
  for(const newId in migratedNew){
    if(!cards[newId])cards[newId]=migratedNew[newId];
  }
  srsSaveCards(username,cards);
  // Cloud sync: delete old paths, write new ones.
  if(firebaseReady&&db){
    for(const oldId of oldIds){
      try{db.ref(srsCardFbPath(username,oldId)).remove();}
      catch(e){/* ignore — local is authoritative until next sync */}
    }
    for(const newId in migratedNew){
      // Only sync if we actually wrote it locally (not skipped due to collision).
      if(cards[newId]===migratedNew[newId]){
        try{
          db.ref(srsCardFbPath(username,newId))
            .set({...cards[newId],lastSync:Date.now()})
            .catch(e=>console.warn("[SRS] leye migration sync error:",e));
        }catch(e){console.warn("[SRS] leye migration sync error:",e);}
      }
    }
  }
  console.log("[SRS] migrated",oldIds.length,"leye/leyi/leyu cards to tone family for",username);
  s.leyeToToneDone=true;
  srsSaveState(username,s);
  srsSyncState(username,s);
  return oldIds.length;
}

// Same one-shot guarded pattern as srsMigrateLeyeToToneIfNeeded.
// Gated by state.poniMolaweToOniNoneDone; runs once per user on next login,
// then never again. Migrates four old forms to their renamed counterparts:
//   poni     (eight)    → oni
//   poniluone(August)   → oniluone
//   molawe   (night)    → none
//   meshimolawe(midnight)→ meshinone
// Preserves SM-2 history (interval, ease, reps, lapses, due dates).
//
// MUST run before the stale-card pruner, since the old forms are no longer
// in DICTIONARY_RAW and would otherwise be deleted before being migrated.
function srsMigratePoniMolaweToOniNoneIfNeeded(username){
  if(!username)return 0;
  const s=srsLoadState(username);
  if(s.poniMolaweToOniNoneDone)return 0;
  const cards=srsLoadCards(username);
  // Map of old lw → {newLw, newGloss}. Glosses match V entries and DICTIONARY_RAW.
  const renameMap={
    "poni":{newLw:"oni", newGloss:"eight"},
    "poniluone":{newLw:"oniluone", newGloss:"August"},
    "molawe":{newLw:"none", newGloss:"night"},
    "meshimolawe":{newLw:"meshinone", newGloss:"midnight"},
  };
  const migratedNew={};   // new card id → card (to write)
  const oldIds=[];         // old card ids (to delete)
  for(const id in cards){
    const c=cards[id];
    if(!c)continue;
    const rename=renameMap[c.lw];
    if(!rename)continue;
    const dir=c.dir||(id.endsWith("::lw_en")?"lw_en":"en_lw");
    const newId=srsCardId(rename.newLw,dir);
    // Preserve all state; rewrite identity fields only.
    migratedNew[newId]={...c,lw:rename.newLw,en:rename.newGloss};
    oldIds.push(id);
  }
  if(oldIds.length===0){
    s.poniMolaweToOniNoneDone=true;
    srsSaveState(username,s);
    srsSyncState(username,s);
    return 0;
  }
  // Apply: delete old, add new. If a new id somehow already exists, keep existing.
  for(const oldId of oldIds)delete cards[oldId];
  for(const newId in migratedNew){
    if(!cards[newId])cards[newId]=migratedNew[newId];
  }
  srsSaveCards(username,cards);
  // Cloud sync: delete old paths, write new ones.
  if(firebaseReady&&db){
    for(const oldId of oldIds){
      try{db.ref(srsCardFbPath(username,oldId)).remove();}
      catch(e){/* ignore — local is authoritative until next sync */}
    }
    for(const newId in migratedNew){
      if(cards[newId]===migratedNew[newId]){
        try{
          db.ref(srsCardFbPath(username,newId))
            .set({...cards[newId],lastSync:Date.now()})
            .catch(e=>console.warn("[SRS] poni/molawe migration sync error:",e));
        }catch(e){console.warn("[SRS] poni/molawe migration sync error:",e);}
      }
    }
  }
  console.log("[SRS] migrated",oldIds.length,"poni/molawe-family cards to oni/none family for",username);
  s.poniMolaweToOniNoneDone=true;
  srsSaveState(username,s);
  srsSyncState(username,s);
  return oldIds.length;
}

// ─── Generic form-rename migration ─────────────────────────────────────
// SRS_FORM_RENAMES is the registry of one-to-one Liru form renames that
// affect existing user SRS cards. Each entry maps an old (retired) lw to
// the new lw. The card's English gloss is NOT changed here — that is the
// job of the regular srsRefreshAndSync pass that runs after this migration
// against the current DICTIONARY_RAW (the renamed form's entry will carry
// the right gloss).
//
// This is the generic replacement for one-off migrations like
// srsMigrateKauheToMouleyaheIfNeeded, srsMigrateLeyeToToneIfNeeded, and
// srsMigratePoniMolaweToOniNoneIfNeeded. Those three remain in place to
// avoid disturbing already-migrated user state; SRS_FORM_RENAMES is the
// home for all *future* renames.
//
// The migration is idempotent by design — on a re-run, no card's lw will
// match any old key (they were rewritten on the prior run), so the loop
// is a no-op. No state flag needed; runs on every login. The cost is one
// pass through the user's cards (typically < 200 entries) looking for
// matches against a small map.
const SRS_FORM_RENAMES={
  kime:'kile',
  kifa:'kinai',
};
function srsMigrateRenamedFormsIfNeeded(username){
  if(!username)return 0;
  if(!SRS_FORM_RENAMES||Object.keys(SRS_FORM_RENAMES).length===0)return 0;
  const cards=srsLoadCards(username);
  const migratedNew={};
  const oldIds=[];
  for(const id in cards){
    const c=cards[id];
    if(!c||!c.lw)continue;
    const newLw=SRS_FORM_RENAMES[c.lw];
    if(!newLw)continue;
    const dir=c.dir||(id.endsWith("::lw_en")?"lw_en":"en_lw");
    const newId=srsCardId(newLw,dir);
    // Preserve all scheduling state; rewrite the identity field only.
    // English gloss is intentionally left as-is here — the next
    // srsRefreshAndSync pass will update it from DICTIONARY_RAW.
    migratedNew[newId]={...c,lw:newLw};
    oldIds.push(id);
  }
  if(oldIds.length===0)return 0;
  // Apply: delete old, add new. Collision guard: if a card already exists
  // at the new id (rare — user had cards for both old and new names),
  // keep the existing one (don't overwrite active history).
  for(const oldId of oldIds)delete cards[oldId];
  for(const newId in migratedNew){
    if(!cards[newId])cards[newId]=migratedNew[newId];
  }
  srsSaveCards(username,cards);
  // Cloud sync: delete old paths, write new ones (only the ones we kept).
  if(firebaseReady&&db){
    for(const oldId of oldIds){
      try{db.ref(srsCardFbPath(username,oldId)).remove();}
      catch(e){/* ignore — local is authoritative until next sync */}
    }
    for(const newId in migratedNew){
      if(cards[newId]===migratedNew[newId]){
        try{
          db.ref(srsCardFbPath(username,newId))
            .set({...cards[newId],lastSync:Date.now()})
            .catch(e=>console.warn("[SRS] form-rename migration sync error:",e));
        }catch(e){console.warn("[SRS] form-rename migration sync error:",e);}
      }
    }
  }
  console.log("[SRS] form-renamed",oldIds.length,"cards via SRS_FORM_RENAMES for",username);
  return oldIds.length;
}

// ─── Scheduling (SM-2 variant) ───────────────────────────────
// rating: "forgot" | "hard" | "good" | "easy"
// Returns mutated card and a human-readable interval-preview label.
function srsRate(card,rating){
  const now=Date.now();
  const dayMs=86400000;
  card.reps++;
  if(rating==="forgot"){
    card.lapses++;
    card.ease=Math.max(SRS_MIN_EASE,card.ease-0.2);
    card.interval=SRS_HARD_FAIL_INTERVAL;
  } else if(rating==="hard"){
    card.ease=Math.max(SRS_MIN_EASE,card.ease-0.15);
    if(card.interval===0){
      card.interval=SRS_NEW_INTERVAL_GOOD;       // new card → 1d
    } else {
      card.interval=Math.max(card.interval*SRS_HARD_INTERVAL_MULT,card.interval+1/24);
    }
  } else if(rating==="good"){
    if(card.interval===0){
      card.interval=SRS_NEW_INTERVAL_GOOD;
    } else {
      card.interval=card.interval*card.ease;
    }
  } else if(rating==="easy"){
    card.ease=card.ease+0.15;
    if(card.interval===0){
      card.interval=SRS_NEW_INTERVAL_EASY;
    } else {
      card.interval=card.interval*card.ease*SRS_EASY_BONUS;
    }
  }
  card.due=now+card.interval*dayMs;
  return card;
}

// Human-readable preview of what each rating would set the interval to.
// Used by review UI to show "10m / 1d / 3d / 1w" beneath buttons.
function srsPreviewIntervals(card){
  const fmt=(days)=>{
    if(days<1/1440*2)return "<1m";
    if(days<1/24)return Math.round(days*1440)+"m";
    if(days<1)return Math.round(days*24)+"h";
    if(days<30)return Math.round(days)+"d";
    if(days<365)return Math.round(days/30)+"mo";
    return Math.round(days/365)+"y";
  };
  // Simulate without mutating
  const simulate=(rating)=>{
    const c={...card};
    srsRate(c,rating);
    return fmt(c.interval);
  };
  return {
    forgot:simulate("forgot"),
    hard:simulate("hard"),
    good:simulate("good"),
    easy:simulate("easy")
  };
}

// ─── Queue building ──────────────────────────────────────────
// Build today's review queue.  Returns {due:[], new:[], total:n}.
// "due" = previously-seen cards whose due time has passed.
// "new" = cards never reviewed (interval===0), capped at SRS_DAILY_NEW_SOFT_CAP unless override.
function srsBuildQueue(username,opts){
  // Prune stale cards (lw no longer in dictionary) before building. This
  // catches cards that became stale after the user's last login, e.g., from
  // a dictionary change that shipped while they were mid-session.
  const rawCards=srsLoadCards(username);
  srsPruneAndSync(username,rawCards);
  // Refresh stale glosses (en drifted from current V) before serving the queue.
  const refreshCards=srsLoadCards(username);
  srsRefreshAndSync(username,refreshCards);
  const cards=srsLoadCards(username);
  const now=Date.now();
  const all=Object.entries(cards).map(([id,c])=>({id,...c}));
  const due=all.filter(c=>c.interval>0&&c.due<=now);
  const news=all.filter(c=>c.interval===0);
  // Sort due by how overdue they are (most overdue first)
  due.sort((a,b)=>a.due-b.due);
  // Sort new by addedAt (oldest first — earlier lessons drilled first)
  news.sort((a,b)=>a.addedAt-b.addedAt);
  const newLimit=(opts&&opts.unlimited)?news.length:SRS_DAILY_NEW_SOFT_CAP;
  const reviewLimit=(opts&&opts.unlimited)?due.length:SRS_DAILY_REVIEW_SOFT_CAP;
  // Build the new pile so each unique word contributes both directions before
  // we move on to the next word. This means a "10-card session" is actually
  // 5 unique words × 2 directions, which gives the anti-adjacency shuffle
  // more diversity to work with.
  const newSlice=srsExpandPairs(news,newLimit);
  const dueSlice=srsExpandPairs(due,reviewLimit);
  return {
    due:srsShuffleNoAdjacency(dueSlice),
    new:srsShuffleNoAdjacency(newSlice),
    totalDue:due.length,
    totalNew:news.length
  };
}

// Take cards in order. For each card, if its sibling (same lw, opposite dir)
// is also present in the input, include both. Stop once we've reached `limit`
// cards in the output. This pulls pairs as units.
function srsExpandPairs(sorted,limit){
  const out=[];
  const seen=new Set();
  for(const c of sorted){
    if(out.length>=limit)break;
    if(seen.has(c.id))continue;
    seen.add(c.id);
    out.push(c);
    // Find sibling
    const siblingDir=c.dir==="lw_en"?"en_lw":"lw_en";
    const siblingId=c.lw+"::"+siblingDir;
    const sibling=sorted.find(s=>s.id===siblingId);
    if(sibling&&!seen.has(sibling.id)&&out.length<limit){
      seen.add(sibling.id);
      out.push(sibling);
    }
  }
  return out;
}

// Fisher-Yates shuffle, then repair adjacent same-lw pairs by swapping with
// non-adjacent positions earlier or later in the array. Runs forward then
// backward so end-of-array adjacencies also get repaired.
function srsShuffleNoAdjacency(arr){
  if(arr.length<=2)return [...arr];
  const a=shuffle(arr);
  const tryRepair=(start,end,step)=>{
    const inc=step>0?1:-1;
    for(let i=start;step>0?i<end:i>end;i+=inc){
      const prev=a[i-1];
      if(!prev||a[i].lw!==prev.lw)continue;
      // Find a swap candidate elsewhere in the array
      let swapIdx=-1;
      for(let j=0;j<a.length;j++){
        if(j===i||j===i-1)continue;
        // Swapping a[i]<->a[j]: check that the result has no adjacency
        // at i (a[i-1] vs a[j]) and at j (a[j-1] vs a[i] and a[j+1] vs a[i])
        if(a[j].lw===prev.lw)continue;
        const jPrev=j>0?a[j-1]:null;
        const jNext=j+1<a.length?a[j+1]:null;
        if(jPrev&&jPrev.lw===a[i].lw)continue;
        if(jNext&&jNext.lw===a[i].lw)continue;
        swapIdx=j;break;
      }
      if(swapIdx>=0){
        [a[i],a[swapIdx]]=[a[swapIdx],a[i]];
      }
    }
  };
  // Forward pass, then backward pass for end-of-array cases
  tryRepair(1,a.length,1);
  tryRepair(a.length-1,0,-1);
  return a;
}

// ─── Realtime cloud listener (Part 3b) ───────────────────────
// Live propagation of cross-device wipes. Attaches once per login to
// users/<key>/srs/cards. When the cards subtree disappears (or empties),
// we know another device wiped the deck and we mirror that locally.
//
// Intentional narrow scope: this listener only handles the WIPE case,
// not per-card sync. Per-card sync via listener would race against the
// active device's own writes (creating echo loops and conflict work).
// Non-wipe drift between devices is still resolved on next login by the
// existing srsPullFromCloud + srsMergeCloudCards path, augmented by the
// cloud→local mirror added in finishLogin.
//
// Mid-session safety: if the user is actively reviewing when the wipe
// fires, we defer the local wipe via state.pendingCloudWipe. The deferred
// wipe applies the next time renderApp runs on a non-review screen
// (typically when the user finishes the session and returns home).
//
// No teardown: the app doesn't support logout without a page reload, so
// the listener naturally lives for the session's lifetime.
let srsCloudListenerRef=null;
function srsAttachCloudListener(username){
  if(!firebaseReady||!db||!username)return;
  // Detach any prior listener (defense in depth — finishLogin shouldn't run
  // twice in one page-load, but if it does, don't stack listeners).
  if(srsCloudListenerRef){
    try{srsCloudListenerRef.off();}catch(e){/* ignore */}
    srsCloudListenerRef=null;
  }
  const ref=db.ref("users/"+fbKey(username)+"/srs/cards");
  srsCloudListenerRef=ref;
  // Skip the initial fire — we already pulled the cloud state during login
  // and don't want this handler to "wipe" on a non-event. Use a one-shot
  // gate that lets the first snapshot through silently.
  let primed=false;
  ref.on("value",snap=>{
    if(!primed){primed=true;return;}
    const cloudCards=snap.val();
    const localCards=srsLoadCards(username);
    const localCount=Object.keys(localCards).length;
    // Wipe condition: cloud has no cards, but local still does.
    const cloudEmpty=!cloudCards||Object.keys(cloudCards).length===0;
    if(cloudEmpty&&localCount>0){
      // Defer if user is mid-review.
      if(state.screen==="review"&&state.reviewQueue&&state.reviewQueue.length>0){
        state.pendingCloudWipe=true;
        console.log("[SRS] cloud wipe detected mid-review; deferring local wipe for",username);
        return;
      }
      // Apply wipe immediately.
      srsApplyPendingWipe(username);
    }
  });
}

// Wipe local cards (and reset the SRS state) in response to a cross-device
// reset. Idempotent — safe to call when there's nothing to wipe. Re-renders
// so any deck-count UI updates.
function srsApplyPendingWipe(username){
  if(!username)return;
  state.pendingCloudWipe=false;
  localStorage.removeItem(srsStoreKey(username));
  // Mirror srsResetAll's state shape — deck is intentionally empty post-wipe,
  // and all one-shot guards are accounted for so a subsequent login on this
  // device doesn't re-run any one-shots (which would do nothing useful but
  // could interact awkwardly with an empty deck).
  const s=srsLoadState(username);
  const preserved={
    backfilled:true,
    deckIntentionallyEmpty:true,
    addedAtMigrationDone:true,
    mechanicalPruneDone:true,
    mechanicalPruneRound2Done:true,
    kauheToMouleyaheDone:s.kauheToMouleyaheDone===true,
    leyeToToneDone:s.leyeToToneDone===true,
    londonGpResetDone:s.londonGpResetDone===true,
  };
  srsSaveState(username,preserved);
  console.log("[SRS] applied pending cloud wipe for",username);
  if(typeof renderApp==="function")renderApp();
}

// ─── Stats ───────────────────────────────────────────────────
// Returns {deep, midTide, shallows, total} buckets for the landing page.
// deep = interval >= 21d
// midTide = 7d <= interval < 21d
// shallows = interval > 0 && interval < 7d  (newly retained but not yet sticky)
// new = interval === 0  (not yet reviewed at all)
function srsBucketStats(username){
  const cards=srsLoadCards(username);
  let deep=0,midTide=0,shallows=0,fresh=0;
  for(const c of Object.values(cards)){
    if(c.interval===0)fresh++;
    else if(c.interval>=21)deep++;
    else if(c.interval>=7)midTide++;
    else shallows++;
  }
  return {deep,midTide,shallows,fresh,total:deep+midTide+shallows+fresh};
}

// ─── Session XP tracking ─────────────────────────────────────
// Returns the XP earned for this card (respecting per-session cap).
function srsAwardXP(username){
  const today=new Date().toDateString();
  const s=srsLoadState(username);
  if(s.sessionDate!==today){s.sessionDate=today;s.sessionXP=0;}
  if(s.sessionXP>=SRS_XP_SESSION_CAP){srsSaveState(username,s);srsSyncState(username,s);return 0;}
  s.sessionXP+=SRS_XP_PER_CARD;
  srsSaveState(username,s);
  srsSyncState(username,s);
  return SRS_XP_PER_CARD;
}

// ─── Dev panel (console-driven verification) ─────────────────
// Type srsDebug() in browser console to see deck state.
function srsDebug(){
  const u=getCurrentUsername();
  if(!u){console.log("[SRS] No user logged in.");return;}
  const cards=srsLoadCards(u);
  const stats=srsBucketStats(u);
  const queue=srsBuildQueue(u);
  const state=srsLoadState(u);
  console.log("[SRS]",u,"deck:",Object.keys(cards).length,"cards");
  console.log("[SRS] buckets:",stats);
  console.log("[SRS] today's queue:",{due:queue.due.length,new:queue.new.length,totalDue:queue.totalDue,totalNew:queue.totalNew});
  console.log("[SRS] state:",state);
  console.log("[SRS] sample (first 5):",Object.entries(cards).slice(0,5));
  return {cards,stats,queue,state};
}

function setState(partial){Object.assign(state,partial);renderApp();}

setTimeout(async()=>{
  const savedName=getCurrentUsername();
  if(savedName){
    const pw=await loadPassword(savedName);
    state.screen="password";state.pwName=savedName;state.pwMode=pw?"verify":"create";state.pwFirst=null;
    renderApp();
  } else {
    state.screen="username";
    renderApp();
  }
},400);

function renderApp(){
  if(currentView!=='app')return;
  // If a cross-device wipe was deferred during a review session, apply it
  // now that we're rendering a non-review screen.
  if(state.pendingCloudWipe&&state.screen!=="review"&&state.user&&state.user.username){
    srsApplyPendingWipe(state.user.username);
    // srsApplyPendingWipe calls renderApp recursively — return now to avoid
    // double-rendering the new state.
    return;
  }
  const viewApp=document.getElementById('view-app');
  if(viewApp)viewApp.classList.toggle('in-lesson',state.screen==='lesson');
  switch(state.screen){
    case"loading":renderLoading();break;
    case"username":renderUsername();break;
    case"home":renderHome();break;
    case"lesson":renderLesson();break;
    case"complete":renderComplete();break;
    case"password":renderPassword();break;
    case"review":renderReview();break;
    case"reviewComplete":renderReviewComplete();break;
  }
}

  const name=state.pwName;
  const m=state.pwMode;
  const title=m==="verify"?"Welcome back":m==="create"?"Create a password":"Confirm password";
  const sub=m==="verify"?`Enter password for <strong>${name}</strong>`:m==="create"?`Create a 4–8 character password for <strong>${name}</strong>`:`Retype the password to confirm`;
  app.innerHTML=`<div style="min-height:calc(100vh - 61px);display:flex;align-items:center;justify-content:center;padding:24px">
    <div style="text-align:center;max-width:360px;width:100%">
      <img class="float liru-logo-img" src="${LIRU_LOGO}" alt="Liru" style="width:96px;height:96px;margin:0 auto 16px">
      <div style="font-family:var(--display);font-size:24px;color:#4A7A9E;font-weight:800;margin-bottom:4px">${title}</div>
      <div style="color:var(--dim);font-size:14px;margin-bottom:24px">${sub}</div>
      <input id="pwInput" type="password" maxlength="8" placeholder="Password"
        style="width:100%;padding:16px;background:var(--input);border:2.5px solid var(--border);border-radius:var(--radius);
        color:var(--text);font-size:17px;font-weight:700;text-align:center;margin-bottom:8px;letter-spacing:2px">
      <div id="pwErr" style="color:var(--red);font-size:13px;font-weight:700;min-height:18px;margin-bottom:12px"></div>
      <button id="pwBtn" class="btn-primary" style="margin-bottom:10px">${m==="verify"?"LOG IN":m==="create"?"NEXT":"CONFIRM"}</button>
      <button id="pwBack" class="btn-secondary">← Switch user</button>
    </div>
  </div>`;
  const inp=document.getElementById("pwInput");const btn=document.getElementById("pwBtn");const err=document.getElementById("pwErr");
  inp.focus();
  const go=async()=>{
    const v=inp.value;err.textContent="";
    if(m==="verify"){
      const real=await loadPassword(name);
      if(v===real){finishLogin(name);}
      else{inp.classList.remove("shake");void inp.offsetWidth;inp.classList.add("shake");err.textContent="Wrong password";inp.value="";}
    }
    else if(m==="create"){
      if(v.length<4||v.length>8){err.textContent="Must be 4–8 characters";return;}
      setState({pwMode:"confirm",pwFirst:v});
    }
    else{
      if(v!==state.pwFirst){err.textContent="Passwords don't match";inp.value="";return;}
      await savePassword(name,v);finishLogin(name);
    }
  };
  btn.addEventListener("click",go);
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  document.getElementById("pwBack").addEventListener("click",()=>{setCurrentUsername("");setState({screen:"username"});});
}

async function doSetUsername(val){
  const name=val.trim();if(!name)return;
  setCurrentUsername(name);
  setState({screen:"loading"});
  const pw=await loadPassword(name);
  setState({screen:"password",pwName:name,pwMode:pw?"verify":"create",pwFirst:null});
}

function renderHome(){
  const u=state.user;
  const completedSet=new Set(u.lessonsCompleted||[]);
  const isAdmin=(u.username||"").toLowerCase()==="admin";

  // Advanced-track gating + section presentation. Units tagged track:"advanced"
  // are hidden until the learner completes l84_finalreview. Admin always sees
  // everything. When advanced units are visible, they render in their own
  // labeled section ("✨ Advanced Liru") below the core section, each with
  // independent progress bars. See advanced_track_plan.md §2, §6.
  const coreComplete=isAdmin||completedSet.has("l84_finalreview");
  const coreUnits=UNITS.filter(u=>u.track!=="advanced");
  const advancedUnits=coreComplete?UNITS.filter(u=>u.track==="advanced"):[];

  // Aggregate progress per section (lessons-completed across the section's units).
  // Core stays at done_core/84 — when complete, freezes at 84/84 ✓ 100% rather
  // than getting repurposed for advanced progress.
  function countSection(units){
    let total=0,done=0;
    for(let i=0;i<units.length;i++){
      const u2=units[i];
      const idxInUnits=UNITS.indexOf(u2);
      const start=u2.start;
      const end=(idxInUnits+1<UNITS.length)?UNITS[idxInUnits+1].start:LESSONS.length;
      const ls=LESSONS.slice(start,end);
      total+=ls.length;
      done+=ls.filter(l=>completedSet.has(l.id)).length;
    }
    return {total,done};
  }
  const coreProg=countSection(coreUnits);
  const advProg=countSection(advancedUnits);

  // Build per-unit lesson groups so units can be collapsed when complete
  const unitIcons=['🌱','🏠','🌍','💡','⚙️','🔥'];
  let lessonsHTML="";

  // Shared per-unit renderer — used by both core and advanced sections.
  // unitDef comes from the section's filtered list; unitIdx is the absolute
  // UNITS index (used for icons, collapse-state keys, and click handler).
  function renderUnit(unitDef,unitIdx,sectionUnits){
    const start=unitDef.start;
    const sectionIdx=sectionUnits.indexOf(unitDef);
    // End of this unit = start of the NEXT unit in the absolute UNITS array
    // (regardless of section), falling back to LESSONS.length only if this is
    // the last unit overall. Using the absolute UNITS list matters because the
    // last unit in a filtered section (e.g. core's Unit 14) is NOT the last in
    // LESSONS once advanced units exist — sectionUnits[sectionIdx+1] would
    // miss the boundary and the section's tail unit would swallow every
    // advanced lesson after it.
    const end=(unitIdx+1<UNITS.length)?UNITS[unitIdx+1].start:LESSONS.length;
    const unitLessons=LESSONS.slice(start,end);
    const doneCount=unitLessons.filter(l=>completedSet.has(l.id)).length;
    const unitComplete=doneCount===unitLessons.length && unitLessons.length>0;
    const override=state.unitToggleOverrides[unitIdx];
    const collapsed=(override===undefined)?unitComplete:!override;

    let innerHTML="";
    unitLessons.forEach((l,offset)=>{
      const i=start+offset;
      const completed=completedSet.has(l.id);
      const unlocked=isAdmin||i===0||completedSet.has(LESSONS[i-1].id);
      const cls=completed?"completed":unlocked?"":"locked";
      const icon=completed?'<span style="color:#4A7A9E;font-size:28px;font-weight:800;line-height:1">✓</span>':unlocked?l.icon:"🔒";
      const isFinal=l.isFinalTest;
      let cardStyle="";
      if(isFinal){cardStyle=`background:linear-gradient(135deg,rgba(255,200,0,0.12),rgba(206,130,255,0.08));border:2.5px solid var(--gold);`;}
      innerHTML+=`<button class="lesson-card ${cls}" data-idx="${i}" ${!unlocked?'disabled':''} style="${cardStyle}">
        <div class="lesson-icon" style="${isFinal?'background:var(--gold-glow);border:2px solid var(--gold)':''}">${icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:16px;font-weight:800;${isFinal?'color:var(--gold)':''}">${l.title}</div>
          <div style="color:var(--dim);font-size:13px;font-weight:600;margin-top:2px">${l.desc}</div>
        </div>
        <div style="color:var(--gold);font-size:12px;font-weight:800;flex-shrink:0">+${l.xp} XP</div>
      </button>`;
    });

    const chevron=collapsed?'▸':'▾';
    return `<div style="margin:${sectionIdx===0?'0':'24px'} 0 12px">
      <button class="unit-header" data-unit-idx="${unitIdx}" style="width:100%;text-align:left;padding:10px 12px;background:linear-gradient(135deg,var(--card),var(--bg2));border:1.5px solid var(--border);border-radius:12px;color:#4A7A9E;font-size:13px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px;cursor:pointer">
        <span style="font-size:14px;width:14px;display:inline-block">${chevron}</span>
        <span>${unitIcons[unitIdx]||'📚'}</span>
        <span style="flex:1">${unitDef.name}</span>
        <span style="color:var(--dim);font-size:11px;font-weight:700;text-transform:none;letter-spacing:0">${doneCount}/${unitLessons.length}${unitComplete?' ✓':''}</span>
      </button>
      <div data-unit-body="${unitIdx}" style="${collapsed?'display:none':'margin-top:12px'}">${innerHTML}</div>
    </div>`;
  }

  // Per-section progress bar markup was previously emitted inside the lesson
  // tree, but both bars now live in the page header (above the tab strip),
  // so no helper is needed here.

  if(LESSONS.length===0){
    // ── Placeholder state while lessons are being authored ──────
    lessonsHTML=`<div style="padding:40px 20px;text-align:center;background:var(--card);border:2px dashed var(--border);border-radius:var(--radius);margin-top:8px">
      <img class="float liru-logo-img" src="${LIRU_LOGO}" alt="Liru" style="width:80px;height:80px;margin:0 auto 14px">
      <div style="font-family:var(--display);font-size:20px;font-weight:800;color:#4A7A9E;margin-bottom:8px">Lessons coming soon</div>
      <div style="color:var(--mid);font-size:14px;font-weight:600;line-height:1.6;max-width:320px;margin:0 auto">
        The lesson plan for Liru is still being written. Check back soon — this is where your journey will begin.
      </div>
      <div style="margin-top:18px;color:var(--dim);font-size:12px;font-weight:700">
        💡 In the meantime, explore the <span style="color:var(--blue)">Grammar Guide</span> and <span style="color:var(--gold)">Dictionary</span>.
      </div>
    </div>`;
  } else {
    // ── Core section ──────────────────────────────────────────
    // Always rendered. Core progress shows in the top header bar (above the
    // tab strip) — no in-tree progress bar here to avoid duplication.
    coreUnits.forEach(unitDef=>{
      const unitIdx=UNITS.indexOf(unitDef);
      lessonsHTML+=renderUnit(unitDef,unitIdx,coreUnits);
    });

    // ── Advanced section ──────────────────────────────────────
    // Hidden when coreComplete is false. Section divider banner only — the
    // advanced progress bar lives in the page header (beneath the core bar)
    // with the same isAdmin||coreComplete visibility rule, so it's already
    // visible above when this section renders.
    if(advancedUnits.length>0){
      lessonsHTML+=`<div style="margin:32px 0 16px;padding:14px 16px;background:linear-gradient(135deg,rgba(255,200,0,0.10),rgba(206,130,255,0.08));border:1.5px solid var(--gold);border-radius:14px;text-align:center">
        <div style="font-family:var(--display);font-size:18px;font-weight:800;color:var(--gold);letter-spacing:0.5px">✨ Advanced Liru</div>
        <div style="color:var(--mid);font-size:12px;font-weight:600;margin-top:2px">Beyond the core — richer expression, more range</div>
      </div>`;
      advancedUnits.forEach(unitDef=>{
        const unitIdx=UNITS.indexOf(unitDef);
        lessonsHTML+=renderUnit(unitDef,unitIdx,advancedUnits);
      });
    }
  }

  // ── Daily Review tile (SRS) ──────────────────────────────────
  let reviewTileHTML="";
  try{
    const queue=srsBuildQueue(u.username);
    const stats=srsBucketStats(u.username);
    const dueCount=queue.due.length;
    const newAvail=Math.min(queue.totalNew,SRS_DAILY_NEW_SOFT_CAP);
    const totalToday=dueCount+newAvail;
    if(stats.total===0){
      // Empty deck — user hasn't completed any lessons yet. Show a placeholder
      // so the tile space is explained rather than mysteriously absent.
      reviewTileHTML=`<div style="background:linear-gradient(135deg,var(--card),var(--bg2));border:1.5px dashed var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:28px;opacity:0.5">🌊</span>
          <div style="flex:1">
            <div style="color:var(--dim);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase">Ocean of knowledge</div>
            <div style="font-size:16px;font-weight:800;margin-top:4px;color:var(--mid)">Your tide pool is empty</div>
            <div style="color:var(--dim);font-size:12px;font-weight:700;margin-top:2px">Complete a lesson below to start collecting words to review</div>
          </div>
        </div>
      </div>`;
    } else if(totalToday===0){
      // All caught up. Offer cram practice as a secondary action.
      reviewTileHTML=`<div style="background:linear-gradient(135deg,var(--card),var(--bg2));border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;opacity:0.95">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
          <span style="font-size:28px">🌊</span>
          <div style="flex:1;min-width:0">
            <div style="color:var(--dim);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase">Ocean of knowledge</div>
            <div style="font-size:17px;font-weight:800;margin-top:4px">All caught up</div>
            <div style="color:var(--dim);font-size:12px;font-weight:700;margin-top:2px">Ready for a new lesson?</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
            <button id="cramBtn" class="btn-secondary" style="width:auto;padding:9px 14px;font-size:12px;font-weight:800;white-space:nowrap">Practice deck</button>
            <button id="practiceAllBtn" class="btn-secondary" style="width:auto;padding:9px 14px;font-size:12px;font-weight:800;white-space:nowrap">Practice all</button>
          </div>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px;text-align:right">
          <button id="srsSettingsBtn" style="background:transparent;border:none;color:var(--dim);font-size:11px;font-weight:700;cursor:pointer;opacity:0.6;padding:2px 4px">⚙ Reset flashcard progress</button>
        </div>
      </div>`;
    } else {
      // Cards available.
      const newWaveLabel=newAvail>0?` · <span style="color:var(--blue);font-weight:800">${newAvail}</span> new`:"";
      reviewTileHTML=`<div style="background:linear-gradient(135deg,var(--card),var(--bg2));border:1.5px solid var(--blue);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;box-shadow:0 0 24px var(--blue-glow)">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
          <span style="font-size:28px">🌊</span>
          <div style="flex:1;min-width:0">
            <div style="color:var(--dim);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase">Ocean of knowledge</div>
            <div style="font-size:17px;font-weight:800;margin-top:4px">A new wave of words</div>
            <div style="color:var(--mid);font-size:13px;font-weight:700;margin-top:2px"><span style="color:var(--blue);font-weight:800">${dueCount}</span> ready to review${newWaveLabel}</div>
          </div>
          <button id="startReviewBtn" class="btn-primary" style="flex-shrink:0;width:auto;padding:12px 22px;font-size:14px;box-shadow:none">Start review</button>
        </div>
        <div style="display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--border)">
          <div style="flex:1;background:var(--bg2);border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;justify-content:space-between;min-height:54px">
            <div style="color:var(--dim);font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase">In the deep</div>
            <div style="font-size:15px;font-weight:800;margin-top:2px">${stats.deep}</div>
          </div>
          <div style="flex:1;background:var(--bg2);border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;justify-content:space-between;min-height:54px">
            <div style="color:var(--dim);font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase">Mid-tide</div>
            <div style="font-size:15px;font-weight:800;margin-top:2px">${stats.midTide}</div>
          </div>
          <div style="flex:1;background:var(--bg2);border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;justify-content:space-between;min-height:54px">
            <div style="color:var(--dim);font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase">Shallows</div>
            <div style="font-size:15px;font-weight:800;margin-top:2px">${stats.shallows}</div>
          </div>
          <div style="flex:1;background:var(--bg2);border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;justify-content:space-between;min-height:54px">
            <div style="color:var(--dim);font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase">New</div>
            <div style="font-size:15px;font-weight:800;margin-top:2px">${stats.fresh}</div>
          </div>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:10px;text-align:right">
          <button id="srsSettingsBtn" style="background:transparent;border:none;color:var(--dim);font-size:11px;font-weight:700;cursor:pointer;opacity:0.6;padding:2px 4px">⚙ Reset flashcard progress</button>
        </div>
      </div>`;
    }
  }catch(e){console.warn("[SRS] tile render failed:",e);}

  let lbHTML="";
  if(!firebaseReady){lbHTML=`<div style="text-align:center;padding:40px 20px;color:var(--dim)"><div style="font-size:36px;margin-bottom:12px">🌐</div><div style="font-size:15px;font-weight:700;margin-bottom:8px">Leaderboard available when hosted</div><div style="font-size:12px;margin-top:8px">Configure Firebase to enable the leaderboard.</div></div>`;}
  else if(state.leaderboard.length===0){lbHTML=`<div style="text-align:center;padding:40px;color:var(--dim);font-size:15px">No learners yet. Be the first!</div>`;}
  else{state.leaderboard.forEach((entry,i)=>{const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1);const isMe=entry.name===u.username;const showDel=isAdmin&&entry.name.toLowerCase()!=="admin";lbHTML+=`<div class="lb-row ${isMe?'is-me':''}"><span style="font-size:${i<3?'24px':'16px'};width:36px;text-align:center;color:var(--dim);font-weight:800">${medal}</span><div style="flex:1"><div style="font-size:15px;font-weight:800">${entry.name} ${isMe?'<span style="color:#4A7A9E;font-size:12px">(you)</span>':''}</div><div style="color:var(--dim);font-size:12px;margin-top:2px">${entry.lessons} lessons · 🔥 ${entry.streak}</div></div><div style="color:var(--gold);font-weight:800;font-size:15px">⚡ ${entry.xp}</div>${showDel?`<button class="admin-del" data-user="${entry.name}" style="margin-left:10px;background:#e74c3c;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-weight:800;cursor:pointer">🗑</button>`:""}</div>`;});lbHTML+=`<button id="refreshLB" class="btn-secondary" style="margin-top:10px;font-size:14px">↻ Refresh</button>`;}

  // Header progress bar tracks CORE progress only — it stays meaningful at
  // 100% after core completion rather than getting diluted by advanced
  // lessons. coreUnits / coreProg are computed earlier in renderHome.
  // The advanced progress bar appears beneath the core bar when the user can
  // see the advanced section at all (isAdmin || coreComplete via L84). It
  // appears in the header regardless of whether the user has started any
  // advanced lessons — same visibility rule as the in-tree "✨ Advanced Liru"
  // section so the two are consistent.
  // validLessonIds is still needed by the stale-entry rebuild banner below.
  const validLessonIds=new Set(LESSONS.map(l=>l.id));
  const headerDone=coreProg.done;
  const headerTotal=coreProg.total;
  const pct=headerTotal>0?Math.round(headerDone/headerTotal*100):0;
  const showAdvHeader=advancedUnits.length>0;
  const advPct=advProg.total>0?Math.round(advProg.done/advProg.total*100):0;

  // One-time rebuild welcome banner. Shows for users with stale completion
  // entries from the previous course version (lesson IDs that no longer
  // exist in LESSONS). Dismissible; the dismissal flag persists in
  // localStorage per-user. New users (empty lessonsCompleted) and users
  // who have already dismissed don't see it.
  let welcomeBannerHTML="";
  const hasStaleEntries=(u.lessonsCompleted||[]).some(id=>!validLessonIds.has(id));
  const dismissedKey="lw_rebuild_v2_seen_"+u.username;
  const alreadyDismissed=loadLocal(dismissedKey,false);
  if(hasStaleEntries && !alreadyDismissed){
    welcomeBannerHTML=`<div id="rebuildBanner" style="background:linear-gradient(135deg,var(--card),var(--bg2));border:1.5px solid var(--blue);border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;position:relative;box-shadow:0 0 24px var(--blue-glow)">
      <button id="rebuildBannerDismiss" style="position:absolute;top:8px;right:10px;background:transparent;border:none;color:var(--dim);font-size:18px;width:24px;height:24px;cursor:pointer;line-height:1;padding:0" title="Dismiss">×</button>
      <div style="display:flex;align-items:flex-start;gap:12px;padding-right:24px">
        <span style="font-size:24px;flex-shrink:0">🌊</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:800;margin-bottom:6px">Welcome back!</div>
          <div style="color:var(--mid);font-size:13px;font-weight:600;line-height:1.5">The course has been rebuilt around shorter lessons and high-frequency vocabulary. Your flashcard progress, XP, and streak are all preserved — but the lesson tree has been reset. Start with Lesson 1 to explore the new course.</div>
        </div>
      </div>
    </div>`;
  }
  app.innerHTML=`<div style="padding-bottom:80px">
    <div style="padding:14px 20px 10px;border-bottom:1.5px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div style="display:flex;align-items:center;gap:8px;min-width:0;flex:1"><span style="font-size:22px">🌊</span><div style="color:var(--dim);font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Waimo, <span style="color:var(--text);font-weight:800">${u.username}</span>${isAdmin?' <span style="color:var(--gold);font-size:12px">👑</span>':''}</div></div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0"><span class="badge badge-streak">🔥 ${u.streak||0}</span><span class="badge badge-xp">⚡ ${u.xp||0}</span><button id="switchUserBtn" style="background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:6px 10px;color:var(--dim);font-size:12px;font-weight:700">Log Out</button></div>
      </div>
      <div style="color:var(--dim);font-size:12px;margin-top:6px;margin-left:30px">${headerDone}/${headerTotal} lessons · ${pct}% complete</div>
      <div style="margin-top:6px;height:8px" class="progress-track"><div class="progress-fill" style="width:${pct}%;background:var(--gold)"></div></div>
      ${showAdvHeader?`
      <div style="color:var(--dim);font-size:12px;margin-top:10px;margin-left:30px">✨ Advanced · ${advProg.done}/${advProg.total} lessons · ${advPct}% complete</div>
      <div style="margin-top:6px;height:8px" class="progress-track"><div class="progress-fill" style="width:${advPct}%;background:linear-gradient(90deg,var(--gold),#ce82ff)"></div></div>`:''}
    </div>
    <div class="tab-bar">
      <button class="tab-btn ${state.tab==='learn'?'active':''}" data-tab="learn">📚 LEARN</button>
      <button class="tab-btn ${state.tab==='leaderboard'?'active':''}" data-tab="leaderboard">🏆 LEADERBOARD</button>
    </div>
    <div style="padding:16px 20px;${state.tab==='learn'?'':'display:none'}" id="learnTab">${welcomeBannerHTML}${reviewTileHTML}${lessonsHTML}</div>

  const practiceAllBtn=document.getElementById("practiceAllBtn");if(practiceAllBtn)practiceAllBtn.addEventListener("click",()=>startPracticeAllSession());

    if(!yes)return;

  if(state.scrollToLessonId){

        if(card)card.scrollIntoView({behavior:"smooth",block:"center"});

    }
  }
}


// ═══════════════════════════════════════════════════════════════
// SRS REVIEW SCREENS
// ═══════════════════════════════════════════════════════════════
// Three flows: startReview() → renderReview() ↻ → renderReviewComplete()
// Flow per card: prompt visible → user taps Reveal → answer + 4 buttons
// "Keep going" override unlocks unlimited cards past the soft caps.

// Wrap a card with session-local state. Each session item tracks:
//   - card: the card object (id, lw, en, dir, etc.)
//   - streak: consecutive correct answers within this session (graduates at 2)
//   - graduated: once true, this card has had its real SM-2 schedule applied
//   - sessionLapses: count of forgot/hard ratings within this session (for fallback scheduling)
function srsWrapForSession(c){
  return {card:c,streak:0,graduated:false,sessionLapses:0};
}

function startReview(opts){
  const username=state.user.username;
  // First session: pull initial 10 cards (or whatever the soft cap is).
  // Unlimited mode is no longer used by "Keep going" — that path now extends
  // the existing queue via keepGoingReview() instead.
  const queue=srsBuildQueue(username,{unlimited:false});
  const items=[];
  for(const c of queue.due)items.push(srsWrapForSession(c));
  for(const c of queue.new)items.push(srsWrapForSession(c));
  if(items.length===0){
    setState({screen:"home"});
    return;
  }
  setState({
    screen:"review",
    reviewQueue:items,
    reviewIdx:0,
    reviewRevealed:false,
    reviewSessionXP:0,
    reviewSessionCorrect:0,
    reviewUnlimited:false,
    reviewCramMode:false
  });
}

// Start a cram-mode practice session. Pulls 20 random unique words from the
// user's deck (any bucket) and presents them with the same review UI. Ratings
// do NOT update the SRS schedule — cram is pure practice, used when the user
// is "all caught up" and wants to drill anyway. XP still accumulates so the
// user gets feedback.
function startCramSession(){
  const username=state.user.username;
  const cards=srsLoadCards(username);
  // Group cards by lw so we pull both directions for each chosen word
  const byLw={};
  for(const id in cards){
    const c=cards[id];
    if(!byLw[c.lw])byLw[c.lw]=[];
    byLw[c.lw].push({id,...c});
  }
  const allLws=Object.keys(byLw);
  if(allLws.length===0){setState({screen:"home"});return;}
  // Pick up to 20 random unique words
  const targetWords=20;
  const picked=shuffle(allLws).slice(0,Math.min(targetWords,allLws.length));
  // Expand each picked word to both directions
  const items=[];
  for(const lw of picked){
    for(const cardObj of byLw[lw]){
      items.push(srsWrapForSession(cardObj));
    }
  }
  // Anti-adjacency shuffle so siblings don't sit next to each other
  const shuffled=srsShuffleNoAdjacency(items.map(i=>i.card));
  const finalItems=shuffled.map(srsWrapForSession);
  setState({
    screen:"review",
    reviewQueue:finalItems,
    reviewIdx:0,
    reviewRevealed:false,
    reviewSessionXP:0,
    reviewSessionCorrect:0,
    reviewUnlimited:false,
    reviewCramMode:true
  });
}

// Start a practice-all session. Pulls 20 random words from the entire
// DICTIONARY_RAW (not just the user's deck), builds throwaway in-memory
// cards, and presents them in cram mode. Cards do NOT enter the user's
// SRS deck and ratings do NOT affect schedule. Pure ephemeral practice.
// Used when the user is "all caught up" and wants to encounter new
// vocabulary that hasn't been taught yet through lessons.
function startPracticeAllSession(){
  if(!Array.isArray(DICTIONARY_RAW)||DICTIONARY_RAW.length===0){
    setState({screen:"home"});return;
  }
  // Filter to entries with a usable English gloss. Skip entries without lw or en.
  const pool=DICTIONARY_RAW.filter(d=>d&&d.lw&&d.en);
  if(pool.length===0){setState({screen:"home"});return;}
  // Pick up to 20 random unique entries
  const targetWords=20;
  const picked=shuffle(pool).slice(0,Math.min(targetWords,pool.length));
  // Build throwaway cards in both directions for each picked entry
  const items=[];
  for(const d of picked){
    for(const dir of ["lw_en","en_lw"]){
      const card=srsMakeCard(d.lw,d.en,d.pos||"n",dir);
      card.id=srsCardId(d.lw,dir);
      // Mark as practice-only so any downstream code that might persist
      // these can choose to ignore them (defensive — cram mode already
      // skips persistence).
      card._practiceAll=true;
      items.push(srsWrapForSession(card));
    }
  }
  // Anti-adjacency shuffle so siblings don't sit next to each other
  const shuffled=srsShuffleNoAdjacency(items.map(i=>i.card));
  const finalItems=shuffled.map(srsWrapForSession);
  setState({
    screen:"review",
    reviewQueue:finalItems,
    reviewIdx:0,
    reviewRevealed:false,
    reviewSessionXP:0,
    reviewSessionCorrect:0,
    reviewUnlimited:false,
    reviewCramMode:true   // reuses cram-mode plumbing: no schedule effect
  });
}

// Extend the current session with another batch of ~20 cards. Used by the
// "Keep going" button on the completion screen. Pulls the next 20 cards via
// the standard queue builder (anti-adjacency aware) and appends them, then
// returns to the review screen at the next unrated position.
function keepGoingReview(){
  const username=state.user.username;
  // Get fresh queue. Build the existing IDs set so we don't double-add cards
  // that are still in the in-progress queue.
  const seen=new Set(state.reviewQueue.map(it=>it.card.id));
  // Pull a batch with a temporarily larger soft cap (20 instead of 10).
  // Build manually so we can include both due and new with combined limit ~20.
  const cards=srsLoadCards(username);
  const now=Date.now();
  const all=Object.entries(cards).map(([id,c])=>({id,...c}));
  const due=all.filter(c=>c.interval>0&&c.due<=now&&!seen.has(c.id));
  const news=all.filter(c=>c.interval===0&&!seen.has(c.id));
  due.sort((a,b)=>a.due-b.due);
  news.sort((a,b)=>a.addedAt-b.addedAt);
  // Take up to 20 total: prefer due, then new
  const target=20;
  const dueSlice=srsExpandPairs(due,Math.min(target,due.length));
  const remainingForNew=target-dueSlice.length;
  const newSlice=srsExpandPairs(news,Math.max(0,remainingForNew));
  const combined=srsShuffleNoAdjacency([...dueSlice,...newSlice]);
  if(combined.length===0){
    // Nothing more available — just go home.
    setState({screen:"home"});
    return;
  }
  const newQueue=[...state.reviewQueue,...combined.map(srsWrapForSession)];
  // reviewIdx points to the next unrated position. After the completion screen,
  // we want to jump back to the first new card we just added.
  setState({
    screen:"review",
    reviewQueue:newQueue,
    reviewIdx:state.reviewQueue.length,
    reviewRevealed:false,
    reviewUnlimited:false
  });
}

function renderReview(){
  const queue=state.reviewQueue;
  const idx=state.reviewIdx;
  if(!queue||queue.length===0||idx>=queue.length){
    // End of session
    setState({screen:"reviewComplete"});
    return;
  }
  const item=queue[idx];
  // queue items are session-wrapped: {card, streak, graduated, sessionLapses}
  const card=item.card||item;  // backward-compat with any old in-memory queue
  // Progress: count graduated cards (numerator) out of distinct cards in the
  // session (denominator). Each card needs ≥2 consecutive correct to graduate;
  // bar fills only when a card is actually mastered. This matches the true
  // session-end condition: session ends when all cards graduate.
  const distinctIds=new Set(queue.map(it=>(it.card||it).id));
  const graduatedIds=new Set();
  for(const it of queue){
    if(it&&it.graduated&&it.card)graduatedIds.add(it.card.id);
  }
  const totalDistinct=distinctIds.size;
  const masteredSoFar=graduatedIds.size;
  const pct=Math.round((masteredSoFar/totalDistinct)*100);
  const dirLabel=card.dir==="lw_en"?"Liru → English":"English → Liru";
  const promptText=card.dir==="lw_en"?card.lw:card.en;
  const answerText=card.dir==="lw_en"?card.en:card.lw;
  const posLabel=posDisplayLabel(card.pos);

  // Build button area depending on reveal state
  let actionAreaHTML="";
  if(state.reviewRevealed){
    // Four-button rating row.
    actionAreaHTML=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">
      <button class="rate-btn" data-rate="forgot" style="background:var(--red-glow);border:1.5px solid var(--red);color:var(--red);padding:14px 6px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer">I forgot</button>
      <button class="rate-btn" data-rate="hard" style="background:var(--gold-glow);border:1.5px solid var(--gold);color:var(--gold);padding:14px 6px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer">Hard</button>
      <button class="rate-btn" data-rate="good" style="background:var(--blue-glow);border:1.5px solid var(--blue);color:var(--blue);padding:14px 6px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer">Good</button>
      <button class="rate-btn" data-rate="easy" style="background:var(--green-glow);border:1.5px solid var(--green);color:var(--green);padding:14px 6px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer">Easy</button>
    </div>`;
  }

  app.innerHTML=`<div style="padding-bottom:80px;min-height:calc(100vh - 61px);display:flex;flex-direction:column">
    <div style="padding:14px 20px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:12px">
      <button id="reviewExitBtn" style="background:var(--card);border:1.5px solid var(--border);border-radius:10px;width:38px;height:38px;font-size:18px;color:var(--mid);cursor:pointer">✕</button>
      <div style="flex:1">
        <div style="height:6px;background:var(--bg2);border-radius:3px;overflow:hidden">
          <div style="height:100%;background:${state.reviewCramMode?'var(--gold)':'var(--blue)'};width:${pct}%;transition:width 0.3s"></div>
        </div>
      </div>
      <div style="color:var(--dim);font-size:12px;font-weight:700;flex-shrink:0">${state.reviewCramMode?`<span style="color:var(--gold);text-transform:uppercase;letter-spacing:0.5px">Practice</span> · ${masteredSoFar}/${totalDistinct}`:`${masteredSoFar}/${totalDistinct} mastered`}</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px">
      <div id="reviewCard" style="background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:36px 24px;width:100%;max-width:420px;text-align:center;animation:fadeUp 0.3s ease-out;${!state.reviewRevealed?'cursor:pointer;transition:transform 0.1s, border-color 0.2s':''}">
        <div style="color:var(--dim);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:18px">${dirLabel}</div>
        <div style="font-family:var(--display);font-size:38px;font-weight:800;color:var(--text);margin-bottom:6px;word-wrap:break-word">${escapeHTML(promptText)}</div>
        ${posLabel?`<div style="color:var(--dim);font-size:13px;font-style:italic;margin-bottom:20px">${posLabel}</div>`:'<div style="margin-bottom:20px"></div>'}
        ${state.reviewRevealed?`
          <div style="border-top:1.5px dashed var(--border);padding-top:20px;margin-top:8px">
            <div style="font-size:24px;font-weight:800;color:var(--blue);word-wrap:break-word">${escapeHTML(answerText)}</div>
          </div>`:`
          <div style="border-top:1.5px dashed var(--border);padding-top:20px;margin-top:8px;color:var(--dim);font-size:13px;font-weight:700">Tap to reveal</div>`}
      </div>
      <div style="width:100%;max-width:420px;margin-top:24px">
        ${actionAreaHTML}
      </div>
    </div>
  </div>`;

  // Wire up handlers
  const exitBtn=document.getElementById("reviewExitBtn");
  if(exitBtn)exitBtn.addEventListener("click",exitReview);

  if(!state.reviewRevealed){
    const cardEl=document.getElementById("reviewCard");
    if(cardEl)cardEl.addEventListener("click",()=>setState({reviewRevealed:true}));
  } else {
    document.querySelectorAll(".rate-btn").forEach(btn=>{
      btn.addEventListener("click",()=>handleRating(btn.dataset.rate));
    });
  }
}

function handleRating(rating){
  const queue=state.reviewQueue;
  const idx=state.reviewIdx;
  const item=queue[idx];
  if(!item)return;
  const card=item.card||item;
  const username=state.user.username;

  // Update session-local streak counter
  const isCorrect=(rating==="good"||rating==="easy");
  if(isCorrect){
    item.streak=(item.streak||0)+1;
  } else {
    item.streak=0;
    item.sessionLapses=(item.sessionLapses||0)+1;
  }

  // Decide: graduate, re-insert, or just advance
  const GRADUATION_THRESHOLD=2;
  const shouldGraduate=isCorrect&&item.streak>=GRADUATION_THRESHOLD;

  // In cram mode, every rating ends the card — advance to next, no re-insertion,
  // no graduation requirement. The card is shown once and that's it.
  if(state.reviewCramMode){
    item.graduated=true;
    if(rating!=="forgot")state.reviewSessionCorrect++;
  } else if(shouldGraduate||item.graduated){
    // Apply real SM-2 scheduling to the stored card and persist
    const cards=srsLoadCards(username);
    const stored=cards[card.id];
    if(stored){
      // If the user lapsed during the session, treat the final scheduling
      // rating as "hard" rather than the actual rating — short interval
      // because they struggled with it. Otherwise use the rating as-is.
      const finalRating=(item.sessionLapses>0&&isCorrect)?"hard":rating;
      srsRate(stored,finalRating);
      cards[card.id]=stored;
      srsSaveCards(username,cards);
      srsSyncCard(username,card.id,stored);
    }
    item.graduated=true;
    if(rating!=="forgot")state.reviewSessionCorrect++;
  } else if(!isCorrect) {
    // Re-insert this card later in the queue. Position depends on rating:
    //   "I forgot" → 3-5 cards later
    //   "Hard"     → 7-10 cards later
    const minOffset=rating==="forgot"?3:7;
    const maxOffset=rating==="forgot"?5:10;
    const offset=minOffset+Math.floor(Math.random()*(maxOffset-minOffset+1));
    const insertAt=Math.min(idx+offset+1,queue.length);
    queue.splice(insertAt,0,item);
  } else {
    // Correct but not yet graduated (streak === 1). Re-insert farther away
    // so the user has to genuinely retrieve it, not just remember from seconds ago.
    const offset=8+Math.floor(Math.random()*5);  // 8-12 cards later
    const insertAt=Math.min(idx+offset+1,queue.length);
    queue.splice(insertAt,0,item);
  }

  // Award XP per rating (capped per session)
  const xp=srsAwardXP(username);
  if(xp>0){
    const u=state.user;
    u.xp=(u.xp||0)+xp;
    saveUserData(u);
    pushToLeaderboard(u);
    state.reviewSessionXP+=xp;
  }

  // Advance to next card
  setState({
    reviewQueue:queue,
    reviewIdx:idx+1,
    reviewRevealed:false,
    user:state.user,
    reviewSessionXP:state.reviewSessionXP,
    reviewSessionCorrect:state.reviewSessionCorrect
  });
}

// At session end, apply a fallback schedule to any cards that were rated but
// never graduated. Called from renderReviewComplete and exitReview.
function srsCloseSession(){
  const username=state.user.username;
  if(!username)return;
  // Cram mode doesn't touch the schedule — exit immediately.
  if(state.reviewCramMode)return 0;
  const queue=state.reviewQueue||[];
  const cards=srsLoadCards(username);
  let touched=0;
  // Walk all session items. For ungraduated items that the user actually saw
  // (i.e. were before reviewIdx in the queue, or have nonzero sessionLapses),
  // apply a 1-day fallback so they appear in tomorrow's queue.
  const seen=new Set();
  for(const item of queue){
    if(!item||!item.card||item.graduated)continue;
    if(seen.has(item.card.id))continue;
    seen.add(item.card.id);
    // Only apply fallback if the user actually rated this card at least once
    // (sessionLapses > 0 OR streak > 0 means they rated it).
    if((item.sessionLapses||0)===0&&(item.streak||0)===0)continue;
    const stored=cards[item.card.id];
    if(!stored)continue;
    // Force a 1-day interval so it shows up tomorrow as a real review.
    stored.interval=1;
    stored.due=Date.now()+86400000;
    stored.reps=(stored.reps||0)+1;
    if((item.sessionLapses||0)>0)stored.lapses=(stored.lapses||0)+1;
    cards[item.card.id]=stored;
    srsSyncCard(username,item.card.id,stored);
    touched++;
  }
  if(touched>0)srsSaveCards(username,cards);
  return touched;
}

function exitReview(){
  // If the user has rated some cards already, treat this as the end of the session.
  if(state.reviewIdx>0){
    srsCloseSession();
    setState({screen:"reviewComplete"});
    return;
  }
  setState({screen:"home"});
}

function renderReviewComplete(){
  const xp=state.reviewSessionXP||0;
  const correct=state.reviewSessionCorrect||0;
  const total=state.reviewIdx||0;
  const username=state.user.username;
  const isCram=!!state.reviewCramMode;
  // For non-cram, check if there are more cards available for "Keep going"
  let offerKeepGoing=false;
  if(!isCram){
    const queue=srsBuildQueue(username);
    const moreDue=queue.due.length;
    const moreNew=queue.totalNew;
    offerKeepGoing=!state.reviewUnlimited&&((moreDue>0)||(moreNew>0));
  } else {
    // Cram: always offer to do another cram session if the deck has cards
    const cards=srsLoadCards(username);
    offerKeepGoing=Object.keys(cards).length>0;
  }

  const accuracy=total>0?Math.round((correct/total)*100):0;
  const wave=isCram
    ?(accuracy>=90?"🌊 Strong currents":accuracy>=70?"🐚 Steady waves":"🪨 Anchored — drilling helps")
    :(accuracy>=90?"🌊 The tide rises":accuracy>=70?"🐚 A steady current":"🪨 Anchored — keep going");
  const headerText=isCram?"Practice complete":"Review complete";
  const keepGoingLabel=isCram?"Practice again":"Keep going";

  app.innerHTML=`<div style="min-height:calc(100vh - 61px);display:flex;align-items:center;justify-content:center;padding:24px;flex-direction:column">
    <div style="background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:32px 24px;width:100%;max-width:420px;text-align:center;animation:fadeUp 0.4s ease-out">
      <div style="font-size:56px;margin-bottom:12px">🌊</div>
      <div style="font-family:var(--display);font-size:24px;font-weight:800;color:#4A7A9E;margin-bottom:6px">${headerText}</div>
      <div style="color:var(--dim);font-size:14px;font-weight:700;margin-bottom:24px">${wave}</div>
      <div style="display:flex;gap:10px;margin-bottom:24px">
        <div style="flex:1;background:var(--bg2);border-radius:10px;padding:12px 8px">
          <div style="color:var(--dim);font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase">Reviewed</div>
          <div style="font-size:20px;font-weight:800;margin-top:4px">${total}</div>
        </div>
        <div style="flex:1;background:var(--bg2);border-radius:10px;padding:12px 8px">
          <div style="color:var(--dim);font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase">Correct</div>
          <div style="font-size:20px;font-weight:800;margin-top:4px;color:var(--green)">${correct}</div>
        </div>
        <div style="flex:1;background:var(--bg2);border-radius:10px;padding:12px 8px">
          <div style="color:var(--dim);font-size:10px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase">XP</div>
          <div style="font-size:20px;font-weight:800;margin-top:4px;color:var(--gold)">+${xp}</div>
        </div>
      </div>
      ${offerKeepGoing?`
        <button id="keepGoingBtn" class="btn-primary" style="width:100%;padding:14px;font-size:15px;margin-bottom:10px">${keepGoingLabel}</button>
      `:""}
      <button id="reviewDoneBtn" class="btn-secondary" style="width:100%;padding:14px;font-size:15px">Back to lessons</button>
    </div>
  </div>`;

  const keepBtn=document.getElementById("keepGoingBtn");
  if(keepBtn)keepBtn.addEventListener("click",()=>{
    if(isCram)startCramSession();
    else keepGoingReview();
  });
  const doneBtn=document.getElementById("reviewDoneBtn");
  if(doneBtn)doneBtn.addEventListener("click",()=>{
    srsCloseSession();
    setState({screen:"home"});
  });
}

// Helper for displaying part-of-speech labels
function posDisplayLabel(pos){
  if(!pos)return "";
  const map={
    n:"noun", v:"verb", adj:"adjective", adv:"adverb",
    pronoun:"pronoun", particle:"particle", social:"expression",
    expr:"expression", demonstrative:"demonstrative", prep:"particle"
  };
  return map[pos]||"";
}

function startLesson(idx){
  const lesson=LESSONS[idx];
  const exercises=generateExercises(lesson.id);
  if(!exercises||exercises.length===0){alert("No exercises available for this lesson.");return;}
  const ex=exercises[0];
  const isFinal=lesson.isFinalTest;
  setState({
    screen:"lesson",lesson,exercises,exIdx:0,correct:0,
    hearts:isFinal?999:3,
    isFinalTest:isFinal,finalFailed:false,
    accXP:0,
    mcSelected:null,mcAnswered:false,
    matchSelectedLeft:null,matchMatched:[],matchWrong:null,
    matchShuffledRight:ex.type==="match"?shuffle(ex.pairs.map(p=>p.right)):[],
    matchShuffledLeft:ex.type==="match"?shuffle(ex.pairs.map(p=>p.left)):[],
    fillInput:"",fillAnswered:false,fillCorrect:false,
    woSelected:[],woAvailable:ex.type==="wordOrder"?[...ex.shuffled]:[],woAnswered:false,woCorrect:false,woOrderHint:false,
    tfAnswered:false,tfSelected:null,
    revfillSelected:null,revfillAnswered:false,
    errcorrectSelected:null,errcorrectAnswered:false,
    freetextInput:"",freetextSubmitted:false,
    clozeFilled:ex.type==="cloze"?ex.blanks.map(()=>null):[],
    clozeBank:ex.type==="cloze"?shuffle(ex.bank.map((w,i)=>({key:w,id:i}))):[],
    clozeAnswered:false,clozeCorrect:false,
    waitingContinue:false,
  });
}

function renderLesson(){
  const ex=state.exercises[state.exIdx];

  const isFinal=state.isFinalTest;

  let heartsHTML="";

  } else {
    // Regular lesson — no hearts, retry-until-right mode.
    // Show running XP tally once > 0; before that, stay blank.
    const xpLabel = state.accXP > 0 ? `+${state.accXP} XP` : "";
    heartsHTML=`<span style="color:var(--dim);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em">${xpLabel}</span>`;
  }

  let exHTML="";
  if(ex.type==="mc")exHTML=renderMC(ex);
  else if(ex.type==="match")exHTML=renderMatch(ex);
  else if(ex.type==="fill")exHTML=renderFill(ex);
  else if(ex.type==="wordOrder")exHTML=renderWordOrder(ex);
  else if(ex.type==="cloze")exHTML=renderCloze(ex);
  else if(ex.type==="tf")exHTML=renderTF(ex);
  else if(ex.type==="revfill")exHTML=renderRevFill(ex);
  else if(ex.type==="errcorrect")exHTML=renderErrCorrect(ex);
  else if(ex.type==="freetext")exHTML=renderFreeText(ex);
  else if(ex.type==="paraIntro")exHTML=renderParaIntro(ex);
  else if(ex.type==="lessonIntro")exHTML=renderLessonIntro(ex);
  else if(ex.type==="flashcard")exHTML=renderFlashcard(ex);
  else if(ex.type==="canvasDrill")exHTML=renderCanvasDrill(ex);

  let continueHTML="";
  if(state.waitingContinue){

  }

  app.innerHTML=`<div class="lesson-shell">
    <div class="lesson-header">
      <button id="closeBtn" style="background:none;color:var(--dim);font-size:24px;padding:4px">✕</button>
      <div style="flex:1" class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${isFinal?'var(--gold)':'#4A7A9E'}"></div></div>
      <div style="display:flex;gap:2px">${heartsHTML}</div>
    </div>
    <div class="lesson-body"><div style="max-width:480px;margin:0 auto" class="fade-up">${exHTML}${continueHTML}</div></div>
  </div>`;

  document.getElementById("closeBtn").addEventListener("click",()=>setState({screen:"home",scrollToLessonId:state.lesson.id}));
  const contBtn=document.getElementById("continueBtn");if(contBtn)contBtn.addEventListener("click",()=>advanceAfterAnswer());

  if(ex.type==="mc")bindMC(ex);
  else if(ex.type==="match")bindMatch(ex);
  else if(ex.type==="fill")bindFill(ex);
  else if(ex.type==="wordOrder")bindWordOrder(ex);
  else if(ex.type==="cloze")bindCloze(ex);
  else if(ex.type==="tf")bindTF(ex);
  else if(ex.type==="revfill")bindRevFill(ex);
  else if(ex.type==="errcorrect")bindErrCorrect(ex);

  else if(ex.type==="lessonIntro")bindLessonIntro(ex);
