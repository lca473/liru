// ─── Multiple Choice ─────────────────────────────────────────
function renderMC(ex){
  const optsHTML=ex.options.map((opt,i)=>{
    let cls="opt-btn";
    if(state.mcAnswered){
      if(opt===ex.correct)cls+=" correct";
      else if(opt===state.mcSelected)cls+=" wrong";
      else cls+=" faded";
    } else if(state.mcSelected===opt){cls+=" selected";cls=cls.replace("opt-btn","opt-btn");}
    return `<button class="${cls}" data-opt="${escapeHTML(opt)}" ${state.mcAnswered?'disabled':''}>${escapeHTML(opt)}</button>`;
  }).join("");
  const noteHTML=ex.note?`<div style="color:var(--blue);font-size:13px;font-weight:700;margin-top:10px">🧩 ${ex.note}</div>`:"";
  const checkHTML=!state.mcAnswered?`<div class="check-bar"><button id="checkBtn" class="btn-primary" ${state.mcSelected?'':'disabled'}>CHECK</button></div>`:"";
  const resultHTML=state.mcAnswered?renderResultBanner(state.mcSelected===ex.correct,ex.correct):"";
  return `<div style="font-family:var(--display);font-size:20px;font-weight:800;margin-bottom:22px;line-height:1.4">${escapeHTML(ex.prompt)}</div>
    ${noteHTML}
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">${optsHTML}</div>
    ${resultHTML}${checkHTML}`;
}
function bindMC(ex){
  document.querySelectorAll(".opt-btn[data-opt]").forEach(b=>b.addEventListener("click",()=>{
    if(state.mcAnswered)return;
    setState({mcSelected:b.dataset.opt});
  }));
  const chk=document.getElementById("checkBtn");
  if(chk)chk.addEventListener("click",()=>{if(!state.mcSelected)return;handleAnswer(state.mcSelected===ex.correct);setState({mcAnswered:true});});
}

// ─── True / False ─────────────────────────────────────────────
function renderTF(ex){
  const optsHTML=["TRUE","FALSE"].map(label=>{
    const val=label==="TRUE";
    let cls="opt-btn";
    if(state.tfAnswered){
      if(val===ex.correct)cls+=" correct";
      else if(val===state.tfSelected)cls+=" wrong";
      else cls+=" faded";
    } else if(state.tfSelected===val){cls+=" selected";}
    return `<button class="${cls}" data-tf="${val}" ${state.tfAnswered?'disabled':''} style="text-align:center">${label==="TRUE"?"✓ TRUE":"✗ FALSE"}</button>`;
  }).join("");
  const checkHTML=!state.tfAnswered?`<div class="check-bar"><button id="checkBtn" class="btn-primary" ${state.tfSelected!==null?'':'disabled'}>CHECK</button></div>`:"";
  const resultHTML=state.tfAnswered?renderResultBanner(state.tfSelected===ex.correct,ex.correct?`TRUE — ${ex.correctLabel||""}`:`FALSE — means "${ex.correctLabel||""}"`):"";
  return `<div style="font-family:var(--display);font-size:20px;font-weight:800;margin-bottom:22px;line-height:1.4;white-space:pre-wrap">${escapeHTML(ex.prompt)}</div>
    <div style="display:flex;flex-direction:column;gap:10px">${optsHTML}</div>
    ${resultHTML}${checkHTML}`;
}
function bindTF(ex){
  document.querySelectorAll(".opt-btn[data-tf]").forEach(b=>b.addEventListener("click",()=>{
    if(state.tfAnswered)return;
    setState({tfSelected:b.dataset.tf==="true"});
  }));
  const chk=document.getElementById("checkBtn");
  if(chk)chk.addEventListener("click",()=>{if(state.tfSelected===null)return;handleAnswer(state.tfSelected===ex.correct);setState({tfAnswered:true});});
}

// ─── Match pairs ─────────────────────────────────────────────
function renderMatch(ex){
  const lefts=state.matchShuffledLeft.length?state.matchShuffledLeft:ex.pairs.map(p=>p.left);
  const rights=state.matchShuffledRight.length?state.matchShuffledRight:ex.pairs.map(p=>p.right);
  const matchedLeft=new Set(state.matchMatched.map(m=>m.left));
  const matchedRight=new Set(state.matchMatched.map(m=>m.right));
  // All tiles share a fixed min-height sized for 2 lines of wrapped text.
  // This prevents any tile from being taller than the others, which would
  // otherwise leak the pairing (a long English translation making its Liru
  // match tile taller too).
  const tileStyle = "min-height:64px;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px 14px";
  const leftColHTML=lefts.map(l=>{
    let cls="match-btn";
    if(matchedLeft.has(l))cls+=" matched";
    else if(state.matchSelectedLeft===l)cls+=" selected";
    if(state.matchWrong&&state.matchWrong.left===l)cls+=" wrong-match";
    return `<button class="${cls}" style="${tileStyle}" data-left="${escapeHTML(l)}" ${matchedLeft.has(l)?'disabled':''}>${escapeHTML(l)}</button>`;
  }).join("");
  const rightColHTML=rights.map(r=>{
    let cls="match-btn";
    if(matchedRight.has(r))cls+=" matched";
    if(state.matchWrong&&state.matchWrong.right===r)cls+=" wrong-match";
    return `<button class="${cls}" style="${tileStyle}" data-right="${escapeHTML(r)}" ${matchedRight.has(r)?'disabled':''}>${escapeHTML(r)}</button>`;
  }).join("");
  return `<div style="font-family:var(--display);font-size:20px;font-weight:800;margin-bottom:22px">Match the pairs</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start">
      <div style="display:flex;flex-direction:column;gap:10px">${leftColHTML}</div>
      <div style="display:flex;flex-direction:column;gap:10px">${rightColHTML}</div>
    </div>`;
}
function bindMatch(ex){
  document.querySelectorAll(".match-btn[data-left]").forEach(b=>b.addEventListener("click",()=>{
    if(b.disabled)return;
    setState({matchSelectedLeft:b.dataset.left,matchWrong:null});
  }));
  document.querySelectorAll(".match-btn[data-right]").forEach(b=>b.addEventListener("click",()=>{
    if(b.disabled||!state.matchSelectedLeft)return;
    const right=b.dataset.right;
    const pair=ex.pairs.find(p=>p.left===state.matchSelectedLeft);
    if(pair&&pair.right===right){
      const newMatched=[...state.matchMatched,{left:state.matchSelectedLeft,right}];
      if(newMatched.length===ex.pairs.length){
        handleAnswer(true);
      }
      setState({matchMatched:newMatched,matchSelectedLeft:null,matchWrong:null});
    } else {
      setState({matchWrong:{left:state.matchSelectedLeft,right}});
      setTimeout(()=>setState({matchWrong:null,matchSelectedLeft:null}),600);
    }
  }));
}

// ─── Fill-in (type the answer) ───────────────────────────────
function renderFill(ex){
  const normalize=s=>s.toLowerCase().replace(/[.,!?;:"']/g,"").replace(/\s+/g," ").trim();
  const userNorm=normalize(state.fillInput||"");
  const correctNorm=normalize(ex.correct);
  const altsNorm=(ex.correctAlts||[]).map(a=>normalize(a));
  const isCorrect=state.fillAnswered?(userNorm===correctNorm||altsNorm.includes(userNorm)):false;
  const resultHTML=state.fillAnswered?renderResultBanner(isCorrect,ex.correct):"";
  const checkHTML=!state.fillAnswered?`<div class="check-bar"><button id="checkBtn" class="btn-primary" ${state.fillInput.trim()?'':'disabled'}>CHECK</button></div>`:"";
  const inputStyle=state.fillAnswered?(isCorrect?"border-color:#4A7A9E;background:rgba(74,122,158,0.1)":"border-color:var(--red);background:rgba(255,75,75,0.08)"):"";
  const isParagraph=ex.isParagraph;
  return `<div style="font-family:var(--display);font-size:20px;font-weight:800;margin-bottom:22px;line-height:1.4;white-space:pre-wrap">${escapeHTML(ex.prompt)}</div>
    <div style="margin-bottom:16px">${isParagraph
      ?`<textarea id="fillInput" rows="4" placeholder="Type your translation..." ${state.fillAnswered?'disabled':''} style="display:block;width:100%;padding:14px 16px;background:var(--bg2);border:2.5px solid var(--blue);border-radius:var(--radius);color:var(--text);font-size:16px;font-weight:600;line-height:1.6;resize:vertical;min-height:100px;box-sizing:border-box;${inputStyle}">${escapeHTML(state.fillInput)}</textarea>`
      :`<input id="fillInput" type="text" placeholder="Type here..." ${state.fillAnswered?'disabled':''} value="${escapeHTML(state.fillInput)}" style="display:block;width:100%;padding:16px;background:var(--bg2);border:2.5px solid var(--blue);border-radius:var(--radius);color:var(--text);font-size:18px;font-weight:700;box-sizing:border-box;${inputStyle}" autocomplete="off" autocapitalize="off" spellcheck="false">`
    }</div>
    ${resultHTML}${checkHTML}`;
}
function bindFill(ex){
  const inp=document.getElementById("fillInput");
  if(!inp)return;
  if(!state.fillAnswered){
    inp.focus();
    const len=inp.value.length;
    try{inp.setSelectionRange(len,len);}catch(e){}
    inp.addEventListener("input",e=>{state.fillInput=e.target.value;const chk=document.getElementById("checkBtn");if(chk)chk.disabled=!state.fillInput.trim();});
    inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey&&!ex.isParagraph){e.preventDefault();const chk=document.getElementById("checkBtn");if(chk&&!chk.disabled)chk.click();}});
  }
  const chk=document.getElementById("checkBtn");
  if(chk)chk.addEventListener("click",()=>{
    const normalize=s=>s.toLowerCase().replace(/[.,!?;:"']/g,"").replace(/\s+/g," ").trim();
    const userNorm=normalize(state.fillInput||"");
    const correctNorm=normalize(ex.correct);
    const altsNorm=(ex.correctAlts||[]).map(a=>normalize(a));
    const isCorrect=userNorm===correctNorm||altsNorm.includes(userNorm);
    handleAnswer(isCorrect);
    setState({fillAnswered:true,fillCorrect:isCorrect});
  });
}

// ─── Word Order (tap to build sentence) ──────────────────────
function renderWordOrder(ex){
  const placedHTML=state.woSelected.map((w,i)=>`<button class="word-chip placed" data-placed="${i}">${escapeHTML(w)}</button>`).join("");
  const availHTML=state.woAvailable.map((w,i)=>`<button class="word-chip" data-avail="${i}">${escapeHTML(w)}</button>`).join("");
  const correctStr=ex.correctOrder.join(" ");
  let resultHTML="";
  if(state.woAnswered){
    resultHTML=renderResultBanner(state.woCorrect, correctStr);
    // If the user had the right words in the wrong order, show the natural-order hint.
    // The hint appears on a wrong answer (since wrong order is now wrong); the wrong-answer
    // path doesn't auto-advance, so the learner has time to read it.
    if(!state.woCorrect && state.woOrderHint){
      resultHTML+=`<div style="margin-top:10px;padding:12px 14px;background:rgba(28,176,246,0.06);border:1.5px solid var(--blue);border-radius:12px;color:var(--blue);font-size:13px;font-weight:700" class="fade-in">📝 Right words! The natural order is: <strong>${escapeHTML(correctStr)}</strong></div>`;
    }
  }
  const checkHTML=!state.woAnswered?`<div class="check-bar"><button id="checkBtn" class="btn-primary" ${state.woSelected.length>0?'':'disabled'}>CHECK</button></div>`:"";
  return `<div style="font-family:var(--display);font-size:20px;font-weight:800;margin-bottom:22px;line-height:1.4">${escapeHTML(ex.prompt)}</div>
    <div style="min-height:60px;padding:12px;background:var(--input);border:2px dashed var(--border);border-radius:var(--radius);margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start">${placedHTML||'<span style="color:var(--dim);font-size:13px">Tap words below to build your answer</span>'}</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">${availHTML}</div>
    ${resultHTML}${checkHTML}`;
}
function bindWordOrder(ex){
  document.querySelectorAll("[data-avail]").forEach(b=>b.addEventListener("click",()=>{
    if(state.woAnswered)return;
    const i=parseInt(b.dataset.avail);
    const w=state.woAvailable[i];
    setState({woSelected:[...state.woSelected,w],woAvailable:state.woAvailable.filter((_,j)=>j!==i)});
  }));
  document.querySelectorAll("[data-placed]").forEach(b=>b.addEventListener("click",()=>{
    if(state.woAnswered)return;
    const i=parseInt(b.dataset.placed);
    const w=state.woSelected[i];
    setState({woSelected:state.woSelected.filter((_,j)=>j!==i),woAvailable:[...state.woAvailable,w]});
  }));
  const chk=document.getElementById("checkBtn");
  if(chk)chk.addEventListener("click",()=>{
    const userStr=state.woSelected.join(" ").toLowerCase();
    const correctStr=ex.correctOrder.join(" ").toLowerCase();
    const alts=(ex.correctOrderAlts||[]).map(a=>a.join(" ").toLowerCase());
    const exactMatch=userStr===correctStr||alts.includes(userStr);
    // Detect "right words, wrong order" so we can show a helpful hint on the wrong banner.
    let rightWordsWrongOrder=false;
    if(!exactMatch){
      const norm=arr=>arr.map(s=>s.toLowerCase()).sort().join("|");
      const userMultiset=norm(state.woSelected);
      const correctMultiset=norm(ex.correctOrder);
      if(userMultiset===correctMultiset){
        rightWordsWrongOrder=true;
      } else {
        for(const alt of (ex.correctOrderAlts||[])){
          if(norm(alt)===userMultiset){rightWordsWrongOrder=true;break;}
        }
      }
    }
    const isCorrect=exactMatch;
    handleAnswer(isCorrect);
    setState({woAnswered:true, woCorrect:isCorrect, woOrderHint:rightWordsWrongOrder});
  });
}

// ─── Cloze (multi-blank fill from a word bank) ────────────────
// Ships with A3 (Unit 17). Exercise data shape:
//   {type:"cloze", liru:[...tokens...], blanks:[idx,idx,...],
//    bank:[chip,chip,...], en:"English translation"}
// blanks lists indices into liru[] that should be hidden as blanks.
// bank lists chips shown below the sentence — must contain every blanked
// token plus 2+ distractors. Learner taps a chip, then taps a blank to
// place it (tap-tap, mobile-friendly). All blanks must be filled to
// enable CHECK; all blanks correct to pass (single-strike pass/fail
// matching renderFill). state.clozeFilled[i] holds the chip object
// {key,id} placed in blank i (or null). state.clozeBank holds the chips
// not yet placed.
function renderCloze(ex){
  const filled=state.clozeFilled;
  const bank=state.clozeBank;
  const allFilled=filled.every(c=>c!==null);
  let userCorrect=false;
  if(state.clozeAnswered){
    userCorrect=filled.every((c,i)=>c && c.key.toLowerCase()===ex.liru[ex.blanks[i]].toLowerCase());
  }
  // Build the sentence: tokens with blanks replaced by interactive boxes.
  const tokensHTML=ex.liru.map((tok,i)=>{
    const blankIdx=ex.blanks.indexOf(i);
    if(blankIdx<0){
      return `<span style="display:inline-block;margin:2px 4px;padding:6px 2px;font-weight:700">${escapeHTML(tok)}</span>`;
    }
    const placed=filled[blankIdx];
    const isThisCorrect=state.clozeAnswered && placed && placed.key.toLowerCase()===ex.liru[i].toLowerCase();
    const isThisWrong=state.clozeAnswered && placed && placed.key.toLowerCase()!==ex.liru[i].toLowerCase();
    let boxStyle="display:inline-block;margin:2px 4px;min-width:64px;padding:6px 12px;border:2px dashed var(--blue);border-radius:10px;font-weight:700;text-align:center;cursor:pointer";
    if(placed){boxStyle="display:inline-block;margin:2px 4px;min-width:64px;padding:6px 12px;border:2px solid var(--blue);border-radius:10px;font-weight:700;text-align:center;cursor:pointer;background:var(--bg2)";}
    if(isThisCorrect){boxStyle+=";border-color:#4A7A9E;background:rgba(74,122,158,0.15)";}
    if(isThisWrong){boxStyle+=";border-color:var(--red);background:rgba(255,75,75,0.10);color:var(--red)";}
    const content=placed?escapeHTML(placed.key):"&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;";
    return `<span class="cloze-blank" data-blank="${blankIdx}" style="${boxStyle}">${content}</span>`;
  }).join("");
  // Bank chips: only those not currently placed in a blank.
  const placedIds=new Set(filled.filter(c=>c!==null).map(c=>c.id));
  const bankHTML=bank.filter(c=>!placedIds.has(c.id)).map(c=>{
    return `<button class="word-chip" data-bank="${c.id}" ${state.clozeAnswered?'disabled':''}>${escapeHTML(c.key)}</button>`;
  }).join("");
  // Correct-answer banner (shows the full correct sentence for clarity).
  const correctSentence=ex.liru.join(" ");
  const resultHTML=state.clozeAnswered?renderResultBanner(userCorrect,correctSentence):"";
  const checkHTML=!state.clozeAnswered?`<div class="check-bar"><button id="checkBtn" class="btn-primary" ${allFilled?'':'disabled'}>CHECK</button></div>`:"";
  return `<div style="font-family:var(--display);font-size:18px;font-weight:800;margin-bottom:10px;line-height:1.4">Fill in the blanks:</div>
    <div style="color:var(--dim);font-size:14px;font-weight:600;margin-bottom:18px;font-style:italic">"${escapeHTML(ex.en)}"</div>
    <div style="padding:14px 8px;background:var(--input);border:2px dashed var(--border);border-radius:var(--radius);margin-bottom:18px;line-height:2.2;font-size:17px">${tokensHTML}</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">${bankHTML||'<span style="color:var(--dim);font-size:13px">All chips placed</span>'}</div>
    ${resultHTML}${checkHTML}`;
}
function bindCloze(ex){
  // Tap a bank chip: place it in the first empty blank (or the active blank
  // if one is "selected"). Simpler tap-tap: tap chip → place in first empty
  // blank; tap filled blank → return its chip to the bank.
  document.querySelectorAll("[data-bank]").forEach(b=>b.addEventListener("click",()=>{
    if(state.clozeAnswered)return;
    const chipId=parseInt(b.dataset.bank);
    const chip=state.clozeBank.find(c=>c.id===chipId);
    if(!chip)return;
    // Find first empty blank.
    const firstEmpty=state.clozeFilled.findIndex(c=>c===null);
    if(firstEmpty<0)return;  // all blanks already filled
    const next=[...state.clozeFilled];
    next[firstEmpty]=chip;
    setState({clozeFilled:next});
  }));
  // Tap a filled blank: return that chip to the bank (empty the slot).
  document.querySelectorAll(".cloze-blank").forEach(b=>b.addEventListener("click",()=>{
    if(state.clozeAnswered)return;
    const blankIdx=parseInt(b.dataset.blank);
    if(state.clozeFilled[blankIdx]===null)return;
    const next=[...state.clozeFilled];
    next[blankIdx]=null;
    setState({clozeFilled:next});
  }));
  const chk=document.getElementById("checkBtn");
  if(chk)chk.addEventListener("click",()=>{
    const allFilled=state.clozeFilled.every(c=>c!==null);
    if(!allFilled)return;
    const isCorrect=state.clozeFilled.every((c,i)=>c.key.toLowerCase()===ex.liru[ex.blanks[i]].toLowerCase());
    handleAnswer(isCorrect);
    setState({clozeAnswered:true,clozeCorrect:isCorrect});
  });
}

// ─── Shared: result banner, answer handler, advance ──────────
function renderResultBanner(isCorrect,correctLabel){
  if(isCorrect){
    return `<div style="margin-top:18px;padding:14px 16px;background:rgba(74,122,158,0.1);border:1.5px solid #4A7A9E;border-radius:12px;color:#4A7A9E;font-size:15px;font-weight:800" class="fade-in">✓ Correct! ${correctLabel?`<span style="color:var(--mid);font-weight:600;font-size:13px">· ${escapeHTML(correctLabel)}</span>`:""}</div>`;
  }
  return `<div style="margin-top:18px;padding:14px 16px;background:rgba(255,75,75,0.08);border:1.5px solid var(--red);border-radius:12px;color:var(--red);font-size:15px;font-weight:800" class="fade-in">✗ Not quite.${correctLabel?`<div style="color:var(--mid);font-weight:600;font-size:13px;margin-top:4px">Answer: ${escapeHTML(correctLabel)}</div>`:""}</div>`;
}

function handleAnswer(isCorrect){
  const ex=state.exercises[state.exIdx];
  // Flashcards and teaching intros don't award XP individually — they're
  // presented as "tap to continue" cards that score trivially.
  const isUngraded=ex && (ex.type==="flashcard"||ex.type==="lessonIntro"||ex.type==="paraIntro");
  // Hearts are only active on checkpoints and the final test.
  const heartsActive=(state.lesson&&state.lesson.isCheckpoint)||state.isFinalTest;

  if(isCorrect){
    state.correct++;
    // Ungraded items don't add XP. For graded exercises, divide the lesson XP
    // evenly across the graded count.
    if(!isUngraded){
      const gradedCount=state.exercises.filter(e=>e.type!=="flashcard"&&e.type!=="lessonIntro"&&e.type!=="paraIntro").length||1;
      state.accXP+=Math.round(state.lesson.xp/gradedCount);
    }
    setTimeout(()=>advanceAfterAnswer(),isUngraded?0:900);
    return;
  }

  // Wrong answer.
  if(state.isFinalTest){
    state.finalFailed=true;
    setTimeout(()=>setState({screen:"complete"}),1200);
    return;
  }

  if(heartsActive){
    // Checkpoint: deplete hearts. Same as before.
    state.hearts--;
    if(state.hearts<=0){
      setTimeout(()=>setState({screen:"complete"}),1200);
    } else {
      setState({waitingContinue:true});
    }
    return;
  }

  // Regular lesson: retry-until-right. Push the current exercise to the end of the queue
  // so the learner encounters it again. Flag waitingContinue so they can review the
  // correct answer before moving on.
  const reinserted={...ex, _retry:true};
  state.exercises.push(reinserted);
  setState({waitingContinue:true});
}

function advanceAfterAnswer(){
  if(state.exIdx+1>=state.exercises.length){
    setState({screen:"complete"});
    return;
  }
  const nextIdx=state.exIdx+1;
  const nextEx=state.exercises[nextIdx];
  setState({
    exIdx:nextIdx,
    mcSelected:null,mcAnswered:false,
    matchSelectedLeft:null,matchMatched:[],matchWrong:null,
    matchShuffledRight:nextEx.type==="match"?shuffle(nextEx.pairs.map(p=>p.right)):[],
    matchShuffledLeft:nextEx.type==="match"?shuffle(nextEx.pairs.map(p=>p.left)):[],
    fillInput:"",fillAnswered:false,fillCorrect:false,
    woSelected:[],woAvailable:nextEx.type==="wordOrder"?[...nextEx.shuffled]:[],woAnswered:false,woCorrect:false,woOrderHint:false,
    tfAnswered:false,tfSelected:null,
    revfillSelected:null,revfillAnswered:false,
    errcorrectSelected:null,errcorrectAnswered:false,
    freetextInput:"",freetextSubmitted:false,
    clozeFilled:nextEx.type==="cloze"?nextEx.blanks.map(()=>null):[],
    clozeBank:nextEx.type==="cloze"?shuffle(nextEx.bank.map((w,i)=>({key:w,id:i}))):[],
    clozeAnswered:false,clozeCorrect:false,
    waitingContinue:false,
  });
}

// ─── Completion screen ────────────────────────────────────────
function renderComplete(){
  const isFinal=state.isFinalTest;
  const passed=isFinal?!state.finalFailed:state.hearts>0;
  const u=state.user;

  if(passed){
    const alreadyDone=(u.lessonsCompleted||[]).includes(state.lesson.id);
    if(!alreadyDone){
      u.lessonsCompleted=[...(u.lessonsCompleted||[]),state.lesson.id];
      // SRS — enroll this lesson's words into the user's review deck.
      // Pass the lesson's index in LESSONS so newly-enrolled cards sort
      // by lesson order alongside backfilled cards.
      try{
        const lessonIdx=LESSONS.findIndex(l=>l.id===state.lesson.id);
        srsEnrollLesson(u.username,state.lesson,V,DICTIONARY_RAW,lessonIdx>=0?lessonIdx:undefined);
      }
      catch(e){console.warn("[SRS] enrollment failed:",e);}
    }
    u.xp=(u.xp||0)+state.accXP;
    // Streak logic
    const today=new Date().toDateString();
    if(u.lastActiveDate!==today){
      const yesterday=new Date(Date.now()-86400000).toDateString();
      if(u.lastActiveDate===yesterday)u.streak=(u.streak||0)+1;
      else u.streak=1;
      u.lastActiveDate=today;
    }
    saveUserData(u);
    pushToLeaderboard(u);

  const confettiHTML=passed?[...Array(30)].map(()=>{const colors=["#58CC02","#FFC800","#1CB0F6","#CE82FF","#FF4B4B"];const c=colors[Math.floor(Math.random()*colors.length)];return `<div class="confetti-piece" style="background:${c};left:${Math.random()*100}%;top:${20+Math.random()*40}%;animation-delay:${Math.random()*0.3}s"></div>`;}).join(""):"";

      <div style="color:var(--dim);font-size:15px;margin-bottom:28px">+${state.accXP} XP earned · ${state.correct}/${state.exercises.length} correct</div>`;
    } else if(isCheckpoint){
      const nextUnitNum=examUnitNum+1;
      innerHTML=`
      <div style="font-size:80px;margin-bottom:16px">🎉</div>
      <div style="font-family:var(--display);font-size:32px;font-weight:800;color:#4A7A9E;margin-bottom:12px">Congratulations!!!</div>
      <div style="color:var(--text);font-size:17px;font-weight:700;margin-bottom:6px">You completed Unit ${examUnitNum}.</div>
      <div style="color:var(--text);font-size:15px;font-weight:600;margin-bottom:18px">Unit ${nextUnitNum} has now been unlocked.</div>
      <div style="color:var(--dim);font-size:14px;margin-bottom:28px">+${state.accXP} XP earned · ${state.correct}/${state.exercises.length} correct</div>`;
    } else {
      innerHTML=`
      <div style="font-size:72px;margin-bottom:16px">🎉</div>
      <div style="font-family:var(--display);font-size:28px;font-weight:800;color:#4A7A9E;margin-bottom:8px">Lesson Complete!</div>
      <div style="color:var(--dim);font-size:15px;margin-bottom:28px">+${state.accXP} XP earned · ${state.correct}/${state.exercises.length} correct</div>`;
    }
  } else {
    if(isFinal){
      innerHTML=`
      <div style="font-size:72px;margin-bottom:16px">💔</div>
      <div style="font-family:var(--display);font-size:28px;font-weight:800;color:var(--red);margin-bottom:8px">So Close!</div>
      <div style="color:var(--dim);font-size:15px;margin-bottom:28px">One mistake ends the Final Test.<br><span style="font-size:13px;color:var(--mid)">Mai moyeru — shamu weihi! (Don't fear — try again!)</span></div>`;
    } else if(isCheckpoint){
      innerHTML=`
      <div style="font-size:72px;margin-bottom:16px">💔</div>

  }

    <div style="min-height:calc(100vh - 61px);display:flex;align-items:center;justify-content:center;padding:24px">

        ${!passed?'<button id="backBtn" class="btn-secondary">BACK TO LESSONS</button>':''}
      </div>
    </div>`;

  document.getElementById("completeBtn").addEventListener("click",()=>{
    if(!passed){const idx=LESSONS.findIndex(l=>l.id===state.lesson.id);startLesson(idx);}
    else{

}

// ─── HTML escape helper ──────────────────────────────────────
function escapeHTML(s){
  if(s===null||s===undefined)return"";
  return String(s).replace(/[&<>"']/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

    icon:"⚖️", title:"Comparisons",
    body:`<p>Three particles handle all ranking:</p>
    <div class="grammar-table-wrap"><table class="grammar-table"><thead><tr><th>Particle</th><th>Meaning</th><th>Placement</th></tr></thead><tbody>
    <tr><td><em>ata</em></td><td>than / more than</td><td>after the adjective</td></tr>
    <tr><td><em>ala</em></td><td>as … as (equal)</td><td>after the adjective</td></tr>
    <tr><td><em>apa</em></td><td>the most</td><td>before the adjective</td></tr>
    </tbody></table></div>
    <p>The <em>mo-</em> prefix inverts: <em>moata</em> (less than), <em>moapa</em> (least).</p>
    <ul>
      <li><em>Foihe su wauli ata kaihe.</em> — Spring is more beautiful than winter.</li>
      <li><em>Moule su liani ala wouhe.</em> — The tree is as tall as the mountain.</li>
      <li><em>Waihe su apa wohimi hue.</em> — Hope is the most important thing.</li>
      <li><em>Kaihe su wauli moata foihe.</em> — Winter is less beautiful than spring.</li>
    </ul>
    <p>For "the X-est of Y," use <em>fa</em> (from/of): <em>Waihe su apa wohimi fa taihue.</em> — Hope is the most important of everything.</p>`
  },
  {
    icon:"🔢", title:"Numbers",
    body:`<p>Numbers are adjectives (they end in <em>-i</em>) and come before the noun.</p>
    <div class="grammar-table-wrap"><table class="grammar-table"><thead><tr><th>#</th><th>Word</th><th>#</th><th>Word</th></tr></thead><tbody>
    <tr><td>0</td><td><em>nuli</em></td><td>6</td><td><em>veni</em></td></tr>
    <tr><td>1</td><td><em>fani</em></td><td>7</td><td><em>meni</em></td></tr>
    <tr><td>2</td><td><em>runi</em></td><td>8</td><td><em>oni</em></td></tr>
    <tr><td>3</td><td><em>teni</em></td><td>9</td><td><em>yani</em></td></tr>
    <tr><td>4</td><td><em>shani</em></td><td>10</td><td><em>hani</em></td></tr>
    <tr><td>5</td><td><em>kani</em></td><td>100</td><td><em>woni</em></td></tr>
    <tr><td></td><td></td><td>1000</td><td><em>yoni</em></td></tr>
    </tbody></table></div>
    <div class="grammar-sub-header">Building compound numbers</div>
    <ul>
      <li><strong>11–19:</strong> <em>hani-fani</em> (11), <em>hani-runi</em> (12), <em>hani-yani</em> (19)</li>
      <li><strong>20–99:</strong> <em>runi-hani</em> (20), <em>runi-hani-fani</em> (21), <em>teni-hani</em> (30)</li>
      <li><strong>100s:</strong> <em>woni</em> (100), <em>runi-woni-teni-hani-runi</em> (232)</li>
      <li><strong>1000s:</strong> <em>yoni</em> (1000), <em>runi-yoni</em> (2000)</li>
    </ul>
    <div class="grammar-sub-header">Ordinals: add <em>-ni</em></div>
    <ul>
      <li><em>fanini</em> (first), <em>runini</em> (second), <em>hanini</em> (tenth)</li>
      <li>For compound ordinals, <em>-ni</em> attaches to the last piece: <em>runi-hani-fanini</em> (21st)</li>
    </ul>
    <div class="grammar-sub-header">Quantifiers</div>
    <p>The first five share the <em>-ai</em> rhyme and measure set-count (how much of a set is involved).</p>
    <ul>
      <li><em>tai</em> — all · <em>Tai moulea su liani.</em> (All trees are tall.)</li>
      <li><em>sai</em> — some · <em>Sai puea wa halu.</em> (Some people went.)</li>
      <li><em>nai</em> — many</li>
      <li><em>fai</em> — any (free-choice) · <em>Fai pue sahu puhu lo.</em> (Anyone can do this.)</li>
      <li><em>nuli</em> — none / zero · <em>Nuli pue su waihi.</em> (No one is hopeful.)</li>
    </ul>
    <div class="grammar-callout"><strong><em>sai</em> vs <em>fai</em>:</strong> <em>sai</em> means "some" — a specific-but-unnamed amount or referent the speaker has in mind. <em>fai</em> means "any" in the free-choice sense — no specific referent, whichever will do. <em>Sai loiwe</em> = "some book (a particular one)"; <em>fai loiwe</em> = "any book (doesn't matter which)."</div>
    <p>Two further roots measure quantity along different axes — increase/decrease and sufficiency. These are full canvas roots, not bare adjectives.</p>
    <ul>
      <li><em>awi</em> — more · <em>Nea wanu awi houme.</em> (We want more bread.)</li>
      <li><em>moawi</em> — less · <em>Ve wa tahu moawi ata ne.</em> (She ate less than me.)</li>
      <li><em>ahimi</em> — enough · <em>Lo mohe su ahimi.</em> (This cup is enough.)</li>
      <li><em>moahimi</em> — not enough</li>
    </ul>
    <div class="grammar-sub-header">"Something / anything / nothing / everything / someone / anyone / no one / everyone"</div>
    <p>Quantifier + <em>hue</em> (thing) or <em>pue</em> (person), written as one word:</p>
    <ul>
      <li><em>taihue</em> — everything · <em>taipue</em> — everyone</li>
      <li><em>saihue</em> — something · <em>saipue</em> — someone</li>
      <li><em>faihue</em> — anything · <em>faipue</em> — anyone</li>
      <li><em>nulihue</em> — nothing · <em>nulipue</em> — no one</li>
    </ul>
    <p>The <em>sai-</em> / <em>fai-</em> split carries through: <em>Ne wa tiru saihue</em> (I saw something specific) vs <em>Ki te wa tiru faihue?</em> (Did you see anything at all?). Negation with <em>fai-</em> gives emphatic "not any": <em>Ne mai wa tiru faihue</em> (I didn't see anything).</p>`
  },
  {
    icon:"🕐", title:"Time",
    body:`<div class="grammar-sub-header">Time anchors are compositional</div>
    <p>Combine a demonstrative or tense marker with a time-noun.</p>
    <div class="grammar-table-wrap"><table class="grammar-table"><thead><tr><th>Phrase</th><th>English</th></tr></thead><tbody>
    <tr><td><em>lo lawe</em></td><td>today</td></tr>
    <tr><td><em>wa lawe</em></td><td>yesterday</td></tr>
    <tr><td><em>wu lawe</em></td><td>tomorrow</td></tr>
    <tr><td><em>lo rouhe / wa rouhe / wu rouhe</em></td><td>this / last / next week</td></tr>
    <tr><td><em>lo luone / wa luone / wu luone</em></td><td>this / last / next month</td></tr>
    <tr><td><em>lo haiwe / wa haiwe / wu haiwe</em></td><td>this / last / next year</td></tr>
    </tbody></table></div>
    <div class="grammar-sub-header">Days of the week</div>
    <p>Built as numeral + <em>lawe</em> (day). Sunday is day 1.</p>
    <ul>
      <li><em>fanilawe</em> Sun · <em>runilawe</em> Mon · <em>tenilawe</em> Tue · <em>shanilawe</em> Wed · <em>kanilawe</em> Thu · <em>venilawe</em> Fri · <em>menilawe</em> Sat</li>
    </ul>
    <div class="grammar-sub-header">Months</div>
    <p>Numeral + <em>luone</em> (moon/month): <em>faniluone</em> (January) through <em>haniruniluone</em> (December).</p>
    <div class="grammar-sub-header">Parts of the day</div>
    <div class="grammar-table-wrap"><table class="grammar-table"><thead><tr><th>Concept</th><th>Word</th></tr></thead><tbody>
    <tr><td>morning</td><td><em>yauhe</em></td></tr>
    <tr><td>noon</td><td><em>meshilawe</em></td></tr>
    <tr><td>evening</td><td><em>pouhe</em></td></tr>
    <tr><td>night</td><td><em>none</em></td></tr>
    <tr><td>midnight</td><td><em>meshinone</em></td></tr>
    </tbody></table></div>
    <p>"Afternoon" is <em>wule meshilawe</em> (after noon).</p>
    <div class="grammar-sub-header">Smaller units</div>
    <ul>
      <li><em>tohe</em> — hour</li>
      <li><em>tohile</em> — minute ("little hour")</li>
      <li><em>tohilele</em> — second / moment ("tiny hour")</li>
    </ul>
    <div class="grammar-sub-header">Seasons</div>
    <ul>
      <li><em>foihe</em> (spring) · <em>hauwe</em> (summer) · <em>youhe</em> (autumn) · <em>kaihe</em> (winter)</li>
    </ul>
    <div class="grammar-sub-header">Handy time adverbs</div>
    <div class="grammar-table-wrap"><table class="grammar-table"><thead><tr><th>Word</th><th>Meaning</th></tr></thead><tbody>
    <tr><td><em>ouhi</em></td><td>already</td></tr>
    <tr><td><em>yauwi</em></td><td>still</td></tr>
    <tr><td><em>nohili</em></td><td>just (recently)</td></tr>
    <tr><td><em>wuhi</em></td><td>soon</td></tr>
    <tr><td><em>feuhi</em></td><td>eventually</td></tr>
    <tr><td><em>oihi</em></td><td>expected</td></tr>
    <tr><td><em>taiweli</em></td><td>always</td></tr>
    <tr><td><em>naiweli</em></td><td>often</td></tr>
    <tr><td><em>saiweli</em></td><td>sometimes</td></tr>
    <tr><td><em>faiweli</em></td><td>ever / at any time</td></tr>
    <tr><td><em>nuliweli</em></td><td>never</td></tr>
    <tr><td><em>noihi</em></td><td>almost</td></tr>
    <tr><td><em>ori</em></td><td>very / really</td></tr>
    </tbody></table></div>
    <p>"Rarely" is just <em>mai naiweli</em> (not often). "Not yet" is <em>mai yauwi</em>. Emphatic "never" can also be <em>mai faiweli</em> (not ever).</p>
    <p>"Early" and "late" are compositional: <em>wale oihi</em> (before expected) and <em>wule oihi</em> (after expected).</p>`
  },
  {
    icon:"🧭", title:"Direction & Space",
    body:`<p>Liru expresses direction in four overlapping layers. For most everyday use, you just need these:</p>
    <div class="grammar-table-wrap"><table class="grammar-table"><thead><tr><th>Concept</th><th>Word</th></tr></thead><tbody>
    <tr><td>right</td><td><em>huni</em> (adj.), <em>hunu</em> (v. "go right")</td></tr>
    <tr><td>left</td><td><em>mohuni</em>, <em>mohunu</em></td></tr>
    <tr><td>near</td><td><em>niani</em>, <em>nianu</em></td></tr>
    <tr><td>far</td><td><em>moniani</em>, <em>monianu</em></td></tr>
    <tr><td>across</td><td><em>tasi</em>, <em>tasu</em></td></tr>
    <tr><td>through</td><td><em>taumi</em>, <em>taumu</em></td></tr>
    <tr><td>front / forward</td><td><em>pohi</em> (from <em>pohe</em>, face)</td></tr>
    <tr><td>back / behind</td><td><em>poki</em> (from <em>poke</em>, back-of-body)</td></tr>
    <tr><td>high / tall</td><td><em>liani</em></td></tr>
    <tr><td>low</td><td><em>moliani</em></td></tr>
    <tr><td>here / there</td><td><em>loya</em> / <em>faloya</em></td></tr>
    </tbody></table></div>
    <ul>
      <li><em>Ne hunu.</em> — I go right.</li>
      <li><em>Nea tasu shafane.</em> — We cross the river.</li>
      <li><em>Paipe su poki hiwe.</em> — The dog is behind the house.</li>
    </ul>`
  },
  {
    icon:"🙏", title:"Social Expressions",
    body:`<p>Liru has <strong>no formal/informal speech split</strong>. All social tone is carried by these five words. They end in <em>-o</em> or <em>-a</em> and can appear anywhere in an utterance, or stand alone.</p>
    <div class="grammar-table-wrap"><table class="grammar-table"><thead><tr><th>Word</th><th>Use</th></tr></thead><tbody>
    <tr><td><em>moa</em></td><td>please</td></tr>
    <tr><td><em>reiwa</em></td><td>thank you</td></tr>
    <tr><td><em>waimo</em></td><td>hello (greeting)</td></tr>
    <tr><td><em>weriko</em></td><td>goodbye (farewell)</td></tr>
    <tr><td><em>elo</em></td><td>sorry · sympathy · excuse me (one word for all three)</td></tr>
    </tbody></table></div>
    <ul>
      <li><em>Reiwa.</em> — Thank you.</li>
      <li><em>Waimo, Maria.</em> — Hello, Maria.</li>
      <li><em>Elo, ne wa kave teo mohe.</em> — Sorry, I broke your cup.</li>
      <li><em>Moa, feru ne teo loiwe.</em> — Please give me your book.</li>
    </ul>
    <div class="grammar-callout"><strong><em>Su mo</em></strong> — "it is balance" — is the universal response idiom. Use it to reply to <em>reiwa</em> ("you're welcome"), to reply to <em>elo</em> ("it's okay"), or as a standalone declaration of forgiveness ("we're square"). Three speech acts, one gesture: declaring the balance restored.</div>`
  },
  {
    icon:"🔨", title:"Affixes (Building New Words)",
    body:`<div class="grammar-sub-header"><em>mo-</em> — the balancing prefix</div>
    <p>Reverses the meaning of a root. Philosophically, this isn't just "not X" — it's <em>X's balancing counterpart</em>. Darkness is not the enemy of light; it is light's balance.</p>
    <ul>
      <li><em>lune</em> (light) → <em>molune</em> (darkness)</li>
      <li><em>houle</em> (joy) → <em>mohoule</em> (sadness)</li>
      <li><em>fere</em> (give) → <em>mofere</em> (take)</li>
      <li><em>hoyu</em> (to buy) → <em>mohoyu</em> (to sell)</li>
    </ul>
    <div class="grammar-sub-header"><em>we-</em> — again / repetition</div>
    <ul>
      <li><em>tiru</em> (see) → <em>wetiru</em> (see again)</li>
      <li><em>liru</em> (speak) → <em>weliru</em> (repeat)</li>
    </ul>
    <div class="grammar-sub-header"><em>ki-</em> — interrogative</div>
    <ul>
      <li><em>liru</em> (speak) → <em>kiliru</em> (ask); <em>kilire</em> (question)</li>
      <li>Stacks: <em>mo-</em> + <em>ki-</em> + <em>liru</em> = <em>mokiliru</em> (to answer — "balance + question + speak")</li>
    </ul>
    <div class="grammar-sub-header"><em>-pue</em> — agent ("one who does X")</div>
    <p>Attaches to a verb stem. This is fully productive — speakers can freely coin new agent nouns.</p>
    <ul>
      <li><em>liru</em> → <em>lirupue</em> (singer / speaker)</li>
      <li><em>kaisu</em> → <em>kaisupue</em> (teacher)</li>
      <li><em>shauwu</em> → <em>shauwupue</em> (swimmer)</li>
    </ul>
    <div class="grammar-callout">Nouns ending in <em>-pe</em> (like <em>paipe</em> dog, <em>kupe</em> coffee) are <strong>not</strong> agents — those endings are coincidental.</div>
    <div class="grammar-sub-header"><em>-ile</em> — diminutive ("small X")</div>
    <p>Stackable — the second <em>-ile</em> replaces the first's final <em>-e</em>.</p>
    <ul>
      <li><em>kome</em> (stone) → <em>komile</em> (pebble) → <em>komilele</em> (grain of sand)</li>
      <li><em>paiwe</em> (shoe) → <em>paiwile</em> (sock)</li>
      <li><em>tohe</em> (hour) → <em>tohile</em> (minute) → <em>tohilele</em> (second)</li>
    </ul>
    <div class="grammar-sub-header"><em>-ni</em> — ordinal</div>
    <p>Attaches to a number to make ordinals. See the <em>Numbers</em> section.</p>`
  },
  {
    icon:"🧱", title:"Compound Words",
    body:`<p>Two roots combine to make a new word. Two rules to remember:</p>
    <p><strong>1. The second element sets the part of speech.</strong> If the second element is a noun, the compound is a noun, and so on.</p>
    <p><strong>2. The first element takes one of three forms</strong> depending on its relationship to the second:</p>
    <div class="grammar-sub-header">Adjective form <em>-i</em> — qualifying</div>
    <p>Use when the first describes the second. Read "X-kind-of Y."</p>
    <ul>
      <li><em>luni kome</em> → <em>lunikome</em> (bright-stone → crystal / gem)</li>
      <li><em>moluni shawe</em> → <em>molunishawe</em> (dark-water → abyss)</li>
    </ul>
    <div class="grammar-sub-header">Noun form <em>-e</em> — material / target</div>
    <p>Use when the first is what the second is made of or acts on.</p>
    <ul>
      <li><em>kome hiwe</em> → <em>komehiwe</em> (house of stone)</li>
      <li><em>shawe nomau</em> → <em>shawenomau</em> (to fill with water)</li>
    </ul>
    <div class="grammar-sub-header">Verb form <em>-u</em> — action</div>
    <p>Use when the first contributes an action.</p>
    <ul>
      <li><em>liru pue</em> → <em>lirupue</em> (speaker)</li>
      <li><em>washu pue</em> → <em>washupue</em> (traveler)</li>
    </ul>
    <div class="grammar-sub-header">When letters collide, one drops</div>
    <p>If the final letter of one element matches the initial letter of the next, they collapse into one.</p>
    <ul>
      <li><em>luni</em> + <em>ile</em> → <em>lunile</em> (not "luniile")</li>
      <li><em>mo-</em> + <em>oku</em> → <em>moku</em> (not "mooku")</li>
    </ul>
    <div class="grammar-sub-header">Three magic endings for building new words</div>
    <p>Above, you saw that you pick the first word's ending (<em>-i</em>, <em>-e</em>, or <em>-u</em>) based on how the two words relate. Most of the time you'll do that yourself. But for three really common endings, we took the guesswork out of it — there's just one rule per ending and you can build new words any time you need them:</p>
    <div class="grammar-callout"><strong>🧑 <em>-pue</em> — "someone who does it"</strong><br>
    Always use the <em>-u</em> (verb) form. A singer is "someone who sings," so take <em>liru</em> (to sing) and stick <em>-pue</em> on the end:<br>
    <em>liru</em> + <em>-pue</em> → <em>lirupue</em> (singer)<br>
    <em>shauwu</em> (to swim) + <em>-pue</em> → <em>shauwupue</em> (swimmer)<br>
    <em>kaisu</em> (to teach) + <em>-pue</em> → <em>kaisupue</em> (teacher)</div>
    <div class="grammar-callout"><strong>🏪 <em>-tieme</em> — "store that sells it"</strong><br>
    Always use the <em>-e</em> (noun) form. A bakery sells bread, so take <em>houme</em> (bread) and stick <em>-tieme</em> on the end:<br>
    <em>houme</em> (bread) + <em>-tieme</em> → <em>houmetieme</em> (bakery)<br>
    <em>loiwe</em> (book) + <em>-tieme</em> → <em>loiwetieme</em> (bookstore)<br>
    <em>kupe</em> (coffee) + <em>-tieme</em> → <em>kupetieme</em> (café)</div>
    <div class="grammar-callout"><strong>⚙️ <em>-pauwe</em> — "machine that does it"</strong><br>
    Always use the <em>-u</em> (verb) form. A washing machine washes things, so take <em>sayu</em> (to wash) and stick <em>-pauwe</em> on the end:<br>
    <em>sayu</em> (to wash) + <em>-pauwe</em> → <em>sayupauwe</em> (washing machine)<br>
    <em>luhu</em> (to make cold) + <em>-pauwe</em> → <em>luhupauwe</em> (refrigerator)<br>
    <em>hauhu</em> (to heat up) + <em>-pauwe</em> → <em>hauhupauwe</em> (oven)<br>
    <em>eiru</em> (to fly) + <em>-pauwe</em> → <em>eirupauwe</em> (airplane)</div>
    <p style="margin-top:14px"><strong>Why these three are easy:</strong> For <em>-pue</em> and <em>-pauwe</em>, both are about doing something — a person does it, or a machine does it — so the verb form (<em>-u</em>) always fits. For <em>-tieme</em>, a store is about the stuff it sells, so the noun form (<em>-e</em>) always fits. No guessing needed!</p>
    <p>You can build words with these three endings any time — you don't have to wait for them to appear in the dictionary.</p>`
  },
  {
    icon:"🎓", title:"Advanced Topics",
    body:`<p>Once you're comfortable with the basics, these finer points will round out your Liru:</p>
    <div class="grammar-sub-header">The <em>lai</em> particle — "that-clause"</div>
    <p><em>lai</em> attaches a clause to the word before it.</p>
    <p><strong>After a noun → relative clause</strong> ("who/that/which"). The head noun's role in the clause is simply left blank:</p>
    <ul>
      <li><em>pue lai wa liru</em> — the person who sang</li>
      <li><em>loiwe lai ne wa loisu</em> — the book that I read</li>
      <li><em>hiwe lai ne hiwu wo</em> — the house that I live in <em>(the preposition hangs at the end)</em></li>
    </ul>
    <p><strong>After a verb → complement clause</strong> ("that X happened"):</p>
    <ul>
      <li><em>Ne senu lai ve wa liru.</em> — I know that she sang.</li>
      <li><em>Nea waihu lai te wu vanu.</em> — We hope that you'll come.</li>
      <li><em>Ne piruhu lai ne wu tahu.</em> — I plan to eat. <em>("to" + verb uses the same pattern)</em></li>
    </ul>
    <div class="grammar-sub-header">Embedded questions — no <em>lai</em></div>
    <ul>
      <li><em>Ne mai senu kiya ve wa halu.</em> — I don't know where she went.</li>
      <li><em>Ne mai senu kipue wa liru.</em> — I don't know who sang.</li>
    </ul>
    <div class="grammar-sub-header">Stopping an action — <em>mowashu</em></div>
    <p><em>mowashu</em> is the verb for "to stop" — it covers both physical cessation and action cessation, and it chains like a modal.</p>
    <ul>
      <li><em>Ne mowashu.</em> — I stop.</li>
      <li><em>Ne mowashu tahu.</em> — I stop eating.</li>
    </ul>
    <div class="grammar-sub-header">Fractions are phrasal</div>
    <p><em>meshifane</em> (half) is the only single-word fraction. All others are built with <em>piehe fa X</em> (part of X):</p>
    <ul>
      <li><em>fani piehe fa teni</em> — one third</li>
      <li><em>fani piehe fa shani</em> — one quarter</li>
      <li><em>runi piehe fa kani</em> — two fifths</li>
    </ul>
    <div class="grammar-sub-header">Three-way temperature</div>
    <p>Temperature is slightly asymmetric:</p>
    <ul>
      <li><em>luhi</em> — cold · <em>moluhi</em> — warm (cold's balancing pair)</li>
      <li><em>hauhi</em> — hot (a separate extreme pole, not a <em>mo-</em> form)</li>
    </ul>
    <div class="grammar-sub-header">Dry vs. arid</div>
    <ul>
      <li><em>houwi</em> — dry (everyday): dry clothes, dry ground</li>
      <li><em>tauhi</em> — arid (environmental): desert climate</li>
    </ul>
    <div class="grammar-sub-header">Proper nouns & loanwords</div>
    <p>Names of people, places, brands, and borrowed terms are pronounced as in the source language — they're not adapted to Liru's phonotactics.</p>
    <ul>
      <li><em>Ne wa hiwu wo Paris.</em> — I lived in Paris.</li>
      <li><em>Nea wa loisu Moby Dick.</em> — We read Moby Dick.</li>
    </ul>
    <div class="grammar-sub-header">Embedded tense is absolute</div>
    <p>Inside a <em>lai</em>-clause, tense is judged from <strong>the speaker's present</strong>, not relative to the matrix verb.</p>
    <ul>
      <li><em>Ve wa liru lai ve su kufi.</em> — She said that she <strong>is [now]</strong> in pain.</li>
      <li><em>Ve wa liru lai ve wa su kufi.</em> — She said that she <strong>was [earlier]</strong> in pain.</li>
    </ul>`
  }
];

function renderGrammar() {
  const el = document.getElementById('grammar-body');
  const intro = `<div class="grammar-intro">
    <strong>Liru</strong> (LiruWaihe) is a constructed language designed to sound like a Pacific island — flowing, song-like, reminiscent of water. It has approximately <strong>450 root words</strong>, completely regular grammar, and no irregular forms to memorize. Tap any section below to expand it.
  </div>`;
  const sections = GRAMMAR_SECTIONS.map((sec, i) => `
    <div class="grammar-section" data-idx="${i}">
      <div class="grammar-section-header" data-toggle="${i}">
        <div class="grammar-section-icon">${sec.icon}</div>
        <div class="grammar-section-title">${sec.title}</div>
        <div class="grammar-section-chevron">▾</div>
      </div>
      <div class="grammar-section-body">${sec.body}</div>
    </div>`).join('');
  el.innerHTML = intro + sections;
  document.querySelectorAll('.grammar-section-header').forEach(h => {
    h.addEventListener('click', () => {
      const sec = h.closest('.grammar-section');
      sec.classList.toggle('open');
    });
  });
}

const GRAMMAR_TIPS = [
  {title:"💡 The Vowel Canvas",text:"In Liru, the <strong>final vowel</strong> tells you the word class: <strong>-e</strong> = noun, <strong>-u</strong> = verb, <strong>-i</strong> = adjective. Change the vowel, change the word!"},
  {title:"💡 The <em>mo-</em> Balance",text:"The <strong>mo-</strong> prefix isn't just negation — it's <em>balance</em>. Dark (<em>molune</em>) is light's balancing partner, not its enemy. This shapes the whole language."},
  {title:"💡 No Articles Needed",text:"Liru has no words for <strong>the</strong> or <strong>a</strong>. Context does the work. Use <strong>lo</strong> (this) or <strong>falo</strong> (that) when you need to be specific."},
  {title:"💡 Questions Start With <em>ki-</em>",text:"All question words share <strong>ki-</strong>: <em>kipue</em> (who), <em>kiwa</em> (what), <em>kiya</em> (where), <em>kile</em> (when), <em>kishe</em> (how)."},
  {title:"💡 Tense is a Tiny Word",text:"<strong>wa</strong> = past, nothing = present, <strong>wu</strong> = future. Verbs never change form. <em>Ne tiru</em> / <em>Ne wa tiru</em> / <em>Ne wu tiru</em>."},
  {title:"💡 Social Expressions Sit Outside",text:"Five special words handle all social tone: <em>moa</em> (please), <em>reiwa</em> (thanks), <em>waimo</em> (hello), <em>weriko</em> (goodbye), <em>elo</em> (sorry). Reply to <em>reiwa</em> or <em>elo</em> with <em>Su mo</em> — \"it is balance.\""},
  {title:"💡 Compound Words, Simple Rules",text:"Two roots combine: the second sets the part-of-speech, the first takes <strong>-i</strong> (qualifying), <strong>-e</strong> (material), or <strong>-u</strong> (action) form."},

function renderDict() {
  const el = document.getElementById('dict-body');
  const tip = GRAMMAR_TIPS[Math.floor(Math.random() * GRAMMAR_TIPS.length)];

  // Letter buttons. Per Grammar.md §1, "sh" is a digraph and gets its own bucket;
  // "S" matches s+vowel words only (sa, sei, su...), "Sh" matches sh+vowel words.
  // Liru consonants per Grammar.md §1: p t k f v s sh h m n l r w y. Vowels: a e i o u.
  const alphabet = ['a','e','f','h','i','k','l','m','n','o','p','r','s','sh','t','u','v','w','y'];
  const letterBtns = alphabet.map(ch => {
    const hasWords = DICTIONARY_RAW.some(e => {
      const lw = e.lw.toLowerCase();
      if (ch === 's') return lw[0] === 's' && lw[1] !== 'h';
      if (ch === 'sh') return lw.startsWith('sh');
      return lw[0] === ch;
    });
    const active = dictState.browseLetter === ch;
    const label = ch === 'sh' ? 'Sh' : ch.toUpperCase();
    return `<button class="dict-letter-btn ${active?'active':''} ${!hasWords?'disabled':''}" data-letter="${ch}" ${!hasWords?'disabled':''}>${label}</button>`;
  }).join('');

  el.innerHTML = `
    <div class="dict-stats">
      <span class="dict-stat-chip blue-bright">~450 roots</span>
      <span class="dict-stat-chip blue-mid">${DICTIONARY_RAW.length.toLocaleString()} words</span>

    <div class="dict-panel">

        <div class="dict-panel-lang">English → Liru</div>

      <div class="dict-input-wrap">
        <input id="enInput" class="dict-search-input" type="text" placeholder="Search English..." value="${escapeHTML(dictState.enInput)}" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="dict-clear-btn ${dictState.enInput?'visible':''}" id="enClear">✕</button>
      </div>
      <div id="enResults" class="dict-results"></div>
    </div>

    <div class="dict-divider">
      <div class="dict-divider-line"></div>
      <div class="dict-divider-icon">⇅</div>
      <div class="dict-divider-line"></div>
    </div>

    <div class="dict-panel lw-panel">
      <div class="dict-panel-label">
        <div class="dict-flag flag-lw">LW</div>
        <div class="dict-panel-lang">Liru → English</div>
      </div>
      <div class="dict-input-wrap">
        <input id="lwInput" class="dict-search-input" type="text" placeholder="Search Liru..." value="${escapeHTML(dictState.lwInput)}" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="dict-clear-btn ${dictState.lwInput?'visible':''}" id="lwClear">✕</button>
      </div>
      <div id="lwResults" class="dict-results"></div>
    </div>

    <div class="dict-grammar-tip">
      <div class="dict-grammar-tip-title">${tip.title}</div>
      <div class="dict-grammar-tip-text">${tip.text}</div>
    </div>

    <div class="dict-browse-section">
      <div class="dict-browse-title">📖 Browse by Letter</div>
      <div class="dict-letter-nav">${letterBtns}</div>
      <div id="browseResults" class="dict-browse-results"></div>
    </div>
  `;

  const enInp = document.getElementById('enInput');
  const lwInp = document.getElementById('lwInput');
  enInp.addEventListener('input', e => {
    dictState.enInput = e.target.value;
    document.getElementById('enClear').classList.toggle('visible', !!dictState.enInput);
    renderDictEnResults();
  });
  lwInp.addEventListener('input', e => {
    dictState.lwInput = e.target.value;
    document.getElementById('lwClear').classList.toggle('visible', !!dictState.lwInput);
    renderDictLwResults();
  });
  document.getElementById('enClear').addEventListener('click', () => {
    dictState.enInput = '';
    enInp.value = '';
    enInp.focus();
    document.getElementById('enClear').classList.remove('visible');
    renderDictEnResults();
  });
  document.getElementById('lwClear').addEventListener('click', () => {
    dictState.lwInput = '';
    lwInp.value = '';
    lwInp.focus();
    document.getElementById('lwClear').classList.remove('visible');
    renderDictLwResults();
  });
  document.querySelectorAll('.dict-letter-btn').forEach(b => b.addEventListener('click', () => {
    if (b.disabled) return;
    const ltr = b.dataset.letter;
    dictState.browseLetter = dictState.browseLetter === ltr ? null : ltr;
    renderDictBrowse();
    renderDict.updateLetterActive && renderDict.updateLetterActive();
    document.querySelectorAll('.dict-letter-btn').forEach(x => x.classList.toggle('active', x.dataset.letter === dictState.browseLetter));
  }));

  renderDictEnResults();
  renderDictLwResults();
  renderDictBrowse();
}

function renderDictEnResults() {
  const el = document.getElementById('enResults');
  if (!el) return;
  const q = dictState.enInput.trim().toLowerCase();
  if (!q) { el.innerHTML = ''; return; }

  // Rank each entry. Lower rank = better match.
  //   0 — the full gloss piece equals q (e.g. "read" matches gloss "read")
  //   1 — one of the WORDS inside the gloss equals q (e.g. "read" matches "to read")
  //       Common function words don't count as matches here, so searching "of"
  //       doesn't flood results — but an entry whose gloss is literally "of"
  //       still matches at rank 0 above.
  //   2 — a word inside the gloss starts with q (e.g. "read" matches "reader")
  // We deliberately do NOT fall back to raw substring matching — that would
  // make "ready" match "bready" and "already", which is pure noise.
  const STOPWORDS = new Set(['to','a','an','the','of','or','and','be','is']);
  const matches = [];
  DICTIONARY_RAW.forEach(e => {
    // Split on slash or comma to get gloss pieces. Parentheticals are treated
    // as separate alternate-sense pieces so "from (or of)" yields two pieces:
    // "from" and "of" (with the leading "or"/"also" stripped). This lets a
    // search for "of" rank-0 match fa's "(or of)" sense, while glosses that
    // merely contain "of" as a connector ("afraid of") don't.
    const rawPieces = e.en.split(/\s*\/\s*|,\s*/).map(g => g.trim());
    const pieces = [];
    for (const raw of rawPieces) {
      const parenMatches = [...raw.matchAll(/\(([^)]*)\)/g)];
      const outside = raw.replace(/\s*\([^)]*\)\s*/g, ' ').trim();
      if (outside) pieces.push(outside);
      for (const m of parenMatches) {
        const inner = m[1].trim().replace(/^(or|also)\s+/i, '').trim();
        if (inner) pieces.push(inner);
      }
    }
    let bestRank = Infinity;
    for (const piece of pieces) {
      const clean = piece.toLowerCase().replace(/[()]/g, '').trim();
      if (!clean) continue;

      if (clean === q) { bestRank = Math.min(bestRank, 0); continue; }

      // Word-level scan — splits on spaces & punctuation
      const words = clean.split(/[\s\-]+/).filter(w => w && !STOPWORDS.has(w));
      for (const w of words) {
        if (w === q) { bestRank = Math.min(bestRank, 1); break; }
      }
      if (bestRank === 1) continue;

      // Prefix match on any content word
      for (const w of words) {
        if (w.startsWith(q)) { bestRank = Math.min(bestRank, 2); break; }
      }
    }
    if (bestRank !== Infinity) matches.push({ e, rank: bestRank });
  });

  matches.sort((a,b) => a.rank - b.rank || a.e.lw.localeCompare(b.e.lw));
  const shown = matches.slice(0, 30);

  if (shown.length === 0) {
    el.innerHTML = `<div class="dict-no-results"><div class="dict-no-results-icon">🔎</div>No matches for "${escapeHTML(q)}"</div>`;
    return;
  }

  const countHTML = matches.length > 30
    ? `<div class="dict-result-count">Showing 30 of ${matches.length} matches</div>`
    : `<div class="dict-result-count">${matches.length} match${matches.length===1?'':'es'}</div>`;

  el.innerHTML = countHTML + shown.map(({e}) => renderDictEntry(e)).join('');
}

function renderDictLwResults() {
  const el = document.getElementById('lwResults');
  if (!el) return;
  const q = dictState.lwInput.trim().toLowerCase();
  if (!q) { el.innerHTML = ''; return; }

  // Liru roots are short, so substring-anywhere matching ("ru" hitting every
  // word containing -ru-) is pure noise. Exact match and prefix only.
  const matches = [];
  DICTIONARY_RAW.forEach(e => {
    const lw = e.lw.toLowerCase();
    if (lw === q) { matches.push({e, rank:0}); return; }
    if (lw.startsWith(q)) { matches.push({e, rank:1}); return; }
  });
  matches.sort((a,b) => a.rank - b.rank || a.e.lw.localeCompare(b.e.lw));
  const shown = matches.slice(0, 30);

  if (shown.length === 0) {
    el.innerHTML = `<div class="dict-no-results"><div class="dict-no-results-icon">🔎</div>No matches for "${escapeHTML(q)}"</div>`;
    return;
  }

  const countHTML = matches.length > 30
    ? `<div class="dict-result-count">Showing 30 of ${matches.length} matches</div>`
    : `<div class="dict-result-count">${matches.length} match${matches.length===1?'':'es'}</div>`;

  el.innerHTML = countHTML + shown.map(({e}) => renderDictEntry(e)).join('');
}

function renderDictBrowse() {
  const el = document.getElementById('browseResults');
  if (!el) return;
  if (!dictState.browseLetter) { el.innerHTML = ''; return; }
  const ltr = dictState.browseLetter;
  const matches = DICTIONARY_RAW.filter(e => {
    const lw = e.lw.toLowerCase();
    if (ltr === 's') return lw[0] === 's' && lw[1] !== 'h';
    if (ltr === 'sh') return lw.startsWith('sh');
    return lw[0] === ltr;
  }).sort((a,b) => a.lw.localeCompare(b.lw));
  const label = ltr === 'sh' ? 'Sh' : ltr.toUpperCase();
  if (matches.length === 0) { el.innerHTML = `<div class="dict-no-results">No words starting with ${label}</div>`; return; }
  const countHTML = `<div class="dict-result-count">${matches.length} word${matches.length===1?'':'s'} starting with <strong>${label}</strong></div>`;
  el.innerHTML = countHTML + matches.map(e => renderDictEntry(e)).join('');
}

function renderDictEntry(e) {
  const noteHTML = e.note ? `<div class="dict-result-note">🧩 ${escapeHTML(e.note)}</div>` : '';
  return `<div class="dict-result-item">
    <div class="dict-result-arrow">›</div>
    <div style="flex:1;min-width:0">
      <div class="dict-result-word">${escapeHTML(e.lw)}</div>
      <div class="dict-result-translation">${escapeHTML(e.en)}</div>
      <div class="dict-result-pos">${e.pos}</div>
      ${noteHTML}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// CONTACT FORM
// ═══════════════════════════════════════════════════════════════
let contactState = {
  name: '',
  email: '',
  category: 'suggestion',
  message: '',
  submitting: false,
  submitted: false,
};

function renderContact() {
  const el = document.getElementById('contact-body');
  if (contactState.submitted) { showContactSuccess(); return; }

  const notice = emailJSReady
    ? ''
    : `<div class="contact-notice"><strong>Note:</strong> This form is ready but needs EmailJS configuration to actually send. See the setup notes at the top of the source file.</div>`;

  el.innerHTML = `
    <div class="contact-intro">
      <div class="contact-intro-icon">💬</div>
      <div class="contact-intro-title">Reiwa for trying Liru!</div>
      <div class="contact-intro-desc">Found a bug? Have a suggestion? Want to request a feature? Let me know below.</div>
    </div>

    <div class="contact-form-group">
      <label class="contact-label" for="cName">Your name</label>
      <input id="cName" class="contact-input" type="text" maxlength="60" value="${escapeHTML(contactState.name)}" placeholder="What should I call you?">
    </div>

    <div class="contact-form-group">
      <label class="contact-label" for="cEmail">Your email <span style="color:var(--dim);font-weight:600">(optional — for replies)</span></label>
      <input id="cEmail" class="contact-input" type="email" maxlength="120" value="${escapeHTML(contactState.email)}" placeholder="you@example.com">
    </div>

    <div class="contact-form-group">
      <label class="contact-label" for="cCat">Category</label>
      <select id="cCat" class="contact-select">
        <option value="suggestion" ${contactState.category==='suggestion'?'selected':''}>💡 Suggestion</option>
        <option value="bug" ${contactState.category==='bug'?'selected':''}>🐛 Bug report</option>
        <option value="feature" ${contactState.category==='feature'?'selected':''}>✨ Feature request</option>
        <option value="language" ${contactState.category==='language'?'selected':''}>📖 Language question / correction</option>
        <option value="newword" ${contactState.category==='newword'?'selected':''}>🌱 New word suggestion</option>
        <option value="other" ${contactState.category==='other'?'selected':''}>💭 Other</option>
      </select>
    </div>

    <div class="contact-form-group">
      <label class="contact-label" for="cMsg">Message</label>
      <textarea id="cMsg" class="contact-textarea" maxlength="2000" placeholder="Tell me what's on your mind...">${escapeHTML(contactState.message)}</textarea>
      <div class="contact-char-count"><span id="cCount">${contactState.message.length}</span>/2000</div>
    </div>

    <button id="cSubmit" class="contact-submit" ${contactState.submitting?'disabled':''}>${contactState.submitting?'Sending…':'Send message'}</button>

    ${notice}
  `;

  const byId = id => document.getElementById(id);
  byId('cName').addEventListener('input', e => contactState.name = e.target.value);
  byId('cEmail').addEventListener('input', e => contactState.email = e.target.value);
  byId('cCat').addEventListener('change', e => contactState.category = e.target.value);
  byId('cMsg').addEventListener('input', e => {
    contactState.message = e.target.value;
    byId('cCount').textContent = contactState.message.length;
  });
  byId('cSubmit').addEventListener('click', submitContact);
}

function submitContact() {
  const name = contactState.name.trim();
  const msg = contactState.message.trim();
  if (!name || !msg) {
    alert('Please fill in your name and a message.');
    return;
  }
  contactState.submitting = true;
  renderContact();

  const params = {
    from_name: name,
    from_email: contactState.email.trim() || '(not provided)',
    category: contactState.category,
    message: msg,
    to_email: EMAILJS_TO_EMAIL,
  };

  if (!emailJSReady) {
    // No EmailJS configured — just show the success screen so the UX is complete
    setTimeout(() => {
      contactState.submitting = false;
      contactState.submitted = true;
      renderContact();
    }, 600);
    return;
  }

  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params)
    .then(() => {
      contactState.submitting = false;
      contactState.submitted = true;
      renderContact();
    })
    .catch(err => {
      console.error('EmailJS error:', err);
      contactState.submitting = false;
      renderContact();
      alert('Sorry — the message could not be sent right now. Please try again later.');
    });
}

function showContactSuccess() {
  const el = document.getElementById('contact-body');
  el.innerHTML = `
    <div class="contact-success">
      <img class="liru-logo-img" src="${LIRU_LOGO}" alt="Liru" style="width:96px;height:96px;margin:0 auto 16px">
      <div class="contact-success-title">Reiwa na teo maihe!</div>
      <div class="contact-success-desc">(Thank you for your message!)<br><br>I'll read it soon and get back to you if you shared your email.</div>
      <button id="cBack" class="btn-primary" style="max-width:280px;margin:0 auto">Send another message</button>
    </div>
  `;
  document.getElementById('cBack').addEventListener('click', () => {
    resetContact();
    renderContact();
  });
}

function resetContact() {
  contactState = {
    name: '',
    email: '',
    category: 'suggestion',
    message: '',
    submitting: false,
    submitted: false,
  };
}


</script>
</body>
</html>
