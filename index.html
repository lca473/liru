  // ── Unit 22 (A8) — High-Frequency Vocabulary ──────────────────
  // 7 lessons (L120–L126 vocab + L127 unit exam). Surfaces 28 high-
  // frequency roots / 33 forms that were deferred from core but
  // don't fit any thematic breadth bucket. See V map block for the
  // per-lesson breakdown, and advanced_track_plan.md §4.

  {id:"l120_vocab_particles_quantifiers",
   title:"For, All, and Some",
   desc:"na (for), tae/tai (whole/all), sai (some)",
   icon:"🔢",
   vocabKey:"l120_vocab_particles_quantifiers",
   xp:14,
   unit:21,
   intro:`<h3>🔗 The particle <em>na</em> — \"for\"</h3><p>Liru's relational particles (<em>fa</em>, <em>ko</em>, <em>wo</em>, <em>so</em>, <em>ya</em>) all sit between two nouns and show how they relate. <em>na</em> means <strong>for</strong>:</p><span class="example">Lo loiwe su na te. <span class="gloss">This book is for you.</span></span><span class="example">Lo lawe su na neo mawe. <span class="gloss">Today is for my mother.</span></span><p>Same position, same shape as the other particles.</p><h3>📊 The quantifier family</h3><p>You already know three of the five Liru quantifiers. Here's the full set:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">word</th><th style="padding:4px 12px;color:var(--dim)">meaning</th></tr><tr><td style="padding:4px 12px"><em>tai</em></td><td style="padding:4px 12px">all (or every)</td></tr><tr><td style="padding:4px 12px"><em>nai</em></td><td style="padding:4px 12px">many (or much) — known</td></tr><tr><td style="padding:4px 12px"><em>sai</em></td><td style="padding:4px 12px">some (or a few)</td></tr><tr><td style="padding:4px 12px"><em>fai</em></td><td style="padding:4px 12px">any — known via <em>faipue</em>/<em>faihue</em></td></tr><tr><td style="padding:4px 12px"><em>nuli</em></td><td style="padding:4px 12px">none — known via the number 0 and <em>nulipue</em>/<em>nulihue</em></td></tr></table><p>All five are adjectives — they sit before a noun:</p><span class="example">Tai piwea wa rau. <span class="gloss">All the children slept.</span></span><span class="example">Sai mewea su rai. <span class="gloss">Some cats are sleepy.</span></span><p>They can also sit <strong>after</strong> a verb as adverbs:</p><span class="example">Ne wa tahu sai. <span class="gloss">I ate some.</span></span><h3>🌐 The noun <em>tae</em> — \"the whole\"</h3><p><em>tai</em> (all) is the adjective form of root <em>tae</em>, which means <strong>the whole</strong> or <strong>totality</strong> as a noun. You already know its verb sibling <em>tau</em> \"to complete\" (from the age idiom in L53).</p><span class="example">Lo su tae. <span class="gloss">This is the whole (of it).</span></span>`},

  {id:"l121_vocab_concrete",
   title:"Door, Window, Gift, Work",
   desc:"poye, taupoye (window), fere, fase",
   icon:"🚪",
   vocabKey:"l121_vocab_concrete",
   xp:18,
   unit:21,
   intro:`<h3>🚪 Door and window</h3><p><em>poye</em> means <strong>door</strong> (or more abstractly, <em>opening</em>). Its adjective sibling <em>poyi</em> means <strong>open</strong>. You already know its verb form <em>poyu</em> (to open) from L78.</p><span class="example">Lo poye su poyi. <span class="gloss">This door is open.</span></span><p><strong>Window</strong> is built compositionally: <em>tauwe</em> (wall) + <em>poye</em> (opening) → <em>taupoye</em>. A window is literally a \"wall-opening\":</p><span class="example">Lo taupoye su piami. <span class="gloss">This window is small.</span></span><h3>🎁 Gift and work</h3><p>Two more useful nouns. Their verbs are already known: <em>feru</em> \"to give\" (L77) and <em>fasu</em> \"to work\" (L82). These are the noun siblings.</p><span class="example">Ne wa feru lo fere so te. <span class="gloss">I gave this gift to you.</span></span><span class="example">Neo fase su ori. <span class="gloss">My job is intense.</span></span><p>A small naming note: <em>fase</em> covers both the abstract concept (\"work\") and the concrete sense (\"a job\") — Liru doesn't split them.</p>`},

  {id:"l122_vocab_emotion_nouns",
   title:"Joy, Worry, Anger, Surprise",
   desc:"houle, muhe + muhu, tauke, kaume — the noun forms of the emotions you know",
   icon:"😊",
   vocabKey:"l122_vocab_emotion_nouns",
   xp:18,
   unit:21,
   intro:`<h3>😊 The feelings as objects</h3><p>You already know how to describe these feelings — the adjectives are from L18 and L24:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">known (adj.)</th><th style="padding:4px 12px;color:var(--dim)">new (n.)</th></tr><tr><td style="padding:4px 12px"><em>houli</em> — happy</td><td style="padding:4px 12px"><em>houle</em> — joy</td></tr><tr><td style="padding:4px 12px"><em>muhi</em> — anxious</td><td style="padding:4px 12px"><em>muhe</em> — worry</td></tr><tr><td style="padding:4px 12px"><em>tauki</em> — angry</td><td style="padding:4px 12px"><em>tauke</em> — anger</td></tr><tr><td style="padding:4px 12px"><em>kaumi</em> — surprised</td><td style="padding:4px 12px"><em>kaume</em> — surprise</td></tr></table><p>The noun lets you treat the feeling as a thing you have or talk about:</p><span class="example">Veo houle su ori. <span class="gloss">Her joy is great.</span></span><span class="example">Ne ahu nai muhe. <span class="gloss">I have a lot of worry.</span></span><h3>😟 A useful verb: <em>muhu</em></h3><p>\"To worry\" — <em>muhu</em> — is high-frequency on its own:</p><span class="example">Mai muhu. <span class="gloss">Don't worry.</span></span><span class="example">Neo mawe wa muhu. <span class="gloss">My mother worried.</span></span><p>The dictionary also has verb forms for joy, anger, and surprise (<em>houlu</em> to rejoice, <em>tauku</em> to anger someone, <em>kaumu</em> to surprise someone), but they're rarer than <em>muhu</em> — we'll let those wait.</p>`},

  {id:"l123_vocab_noun_of_verb",
   title:"Noun Forms of Verbs You Know",
   desc:"wane (want), hoye (purchase), pire (thought), lire (song)",
   icon:"💭",
   vocabKey:"l123_vocab_noun_of_verb",
   xp:18,
   unit:21,
   intro:`<h3>💭 These are nouns — not the verbs!</h3><p>This lesson teaches four <strong>noun</strong> forms of verbs you already know. They look almost identical to the verbs — only the final vowel changes:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">known verb</th><th style="padding:4px 12px;color:var(--dim)">new noun</th></tr><tr><td style="padding:4px 12px"><em>wanu</em> — to want (L7)</td><td style="padding:4px 12px"><em>wane</em> — a want, a desire</td></tr><tr><td style="padding:4px 12px"><em>hoyu</em> — to buy (L59)</td><td style="padding:4px 12px"><em>hoye</em> — a purchase</td></tr><tr><td style="padding:4px 12px"><em>piru</em> — to think (L78)</td><td style="padding:4px 12px"><em>pire</em> — a thought</td></tr><tr><td style="padding:4px 12px"><em>liru</em> — to speak, sing, say (L25)</td><td style="padding:4px 12px"><em>lire</em> — a song, speech</td></tr></table><h3>🔁 The pattern is productive</h3><p>This is the canvas system at work. Strip the <em>-u</em> from a verb, replace with <em>-e</em>, and you have its sibling noun. Once you internalize this, the dictionary essentially doubles.</p><span class="example">Ne nawu te. <span class="gloss">I love you. (verb)</span></span><span class="example">Neo nawe su ori. <span class="gloss">My love is great. (noun)</span></span><p>Heads-up: not every verb has a useful noun sibling (some sound natural, others are rare). But for these four, the noun form is everyday vocabulary:</p><span class="example">Lo lire su nai waihi. <span class="gloss">This song is very hopeful.</span></span><span class="example">Neo wane su rae. <span class="gloss">My desire is sleep.</span></span>`},

  {id:"l124_vocab_abstract_nouns",
   title:"Ability, Obligation, Memory, Need",
   desc:"sahe + sahi (maybe), shihe, mere, mihe — abstract nouns paired with modals you know",
   icon:"🧠",
   vocabKey:"l124_vocab_abstract_nouns",
   xp:20,
   unit:21,
   intro:`<h3>🧠 The abstract sibling of each modal verb</h3><p>The Liru modal verbs from L20 — <em>sahu</em> \"can\" and <em>shihu</em> \"must\" — both have noun siblings that name the underlying concept:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">verb</th><th style="padding:4px 12px;color:var(--dim)">noun</th></tr><tr><td style="padding:4px 12px"><em>sahu</em> — can, to be able to</td><td style="padding:4px 12px"><em>sahe</em> — ability, possibility</td></tr><tr><td style="padding:4px 12px"><em>shihu</em> — must, should</td><td style="padding:4px 12px"><em>shihe</em> — obligation</td></tr></table><span class="example">Veo sahe su ori. <span class="gloss">Her ability is great.</span></span><span class="example">Ne ahu shihe. <span class="gloss">I have an obligation.</span></span><h3>🤔 <em>sahi</em> — \"possible / maybe\"</h3><p>Root <em>sahe</em> has an adjective form too: <em>sahi</em>, meaning <strong>possible</strong> or, as a standalone reply, <strong>maybe</strong>:</p><span class="example">"Te wu vanu?" "Sahi." <span class="gloss">"Will you come?" "Maybe."</span></span><span class="example">Lo su sahi. <span class="gloss">This is possible.</span></span><h3>🧐 Memory and need</h3><p>Two more noun forms whose verbs you already know:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">verb</th><th style="padding:4px 12px;color:var(--dim)">noun</th></tr><tr><td style="padding:4px 12px"><em>meru</em> — to remember</td><td style="padding:4px 12px"><em>mere</em> — memory</td></tr><tr><td style="padding:4px 12px"><em>mihu</em> — to need</td><td style="padding:4px 12px"><em>mihe</em> — need</td></tr></table><span class="example">Neo mere su houli. <span class="gloss">My memory is happy.</span></span><span class="example">Ne ahu mihe. <span class="gloss">I have a need.</span></span>`},

  {id:"l125_vocab_learning_cluster",
   title:"Lesson, Teach, Love, Knowledge, Understanding",
   desc:"kaise + kaisu (to teach), nawe, sene, yeihe",
   icon:"📖",
   vocabKey:"l125_vocab_learning_cluster",
   xp:20,
   unit:21,
   intro:`<h3>📖 The matching verb for \"to learn\"</h3><p>You learned <em>mauhu</em> \"to learn\" in L82. Its partner verb has been missing until now: <em>kaisu</em> means <strong>to teach</strong>. And its noun sibling is <em>kaise</em> — <strong>a lesson</strong>:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">word</th><th style="padding:4px 12px;color:var(--dim)">meaning</th></tr><tr><td style="padding:4px 12px"><em>kaise</em> (n.)</td><td style="padding:4px 12px">lesson</td></tr><tr><td style="padding:4px 12px"><em>kaisu</em> (v.)</td><td style="padding:4px 12px">to teach</td></tr></table><span class="example">Ne kaisu Liru. <span class="gloss">I teach Liru.</span></span><span class="example">Lo su neo kaise. <span class="gloss">This is my lesson.</span></span><h3>💞 Three more noun siblings</h3><p>Three abstract nouns whose verbs are old friends:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">verb (known)</th><th style="padding:4px 12px;color:var(--dim)">noun (new)</th></tr><tr><td style="padding:4px 12px"><em>nawu</em> — to love (L8)</td><td style="padding:4px 12px"><em>nawe</em> — love</td></tr><tr><td style="padding:4px 12px"><em>senu</em> — to know (L9)</td><td style="padding:4px 12px"><em>sene</em> — knowledge</td></tr><tr><td style="padding:4px 12px"><em>yeihu</em> — to understand (L81)</td><td style="padding:4px 12px"><em>yeihe</em> — understanding</td></tr></table><span class="example">Neo nawe na te su ori. <span class="gloss">My love for you is great.</span></span><span class="example">Veo sene su nai. <span class="gloss">Her knowledge is much.</span></span><p>You may notice the pattern by now — Liru lets you flip almost any taught verb into its sibling noun by swapping <em>-u</em> for <em>-e</em>. This is doubling your vocabulary every time you internalize a new verb.</p>`},

  {id:"l126_vocab_time_state",
   title:"Previous, Next, and Sleep",
   desc:"wali (previous), wuli (next), rae + rai (sleep / sleepy)",
   icon:"⏳",
   vocabKey:"l126_vocab_time_state",
   xp:14,
   unit:21,
   intro:`<h3>⏳ Previous and next as adjectives</h3><p>You already know <em>wale</em> \"before\" and <em>wule</em> \"after\" from L28 — used as time-anchor adverbs:</p><span class="example">Wale ne wa tahu. <span class="gloss">Before, I ate.</span></span><p>The matching adjectives are <em>wali</em> (<strong>previous</strong>) and <em>wuli</em> (<strong>next</strong>). They sit before a noun, modifying it:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">adverb (known)</th><th style="padding:4px 12px;color:var(--dim)">adjective (new)</th></tr><tr><td style="padding:4px 12px"><em>wale</em> — before</td><td style="padding:4px 12px"><em>wali</em> — previous</td></tr><tr><td style="padding:4px 12px"><em>wule</em> — after</td><td style="padding:4px 12px"><em>wuli</em> — next</td></tr></table><span class="example">Wali kaise wa nauyi. <span class="gloss">The previous lesson was fun.</span></span><span class="example">Wuli lawe ne wu vanu. <span class="gloss">The next day I will come.</span></span><h3>😴 Sleep as a noun and adjective</h3><p>You learned <em>rau</em> \"to sleep\" in L48. Its siblings:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">word</th><th style="padding:4px 12px;color:var(--dim)">meaning</th></tr><tr><td style="padding:4px 12px"><em>rae</em> (n.)</td><td style="padding:4px 12px">sleep</td></tr><tr><td style="padding:4px 12px"><em>rai</em> (adj.)</td><td style="padding:4px 12px">sleepy</td></tr></table><span class="example">Ne ahu mihe na rae. <span class="gloss">I have a need for sleep.</span></span><span class="example">Lo piwe su rai. <span class="gloss">This child is sleepy.</span></span>`},

// Populate the landing-page lesson and word counts from live data.
(function updateLandingCounts(){
  const setCounts = () => {
    const lessonEl = document.getElementById('landing-lesson-count');
    if (lessonEl) lessonEl.textContent = LESSONS.length.toString();
    const wordEl = document.getElementById('landing-word-count');
    if (wordEl && typeof DICTIONARY_RAW !== 'undefined') {
      // Round down to nearest 100 and append "+" so the number feels stable
      // and approachable — "1,583" reads like inventory, "1,500+" reads like scale.
      const rounded = Math.floor(DICTIONARY_RAW.length / 100) * 100;
      wordEl.textContent = rounded.toLocaleString() + '+';
    }
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setCounts);
  } else {
    setCounts();
  }
})();

  }
})();

// ═══════════════════════════════════════════════════════════════
// EXERCISE GENERATOR
// ═══════════════════════════════════════════════════════════════
// Generates an array of exercise objects for a given lesson id.
// Exercise types: mc, tf, match, fill, wordOrder, revfill, errcorrect, freetext
function generateExercises(lessonId){
  const lesson=LESSONS.find(l=>l.id===lessonId);
  if(!lesson)return[];

  if(lesson.isFinalTest) return generateFinalTest();
  if(lesson.isFreeText) return generateFreeTextExercises(lesson);
  if(lesson.isParagraph) return generateParagraphExercises(lesson);
  if(lesson.isSentence) return generateSentenceExercises(lesson);
  if(lesson.isReview && lesson.reviewPool) return generateReviewExercises(lesson);
  return generateVocabExercises(lesson);
}

function generateVocabExercises(lesson){
  const items=V[lesson.vocabKey];
  if(!items||items.length===0)return[];

  // Normalize the current lesson's items.
  const wordItems=items.map(v=>({
    lw:Array.isArray(v.lw)?v.lw.join(" "):v.lw,
    en:v.en,
    pos:v.pos||null,
    note:v.note||null,
    canvas:v.canvas||null,
    pair:v.pair||null,
    plural:v.plural||null, plural_en:v.plural_en||null,
  }));

  // Build a pool of words from previous lessons to use as distractors when the
  // current lesson is small. Walk LESSONS up to (but not including) the current
  // lesson, collecting each non-review, non-checkpoint lesson's items.
  const distractorPool=[];
  const seenEn=new Set(wordItems.map(w=>w.en));
  const seenLw=new Set(wordItems.map(w=>w.lw));
  for(const L of LESSONS){
    if(L.id===lesson.id)break;
    if(L.isReview||L.isCheckpoint||L.isFinalTest)continue;
    const arr=V[L.vocabKey];
    if(!arr)continue;
    arr.forEach(v=>{
      if(Array.isArray(v.lw))return; // skip multi-word sentences
      if(seenEn.has(v.en)||seenLw.has(v.lw))return;
      distractorPool.push({lw:v.lw, en:v.en, pos:v.pos||null});
      seenEn.add(v.en);
      seenLw.add(v.lw);
    });
  }
  // Combined pool for distractor lookups (current + previous).
  const fullPool=[...wordItems, ...distractorPool];

  // Helper: get 3 wrong answers from fullPool that don't share the target's gloss/lw.
  const wrongEn=(target)=>pickUnique(fullPool.filter(v=>v.en!==target.en), 3, v=>v.en).map(v=>v.en);
  const wrongLw=(target)=>pickUnique(fullPool.filter(v=>v.lw!==target.lw), 3, v=>v.lw).map(v=>v.lw);

  const exercises=[];

  // ─── STAGE 1: Flashcard introductions ────────────────────────
  wordItems.forEach(item=>{
    exercises.push({type:"flashcard", item:item});
  });

  // ─── STAGE 2: Recognition (LW → EN) ─────────────────────────
  // One MC per item up to 5. Extra items get covered via top-up or match.
  // Fallback: if fewer than 3 distractors are available (early lessons with
  // tiny pools), build a 3-option MC with 2 wrong answers instead of 4-option
  // with 3. Skip only if 0 or 1 distractors are available — those don't make
  // a meaningful MC.
  shuffle([...wordItems]).slice(0, 5).forEach(item=>{
    const wrong=wrongEn(item);
    if(wrong.length<2)return;
    const wrongUsed=wrong.slice(0, Math.min(3, wrong.length));
    exercises.push({type:"mc", prompt:`What does "${item.lw}" mean?`, correct:item.en, options:shuffle([item.en,...wrongUsed]), note:item.note, lwWord:item.lw});
  });

  // ─── STAGE 3: Production (EN → LW) ──────────────────────────
  // Skip particles and items whose gloss contains slashes / parentheticals —
  // these don't translate cleanly as "X in Liru is:".
  const cleanForProduction=v=>{
    if(v.pos==="particle")return false;
    if(v.en.includes("/") || v.en.includes("(") )return false;
    return true;
  };
  const prodPool=wordItems.filter(cleanForProduction);
  // Production MC — same fallback as recognition: allow 2 distractors when 3
  // aren't available.
  shuffle([...prodPool]).slice(0, 4).forEach(item=>{
    const wrong=wrongLw(item);
    if(wrong.length<2)return;
    const wrongUsed=wrong.slice(0, Math.min(3, wrong.length));
    exercises.push({type:"mc", prompt:`How do you say "${item.en}" in Liru?`, correct:item.lw, options:shuffle([item.lw,...wrongUsed])});
  });
  shuffle([...prodPool]).slice(0,2).forEach(item=>{
    exercises.push({type:"fill", prompt:`"${item.en}" in Liru is:`, correct:item.lw.toLowerCase()});
  });

  // ─── STAGE 4: Canvas drill ───────────────────────────────────
  // Only canvas roots with at least one non-mechanical sibling get drilled.
  // Mechanical-tagged forms (adj_tier:"mechanical" or v_tier:"mechanical")
  // are skipped both as drill endpoints and as distractors — they exist as
  // legal Liru forms but should not be taught as standalone vocabulary.
  // See DECISIONS.md "Mechanical-tag display rules."
  const canvasItems=wordItems.filter(v=>{
    if(!v.canvas)return false;
    const adjOk=v.canvas.adj && v.canvas.adj_tier!=="mechanical";
    const vOk  =v.canvas.v   && v.canvas.v_tier  !=="mechanical";
    return adjOk || vOk;
  });
  if(canvasItems.length>0){
    // Build a canvas-distractor pool from current + previous canvas items.
    // Skip mechanical forms — they shouldn't surface as plausible answer choices.
    const canvasDistractors=[];
    fullPool.forEach(v=>{
      if(v.canvas){
        if(v.canvas.adj && v.canvas.adj_tier!=="mechanical")canvasDistractors.push(v.canvas.adj);
        if(v.canvas.v   && v.canvas.v_tier  !=="mechanical")canvasDistractors.push(v.canvas.v);
        canvasDistractors.push(v.lw);
      }
    });
    // Generate up to 2 canvas drills (one per random current-lesson canvas item).
    const drillSources=shuffle([...canvasItems]).slice(0,Math.min(2, canvasItems.length));
    drillSources.forEach(pick1=>{
      // Build candidate directions; drop any whose from or to is mechanical-tagged.
      const adjOk=pick1.canvas.adj && pick1.canvas.adj_tier!=="mechanical";
      const vOk  =pick1.canvas.v   && pick1.canvas.v_tier  !=="mechanical";
      const directions=[
        vOk          ? {fromForm:pick1.lw,           fromEn:pick1.en,           to:"v",   toForm:pick1.canvas.v,   toEn:pick1.canvas.v_en}   : null,
        adjOk        ? {fromForm:pick1.lw,           fromEn:pick1.en,           to:"adj", toForm:pick1.canvas.adj, toEn:pick1.canvas.adj_en} : null,
        (adjOk&&vOk) ? {fromForm:pick1.canvas.adj,   fromEn:pick1.canvas.adj_en, to:"v",   toForm:pick1.canvas.v,   toEn:pick1.canvas.v_en}   : null,
        vOk          ? {fromForm:pick1.canvas.v,     fromEn:pick1.canvas.v_en,   to:"n",   toForm:pick1.lw,         toEn:pick1.en}            : null,
      ].filter(d=>d && d.toForm && d.fromForm);
      if(directions.length===0)return;
      const dir=directions[Math.floor(Math.random()*directions.length)];
      const wrong=pick(canvasDistractors.filter(d=>d!==dir.toForm && d!==dir.fromForm), 3);
      if(wrong.length<3)return;
      const posLabel={n:"noun", adj:"adjective", v:"verb"}[dir.to];
      exercises.push({
        type:"canvasDrill",
        prompt:`"${dir.fromForm}" means "${dir.fromEn}". What is its ${posLabel} form?`,
        correct:dir.toForm,
        correctEn:dir.toEn,
        options:shuffle([dir.toForm, ...wrong])
      });
    });
  }

  // ─── STAGE 5: Consolidation match ────────────────────────────
  // Use current lesson words if possible, but mix in previous-lesson words if
  // the current lesson doesn't have enough to form 4 pairs.
  // Particles are normally filtered out of Match (e.g. ki, lai, wa/wu in
  // sentence lessons would be confusing as match items). Exception: when the
  // current lesson is particle-only (e.g. relational1), allow particles —
  // the lesson's whole point is teaching those particles, so matching them
  // to their glosses is appropriate consolidation.
  const lessonHasNonParticles=wordItems.some(v=>v.pos!=="particle");
  const matchPosFilter=lessonHasNonParticles ? (v=>v.pos!=="particle") : (()=>true);
  const matchCandidates=[...wordItems.filter(matchPosFilter)];
  while(matchCandidates.length<4 && distractorPool.length>0){
    const extra=distractorPool.filter(v=>matchPosFilter(v) && !matchCandidates.find(m=>m.lw===v.lw));
    if(extra.length===0)break;
    matchCandidates.push(extra[Math.floor(Math.random()*extra.length)]);
  }
  if(matchCandidates.length>=3){
    const matchItems=pick(matchCandidates, Math.min(4, matchCandidates.length));
    exercises.push({type:"match", pairs:matchItems.map(v=>({left:v.lw, right:v.en}))});
  }

  // ─── STAGE 6: TOP-UP to reach target length ──────────────────
  // Scale target by lesson size. Small lessons (1-3 items) target 10; larger
  // lessons target flashcards+10, capped at 18. This avoids hammering a 1-item
  // lesson with 13 copies of the same drill.
  const flashcardCount=wordItems.length;
  const targetTotal=Math.min(18, Math.max(10, flashcardCount + 10));
  let padNeeded=targetTotal - exercises.length;

  // Track prompts we've already generated so top-up doesn't duplicate.
  const promptSignatures=new Set(exercises.map(e=>{
    if(e.type==="mc"||e.type==="canvasDrill")return e.type+"|"+e.prompt+"|"+e.correct;
    if(e.type==="fill")return "fill|"+e.correct;
    return e.type+"|"+(e.prompt||"");
  }));

  // Generate candidate top-up exercises, skip duplicates, stop if we run out.
  let guard=60;
  const topupItems=wordItems.filter(cleanForProduction); // use clean pool only
  if(topupItems.length===0)padNeeded=0; // e.g. particles-only lesson
  while(padNeeded>0 && guard-->0){
    const item=topupItems[Math.floor(Math.random()*topupItems.length)];
    // Pick an exercise type we haven't used for this item yet.
    const tryTypes=shuffle(["mc-lw2en","mc-en2lw","fill"]);
    let added=false;
    for(const t of tryTypes){
      let ex=null, sig=null;
      if(t==="mc-lw2en"){
        const wrong=wrongEn(item);
        if(wrong.length<2)continue;
        const wrongUsed=wrong.slice(0, Math.min(3, wrong.length));
        ex={type:"mc", prompt:`What does "${item.lw}" mean?`, correct:item.en, options:shuffle([item.en,...wrongUsed]), note:item.note, lwWord:item.lw};
        sig="mc|"+ex.prompt+"|"+ex.correct;
      } else if(t==="mc-en2lw"){
        const wrong=wrongLw(item);
        if(wrong.length<2)continue;
        const wrongUsed=wrong.slice(0, Math.min(3, wrong.length));
        ex={type:"mc", prompt:`How do you say "${item.en}" in Liru?`, correct:item.lw, options:shuffle([item.lw,...wrongUsed])};
        sig="mc|"+ex.prompt+"|"+ex.correct;
      } else { // fill
        ex={type:"fill", prompt:`"${item.en}" in Liru is:`, correct:item.lw.toLowerCase()};
        sig="fill|"+ex.correct;
      }
      if(promptSignatures.has(sig))continue;
      exercises.push(ex);
      promptSignatures.add(sig);
      added=true;
      padNeeded--;
      break;
    }
    if(!added){
      // All types for all items are already in the set — lesson is saturated.
      break;
    }
  }

  // Final ordering:
  //   1. Flashcards in declared order (introduction).
  //   2. Recognition exercises shuffled (mc, match, canvasDrill) — every word's
  //      first non-flashcard exposure is a recognition exercise, never typing.
  //   3. Fill (typing) exercises shuffled at the tail — production from memory
  //      only after the learner has seen each word in a recognition context.
  // This enforces the pedagogy: introduce → recognize → produce.
  const flashcards=exercises.filter(e=>e.type==="flashcard");
  const fills=exercises.filter(e=>e.type==="fill");
  const recognition=exercises.filter(e=>e.type!=="flashcard" && e.type!=="fill");
  const ordered=[...flashcards, ...shuffle(recognition), ...shuffle(fills)];
  // If the lesson declares an intro, prepend it (not shuffled, never capped).
  // Mirrors the behavior of generateSentenceExercises so vocab lessons with
  // intro cards (the canvas rule in Like, Want, Need; the mo- rule in
  // Feeling, Happy, Sad; etc.) actually display them to the learner.
  if(lesson.intro){
    return [{type:"lessonIntro",html:lesson.intro}].concat(ordered);
  }
  return ordered;
}

function generateSentenceExercises(lesson){
  const items=V[lesson.vocabKey];
  if(!items||items.length===0)return[];

  // Build a pool of single-word distractor tiles drawn from previously-taught
  // lessons (vocab-lesson V entries + tokens used in prior sentence lessons).
  // Used to pad word-order prompts where the correct sentence has < 3 tiles —
  // without padding, a single-token sentence like "Weriko." → ["Weriko"] is
  // unfailable (one tile, one possible answer). With 1–2 distractors mixed in,
  // the learner has to actually identify the correct word.
  const distractorTilePool=(()=>{
    const pool=new Set();
    for(const L of LESSONS){
      if(L.id===lesson.id)break;
      if(L.isReview||L.isCheckpoint||L.isFinalTest)continue;
      const arr=V[L.vocabKey];
      if(!arr)continue;
      for(const v of arr){
        if(Array.isArray(v.lw)){
          // Sentence lesson — harvest each token.
          for(const tok of v.lw){
            const clean=String(tok).toLowerCase().replace(/[.,!?]/g,"");
            if(clean&&!/\s/.test(clean))pool.add(clean);
          }
        } else if(typeof v.lw==="string"){
          // Vocab lesson — base form plus canvas + plural where present.
          pool.add(v.lw.toLowerCase());
          if(v.canvas){
            if(v.canvas.adj)pool.add(v.canvas.adj.toLowerCase());
            if(v.canvas.v)pool.add(v.canvas.v.toLowerCase());
          }
          if(v.plural)pool.add(v.plural.toLowerCase());
        }
      }
    }
    return [...pool];
  })();

  // Pad a word-order tile array with distractors when it's too short to be
  // failable. correctOrderLower is the lowercased correct tokens — we exclude
  // those from distractor candidates so a distractor can never accidentally
  // match a correct tile.
  const padShuffled=(shuffledArr,correctOrder)=>{
    if(correctOrder.length>=3)return shuffledArr;
    const correctLower=new Set(correctOrder.map(t=>String(t).toLowerCase().replace(/[.,!?]/g,"")));
    const candidates=distractorTilePool.filter(w=>!correctLower.has(w));
    if(candidates.length===0)return shuffledArr;
    // Length 1 → add 2 distractors (3 tiles total); length 2 → add 1 distractor.
    const need=correctOrder.length===1?2:1;
    const picked=shuffle([...candidates]).slice(0,Math.min(need,candidates.length));
    return shuffle([...shuffledArr,...picked]);
  };

  const wordOrderPool=[];
  const fillPool=[];
  const clozePool=[];
  items.forEach(sent=>{
    const lwStr=Array.isArray(sent.lw)?sent.lw.join(" "):sent.lw;
    const lwArr=Array.isArray(sent.lw)?sent.lw:lwStr.split(" ");
    const baseShuffled=shuffle([...lwArr]);
    const padded=padShuffled(baseShuffled,lwArr);
    wordOrderPool.push({type:"wordOrder",prompt:`Translate: "${sent.en}"`,correctOrder:lwArr,correctOrderAlts:sent.alts||null,shuffled:padded});
    fillPool.push({type:"fill",prompt:`Translate to Liru:\n"${sent.en}"`,correct:lwStr.toLowerCase()});
    // Sentences with a `cloze` field generate a cloze exercise (multi-blank
    // fill from a word bank). Introduced in A3 (Unit 17) — see renderCloze.
    if(sent.cloze && Array.isArray(sent.cloze.blanks) && Array.isArray(sent.cloze.bank)){
      clozePool.push({type:"cloze", liru:lwArr, blanks:sent.cloze.blanks, bank:sent.cloze.bank, en:sent.en});
    }
  });
  // Scaffold progression: word-order first (recognition), then fill
  // (production from scratch), then cloze (production with bank +
  // distractors — pinpointed placement test). For sentence lessons
  // without any cloze entries (all core sentence lessons and any
  // advanced sentence lesson that chooses not to use cloze), behavior
  // is identical to the pre-cloze generator. For lessons with cloze
  // entries (A3 onward), the lesson gets word-order + fill + cloze.
  // Total caps: 7 word-order + 7 fill + all available cloze (capped at
  // a reasonable upper bound to avoid runaway length).
  const TOTAL_CAP=14;
  const woCap=Math.ceil(TOTAL_CAP/2);
  const fillCap=Math.floor(TOTAL_CAP/2);
  const clozeCap=Math.min(clozePool.length, 4);
  const wordOrderChosen=shuffle(wordOrderPool).slice(0,woCap);
  const fillChosen=shuffle(fillPool).slice(0,fillCap);
  const clozeChosen=shuffle(clozePool).slice(0,clozeCap);
  const ordered=[...wordOrderChosen, ...fillChosen, ...clozeChosen];
  // If the lesson declares an intro, prepend it (not shuffled, never capped).
  if(lesson.intro){
    return [{type:"lessonIntro",html:lesson.intro}].concat(ordered);
  }
  return ordered;
}

function generateReviewExercises(lesson){
  const allItems=[];
  (lesson.reviewPool||[]).forEach(key=>{
    const arr=V[key];
    if(arr)arr.forEach(v=>{if(!Array.isArray(v.lw))allItems.push({lw:v.lw,en:v.en,note:v.note||null});});
  });
  if(allItems.length===0)return[];
  const exercises=[];
  const used=new Set();

  // MC LW→EN
  pick(allItems.filter(v=>!used.has(v.lw)),6).forEach(item=>{
    used.add(item.lw);
    const wrong=pickUnique(allItems.filter(v=>v.en!==item.en),3,v=>v.en).map(v=>v.en);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`What does "${item.lw}" mean?`,correct:item.en,options:shuffle([item.en,...wrong])});
  });
  // MC EN→LW
  pick(allItems.filter(v=>!used.has(v.lw)),4).forEach(item=>{
    used.add(item.lw);
    const wrong=pick(allItems.filter(v=>v.lw!==item.lw),3).map(v=>v.lw);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`How do you say "${item.en}" in Liru?`,correct:item.lw,options:shuffle([item.lw,...wrong])});
  });
  // TF
  pick(allItems.filter(v=>!used.has(v.lw)),3).forEach(item=>{
    used.add(item.lw);
    const isTrue=Math.random()>0.5;
    let shownEn=item.en;
    if(!isTrue){const w=pick(allItems.filter(v=>v.en!==item.en),1);if(w.length)shownEn=w[0].en;}
    exercises.push({type:"tf",prompt:`"${item.lw}" means "${shownEn}"`,correct:isTrue,correctLabel:item.en});
  });
  // Match
  const matchItems=pick(allItems.filter(v=>!used.has(v.lw)),4);
  if(matchItems.length===4){
    matchItems.forEach(v=>used.add(v.lw));
    exercises.push({type:"match",pairs:matchItems.map(v=>({left:v.lw,right:v.en}))});
  }
  return shuffle(exercises).slice(0,12);
}

function generateParagraphExercises(lesson){
  const paras=V[lesson.vocabKey];
  if(!paras||paras.length===0)return[];
  const exercises=[];
  paras.forEach(para=>{
    // Paragraph intro screen
    exercises.push({type:"paraIntro",en:para.en,sentences:para.sentences});

    // Full paragraph translation
    const fullLw=para.sentences.map(s=>s.lw.join(" ")).join(" ").toLowerCase();
    const paraAlts=[];
    para.sentences.forEach((s,si)=>{
      if(s.alts){
        s.alts.forEach(altSent=>{
          const altFull=para.sentences.map((s2,si2)=>si2===si?altSent.join(" "):s2.lw.join(" ")).join(" ").toLowerCase();
          paraAlts.push(altFull);
        });
      }
    });
    exercises.push({type:"fill",prompt:`Translate this paragraph to Liru:\n"${para.en}"`,correct:fullLw,correctAlts:paraAlts.length>0?paraAlts:null,isParagraph:true});

    // Word order for each sentence
    para.sentences.forEach(s=>{
      exercises.push({type:"wordOrder",prompt:`Translate: "${s.en}"`,correctOrder:s.lw,correctOrderAlts:s.alts||null,shuffled:shuffle([...s.lw])});
    });

    // TF on first sentence
    const tfSent=para.sentences[0];
    const isTrue=Math.random()>0.5;
    let shownEn=tfSent.en;
    if(!isTrue&&para.sentences.length>1){shownEn=para.sentences[para.sentences.length-1].en;}
    exercises.push({type:"tf",prompt:`"${tfSent.lw.join(" ")}" means:\n"${shownEn}"`,correct:isTrue,correctLabel:tfSent.en});

    // Error correction
    const errSent=para.sentences[Math.min(1,para.sentences.length-1)];
    const errLw=[...errSent.lw];
    const errIdx=Math.max(1,Math.floor(Math.random()*(errLw.length-1)));
    const sub=["fa","na","la","ko","wo","so","ya"].filter(w=>w!==errLw[errIdx].toLowerCase())[0]||"lo";
    errLw[errIdx]=sub;
    exercises.push({type:"errcorrect",prompt:`Is this sentence correct?\n"${errLw.join(" ")}"`,sentenceEn:errSent.en,isCorrect:false,correctSent:errSent.lw.join(" ")});
  });
  return shuffle(exercises).slice(0,14);
}

function generateFreeTextExercises(lesson){
  const prompts=shuffle([...FREETEXT_PROMPTS]).slice(0,4);
  const exercises=[];
  prompts.forEach(p=>{exercises.push({type:"freetext",prompt:p.prompt,hint:p.hint});});
  return exercises;
}

function generateFinalTest(){
  // Draws from all lesson vocab once populated.
  const allKeys=Object.keys(V);
  const allItems=[];
  allKeys.forEach(key=>{const arr=V[key];if(arr)arr.forEach(v=>{if(!Array.isArray(v.lw))allItems.push({lw:v.lw,en:v.en,note:v.note||null});});});
  if(allItems.length===0)return[];
  const exercises=[];
  const used=new Set();

  pick(allItems.filter(v=>!used.has(v.lw)),5).forEach(item=>{
    used.add(item.lw);
    const wrong=pickUnique(allItems.filter(v=>v.en!==item.en),3,v=>v.en).map(v=>v.en);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`What does "${item.lw}" mean?`,correct:item.en,options:shuffle([item.en,...wrong])});
  });
  pick(allItems.filter(v=>!used.has(v.lw)),4).forEach(item=>{
    used.add(item.lw);
    const wrong=pick(allItems.filter(v=>v.lw!==item.lw),3).map(v=>v.lw);
    if(wrong.length>=3)exercises.push({type:"mc",prompt:`How do you say "${item.en}" in Liru?`,correct:item.lw,options:shuffle([item.lw,...wrong])});
  });
  pick(allItems.filter(v=>!used.has(v.lw)),3).forEach(item=>{
    used.add(item.lw);
    const isTrue=Math.random()>0.5;
    let shownEn=item.en;
    if(!isTrue){const w=pick(allItems.filter(v=>v.en!==item.en),1);if(w.length)shownEn=w[0].en;}
    exercises.push({type:"tf",prompt:`"${item.lw}" means "${shownEn}"`,correct:isTrue,correctLabel:item.en});
  });
  const matchItems=pick(allItems.filter(v=>!used.has(v.lw)),4);
  if(matchItems.length===4){
    matchItems.forEach(v=>used.add(v.lw));
    exercises.push({type:"match",pairs:matchItems.map(v=>({left:v.lw,right:v.en}))});
  }
  return shuffle(exercises).slice(0,20);
}

function shuffle(arr) {
  const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}
function pick(arr,n){return shuffle(arr).slice(0,n);}
// Like pick, but deduplicates by a key function so no two results share the same display value
function pickUnique(arr,n,keyFn){
  const seen=new Set();const result=[];
  for(const item of shuffle(arr)){const k=keyFn(item);if(!seen.has(k)){seen.add(k);result.push(item);if(result.length>=n)break;}}
  return result;
}
function saveLocal(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){}}
function loadLocal(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def}catch(e){return def}}
function getCurrentUsername(){return loadLocal("lw_current_user","");}
function setCurrentUsername(name){saveLocal("lw_current_user",name);}
function fbKey(u){return u.replace(/[.#$\/\[\]]/g,"_");}
function applyStreakLogic(data){
  if(data.lastActiveDate){
    const today=new Date().toDateString();
    const yesterday=new Date(Date.now()-86400000).toDateString();
    if(data.lastActiveDate!==today&&data.lastActiveDate!==yesterday)data.streak=0;
  }
  return data;
}
function loadUserData(username){
  if(!username)return{username:"",xp:0,streak:0,lessonsCompleted:[],lastActiveDate:null};
  const data=loadLocal("lw_user_"+username,{username,xp:0,streak:0,lessonsCompleted:[],lastActiveDate:null});
  data.username=username;
  return applyStreakLogic(data);
}
async function loadUserDataCloud(username){
  if(!username)return{username:"",xp:0,streak:0,lessonsCompleted:[],lastActiveDate:null};
  if(firebaseReady&&db){
    try{
      const key=fbKey(username);
      const snap=await db.ref("users/"+key).once("value");
      if(snap.exists()){
        const data=snap.val();
        data.username=username;
        data.lessonsCompleted=data.lessonsCompleted||[];
        const updated=applyStreakLogic(data);
        saveLocal("lw_user_"+username,updated);
        return updated;
      }
    }catch(e){console.warn("Firebase load error:",e);}
  }
  return loadUserData(username);
}
function saveUserData(data){
  if(!data.username)return;
  saveLocal("lw_user_"+data.username,data);
  if(firebaseReady&&db){
    const key=fbKey(data.username);
    // Use .update() not .set() — set() would wipe sibling subtrees like srs/.
    db.ref("users/"+key).update({...data,updatedAt:Date.now()}).catch(e=>console.warn("Firebase save error:",e));
  }
}
async function pushToLeaderboard(data){
  if(!firebaseReady||!db||!data.username)return;
  if(data.username.toLowerCase()==="admin")return;
  // Count only completions matching the current LESSONS — stale entries from
  // previous course versions don't inflate the leaderboard.
  const validLessonIds=new Set(LESSONS.map(l=>l.id));
  const validDone=(data.lessonsCompleted||[]).filter(id=>validLessonIds.has(id)).length;
  try{await db.ref("leaderboard/"+fbKey(data.username)).set({name:data.username,xp:data.xp,streak:data.streak,lessons:validDone,updatedAt:Date.now()});}
  catch(e){console.warn("Firebase push error:",e);}
}
async function fetchLeaderboard(){
  if(!firebaseReady||!db)return[];
  try{const snap=await db.ref("leaderboard").orderByChild("xp").limitToLast(50).once("value");const entries=[];snap.forEach(c=>{entries.push(c.val());});return entries.sort((a,b)=>b.xp-a.xp);}
  catch(e){console.warn("Firebase fetch error:",e);return[];}
}
async function savePassword(u,pw){if(firebaseReady&&db){try{await db.ref("passwords/"+fbKey(u)).set(pw);}catch(e){}}}
async function loadPassword(u){if(firebaseReady&&db){try{const s=await db.ref("passwords/"+fbKey(u)).once("value");return s.exists()?s.val():null;}catch(e){}}return null;}
async function adminDeleteUser(u){if(!firebaseReady||!db)return;const k=fbKey(u);try{await db.ref("users/"+k).remove();await db.ref("leaderboard/"+k).remove();await db.ref("passwords/"+k).remove();}catch(e){console.warn(e);}}

async function finishLogin(name){
  const user=await loadUserDataCloud(name);
  saveUserData(user);
  state.user=user;
  // SRS — pull cloud first (in case user has data from another device),
  // merge with anything local, then run backfill/migration to fill gaps
  try{
    const cloud=await srsPullFromCloud(user.username);
    if(cloud){
      const localCards=srsLoadCards(user.username);
      // Cloud→local mirror: when cloud explicitly returned a `cards` object,
      // treat cloud as canonical for set membership. Drop any local card whose
      // ID isn't in cloud. This is what makes a reset on Device A propagate
      // to Device B on B's next login — without this step, B's old local
      // cards survive the merge (which only ever ADOPTS cloud cards, never
      // deletes local). The guard `cloud.cards` (truthy object) ensures a
      // missing/transient subtree doesn't accidentally wipe local — only an
      // explicit cloud state with a known card set triggers the mirror.
      if(cloud.cards){
        const cloudIds=cloud.cards;
        let dropped=0;
        for(const id in localCards){
          if(!(id in cloudIds)){
            delete localCards[id];
            dropped++;
          }
        }
        if(dropped>0)console.log("[SRS] mirror dropped",dropped,"local cards missing from cloud for",user.username);
      }
      const merged=srsMergeCloudCards(localCards,cloud.cards||{});
      srsSaveCards(user.username,localCards);
      if(cloud.state){
        // Merge cloud state with local; cloud flags win since cloud is canonical
        const localState=srsLoadState(user.username);
        const mergedState={...localState,...cloud.state};
        srsSaveState(user.username,mergedState);
      }
      if(merged>0)console.log("[SRS] merged",merged,"cards from cloud for",user.username);
    }
    // One-time recoinage migration: kauhe → mouleyahe. MUST run before the
    // stale-card pruner, which would otherwise delete kauhe cards (kauhe is
    // no longer in DICTIONARY_RAW) before this migration can rewrite them.
    {
      const migrated=srsMigrateKauheToMouleyaheIfNeeded(user.username);
      if(migrated>0)console.log("[SRS] migrated",migrated,"kauhe cards to mouleyahe for",user.username);
    }
    // One-time recoinage migration: leye → tone. Same constraint as kauhe:
    // MUST run before the stale-card pruner. Unlike kauhe (single-form
    // compound), leye had a full canvas (n./adj./v.) so all three forms get
    // migrated: leye → tone, leyi → toni, leyu → tonu.
    {
      const migrated=srsMigrateLeyeToToneIfNeeded(user.username);
      if(migrated>0)console.log("[SRS] migrated",migrated,"leye/leyi/leyu cards to tone family for",user.username);
    }
    // One-time rename migration: poni→oni (eight), molawe→none (night), plus
    // their compounds poniluone→oniluone (August) and meshimolawe→meshinone
    // (midnight). Day/night un-paired from the mo- system; eight renamed to
    // set up the n+eight easter egg (oni → none). MUST run before the
    // stale-card pruner. See DECISIONS.md "Eight/night easter egg".
    {
      const migrated=srsMigratePoniMolaweToOniNoneIfNeeded(user.username);
      if(migrated>0)console.log("[SRS] migrated",migrated,"poni/molawe-family cards for",user.username);
    }
    // Generic form-rename migration via SRS_FORM_RENAMES. Idempotent —
    // runs on every login, no-op once cards are rewritten. Handles all
    // future one-to-one form renames without bespoke migration code.
    // MUST run before the stale-card pruner. See DECISIONS.md / SHIPLOG.md
    // entries for individual renames carried by the registry.
    {
      const migrated=srsMigrateRenamedFormsIfNeeded(user.username);
      if(migrated>0)console.log("[SRS] form-renamed",migrated,"cards for",user.username);
    }
    // Prune any cards whose lw is no longer in the dictionary (stale from prior cleanups)
    {
      const cards=srsLoadCards(user.username);
      srsPruneAndSync(user.username,cards);
      // Refresh glosses against current V (catches "to do ill" → "to do wrong" style updates)
      const cards2=srsLoadCards(user.username);
      srsRefreshAndSync(user.username,cards2);
    }
    const added=srsBackfillIfNeeded(user.username,user,LESSONS,V,DICTIONARY_RAW);
    if(added>0)console.log("[SRS] backfilled",added,"cards for",user.username);
    const restamped=srsMigrateAddedAtIfNeeded(user.username,user,LESSONS,V,DICTIONARY_RAW);
    if(restamped>0)console.log("[SRS] re-stamped addedAt on",restamped,"existing cards for",user.username);
    const prunedMech=srsPruneMechanicalIfNeeded(user.username);
    if(prunedMech>0)console.log("[SRS] pruned",prunedMech,"mechanical cards for",user.username);
    const prunedMech2=srsPruneMechanicalRound2IfNeeded(user.username);
    if(prunedMech2>0)console.log("[SRS] round-2 pruned",prunedMech2,"mechanical cards for",user.username);
    // One-shot pruner for *hoye* and *mohoye* nouns retired from the L59
    // course (May 2026). The verb forms *hoyu* and *mohoyu* are now the
    // taught headwords; the noun forms remain in DICTIONARY_RAW for
    // searchability but are excluded from SRS. Existing L59-completers may
    // have lingering noun cards from the previous V structure — this kills
    // them. Their *hoyu* / *mohoyu* verb cards are preserved (already exist).
    // See DECISIONS.md "*hoye* / *mohoye* nouns retired from the course".
    const prunedHoyeMohoye=srsPruneHoyeMohoyeNounsIfNeeded(user.username);
    if(prunedHoyeMohoye>0)console.log("[SRS] pruned",prunedHoyeMohoye,"retired hoye/mohoye noun cards for",user.username);
    // One-shot targeted reset for user "LondonGP" — wipes his deck and
    // re-enrolls from current LESSONS ∩ lessonsCompleted. No-op for everyone
    // else. See srsResetLondonGpIfNeeded for full rationale.
    await srsResetLondonGpIfNeeded(user.username,user,LESSONS,V,DICTIONARY_RAW);
  }catch(e){console.warn("[SRS] cloud sync/backfill/migration failed:",e);}
  // Attach realtime listener so a reset on another device propagates live
  // to this open session. Wipe-only scope; see srsAttachCloudListener.
  srsAttachCloudListener(user.username);
  state.screen="home";
  renderApp();
  fetchLeaderboard().then(lb=>{state.leaderboard=lb;renderApp();});
}

// ═══════════════════════════════════════════════════════════════
// SRS ENGINE — spaced repetition for vocabulary retention
// ═══════════════════════════════════════════════════════════════
// Storage layout (localStorage, prefixed lw_srs_):
//   lw_srs_<username>_cards = { "<cardId>": {ease, interval, due, reps, lapses, dir, lw, en, pos, addedAt} }
//   lw_srs_<username>_state = { lastReviewDate, sessionXP, sessionDate, backfilled }
// Card id format: "<lw>::<dir>"  where dir is "lw_en" or "en_lw"
// Algorithm: SM-2 variant (FSRS-flavored — simpler, well-tested)

// ─── Constants ────────────────────────────────────────────────
const SRS_PARTICLE_SKIP = new Set(["ki","wa","wu","mai","lai"]);

// SRS_GLOSS_OVERRIDES — small declarative override map for SRS-specific gloss
// reinforcement. Used when a particle's lexical pairing alone is insufficient
// for retention (typically: grammar-loaded particles whose meaning depends on
// placement). The DICTIONARY_RAW canonical gloss is preserved for the in-app
// dictionary search; only SRS cards show the placement-cued version. Looked
// up in srsExtractLessonWords (at enrollment) and srsBuildVGlossMap (at
// queue-build, so existing user decks regloss automatically). Scoped narrowly
// — not a general-purpose gloss override system. See DECISIONS.md SRS section.
const SRS_GLOSS_OVERRIDES = {
  "ata":   "more than (after adj.)",
  "ala":   "as ___ as (after adj.)",
  "apa":   "the most (before adj.)",
  "moata": "less than (after adj.)",
  "moapa": "the least (before adj.)",
  "vi":    "if (before clause)",
  "nalai": "because (particle, before/after clause)",
  "file":  "until (before clause)",
  "mavi":  "although (before clause)",
  "maivi": "unless (before/after clause)",
  // A3 (Unit 17): the case-that marker — placement determines reading.
  "lai":   "that / who / which (after noun=relative, after verb=complement)",
  // A4 (Unit 18): spatial particles — placement and pairing patterns.
  "niwa":  "between (takes two args joined by sho)",
  "voi":   "around (encircles single arg)",
  "moso":  "away from (motion, not static origin)",
  // A8 (Unit 22): relational particle "for".
  "na":    "for (particle, post-noun: X na Y = X for Y)",
};

const SRS_INITIAL_EASE = 2.5;
const SRS_MIN_EASE = 1.3;
const SRS_NEW_INTERVAL_GOOD = 1;       // days
const SRS_NEW_INTERVAL_EASY = 3;       // days
const SRS_AGAIN_INTERVAL_MIN = 1/1440; // ~1 minute, in days
const SRS_HARD_FAIL_INTERVAL = 10/1440; // ~10 min for "I forgot"
const SRS_HARD_INTERVAL_MULT = 1.2;
const SRS_EASY_BONUS = 1.3;
const SRS_DAILY_NEW_SOFT_CAP = 10;
const SRS_DAILY_REVIEW_SOFT_CAP = 100;
const SRS_XP_PER_CARD = 1;
const SRS_XP_SESSION_CAP = 30;

// ─── Storage helpers ─────────────────────────────────────────
function srsStoreKey(username){return "lw_srs_"+username+"_cards";}
function srsStateKey(username){return "lw_srs_"+username+"_state";}
function srsLoadCards(username){
  if(!username)return{};
  return loadLocal(srsStoreKey(username),{});
}
function srsSaveCards(username,cards){
  if(!username)return;
  saveLocal(srsStoreKey(username),cards);
}
function srsLoadState(username){
  if(!username)return{lastReviewDate:null,sessionXP:0,sessionDate:null,backfilled:false};
  return loadLocal(srsStateKey(username),{lastReviewDate:null,sessionXP:0,sessionDate:null,backfilled:false});
}
function srsSaveState(username,s){
  if(!username)return;
  saveLocal(srsStateKey(username),s);
}

// ─── Firebase sync ───────────────────────────────────────────
// Local-first: every change writes to localStorage immediately, then async
// to Firebase. Firebase IDs use the same fbKey() escaping as user data.
// Card paths use the literal "::" separator in card IDs (Firebase allows
// this in path segments). Conflict resolution: last-write-wins.

function srsCardFbPath(username,cardId){
  // Firebase paths can't contain ".", "#", "$", "/", "[", or "]".
  // Card IDs are like "waimo::lw_en" — colons are fine, no escape needed.
  return "users/"+fbKey(username)+"/srs/cards/"+cardId;
}
function srsStateFbPath(username){
  return "users/"+fbKey(username)+"/srs/state";
}

// Fire-and-forget sync of a single card (called after each rating).
function srsSyncCard(username,cardId,card){
  if(!firebaseReady||!db||!username)return;
  try{
    db.ref(srsCardFbPath(username,cardId))
      .set({...card,lastSync:Date.now()})
      .catch(e=>console.warn("[SRS] sync card error:",e));
  }catch(e){console.warn("[SRS] sync card error:",e);}
}

// Fire-and-forget sync of state (called after backfill, migration, XP award).
function srsSyncState(username,s){
  if(!firebaseReady||!db||!username)return;
  try{
    db.ref(srsStateFbPath(username))
      .set({...s,lastSync:Date.now()})
      .catch(e=>console.warn("[SRS] sync state error:",e));
  }catch(e){console.warn("[SRS] sync state error:",e);}
}

// Pull the entire SRS subtree from Firebase. Used on login. Returns
// {cards, state} or null if Firebase has no data for this user.
async function srsPullFromCloud(username){
  if(!firebaseReady||!db||!username)return null;
  try{
    const snap=await db.ref("users/"+fbKey(username)+"/srs").once("value");
    if(!snap.exists())return null;
    const data=snap.val()||{};
    return {
      cards:data.cards||{},
      state:data.state||null
    };
  }catch(e){
    console.warn("[SRS] pull error:",e);
    return null;
  }
}

// Merge cloud cards into the local deck. For each card, the side with the
// later lastSync (or due, as fallback) wins. Returns count of cards updated.
function srsMergeCloudCards(localCards,cloudCards){
  let changes=0;
  for(const id in cloudCards){
    const cloud=cloudCards[id];
    const local=localCards[id];
    if(!local){
      // New from cloud — adopt directly
      localCards[id]=cloud;
      changes++;
      continue;
    }
    // Both sides exist; pick the more recent
    const cloudT=cloud.lastSync||cloud.due||0;
    const localT=local.lastSync||local.due||0;
    if(cloudT>localT){
      localCards[id]=cloud;
      changes++;
    }
  }
  return changes;
}

// ─── Stale-card pruning ─────────────────────────────────────
// When a Liru form is removed from the dictionary (e.g., a strained verb form
// dropped during cleanup), any existing SRS cards for that form become stale.
// Their stored gloss reflects the old definition and shouldn't keep appearing
// for review.
//
// Rule: a card is stale if card.lw is not present in DICTIONARY_RAW. Phrases
// with spaces (e.g. "wule oihi") aren't enrolled as cards, so the simple
// single-word forms-set is sufficient.
//
// This runs at two points (defense in depth):
//   1. After srsMergeCloudCards on login — catches cards that came from cloud
//      after a dictionary change shipped.
//   2. At the start of srsBuildQueue — catches cards that became stale
//      between syncs (e.g., user has the new app but Firebase still has stale
//      cards from another device).
//
// Pruning is destructive: removed from local storage AND Firebase. Last-write-
// wins means a stale device that re-syncs a card back will get pruned again
// next time an updated device runs.
function srsValidFormsSet(){
  const s=new Set();
  for(const e of DICTIONARY_RAW){if(e&&e.lw)s.add(e.lw);}
  return s;
}
function srsPruneStaleCards(cards,validForms){
  const prunedIds=[];
  for(const id in cards){
    const c=cards[id];
    if(!c||!c.lw||!validForms.has(c.lw)){
      prunedIds.push(id);
      delete cards[id];
    }
  }
  return prunedIds;
}
function srsPruneAndSync(username,cards){
  if(!username||!cards)return 0;
  const validForms=srsValidFormsSet();
  const prunedIds=srsPruneStaleCards(cards,validForms);
  if(prunedIds.length===0)return 0;
  srsSaveCards(username,cards);
  // Delete from Firebase. Fire-and-forget; if it fails, the next prune will
  // catch the same stale cards again from cloud.
  if(firebaseReady&&db){
    for(const id of prunedIds){
      try{db.ref(srsCardFbPath(username,id)).remove();}
      catch(e){/* ignore — local is authoritative until next sync */}
    }
  }
  console.log("[SRS] pruned",prunedIds.length,"stale cards for",username,prunedIds);
  return prunedIds.length;
}

// ─── Stale-gloss refresh ─────────────────────────────────────
// When a gloss is updated in V (e.g., "to do ill" → "to do wrong"), existing
// SRS cards still show the old gloss because each card's `en` is copied in at
// creation time and never re-read. This pass walks every card and rewrites
// any stored `en` that doesn't match the current canonical gloss.
//
// Refresh source: V (the lesson vocabulary array). Per project convention V
// carries the teaching gloss (often shorter/clearer than DICTIONARY_RAW's
// reference gloss); cards should match what the learner saw at lesson time.
// If a card's `lw` isn't found in V (anomalous), the card is left alone —
// stale-form pruning would have already caught it if its lw was deleted.
//
// Fires after srsPruneAndSync at both call sites (login + queue build).
function srsBuildVGlossMap(){
  // Walk V (which is { lessonKey: [entry, entry, ...] }) and collect every
  // gloss as { lw -> en }. Canvas adj/v derived forms each contribute their
  // own row; plural forms contribute their own. On collision, last write wins
  // (V is the canonical teaching layer; collisions across lessons should
  // already be cleaned up by preflight's duplicate check).
  // Mechanical-tagged forms are excluded — they should never be SRS cards,
  // so their glosses don't belong in the refresh map.
  //
  // Fallback layer: after V is walked, walk DICTIONARY_RAW and add any form
  // that V did not register. This is the only source of glosses for
  // sentence-lesson tokens that have SRS cards but no vocab V entry (e.g.,
  // pronouns and possessives like *veo*, *veoa*; modals like *shihu*; or
  // any other form first encountered as a sentence-only token). Without
  // this fallback, those cards become permanently stuck on whatever gloss
  // DICTIONARY_RAW had at enrollment time, and dictionary regloss edits
  // never propagate to existing decks. V still wins on collisions, and
  // any lw that V explicitly mechanical-tagged is also excluded from the
  // DICTIONARY_RAW fallback — preserving the original mechanical-exclusion
  // intent (mechanical forms should never have refreshable cards).
  // See DECISIONS.md SRS section "Sentence-only form gloss refresh."
  const map=new Map();
  const mechanicalLws=new Set();
  if(typeof V==="undefined"||!V)return map;
  for(const key in V){
    const entries=V[key];
    if(!Array.isArray(entries))continue;
    for(const ent of entries){
      if(!ent||!ent.lw)continue;
      // Skip sentence-style entries where lw is an array of tokens
      if(Array.isArray(ent.lw))continue;
      if(ent.tier==="mechanical")mechanicalLws.add(ent.lw);
      else if(typeof ent.en==="string")map.set(ent.lw,ent.en);
      if(ent.canvas){
        if(ent.canvas.adj){
          if(ent.canvas.adj_tier==="mechanical")mechanicalLws.add(ent.canvas.adj);
          else if(typeof ent.canvas.adj_en==="string")map.set(ent.canvas.adj,ent.canvas.adj_en);
        }
        if(ent.canvas.v){
          if(ent.canvas.v_tier==="mechanical")mechanicalLws.add(ent.canvas.v);
          else if(typeof ent.canvas.v_en==="string")map.set(ent.canvas.v,ent.canvas.v_en);
        }
      }
      if(ent.plural&&typeof ent.plural_en==="string")map.set(ent.plural,ent.plural_en);
    }
  }
  // DICTIONARY_RAW fallback for sentence-only tokens.
  // Skip lws V mechanical-tagged — those shouldn't be refreshable.
  if(typeof DICTIONARY_RAW!=="undefined"&&Array.isArray(DICTIONARY_RAW)){
    for(const d of DICTIONARY_RAW){
      if(!d||!d.lw||typeof d.en!=="string")continue;
      if(map.has(d.lw))continue;
      if(mechanicalLws.has(d.lw))continue;
      map.set(d.lw,d.en);
    }
  }
  // SRS_GLOSS_OVERRIDES — last-write-wins overlay. Applied after V and
  // DICTIONARY_RAW so overrides always win regardless of which layer
  // contributed the form's previous gloss. This is what causes an existing
  // user's *ata* card (enrolled before overrides existed) to regloss to
  // "more than (after adj.)" on next login. See SRS_GLOSS_OVERRIDES definition
  // near SRS constants for the full rationale.
  if(typeof SRS_GLOSS_OVERRIDES!=="undefined"){
    for(const lw in SRS_GLOSS_OVERRIDES){
      if(mechanicalLws.has(lw))continue;
      map.set(lw,SRS_GLOSS_OVERRIDES[lw]);
    }
  }
  return map;
}
function srsRefreshGlosses(cards,glossMap){
  // Walk cards; rewrite card.en if the V gloss has drifted. Returns array of
  // refreshed card IDs (for sync). Cards whose lw isn't in glossMap are
  // skipped (can't refresh against an unknown source).
  const refreshedIds=[];
  for(const id in cards){
    const c=cards[id];
    if(!c||!c.lw)continue;
    const canonical=glossMap.get(c.lw);
    if(canonical===undefined)continue;
    if(c.en!==canonical){
      c.en=canonical;
      refreshedIds.push(id);
    }
  }
  return refreshedIds;
}
function srsRefreshAndSync(username,cards){
  if(!username||!cards)return 0;
  const glossMap=srsBuildVGlossMap();
  if(glossMap.size===0)return 0;
  const refreshedIds=srsRefreshGlosses(cards,glossMap);
  if(refreshedIds.length===0)return 0;
  srsSaveCards(username,cards);
  // Sync refreshed cards to Firebase. Fire-and-forget. Uses the existing
  // per-card sync helper which writes the full card object including the
  // updated en.
  if(firebaseReady&&db){
    for(const id of refreshedIds){
      try{srsSyncCard(username,id,cards[id]);}
      catch(e){/* ignore — local is authoritative until next sync */}
    }
  }
  console.log("[SRS] refreshed",refreshedIds.length,"stale glosses for",username);
  return refreshedIds.length;
}

// Hard reset: wipe local + cloud SRS data. Going forward (post-Part 2),
// reset means "empty deck, full stop" — no auto-repopulation from completed
// lessons. The deckIntentionallyEmpty flag tells srsBackfillIfNeeded to
// skip self-healing on this user; the flag is cleared automatically when
// the user completes their next lesson (see srsEnrollLesson).
//
// Cloud is wiped and a fresh state with the flag set is written so that
// other devices, on their next login, will mirror the wipe (via the
// cloud→local mirror in finishLogin) and skip their own backfill.
//
// The realtime listener attached in finishLogin causes other open devices
// to mirror this wipe live, without waiting for a re-login.
async function srsResetAll(username){
  if(!username)return;
  // Local wipe
  localStorage.removeItem(srsStoreKey(username));
  localStorage.removeItem(srsStateKey(username));
  // Write fresh state. deckIntentionallyEmpty:true blocks login-time
  // backfill on this and any other device until the user completes a
  // future lesson. Other one-shot guards are also set so they don't
  // re-fire on a freshly-empty deck.
  const freshState={
    backfilled:true,
    deckIntentionallyEmpty:true,
    addedAtMigrationDone:true,
    mechanicalPruneDone:true,
    mechanicalPruneRound2Done:true,
    kauheToMouleyaheDone:true,
    leyeToToneDone:true,
    londonGpResetDone:true,
  };
  srsSaveState(username,freshState);
  // Cloud wipe (await the remove so the subsequent state write is unambiguous).
  if(firebaseReady&&db){
    try{
      await db.ref("users/"+fbKey(username)+"/srs").remove();
      // After removal, set the state subtree explicitly so other devices
      // picking up the change on next login see a fresh, post-reset state
      // (rather than treating the missing subtree as "first-time user" and
      // running their own backfill). Cards subtree stays absent → empty deck.
      await db.ref("users/"+fbKey(username)+"/srs/state").set({...freshState,lastSync:Date.now()});
    }
    catch(e){console.warn("[SRS] cloud reset error:",e);}
  }
}

// ─── Card creation ──────────────────────────────────────────
function srsMakeCard(lw,en,pos,dir){
  return {
    lw,en,pos,dir,
    ease:SRS_INITIAL_EASE,
    interval:0,           // 0 = new, never reviewed
    due:Date.now(),       // due immediately when new
    reps:0,
    lapses:0,
    addedAt:Date.now()
  };
}
function srsCardId(lw,dir){return lw+"::"+dir;}

// Add a (lw, en, pos) triplet to the deck in both directions if not already present.
// addedAtBase is an optional override for backfill ordering — allows callers to
// assign deterministic ordering (lower = earlier in study order). Returns count
// of cards actually added.
function srsAddWord(cards,lw,en,pos,addedAtBase){
  if(!lw||!en)return 0;
  let added=0;
  ["lw_en","en_lw"].forEach(dir=>{
    const id=srsCardId(lw,dir);
    if(!cards[id]){
      cards[id]=srsMakeCard(lw,en,pos,dir);
      if(typeof addedAtBase==="number")cards[id].addedAt=addedAtBase;
      added++;
    }
  });
  return added;
}

// ─── Lesson → words extraction ───────────────────────────────
// Given a lesson object and the V map, return an array of {lw, en, pos}
// representing every word that should enroll for SRS.
function srsExtractLessonWords(lesson,V,DICTIONARY_RAW){
  if(!lesson||lesson.isReview||lesson.isCheckpoint)return [];
  const vKey=lesson.vocabKey;
  if(!vKey||vKey==="_review")return [];
  const entries=V[vKey];
  if(!entries||!Array.isArray(entries))return [];

  const out=[];
  if(lesson.isSentence){
    // Sentence lessons — tokenize each sentence and add each unique content word.
    const dictLookup={};
    for(const d of DICTIONARY_RAW){dictLookup[d.lw]=d;}
    const seen=new Set();
    for(const ent of entries){
      if(!Array.isArray(ent.lw))continue;
      for(const tok of ent.lw){
        const lwLower=String(tok).toLowerCase().replace(/[.,!?]/g,"");
        if(seen.has(lwLower))continue;
        seen.add(lwLower);
        if(SRS_PARTICLE_SKIP.has(lwLower))continue;
        // Look up base form (handle inflections: -ea plural, -eo possessive, -eoa plural-poss)
        let base=lwLower;
        if(!dictLookup[base]){
          // try stripping plural/possessive endings
          if(base.endsWith("eoa")&&dictLookup[base.slice(0,-2)])base=base.slice(0,-2);
          else if(base.endsWith("eo")&&dictLookup[base.slice(0,-1)])base=base.slice(0,-1);
          else if(base.endsWith("ea")&&dictLookup[base.slice(0,-1)])base=base.slice(0,-1);
        }
        const d=dictLookup[base];
        if(!d)continue;          // unknown token; skip
        if(d.pos==="particle"&&SRS_PARTICLE_SKIP.has(d.lw))continue;
        // Skip purely-structural particles even if not in skip set above (defensive)
        // SRS_GLOSS_OVERRIDES: substitute placement-cued gloss for forms whose
        // dictionary gloss is too abstract to drill in isolation (e.g., comparison
        // particles, where placement is the actual grammar payload).
        const enForCard = SRS_GLOSS_OVERRIDES[d.lw] || d.en;
        out.push({lw:d.lw,en:enForCard,pos:d.pos});
      }
    }
  } else {
    // Vocab lessons — enroll the base + canvas forms + plural form.
    // Mechanical-tagged forms (e.g., participial adjectives like *hali* "going",
    // *kosi* "obtained") are excluded — they exist as legal Liru forms in the
    // dictionary but invite usage errors when shown as standalone flashcards.
    // See DesignNotes.md "Mechanical tag" / DECISIONS.md SRS section.
    for(const ent of entries){
      if(!ent.lw||Array.isArray(ent.lw))continue;
      if(ent.tier!=="mechanical"){
        const enForCard = SRS_GLOSS_OVERRIDES[ent.lw] || ent.en;
        out.push({lw:ent.lw,en:enForCard,pos:ent.pos||"n"});
      }
      if(ent.canvas){
        if(ent.canvas.adj&&ent.canvas.adj_tier!=="mechanical"){
          const adjEn = SRS_GLOSS_OVERRIDES[ent.canvas.adj] || ent.canvas.adj_en;
          out.push({lw:ent.canvas.adj,en:adjEn,pos:"adj"});
        }
        if(ent.canvas.v&&ent.canvas.v_tier!=="mechanical"){
          const vEn = SRS_GLOSS_OVERRIDES[ent.canvas.v] || ent.canvas.v_en;
          out.push({lw:ent.canvas.v,en:vEn,pos:"v"});
        }
      }
      if(ent.plural){
        const plEn = SRS_GLOSS_OVERRIDES[ent.plural] || ent.plural_en || ent.en;
        out.push({lw:ent.plural,en:plEn,pos:ent.pos||"n"});
      }
    }
  }
  // srsExtras: forms listed on the LESSONS entry (not V) that should also
  // enter the SRS deck on completion. Used by units with productive-pattern
  // content where the full instance set deserves SRS coverage even though
  // only a subset is drilled as lesson vocab (e.g., A7 routes 8 ordinals
  // and 9 month names through srsExtras while drilling only a handful).
  // Forms are looked up in DICTIONARY_RAW for canonical gloss + pos.
  // See DECISIONS.md "A7 — Numbers Beyond 10, Ordinals & Months".
  if(Array.isArray(lesson.srsExtras)&&lesson.srsExtras.length){
    const dictLookup={};
    for(const d of DICTIONARY_RAW){dictLookup[d.lw]=d;}
    const seenExtras=new Set(out.map(w=>w.lw));
    for(const extra of lesson.srsExtras){
      const lw=String(extra).toLowerCase();
      if(seenExtras.has(lw))continue;
      const d=dictLookup[lw];
      if(!d)continue;  // preflight should have caught this; defensive
      const enForCard = SRS_GLOSS_OVERRIDES[d.lw] || d.en;
      out.push({lw:d.lw,en:enForCard,pos:d.pos||"n"});
      seenExtras.add(lw);
    }
  }
  return out;
}

// ─── Enrollment ──────────────────────────────────────────────
// Called when a lesson is completed.  Adds new cards to the user's deck.
// Returns count of cards added. lessonIdx (optional) is used to derive a
// stable addedAt that puts earlier lessons before later lessons in study order.
function srsEnrollLesson(username,lesson,V,DICTIONARY_RAW,lessonIdx){
  if(!username)return 0;
  const words=srsExtractLessonWords(lesson,V,DICTIONARY_RAW);
  if(words.length===0)return 0;
  const cards=srsLoadCards(username);
  let added=0;
  // If lessonIdx wasn't provided, fall back to actual current time so live
  // enrollments still sort after any backfilled words.
  const baseTime=(typeof lessonIdx==="number")?(lessonIdx*100000):Date.now();
  for(let i=0;i<words.length;i++){
    const w=words[i];
    added+=srsAddWord(cards,w.lw,w.en,w.pos,baseTime+i);
  }
  if(added>0)srsSaveCards(username,cards);
  // If the deck was intentionally empty (post-reset), the user completing
  // a lesson signals they want progression to resume. Clear the flag so
  // future login-time self-healing backfills can run normally.
  const s=srsLoadState(username);
  if(s.deckIntentionallyEmpty){
    s.deckIntentionallyEmpty=false;
    srsSaveState(username,s);
    srsSyncState(username,s);
  }
  return added;
}

// Backfill enrollment from completed lessons. Runs both for first-time setup
// (flag never set) AND as a self-healing pass when the deck is incomplete
// relative to the user's lesson progress (flag set but cards missing —
// e.g. data was lost or never fully synced to cloud). The flag is purely
// advisory; the deck-completeness check is authoritative.
function srsBackfillIfNeeded(username,user,LESSONS,V,DICTIONARY_RAW){
  if(!username)return 0;
  const s=srsLoadState(username);
  // After a manual reset (via the gear button), the deck is intentionally
  // empty and should NOT be repopulated by self-healing backfill. The flag
  // is set in srsResetAll. Cleared by srsEnrollLesson when the user
  // completes their next lesson, so future progression resumes normally.
  if(s.deckIntentionallyEmpty)return 0;
  const completed=new Set(user.lessonsCompleted||[]);
  if(completed.size===0){
    // Mark backfilled even if there's nothing to backfill, so we don't re-check forever.
    s.backfilled=true;srsSaveState(username,s);
    return 0;
  }
  const cards=srsLoadCards(username);
  // Walk all completed lessons. Enroll any word that's missing from the deck.
  // This works whether the flag is set or not — if the deck is complete, no
  // additions happen; if it's incomplete, the missing words get enrolled.
  let added=0;
  for(let li=0;li<LESSONS.length;li++){
    const lesson=LESSONS[li];
    if(!completed.has(lesson.id))continue;
    const words=srsExtractLessonWords(lesson,V,DICTIONARY_RAW);
    const baseTime=li*100000;  // deterministic per-lesson slot
    for(let i=0;i<words.length;i++){
      const w=words[i];
      added+=srsAddWord(cards,w.lw,w.en,w.pos,baseTime+i);
    }
  }
  if(added>0||!s.backfilled)srsSaveCards(username,cards);
  s.backfilled=true;
  srsSaveState(username,s);
  // Cloud sync: push the entire deck to Firebase whenever backfill ran.
  // We do this even if added=0 because the existing local deck might not be
  // in cloud yet (e.g. user from before sync existed, or sync was never
  // completed for fresh cards). Bulk write is one Firebase op.
  if(firebaseReady&&db){
    try{
      const stamped={};
      const now=Date.now();
      for(const id in cards){stamped[id]={...cards[id],lastSync:cards[id].lastSync||now};}
      // Only push if we have cards to push (don't wipe cloud with an empty deck)
      if(Object.keys(stamped).length>0){
        db.ref("users/"+fbKey(username)+"/srs/cards").update(stamped)
          .catch(e=>console.warn("[SRS] bulk sync error:",e));
      }
    }catch(e){console.warn("[SRS] bulk sync error:",e);}
  }
  srsSyncState(username,s);
  return added;
}

// One-time migration: re-stamp addedAt on cards that were enrolled before
// the deterministic-ordering fix. Detects "old" by checking for a migration
// flag in the SRS state. Only re-stamps fresh (interval=0) cards so that
// reviewed cards' history is preserved.
function srsMigrateAddedAtIfNeeded(username,user,LESSONS,V,DICTIONARY_RAW){
  if(!username)return 0;
  const s=srsLoadState(username);
  if(s.addedAtMigrationDone)return 0;
  const completed=new Set(user.lessonsCompleted||[]);
  const cards=srsLoadCards(username);
  let restamped=0;
  // Build a (lw -> {lessonIdx, wordIdx}) map by walking lessons in order.
  const map={};
  for(let li=0;li<LESSONS.length;li++){
    const lesson=LESSONS[li];
    if(!completed.has(lesson.id))continue;
    const words=srsExtractLessonWords(lesson,V,DICTIONARY_RAW);
    for(let i=0;i<words.length;i++){
      if(!map[words[i].lw])map[words[i].lw]={lessonIdx:li,wordIdx:i};
    }
  }
  // Re-stamp every fresh card whose lw is in the map.
  for(const id in cards){
    const c=cards[id];
    if(c.interval!==0)continue;          // don't disturb scheduled cards
    const m=map[c.lw];
    if(!m)continue;
    c.addedAt=m.lessonIdx*100000+m.wordIdx;
    restamped++;
  }
  srsSaveCards(username,cards);
  s.addedAtMigrationDone=true;
  srsSaveState(username,s);
  // Cloud sync: use .update() so we don't wipe cards the cloud might have
  // that local doesn't know about.
  if(firebaseReady&&db&&restamped>0){
    try{
      const stamped={};
      const now=Date.now();
      for(const id in cards){stamped[id]={...cards[id],lastSync:cards[id].lastSync||now};}
      if(Object.keys(stamped).length>0){
        db.ref("users/"+fbKey(username)+"/srs/cards").update(stamped)
          .catch(e=>console.warn("[SRS] migration sync error:",e));
      }
    }catch(e){console.warn("[SRS] migration sync error:",e);}
  }
  srsSyncState(username,s);
  return restamped;
}

// ─── One-time mechanical-card pruner ─────────────────────────
// When the mechanical-tag filter was wired into srsExtractLessonWords and
// srsBuildVGlossMap, existing users had cards from before the filter existed —
// participial-adjective forms like *hali* "going" enrolled and glossed in a
// way that invites usage errors. This one-time pass walks every card and
// deletes any whose `lw` is mechanical-tagged in V.
//
// Gated by state.mechanicalPruneDone; runs once per user on next login,
// then never again. Safe to keep in the codebase indefinitely — the flag
// prevents repeated work, and a future user with a fresh deck just gets
// a no-op (no mechanical cards exist to prune because the filter blocks
// them at enrollment time).
function srsBuildMechanicalFormsSet(){
  const set=new Set();
  if(typeof V==="undefined"||!V)return set;
  for(const key in V){
    const entries=V[key];
    if(!Array.isArray(entries))continue;
    for(const ent of entries){
      if(!ent||Array.isArray(ent.lw))continue;
      if(ent.tier==="mechanical"&&ent.lw)set.add(ent.lw);
      if(ent.canvas){
        if(ent.canvas.adj_tier==="mechanical"&&ent.canvas.adj)set.add(ent.canvas.adj);
        if(ent.canvas.v_tier==="mechanical"&&ent.canvas.v)set.add(ent.canvas.v);
      }
    }
  }
  return set;
}
function srsPruneMechanicalIfNeeded(username){
  if(!username)return 0;
  const s=srsLoadState(username);
  if(s.mechanicalPruneDone)return 0;
  const mechSet=srsBuildMechanicalFormsSet();
  if(mechSet.size===0){
    // No mechanical forms in V (defensive). Mark done so we don't re-check.
    s.mechanicalPruneDone=true;
    srsSaveState(username,s);
    srsSyncState(username,s);
    return 0;
  }
  const cards=srsLoadCards(username);
  const prunedIds=[];
  for(const id in cards){
    const c=cards[id];
    if(c&&c.lw&&mechSet.has(c.lw)){
      prunedIds.push(id);
      delete cards[id];
    }
  }
  if(prunedIds.length>0){
    srsSaveCards(username,cards);
    if(firebaseReady&&db){
      for(const id of prunedIds){
        try{db.ref(srsCardFbPath(username,id)).remove();}
        catch(e){/* ignore — local is authoritative until next sync */}
      }
    }
    console.log("[SRS] pruned",prunedIds.length,"mechanical cards for",username,prunedIds);
  }
  s.mechanicalPruneDone=true;
  srsSaveState(username,s);
  srsSyncState(username,s);
  return prunedIds.length;
}

// ─── One-time mechanical-card pruner (round 2) ───────────────

function srsPruneMechanicalRound2IfNeeded(username){

  }

}
