  // ── UNIT 11: BODY, HEALTH, AND DAILY LIFE (L62–L67) ─────────────────
  {id:"l62_body",
   title:"Body Parts",
   desc:"Head, eye, hand, foot, arm, leg",
   icon:"🦵",
   vocabKey:"l62_body",
   xp:22,
   unit:10,
   intro:`<h3>🦵 Body parts</h3><p>Six everyday body parts. The "X-related" adjectives (<em>tuni, misi, lauhi, laupi, hemi, hipi</em>) follow predictably from the canvas rule and aren't drilled separately — focus on the nouns.</p><p>Three of the canvas verbs are useful in their own right and surface as flashcards:</p><ul><li><em>misu</em> — to look (or watch)</li><li><em>laupu</em> — to kick</li><li><em>hipu</em> — to walk</li></ul><p><strong>Look vs. see.</strong> <em>misu</em> (look) and <em>tiru</em> (see, from L8) are different verbs. <em>tiru</em> is passive perception — what your eyes register. <em>misu</em> is active directed attention — turning your eyes toward something. English blurs the two; Liru keeps them apart.</p>`},

  {id:"l63_painsickness",
   title:"Pain and Sickness",
   desc:"kufe, mosheye, sheye",
   icon:"🤒",
   vocabKey:"l63_painsickness",
   xp:22,
   unit:10,
   intro:`<h3>🤒 The sickness arc</h3><p>Three roots covering pain, illness, and recovery — each with its full canvas (noun, adjective, verb):</p><ul><li><em>kufe</em> (pain) → <em>kufi</em> (painful) → <em>kufu</em> (to hurt)</li><li><em>mosheye</em> (sickness) → <em>mosheyi</em> (sick) → <em>mosheyu</em> (to fall ill)</li><li><em>sheye</em> (health) → <em>sheyi</em> (healthy) → <em>sheyu</em> (to heal)</li></ul><p><em>mosheye</em> and <em>sheye</em> are a balancing pair — sickness and its opposite. The next lesson (L65) drills these forms in the everyday idioms <em>Ne su mosheyi</em> ("I am sick") and <em>Neo X kufu</em> ("My X hurts").</p>`},

  {id:"l64_healthcare",
   title:"Healthcare and People",
   desc:"pue, mashe, mashupue, sheyupue",
   icon:"🏥",
   vocabKey:"l64_healthcare",
   xp:22,
   unit:10,
   intro:`<h3>🏥 Person, medicine, healers</h3><p><em>pue</em> means "person" — a standalone noun. It also attaches to verb stems as a productive suffix to mean "one who does X":</p><span class="example">liru (speak) + pue → lirupue <span class="gloss">speaker / singer</span></span><span class="example">washu (travel) + pue → washupue <span class="gloss">traveler</span></span><p>Two healthcare agents follow the same rule:</p><span class="example">mashu (treat) + pue → mashupue <span class="gloss">doctor — "one who treats"</span></span><span class="example">sheyu (heal) + pue → sheyupue <span class="gloss">nurse — "one who heals"</span></span><p>Notice the verb form (<em>-u</em>) is always the first element: an agent is defined by what they <strong>do</strong>. <em>mashe</em> (medicine) is the substance itself — the noun.</p>`},

  {id:"l65_healthidioms",
   title:"Health Idioms",
   desc:"I am sick. My head hurts.",
   icon:"🩹",
   vocabKey:"l65_healthidioms",
   xp:22,
   unit:10,
   isSentence:true,
   intro:`<h3>🩹 Saying you're sick or hurt</h3><p>Liru handles two everyday health expressions through grammar you already know:</p><p><strong>"I am sick"</strong> uses the copula <em>su</em> (L7) with the predicate adjective <em>mosheyi</em> (sick):</p><span class="example">Ne su mosheyi. <span class="gloss">I am sick.</span></span><span class="example">Te su sheyi. <span class="gloss">You are healthy.</span></span><p><strong>"My X hurts"</strong> uses the possessive (L4) with a body part and the verb <em>kufu</em> (to hurt):</p><span class="example">Neo tune kufu. <span class="gloss">My head hurts.</span></span><span class="example">Teo laupe kufu. <span class="gloss">Your foot hurts.</span></span><p>Note the contrast: <em>Ne kufu</em> alone means "I hurt" or "I feel pain" generally; <em>Neo X kufu</em> specifies which body part hurts. Liru keeps the body part as the subject of the verb — there's no "I have pain in my X" construction.</p>`},

  {id:"l66_thingsactivities",
   title:"Things and Activities",
   desc:"loiwe, nauye, fauhe, hue",
   icon:"📚",
   vocabKey:"l66_thingsactivities",
   xp:22,
   unit:10,
   intro:`<h3>📚 Everyday things and activities</h3><p>Four nouns from daily life. Two carry useful canvas verbs:</p><ul><li><em>nauye</em> (game) → <em>nauyi</em> (fun) → <em>nauyu</em> (to play)</li><li><em>fauhe</em> (story) → <em>fauhu</em> (to tell a story)</li></ul><p><em>loiwe</em> (book) is a noun-only learning tool — it joins the <em>loi-</em> literacy cluster you saw in earlier units. <em>hue</em> (thing) is the general placeholder noun, and pairs with quantifiers to form indefinite pronouns: <em>saihue</em> "something," <em>faihue</em> "anything," <em>nulihue</em> "nothing," <em>taihue</em> "everything."</p>`},

  {id:"l67_exam",
   title:"Unit 11 Exam: Body, Health, and Daily Life",
   desc:"Three hearts. Show what you know.",
   icon:"✅",
   vocabKey:"l67_exam",
   xp:26,
   unit:10,
   isSentence:true,
   isCheckpoint:true,
   intro:`<h3>✅ Unit 11 Exam</h3><p>This is your Unit 11 exam. <strong>Three hearts — show what you've learned.</strong> Pass it to complete the unit.</p><p>Mixed practice across body parts, pain and sickness vocabulary, healthcare, the L65 idioms, and daily-life vocabulary — plus prior-unit grammar (possessives, copula, demonstratives, modals, locatives, plurals, ki-questions, future tense).</p>`},

  // ── UNIT 12: WEATHER AND NATURE (L68–L74) ──────────────────────────────

  {id:"l68_weather1",
   title:"Sun, Rain, Wind, Sky",
   desc:"Four core weather and nature nouns",
   icon:"☀️",
   vocabKey:"l68_weather1",
   xp:18,
   unit:11,
   intro:`<h3>☀️ Welcome to Weather and Nature</h3><p>This unit teaches everyday weather and natural-world vocabulary, plus two new locative particles for talking about position (above, below).</p><p>Four nouns to start: <em>haule</em> (sun), <em>shalire</em> (rain), <em>fiwe</em> (wind), <em>laime</em> (sky). Two of them — <em>shalire</em> and <em>fiwe</em> — also surface as verbs (<em>shaliru</em> "to rain," <em>fiwu</em> "to blow") because Liru uses these directly to describe weather: <em>shaliru</em> by itself means "it's raining."</p>`},

  {id:"l69_weather2",
   title:"Hot, Cold, Snow, Cloud",
   desc:"Temperature adjectives and more weather",
   icon:"❄️",
   vocabKey:"l69_weather2",
   xp:20,
   unit:11,
   intro:`<h3>❄️ Hot and cold; snow and cloud</h3><p>Two adjective-led pairs and two weather nouns:</p><ul><li><em>hauhe</em> (heat) → <em>hauhi</em> (hot)</li><li><em>luhe</em> (coldness) → <em>luhi</em> (cold)</li><li><em>iroume</em> (snow) → <em>iroumu</em> (to snow)</li><li><em>felume</em> (cloud)</li></ul><p>The adjective forms <em>hauhi</em> and <em>luhi</em> are the everyday teaching targets — say <em>Haule su hauhi</em> "the sun is hot" or <em>Iroume su luhi</em> "the snow is cold." The verb <em>iroumu</em> ("to snow") will be drilled in L73 with the impersonal-verb construction.</p>`},

  {id:"l70_nature",
   title:"Tree, Flower, Grass, Plant",
   desc:"Nature nouns and the forest compound",
   icon:"🌳",
   vocabKey:"l70_nature",
   xp:20,
   unit:11,
   intro:`<h3>🌳 The growing world</h3><p>Four nature nouns: <em>moule</em> (tree), <em>loshe</em> (flower), <em>foshe</em> (grass), <em>liume</em> (plant). Plus a productive compound: <em>mouleyahe</em> (forest).</p><p><em>mouleyahe</em> follows the productive-compound pattern from Grammar §19: <em>moule</em> (tree) + <em>yahe</em> (place) = "tree-place" = forest. Like <em>senehiwe</em> (school = teaching-place) and <em>kupetieme</em> (café = drink-store), it's built from parts you already know — and you can recognize others like it as you encounter them.</p><p><em>loshu</em> "to bloom" surfaces because flowers blooming is everyday vocabulary worth keeping.</p>`},

  {id:"l71_locatives",
   title:"Above and Below",
   desc:"Two new locative particles: leu and moleu",
   icon:"⬆️",
   vocabKey:"l71_locatives",
   xp:22,
   unit:11,
   isSentence:true,
   intro:`<h3>⬆️ Where things are vertically</h3><p>Liru has two more locative particles for vertical position:</p><ul><li><em>leu</em> — above, on</li><li><em>moleu</em> — below, under</li></ul><p>Like the locatives you already know (<em>ya, wo, mowo, so, fa</em> from Unit 7), these come between the subject and the place noun:</p><ul><li><em>Loshe su leu moule.</em> — The flower is on the tree.</li><li><em>Foshe su moleu moule.</em> — The grass is below the tree.</li></ul><p>Notice that <em>moleu</em> is the <em>mo-</em> derivation of <em>leu</em> — they form a balancing pair, just like <em>mowo</em> (out) balances <em>wo</em> (in).</p><p>One thing to know: Liru uses <em>leu</em> for both English "above" (when not touching) and "on" (when contacting the surface). The English gloss adapts to context, but the Liru is one word.</p>`},

  {id:"l72_dramaticweather",
   title:"Thunder, Lightning, Storm, Ocean",
   desc:"Four dramatic-weather and water nouns",
   icon:"⚡",
   vocabKey:"l72_dramaticweather",
   xp:18,
   unit:11,
   intro:`<h3>⚡ Big weather, big water</h3><p>Four dramatic nature nouns: <em>tarume</em> (thunder), <em>lunume</em> (lightning), <em>shupe</em> (storm), <em>shawome</em> (ocean).</p><p>These are taught as nouns only — Liru has verb forms for these (you can find them in the dictionary), but the everyday speech patterns lean on the noun forms with descriptive adjectives. Say <em>Shupe su shawomi</em> "the storm is oceanic" rather than trying to verb the storm.</p>`},

  {id:"l73_impersonal",
   title:"It Rains, It Snows, It's Windy",
   desc:"The impersonal-verb construction",
   icon:"🌧️",
   vocabKey:"l73_impersonal",
   xp:22,
   unit:11,
   isSentence:true,
   intro:`<h3>🌧️ Subjectless weather</h3><p>In English, we say "it's raining" — but the "it" doesn't refer to anything. It's a placeholder. Liru handles this differently: it just drops the placeholder.</p><ul><li><em>Shaliru.</em> — It is raining. <em>(literally: "rains.")</em></li><li><em>Iroumu.</em> — It is snowing.</li><li><em>Fiwu.</em> — It is windy.</li></ul><p>The verb stands alone. Tense particles work the same as with any verb:</p><ul><li><em>Wa shaliru.</em> — It rained.</li><li><em>Wu iroumu wuhi.</em> — It will snow soon.</li></ul><p>And time anchors slot in naturally:</p><ul><li><em>Shaliru lo lawe.</em> — It is raining today.</li><li><em>Wa fiwu wa lawe.</em> — It was windy yesterday.</li></ul>`},

  {id:"l74_exam",
   title:"Unit 12 Exam: Weather and Nature",
   desc:"Three hearts. Show what you know.",
   icon:"✅",
   vocabKey:"l74_exam",
   xp:26,
   unit:11,
   isSentence:true,
   isCheckpoint:true,
   intro:`<h3>✅ Unit 12 Exam</h3><p>This is your Unit 12 exam. <strong>Three hearts — show what you've learned.</strong> Pass it to complete the unit.</p><p>Mixed practice across weather and nature vocabulary, the new locative particles (<em>leu</em>, <em>moleu</em>), and the impersonal-verb construction — plus prior-unit grammar (possessives, demonstratives, plurals, conjunctions, ki-questions, tense).</p>`},

  // ── UNIT 13: THIS AND THAT (L75–L80) ──────────────────────────────────
  // Descriptive vocabulary, common verbs, household objects.
  // No coinages, no new grammar (the new clause-coordination rule per
  // Grammar.md §10 is implicit in L80's exam sentences but not taught
  // explicitly via an intro card).

  {id:"l75_bigsmall",
   title:"Big and Small, Old and New, Beautiful and Ugly",
   desc:"piami, mopiami, nohi, monohi, wauli, mowauli",
   icon:"🌸",
   vocabKey:"l75_bigsmall",
   xp:20,
   unit:12,
   intro:`<h3>🌸 Describing Things</h3><p>So far you've learned to say what things are (a dog, a friend) and where they are (in the room, at home). Now you'll learn to describe them.</p><p>Liru describes things using <strong>adjective + noun</strong>, with the adjective coming <strong>before</strong> the noun:</p><span class="example">piami paipe <span class="gloss">a small dog</span></span><p>Or with the copula <em>su</em> to make a full sentence:</p><span class="example">Lo paipe su piami. <span class="gloss">This dog is small.</span></span><p>Three pairs in this lesson all use the <em>mo-</em> balancing rule from Unit 4:</p><ul><li><em>piami</em> (small) ↔ <em>mopiami</em> (big)</li><li><em>nohi</em> (new) ↔ <em>monohi</em> (old)</li><li><em>wauli</em> (beautiful) ↔ <em>mowauli</em> (ugly)</li></ul>`},

  {id:"l76_easyhardsmart",
   title:"Easy and Hard, Soft and Hard, Smart",
   desc:"teuhi, moteuhi, peri, moperi, yashi",
   icon:"💡",
   vocabKey:"l76_easyhardsmart",
   xp:18,
   unit:12,
   intro:`<h3>💡 More Adjectives</h3><p>Three more describing words. Two are <em>mo-</em> pairs like the ones you just learned; the third stands alone.</p><ul><li><em>teuhi</em> (easy) ↔ <em>moteuhi</em> (difficult)</li><li><em>peri</em> (soft) ↔ <em>moperi</em> (hard)</li><li><em>yashi</em> (smart, clever)</li></ul><p>Note: English uses <strong>hard</strong> for two different ideas — <em>moteuhi</em> is "hard" as in difficult, and <em>moperi</em> is "hard" as in not soft. Liru keeps these separate.</p>`},

  {id:"l77_holdgive",
   title:"To Hold and To Drop, To Get and To Let Go",
   desc:"kahu, mokahu, kosu, mokosu",
   icon:"✋",
   vocabKey:"l77_holdgive",
   xp:16,
   unit:12,
   intro:`<h3>✋ Holding and Getting</h3><p>Four verbs about possession.</p><ul><li><em>kahu</em> (to hold, carry) — <em>mokahu</em> (to drop)</li><li><em>kosu</em> (to get, obtain) — <em>mokosu</em> (to let go)</li></ul>`},

  {id:"l78_cognitiveopen",
   title:"To Remember, To Forget, To Think, To Open, To Close",
   desc:"meru, momeru, piru, poyu, mopoyu",
   icon:"🧠",
   vocabKey:"l78_cognitiveopen",
   xp:18,
   unit:12,
   intro:`<h3>🧠 Cognitive and Action Verbs</h3><p>Five more verbs that come up in everyday speech.</p><ul><li><em>meru</em> (to remember) ↔ <em>momeru</em> (to forget)</li><li><em>piru</em> (to think)</li><li><em>poyu</em> (to open) ↔ <em>mopoyu</em> (to close)</li></ul>`},

  {id:"l79_athome",
   title:"Things at Home",
   desc:"seme, pahe, koire, voure, tiere, neule",
   icon:"🏠",
   vocabKey:"l79_athome",
   xp:20,
   unit:12,
   intro:`<h3>🏠 Common Objects</h3><p>Six everyday things — three around your home, three modern devices.</p><p><em>koire</em>, <em>voure</em>, <em>tiere</em>, and <em>neule</em> are recent additions to Liru's lexicon — the language treats modern technology with the same simple noun patterns as anything else. There's no special "tech" vocabulary register.</p>`},

   title:"Unit 13 Exam: This and That",

  // ──────────────── UNIT 14 — Asking for Help; Final Review ────────────────

  {id:"l81_pleasehelp",
   title:"Please, Help, Understand",
   desc:"moa, sove, sovu, yeihu, moyeihi",
   icon:"🙏",
   vocabKey:"l81_pleasehelp",
   xp:20,
   unit:13,
   intro:`<h3>🙏 The most useful words a learner has</h3><p>Five forms that unlock real conversation: <em>moa</em> ("please") finally lands here — you've been waiting for it since Unit 1.</p><p>Two help-words from one root: <em>sove</em> is the noun ("help"), <em>sovu</em> is the verb ("to help"). Use whichever fits the sentence.</p><p><em>yeihu</em> is the verb "to understand." Its <em>mo-</em> partner shows up as <em>moyeihi</em> (adj. "confused") — the form you reach for when describing yourself: <em>Ne su moyeihi</em>.</p>`},

  {id:"l82_repeatslow",
   title:"Repeat, Slow, Clear, Language, Learn",
   desc:"weliru, mosairi, paili, iwuhe, mauhu",
   icon:"🐢",
   vocabKey:"l82_repeatslow",
   xp:20,
   unit:13,
   intro:`<h3>🐢 Slow down and learn</h3><p>Five more useful forms. <em>weliru</em> ("to repeat") is a verb-only entry. <em>mosairi</em> works as both adjective and adverb — "slow" and "slowly."</p><p><em>paili</em> describes water that runs clear, but works for anything that's clear in shape or meaning. <em>iwuhe</em> is the noun "language" — the meta-vocabulary every learner needs.</p><p>And <em>mauhu</em> — "to learn." The verb you've been doing all along.</p>`},

  {id:"l83_askinghelp",
   title:"Asking for Help",
   desc:"the phrases a learner reaches for",
   icon:"💬",
   vocabKey:"l83_askinghelp",
   xp:20,
   unit:13,
   isSentence:true,
   intro:`<h3>💬 Asking for Help</h3><p>This lesson teaches the phrases a Liru learner uses most: asking for help, saying you don't understand, asking for repetition.</p><p><em>Moa</em> ("please") usually goes at the end of a request, after a comma. <em>Sovu</em> is the verb "to help" — the noun <em>sove</em> means "help" itself.</p>`},

  // ── UNIT 15 (A1): COMPARATIVES & SUPERLATIVES (L85–L88) ──────────────
  // First advanced-track unit. Teaches the comparison particles ata (more than),
  // ala (as ___ as), apa (most), moata (less than), moapa (least).
  // See advanced_track_plan.md §4 for unit scope.

  {id:"l85_comparison_basics",
   title:"More than, As ___ as",
   desc:"Comparing two things with ata and ala",
   icon:"⚖️",
   vocabKey:"l85_comparison_basics",
   xp:22,
   unit:14,
   isSentence:true,
   intro:`<h3>⚖️ Comparing two things</h3><p>Liru compares things by placing a small particle next to an adjective.</p><p>To say <em>more than</em>, put <em>ata</em> <em>after</em> the adjective:</p><span class="example">Mawe su <strong>wauli ata</strong> pawe. <span class="gloss">Mother is more beautiful than father.</span></span><p>To say <em>as ___ as</em> (equal), put <em>ala</em> in the same spot:</p><span class="example">Yoye su <strong>houli ala</strong> loye. <span class="gloss">Sister is as happy as brother.</span></span><p>The pattern is always: <strong>[subject] su [adjective] ata/ala [comparison]</strong>. The particle hugs the adjective from behind — never before it.</p>`},

  {id:"l86_superlative_apa",
   title:"The Most",
   desc:"Superlatives with apa and apa fa",
   icon:"🏆",
   vocabKey:"l86_superlative_apa",
   xp:22,
   unit:14,
   isSentence:true,
   intro:`<h3>🏆 The most ___</h3><p><em>apa</em> means "the most." Unlike <em>ata</em> and <em>ala</em>, <em>apa</em> goes <em>before</em> the adjective:</p><span class="example">Neo mawe su <strong>apa wauli</strong>. <span class="gloss">My mother is the most beautiful.</span></span><p>Watch the placement carefully — it's the reverse of last lesson:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><td style="padding:4px 12px;color:var(--dim)"><em>ata, ala</em></td><td style="padding:4px 12px">go <strong>after</strong> the adjective</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>apa</em></td><td style="padding:4px 12px">goes <strong>before</strong> the adjective</td></tr></table><p>To say <em>the most ___ of [group]</em>, add <em>fa</em> (of) plus the group:</p><span class="example">Yuna su <strong>apa houli fa</strong> neo wahe. <span class="gloss">Yuna is the happiest of my family.</span></span><p>You already know <em>fa</em> from Unit 7 (where it meant "from"). Here it does double duty as "of [a set]."</p>`},

  {id:"l87_mo_comparison",
   title:"Less than, Least",
   desc:"The mo- counterparts: moata and moapa",
   icon:"🔻",
   vocabKey:"l87_mo_comparison",
   xp:22,
   unit:14,
   isSentence:true,
   intro:`<h3>🔻 Less than, the least</h3><p>You already know the <em>mo-</em> prefix from across the course — it creates the balancing counterpart of a word (<em>houli</em> → <em>mohouli</em>, <em>nawu</em> → <em>monawu</em>). The same pattern works on the comparison particles:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><td style="padding:4px 12px;color:var(--dim)"><em>ata</em> (more than)</td><td style="padding:4px 12px">→</td><td style="padding:4px 12px"><strong>moata</strong> (less than)</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>apa</em> (the most)</td><td style="padding:4px 12px">→</td><td style="padding:4px 12px"><strong>moapa</strong> (the least)</td></tr></table><p>Placement is identical to their positive counterparts: <em>moata</em> goes after the adjective, <em>moapa</em> goes before.</p><span class="example">Mewe su <strong>moata yashi ata</strong> paipe. <span class="gloss">The cat is less smart than the dog.</span></span><span class="example">Lo nauye su <strong>moapa nauyi</strong>. <span class="gloss">This game is the least fun.</span></span><p style="color:var(--mid);font-size:13px;font-style:italic;margin-top:14px">Note: there's no <em>moala</em>. Equality doesn't have a "less equal" counterpart — if two things aren't equal, you'd use <em>moata</em> or <em>ata</em> instead.</p>`},

  // ── UNIT 16 (A2): CONDITIONAL & CAUSAL CONJUNCTIONS (L89–L94) ────────
  // Second advanced-track unit. Teaches vi (if), nalae/nalai/nalau
  // (reason/because/to cause), file (until), mavi (although), maivi (unless).
  // Mix of 2 vocab lessons (A20 verbs paired with the conjunctions) + 3
  // sentence-based teaching lessons + 1 unit exam.
  // See advanced_track_plan.md §4 for unit scope.

  {id:"l89_vocab_decision_attempt",
   title:"Try and Decide",
   desc:"shame (try) and seuhe (decide)",
   icon:"🤔",
   vocabKey:"l89_vocab_decision_attempt",
   xp:20,
   unit:15,
   intro:`<h3>🤔 Two verbs for what we want and where we land</h3><p>Two everyday roots with full canvas — noun, adjective, verb. The verb forms are the workhorses, but each root carries an adjective form learners will see in the wild too:</p><ul><li><em>shame</em> (attempt) → <em>shami</em> (attempted) → <em>shamu</em> (to try)</li><li><em>seuhe</em> (decision) → <em>seuhi</em> (decided) → <em>seuhu</em> (to decide / to choose)</li></ul><p><em>shamu</em> and <em>seuhu</em> stack with modals just like any verb:</p><span class="example">Ne wanu shamu. <span class="gloss">I want to try.</span></span><span class="example">Te sahu seuhu. <span class="gloss">You can decide.</span></span><p>You'll meet these again next lesson — they're natural partners for <em>vi</em> "if."</p>`},

  {id:"l90_conditional_vi",
   title:"If — vi",
   desc:"Conditional clauses with vi",
   icon:"🔀",
   vocabKey:"l90_conditional_vi",
   xp:22,
   unit:15,
   isSentence:true,
   intro:`<h3>🔀 If — <em>vi</em></h3><p>Liru joins two clauses with the particle <em>vi</em> to make a conditional: <strong>if X, then Y</strong>. The clause that <em>vi</em> introduces is the condition; the other clause is the result.</p><p>The <em>vi</em>-clause can come first:</p><span class="example">Vi te halu, ne wu halu. <span class="gloss">If you go, I will go.</span></span><p>Or last:</p><span class="example">Ne wu halu, vi te halu. <span class="gloss">I will go, if you go.</span></span><p>Both orders are common. English shows the split with a comma — Liru just lets the conjunction do the work.</p><p>Mixing tenses is natural — the condition and the result can sit in different time zones:</p><span class="example">Vi te wa vanu, Maya wu su houli. <span class="gloss">If you came, Maya will be happy.</span></span><p>And negation works as expected — put <em>mai</em> wherever it belongs:</p><span class="example">Vi shaliru, ne mai wu halu. <span class="gloss">If it rains, I will not go.</span></span>`},

  {id:"l91_vocab_finish_wait",
   title:"Finish and Wait",
   desc:"toye (finish) and loime (wait)",
   icon:"⏳",
   vocabKey:"l91_vocab_finish_wait",
   xp:20,
   unit:15,
   intro:`<h3>⏳ Two verbs for time and completion</h3><p>Two more full-canvas roots — these come up constantly in everyday speech, and both pair naturally with <em>file</em> "until" in the next sentence lesson:</p><ul><li><em>toye</em> (end) → <em>toyi</em> (finished) → <em>toyu</em> (to finish / to end)</li><li><em>loime</em> (wait) → <em>loimi</em> (waiting) → <em>loimu</em> (to wait)</li></ul><p><em>toyu</em> can be intransitive ("I finish") or transitive ("I finish the book"):</p><span class="example">Ne wa toyu. <span class="gloss">I finished.</span></span><span class="example">Ne wa toyu lo loiwe. <span class="gloss">I finished this book.</span></span><p><em>loimu</em> typically takes a complement clause — "wait until X" or "wait for X." Liru handles "wait until" with <em>file</em>, which you'll learn in L93.</p>`},

  {id:"l92_causal_nalae",
   title:"Because — nalai",
   desc:"Causes, reasons, and to cause",
   icon:"➡️",
   vocabKey:"l92_causal_nalae",
   xp:24,
   unit:15,
   isSentence:true,
   intro:`<h3>➡️ Because — <em>nalai</em> (and family)</h3><p>The <em>nalae</em> root carries the whole cause-and-effect family in one canvas:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><td style="padding:4px 12px;color:var(--dim)"><em>nalae</em> (n.)</td><td style="padding:4px 12px">reason / cause / purpose</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>nalai</em> (particle)</td><td style="padding:4px 12px">because / since</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>nalau</em> (v.)</td><td style="padding:4px 12px">to cause</td></tr></table><p>The particle <em>nalai</em> is the main teaching target — it joins two clauses to give a reason. Like <em>vi</em>, the <em>nalai</em>-clause can come first or last:</p><span class="example">Maya su houli nalai ve ahu tone. <span class="gloss">Maya is happy because she has money.</span></span><span class="example">Nalai ne wa rau, ne su sheyi lo lawe. <span class="gloss">Because I slept, I am healthy today.</span></span><p>The noun <em>nalae</em> stands in for "the reason" as you'd expect:</p><span class="example">Kiwa su teo nalae? <span class="gloss">What is your reason?</span></span><p>And the verb <em>nalau</em> means "to cause" — takes an ordinary object:</p><span class="example">Kiwa wa nalau teo kufe? <span class="gloss">What caused your pain?</span></span><p style="color:var(--mid);font-size:13px;font-style:italic;margin-top:14px">You already know the phrase <em>nalai lo</em> "therefore" — that's literally "because of this," and it's how Liru starts a consequence clause across a sentence boundary.</p>`},

  {id:"l93_until_although_unless",
   title:"Until, Although, Unless",
   desc:"file, mavi, and maivi",
   icon:"🪢",
   vocabKey:"l93_until_although_unless",
   xp:24,
   unit:15,
   isSentence:true,
   intro:`<h3>🪢 Three more conjunctions</h3><p>Three conjunctions, each joining two clauses. <em>file</em> first — it marks an endpoint:</p><span class="example">Ne wu loimu file te vanu. <span class="gloss">I will wait until you come.</span></span><span class="example">Maya wa tahu file ve su toyi. <span class="gloss">Maya ate until she was finished.</span></span><p>Then the two that look almost identical but mean opposite things:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><td style="padding:4px 12px;color:var(--dim)"><em>mavi</em></td><td style="padding:4px 12px">although / even though (from <em>ma</em> "but" + <em>vi</em> "if")</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>maivi</em></td><td style="padding:4px 12px">unless (from <em>mai</em> "not" + <em>vi</em> "if")</td></tr></table><p><strong>One letter, opposite worlds.</strong> Watch the <em>i</em>:</p><span class="example">Mavi shaliru, Yuna su houli. <span class="gloss">Although it is raining, Yuna is happy.</span></span><span class="example">Ne mai wu halu maivi te vanu. <span class="gloss">I will not go unless you come.</span></span><p>Notice the decomposition: <em>mavi</em> is "but-if" (a concession — "but even if this is true"), while <em>maivi</em> is "not-if" (a negative condition — "if this is not true"). Both come from familiar pieces.</p>`},

   unit:16,
   isSentence:true,
   intro:`<h3>🔗 Relative clauses with <em>lai</em></h3><p>The particle <em>lai</em> attaches a clause to a noun. The clause describes the noun — answering "which one?":</p><span class="example">pue lai wa liru <span class="gloss">the person who sang</span></span><p>The English glosses use <strong>who</strong>, <strong>that</strong>, and <strong>which</strong>; Liru uses just <em>lai</em> for all three.</p><h3>🧩 The gap</h3><p>Inside the clause, the noun's role is left empty — that empty slot is the <strong>gap</strong>. The gap tells you what role the noun plays inside the clause:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><td style="padding:4px 12px;color:var(--dim)"><strong>subject gap</strong></td><td style="padding:4px 12px"><em>pue lai wa liru</em> — the person who sang</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><strong>object gap</strong></td><td style="padding:4px 12px"><em>loiwe lai ne wa loisu</em> — the book that I read</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><strong>oblique gap</strong></td><td style="padding:4px 12px"><em>hiwe lai ne wa rau wo</em> — the house I slept in</td></tr></table><p>For oblique gaps — when the noun plays a role marked by a relational particle like <em>wo</em> "in," <em>ko</em> "with," <em>so</em> "to," <em>ya</em> "at" — the particle <strong>stays at the end of the clause</strong>. English does the same thing colloquially: "the house I slept <strong>in</strong>."</p><h3>🆕 Three new verbs</h3><p>Three workhorse action verbs to drill with:</p><ul><li><em>kave</em> (fracture) → <em>kavi</em> (broken) → <em>kavu</em> (to break)</li><li><em>haire</em> (run) → <em>hairi</em> (running) → <em>hairu</em> (to run)</li><li><em>laune</em> (placement) → <em>launi</em> (placed) → <em>launu</em> (to put / to place)</li></ul><p>All three are concrete and picture-friendly — perfect for relative-clause practice. You'll see <em>launu</em> taking objects placed at locations: <em>ne wa launu loiwe ya pahe</em> "I put the book on the table."</p>`},

  {id:"l96_complement_clauses",
   title:"Complement Clauses — lai",
   desc:"Verb + lai + full embedded clause",
   icon:"💭",
   vocabKey:"l96_complement_clauses",
   xp:26,
   unit:16,
   isSentence:true,
   intro:`<h3>💭 Complement clauses with <em>lai</em></h3><p>Same particle, different position. When <em>lai</em> sits <strong>after a verb</strong>, the clause that follows is a <strong>complement</strong> — a full embedded sentence with its own subject, verb, and tense. No gap:</p><span class="example">Ne senu lai ve wa liru. <span class="gloss">I know that she sang.</span></span><span class="example">Ve wa liru lai ne wa halu. <span class="gloss">She said that I left.</span></span><p>Compare with relative clauses from last lesson — there's no "missing piece" inside the embedded clause. <em>ve wa liru</em> is a complete sentence on its own; <em>lai</em> just glues it into the matrix sentence as the object of <em>senu</em>.</p><h3>📖 The verbs that take complements</h3><p>Four new A20 verbs, each takes a "that…" complement. Each has the full canvas:</p><ul><li><em>waihe</em> (hope) → <em>waihi</em> (hopeful) → <em>waihu</em> (to hope) — the second half of <em>LiruWaihe</em>, the language's full name</li><li><em>moyere</em> (fear) → <em>moyeri</em> (afraid — you know this one) → <em>moyeru</em> (to fear)</li><li><em>feihe</em> (promise) → <em>feihi</em> (promised) → <em>feihu</em> (to promise)</li><li><em>oihe</em> (expectation) → <em>oihi</em> (expected) → <em>oihu</em> (to expect)</li></ul><p>Already-taught complement verbs you already know how to use this way: <em>senu</em> (know), <em>liru</em> (say), <em>meru</em> (remember). They all work identically.</p><h3>⚖️ Soft default for ambiguity</h3><p>What if the matrix verb is followed by an object, and <em>then</em> <em>lai</em>? Both readings are possible:</p><ul><li>Relative: "I know <strong>the person who sang</strong>"</li><li>Complement: "I know <strong>that the person sang</strong>"</li></ul><p>The soft rule: <strong>cognitive, reportive, and emotive verbs</strong> (know, say, hope, fear) default to complement. <strong>Physical verbs</strong> default to relative. Context settles the rest. We'll come back to this next lesson.</p>`},

  {id:"l97_complement_advanced",
   title:"Embedded Tense and To-Infinitives",
   desc:"Absolute embedded tense; same-subject to-V patterns",
   icon:"⏱️",
   vocabKey:"l97_complement_advanced",
   xp:28,
   unit:16,
   isSentence:true,
   intro:`<h3>⏱️ Embedded tense is absolute</h3><p>One of the trickiest English-to-Liru differences. When a complement clause has its own tense particle, that tense is <strong>anchored to the speaker's now</strong> — not to the matrix verb's time. Compare:</p><span class="example">Yuna wa liru lai ve su kufi. <span class="gloss">Yuna said that she is [now] in pain.</span></span><span class="example">Yuna wa liru lai ve wa su kufi. <span class="gloss">Yuna said that she was [earlier] in pain.</span></span><p>English usually "backshifts" — when the matrix is past, English makes the embedded past too ("she said that she <strong>was</strong> in pain") even when the pain is still happening now. Liru doesn't backshift. The embedded <em>wa</em> means past from <em>your</em> standpoint, not from Yuna's.</p><p>This matters for the future too:</p><span class="example">Ne wa lenu lai te wu sovu ne. <span class="gloss">I trusted that you would help me.</span></span><p>Literally: "I trusted that you <em>will</em> help me." The <em>wu</em> embedded says the helping is future from your now. English calls it "would" because English backshifts; Liru just says <em>wu</em>.</p><h3>🎯 The "to-V" equivalent</h3><p>English uses "to + verb" for same-subject complements: "I plan to eat," "I decide to go," "she remembers to write." Liru handles all of these with the complement <em>lai</em> pattern and the future particle <em>wu</em>:</p><span class="example">Ne piruhu lai ne wu tahu. <span class="gloss">I plan to eat.</span></span><span class="example">Ve seuhu lai ve wu halu. <span class="gloss">She decides to go.</span></span><p>The subject of the embedded clause repeats — there's no "raising." This stays explicit and grammatical.</p><h3>🆕 Three new verbs</h3><ul><li><em>piruhe</em> (plan) → <em>piruhi</em> (planned) → <em>piruhu</em> (to plan)</li><li><em>seuwe</em> (allowance) → <em>seuwi</em> (allowed) → <em>seuwu</em> (to allow / permit)</li><li><em>lene</em> (trust) → <em>leni</em> (trustworthy) → <em>lenu</em> (to trust)</li></ul><p><em>seuwu</em> takes a <strong>different-subject</strong> complement most naturally: "I allow <em>you</em> to go" — <em>Ne seuwu lai te halu</em>. <em>lenu</em> is a classic complement verb: "I trust <em>that</em>…".</p>`},

  {id:"l98_lai_combined",
   title:"Combined Patterns",
   desc:"Relative inside complement, complement inside relative, chained clauses",
   icon:"🧬",
   vocabKey:"l98_lai_combined",
   xp:30,
   unit:16,
   isSentence:true,
   intro:`<h3>🧬 Putting it all together</h3><p>You now know everything <em>lai</em> can do. This lesson is about putting the pieces together — clauses inside clauses. No new vocabulary; the cognitive load is structural.</p><h3>🪆 Relative inside complement</h3><p>The matrix clause has a complement <em>lai</em>; the embedded clause contains a noun with its own relative <em>lai</em>:</p><span class="example">Ne senu lai pue lai wa liru su moyeri. <span class="gloss">I know that the person who sang is afraid.</span></span><p>Parse it outside-in: <em>Ne senu lai [X]</em> — "I know that [X]." The [X] is itself a sentence: <em>pue lai wa liru su moyeri</em> — "the person who sang is afraid." Two <em>lai</em>'s, two roles.</p><h3>🔁 Complement inside relative</h3><p>The reverse — a relative clause whose embedded clause contains a complement:</p><span class="example">Ne wamu pue lai senu lai ne su moyeri. <span class="gloss">I like the person who knows that I am afraid.</span></span><p>Outside-in: <em>Ne wamu pue lai [Y]</em> — "I like the person who [Y]s." The [Y] is <em>senu lai ne su moyeri</em> — "knows that I am afraid."</p><h3>🪢 Chained relatives</h3><p>Two relative clauses describing the same noun. The first runs straight after the noun; the second usually attaches with a coordinator like <em>sho</em> "and":</p><span class="example">Loiwe lai ne wa loisu sho Maya wa launu ya pahe su nohi. <span class="gloss">The book that I read and that Maya put on the table is new.</span></span><p>Both <em>lai</em> clauses modify <em>loiwe</em>. The <em>sho</em> separates them. The final <em>su nohi</em> is the matrix predicate — "is new."</p><h3>💡 Reading strategy</h3><p>When you hit a long <em>lai</em>-heavy sentence:</p><ol><li>Find the <strong>outermost</strong> matrix verb (usually the leftmost one with no <em>lai</em> directly before it).</li><li>For each <em>lai</em>, decide if the word before it is a noun (→ relative) or verb (→ complement).</li><li>Build inward.</li></ol><p>You'll work through 8 such sentences. The complexity is real; take them one at a time.</p>`},

  // ═══════════════════════════════════════════════════════════════
  // Unit 18 (A4) — Frequency & Spatial Adverbs
  // ═══════════════════════════════════════════════════════════════
  {id:"l100_vocab_frequency_basic",
   title:"How Often — Always, Often, Sometimes",
   desc:"The three positive frequency adverbs",
   icon:"🕒",
   vocabKey:"l100_vocab_frequency_basic",
   xp:22,
   unit:17,
   intro:`<h3>🕒 Frequency adverbs</h3><p>How often does something happen? Liru builds frequency adverbs from a quantifier plus <em>weli</em> (\"times\"):</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><td style="padding:4px 12px;color:var(--dim)"><em>tai</em> (all) + <em>weli</em></td><td style="padding:4px 12px">→ <em>taiweli</em> — always</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>nai</em> (many) + <em>weli</em></td><td style="padding:4px 12px">→ <em>naiweli</em> — often</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>sai</em> (some) + <em>weli</em></td><td style="padding:4px 12px">→ <em>saiweli</em> — sometimes</td></tr></table><p>The pattern is regular: <strong>quantifier + weli = how-often word</strong>. You'll meet the two polar members (<em>nuliweli</em> never, <em>faiweli</em> ever) in the next lesson.</p><h3>📍 Where they sit in the sentence</h3><p>Frequency adverbs go in the standard adverb slot — <strong>before the verb</strong> — the same slot <em>ori</em> (very) and <em>noihi</em> (almost) occupy:</p><span class="example">Ne taiweli tahu. <span class="gloss">I always eat.</span></span><span class="example">Maya naiweli halu so mouleyahe. <span class="gloss">Maya often goes to the garden.</span></span><span class="example">Yuna saiweli liru ko ne. <span class="gloss">Yuna sometimes speaks with me.</span></span><p>With past or future tense particles (<em>wa</em>, <em>wu</em>), the frequency adverb still sits before the verb — the tense particle comes between them:</p><span class="example">Ne taiweli wa tahu. <span class="gloss">I always ate.</span></span>`},

  {id:"l101_vocab_frequency_polar",
   title:"Never, Ever, and Visiting",
   desc:"The polar frequency adverbs + a verb that loves them",
   icon:"🔁",
   vocabKey:"l101_vocab_frequency_polar",
   xp:24,
   unit:17,
   intro:`<h3>🔁 The polar frequency adverbs</h3><p>Two more from the <em>quantifier + weli</em> pattern, at the two extremes:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><td style="padding:4px 12px;color:var(--dim)"><em>nuli</em> (zero) + <em>weli</em></td><td style="padding:4px 12px">→ <em>nuliweli</em> — never</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>fai</em> (any) + <em>weli</em></td><td style="padding:4px 12px">→ <em>faiweli</em> — ever / at any time</td></tr></table><p><em>nuliweli</em> carries its own negation — you don't need <em>mai</em> with it. <em>faiweli</em> is the free-choice form most often seen in questions and after <em>mai</em>:</p><span class="example">Ne nuliweli wa koulu Yuna. <span class="gloss">I have never visited Yuna.</span></span><span class="example">Ki te faiweli wa koulu Maya? <span class="gloss">Have you ever visited Maya?</span></span><h3>📖 \"Rarely\" and emphatic \"never\"</h3><p>There's no single word for \"rarely.\" Liru uses <em>mai naiweli</em> — literally \"not often\":</p><span class="example">Ne mai naiweli halu so loya. <span class="gloss">I rarely come here.</span></span><p>An emphatic \"never\" can be rendered <em>mai faiweli</em> — \"not at any time, ever\":</p><span class="example">Ve mai faiweli wa liru ko ne. <span class="gloss">She has never (ever) spoken with me.</span></span><h3>🆕 A verb that loves frequency: <em>koulu</em></h3><p>Visiting is the prototypical \"how often\" verb. Its full canvas:</p><ul><li><em>koule</em> (n.) — a visit</li><li><em>kouli</em> (adj.) — visited</li><li><em>koulu</em> (v.) — to visit</li></ul><p>You'll meet all three; the verb does most of the work in conversation.</p>`},

  {id:"l102_frequency_sentences",
   title:"Putting Frequency to Work",
   desc:"7 sentences drilling all five frequency adverbs in context",
   icon:"⏱️",
   vocabKey:"l102_frequency_sentences",
   xp:24,
   unit:17,
   isSentence:true,
   intro:`<h3>⏱️ All five together</h3><p>You now know the full set:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><td style="padding:4px 12px"><em>taiweli</em></td><td style="padding:4px 12px">always</td></tr><tr><td style="padding:4px 12px"><em>naiweli</em></td><td style="padding:4px 12px">often</td></tr><tr><td style="padding:4px 12px"><em>saiweli</em></td><td style="padding:4px 12px">sometimes</td></tr><tr><td style="padding:4px 12px"><em>mai naiweli</em></td><td style="padding:4px 12px">rarely</td></tr><tr><td style="padding:4px 12px"><em>nuliweli</em></td><td style="padding:4px 12px">never</td></tr><tr><td style="padding:4px 12px"><em>faiweli</em></td><td style="padding:4px 12px">ever (in questions, or after <em>mai</em>)</td></tr></table><p>This lesson drills placement and pairing. Pay attention to where the adverb sits relative to the tense particle — <em>wa</em> and <em>wu</em> always come <strong>between</strong> the frequency adverb and the verb.</p>`},

  {id:"l103_vocab_paths",
   title:"Paths — Through, Across, Near, Far",
   desc:"Four canvas-root spatial concepts",
   icon:"🛤️",
   vocabKey:"l103_vocab_paths",
   xp:26,
   unit:17,
   intro:`<h3>🛤️ Path-shaped spatial adverbs</h3><p>Four spatial concepts, each a full canvas root: the noun names the abstract concept, the adjective/adverb describes manner, the verb names the action.</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 8px;color:var(--dim)">noun</th><th style="padding:4px 8px;color:var(--dim)">adj./adv.</th><th style="padding:4px 8px;color:var(--dim)">verb</th><th style="padding:4px 8px;color:var(--dim)">meaning</th></tr><tr><td style="padding:4px 8px"><em>taume</em></td><td style="padding:4px 8px"><em>taumi</em></td><td style="padding:4px 8px"><em>taumu</em></td><td style="padding:4px 8px">through / pass through</td></tr><tr><td style="padding:4px 8px"><em>tase</em></td><td style="padding:4px 8px"><em>tasi</em></td><td style="padding:4px 8px"><em>tasu</em></td><td style="padding:4px 8px">across / cross</td></tr><tr><td style="padding:4px 8px"><em>niane</em></td><td style="padding:4px 8px"><em>niani</em></td><td style="padding:4px 8px"><em>nianu</em></td><td style="padding:4px 8px">near / approach</td></tr><tr><td style="padding:4px 8px"><em>moniane</em></td><td style="padding:4px 8px"><em>moniani</em></td><td style="padding:4px 8px"><em>monianu</em></td><td style="padding:4px 8px">far / recede</td></tr></table><h3>⚖️ <em>niane</em> and <em>moniane</em> — a balancing pair</h3><p><em>moniane</em> is built from <em>niane</em> with the <em>mo-</em> prefix — the same balancing pattern you've seen with <em>nawu</em>/<em>monawu</em>, <em>houli</em>/<em>mohouli</em>, and many others.</p><h3>📝 In use</h3><span class="example">Ne taumu mouleyahe. <span class="gloss">I pass through the garden.</span></span><span class="example">Nea wa tasu mouleyahe. <span class="gloss">We crossed the garden.</span></span><span class="example">Ve wa nianu hiwe. <span class="gloss">She approached the house.</span></span><span class="example">Hiwe su moniani fa senehiwe. <span class="gloss">The house is far from the school.</span></span><p>The verb form pairs directly with an object — <em>tasu mouleyahe</em>, <em>nianu hiwe</em>, no preposition. The adjective/adverb form modifies a verb or noun.</p>`},

  {id:"l104_vocab_position",
   title:"Position — Right, Left, Low, Side",
   desc:"Four more canvas-root spatial concepts",
   icon:"🧭",
   vocabKey:"l104_vocab_position",
   xp:26,
   unit:17,
   intro:`<h3>🧭 Position-shaped spatial adverbs</h3><p>Four more canvas roots covering basic directional position.</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 8px;color:var(--dim)">noun</th><th style="padding:4px 8px;color:var(--dim)">adj./adv.</th><th style="padding:4px 8px;color:var(--dim)">verb</th><th style="padding:4px 8px;color:var(--dim)">meaning</th></tr><tr><td style="padding:4px 8px"><em>hune</em></td><td style="padding:4px 8px"><em>huni</em></td><td style="padding:4px 8px">—</td><td style="padding:4px 8px">right (side / to the right)</td></tr><tr><td style="padding:4px 8px"><em>mohune</em></td><td style="padding:4px 8px"><em>mohuni</em></td><td style="padding:4px 8px">—</td><td style="padding:4px 8px">left (side / to the left)</td></tr><tr><td style="padding:4px 8px"><em>moliane</em></td><td style="padding:4px 8px"><em>moliani</em></td><td style="padding:4px 8px"><em>molianu</em></td><td style="padding:4px 8px">low / lower (or descend)</td></tr><tr><td style="padding:4px 8px"><em>vaihe</em></td><td style="padding:4px 8px"><em>vaihi</em></td><td style="padding:4px 8px"><em>vaihu</em></td><td style="padding:4px 8px">side / face (a direction)</td></tr></table><h3>⚖️ <em>hune</em> and <em>mohune</em> — a directional pair</h3><p><em>mohune</em> \"left\" is built from <em>hune</em> \"right\" with the <em>mo-</em> prefix. The pair forms the basic left/right axis. (\"Right\" in the sense of \"justice / fairness\" is a different word — <em>sheure</em> — which you'll meet later.)</p><p>Unlike most canvas roots, <em>hune</em> and <em>mohune</em> have no dedicated verb form. To say \"go right\" or \"go left,\" pair the adverb with a motion verb: <em>halu huni</em>, <em>halu mohuni</em>.</p><h3>📝 In use</h3><span class="example">Ne halu huni. <span class="gloss">I go right.</span></span><span class="example">Ve wa halu mohuni. <span class="gloss">She went left.</span></span><span class="example">Lo hiwe su moliani. <span class="gloss">This house is low.</span></span><span class="example">Hiwe vaihu moule. <span class="gloss">The house faces the tree.</span></span><p><em>moliani</em> contrasts with already-taught <em>liani</em> \"high / tall\" — the same canvas-root pattern, opposite values on the height axis.</p>`},

  {id:"l105_spatial_particles",
   title:"Spatial Particles — Between, Around, Away From",
   desc:"Three new particles plus moving water (washu)",
   icon:"🌀",
   vocabKey:"l105_spatial_particles",
   xp:24,
   unit:17,
   isSentence:true,
   intro:`<h3>🌀 Three spatial particles</h3><p>Particles sit between phrases the way <em>wo</em> (in), <em>ya</em> (at), and <em>so</em> (to) do — they tell you a spatial relationship without naming a manner or action. Three new ones in this lesson:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><td style="padding:4px 12px"><em>niwa</em></td><td style="padding:4px 12px">between</td></tr><tr><td style="padding:4px 12px"><em>voi</em></td><td style="padding:4px 12px">around</td></tr><tr><td style="padding:4px 12px"><em>moso</em></td><td style="padding:4px 12px">away from</td></tr></table><h3>📝 Usage notes</h3><p><strong><em>niwa</em></strong> takes two arguments joined by <em>sho</em>:</p><span class="example">Moule su niwa hiwe sho senehiwe. <span class="gloss">The tree is between the house and the school.</span></span><p><strong><em>voi</em></strong> takes a single argument — the thing being encircled:</p><span class="example">Ve halu voi moule. <span class="gloss">She walks around the tree.</span></span><p><strong><em>moso</em></strong> is the directional companion of already-taught <em>so</em> \"to.\" Where <em>so</em> marks motion toward, <em>moso</em> marks motion away from. (This is distinct from <em>fa</em> \"from / of,\" which marks static origin, not motion away.)</p><span class="example">Paipe wa hairu moso hiwe. <span class="gloss">The dog ran away from the house.</span></span><h3>🆕 A new verb: <em>washu</em></h3><p>Water and wind do it; people and ideas do it metaphorically. The verb <em>washu</em> \"to move / to flow\" is the natural partner of these spatial particles:</p><span class="example">Iwuhe washu taumi mouleyahe. <span class="gloss">Water flows through the garden.</span></span><p>Its full canvas — <em>washe</em> (movement/flow), <em>washi</em> (flowing/mobile), <em>washu</em> (to move/flow) — is in the dictionary for reference, but you'll only drill the verb here.</p>`},

  // ── UNIT 19: EXISTENTIAL PRONOUNS (L107–L110) — ADVANCED TRACK ──────
  // A5: closes out the pronoun system. Parallel to the ki- WH-pronouns
  // from L36. 8 transparent compositional pronouns (quantifier + hue/pue)
  // plus 3 weave-in canvas roots (vehe, vihe, wohime). 4 lessons total.
  {id:"l107_vocab_existentials_things",
   title:"Something, Anything, Nothing, Everything",
   desc:"saihue, faihue, nulihue, taihue",
   icon:"🔵",
   vocabKey:"l107_vocab_existentials_things",
   xp:22,
   unit:18,
   intro:`<h3>🔵 Existential pronouns — the <em>-hue</em> series</h3><p>You met <em>hue</em> "thing" back in Unit 10, alongside a brief mention of these four compound pronouns. Now you'll drill them. Each is built from a quantifier you already know plus <em>hue</em>:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><td style="padding:4px 12px;color:var(--dim)"><em>sai</em> (some) + <em>hue</em></td><td style="padding:4px 12px">→ <em>saihue</em> — something</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>fai</em> (any) + <em>hue</em></td><td style="padding:4px 12px">→ <em>faihue</em> — anything (free-choice)</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>nuli</em> (zero) + <em>hue</em></td><td style="padding:4px 12px">→ <em>nulihue</em> — nothing</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>tai</em> (all) + <em>hue</em></td><td style="padding:4px 12px">→ <em>taihue</em> — everything</td></tr></table><h3>📝 In use</h3><span class="example">Ne wanu saihue. <span class="gloss">I want something.</span></span><span class="example">Ki te wanu faihue? <span class="gloss">Do you want anything?</span></span><span class="example">Ne mai wanu nulihue. <span class="gloss">I don't want anything.</span></span><span class="example">Ne wamu taihue. <span class="gloss">I like everything.</span></span><p>Notice that <em>nulihue</em> carries its own negation — you don't need <em>mai</em> with it. The parallel <em>-pue</em> series (someone, anyone, no one, everyone) lands two lessons from now; the next lesson takes a short detour through three useful verb roots that pair naturally with these pronouns.</p>`},

  {id:"l108_vocab_weave",
   title:"Show, Share, Matter",
   desc:"vehe, vihe, wohime — three canvas roots",
   icon:"🤝",
   vocabKey:"l108_vocab_weave",
   xp:26,
   unit:18,
   intro:`<h3>🤝 Three useful canvas roots</h3><p>Before meeting the <em>-pue</em> existentials, three full-canvas roots that pair naturally with both series. Each gives you a noun, an adjective, and a verb:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 8px;color:var(--dim)">noun</th><th style="padding:4px 8px;color:var(--dim)">adj.</th><th style="padding:4px 8px;color:var(--dim)">verb</th><th style="padding:4px 8px;color:var(--dim)">meaning</th></tr><tr><td style="padding:4px 8px"><em>vehe</em></td><td style="padding:4px 8px"><em>vehi</em></td><td style="padding:4px 8px"><em>vehu</em></td><td style="padding:4px 8px">showing / shown / to show</td></tr><tr><td style="padding:4px 8px"><em>vihe</em></td><td style="padding:4px 8px"><em>vihi</em></td><td style="padding:4px 8px"><em>vihu</em></td><td style="padding:4px 8px">sharing / shared / to share</td></tr><tr><td style="padding:4px 8px"><em>wohime</em></td><td style="padding:4px 8px"><em>wohimi</em></td><td style="padding:4px 8px"><em>wohimu</em></td><td style="padding:4px 8px">importance / important / to matter</td></tr></table><h3>📝 In use</h3><span class="example">Vehu ne lo loiwe. <span class="gloss">Show me this book.</span></span><span class="example">Maya wa vehu ne saihue. <span class="gloss">Maya showed me something.</span></span><span class="example">Nea vihu loiwe. <span class="gloss">We share a book.</span></span><span class="example">Lo loiwe su wohimi. <span class="gloss">This book is important.</span></span><span class="example">Nulihue su wohimi. <span class="gloss">Nothing matters.</span></span><p>The verb forms take direct objects without prepositions: <em>vehu ne</em> "show me," <em>vihu loiwe</em> "share a book." <em>wohimu</em> "to matter" is most often used impersonally (<em>X wohimu</em> "X matters").</p>`},

  {id:"l109_vocab_existentials_people",
   title:"Someone, Anyone, No One, Everyone",
   desc:"saipue, faipue, nulipue, taipue",
   icon:"👥",
   vocabKey:"l109_vocab_existentials_people",
   xp:24,
   unit:18,
   intro:`<h3>👥 Existential pronouns — the <em>-pue</em> series</h3><p>Same pattern as the <em>-hue</em> series from L107, but with <em>pue</em> (person) instead of <em>hue</em> (thing):</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><td style="padding:4px 12px;color:var(--dim)"><em>sai</em> + <em>pue</em></td><td style="padding:4px 12px">→ <em>saipue</em> — someone</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>fai</em> + <em>pue</em></td><td style="padding:4px 12px">→ <em>faipue</em> — anyone (free-choice)</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>nuli</em> + <em>pue</em></td><td style="padding:4px 12px">→ <em>nulipue</em> — no one</td></tr><tr><td style="padding:4px 12px;color:var(--dim)"><em>tai</em> + <em>pue</em></td><td style="padding:4px 12px">→ <em>taipue</em> — everyone</td></tr></table><h3>⚖️ <em>sai-</em> vs. <em>fai-</em>: specific vs. free-choice</h3><p>This distinction matters and pairs the same way as in English's <em>something</em>/<em>anything</em> and <em>someone</em>/<em>anyone</em>:</p><ul><li><em>sai-</em> picks out a specific-but-unnamed referent. Use in plain assertions.</li><li><em>fai-</em> is free-choice. Use in questions, after <em>mai</em>, and in conditional/hypothetical clauses.</li></ul><span class="example">Ne wa tiru saipue. <span class="gloss">I saw someone. (specific, didn't name them)</span></span><span class="example">Ki te wa tiru faipue? <span class="gloss">Did you see anyone? (at all)</span></span><span class="example">Ne mai wa tiru faipue. <span class="gloss">I didn't see anyone. (emphatic)</span></span><h3>📝 More in use</h3><span class="example">Saipue wa vanu. <span class="gloss">Someone came.</span></span><span class="example">Nulipue wa nahu. <span class="gloss">No one cooked.</span></span><span class="example">Taipue wamu Yuna. <span class="gloss">Everyone likes Yuna.</span></span><span class="example">Vihu lo loiwe ko saipue wohimi. <span class="gloss">Share this book with an important person.</span></span><p>Like <em>nulihue</em>, <em>nulipue</em> carries negation natively — no <em>mai</em> needed.</p>`},

  // ── UNIT 20: COLORS (L111–L115) — ADVANCED TRACK ────────────────────
  // A6: first breadth unit. 13 color roots sharing the -ale/-ali/-alu
  // canvas pattern. Only noun and adjective forms are taught (per
  // Neal's decision); verb forms exist in Dictionary.md but aren't
  // drilled. Exception: tinale "color" keeps its verb tinalu
  // "to color/tint" as a genuinely useful general-purpose verb.
  // 4 vocab lessons + 1 unit exam. All 12 colors covered in actual
  // exam sentences (not distractor-only). No weave-in vocab.
  {id:"l111_vocab_color_meta",
   title:"Colors — Meta Root and Warm Colors",
   desc:"tinale (color), feyale (red), haumale (yellow)",
   icon:"🎨",
   vocabKey:"l111_vocab_color_meta",
   xp:24,
   unit:19,
   intro:`<h3>🎨 Color words share one canvas pattern</h3><p>Every color word in Liru sits on the same canvas: a noun ending in <em>-ale</em>, and an adjective ending in <em>-ali</em>. Once you know the pattern, you know how every color word works.</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">noun (the color)</th><th style="padding:4px 12px;color:var(--dim)">adjective</th></tr><tr><td style="padding:4px 12px"><em>tinale</em></td><td style="padding:4px 12px"><em>tinali</em> — colored / colorful</td></tr><tr><td style="padding:4px 12px"><em>feyale</em></td><td style="padding:4px 12px"><em>feyali</em> — red</td></tr><tr><td style="padding:4px 12px"><em>haumale</em></td><td style="padding:4px 12px"><em>haumali</em> — yellow</td></tr></table><h3>🖌️ <em>tinale</em> — the meta-root</h3><p><em>tinale</em> means "color" itself, and <em>tinali</em> means "colored" or "colorful." It also carries a verb form, <em>tinalu</em> — "to color" or "to tint" something. (This verb is taught; the color-change verbs of the specific colors aren't.)</p><h3>📝 Two ways to say "the X is red"</h3><p>Like other adjectives, color adjectives can sit on either side of the copula <em>su</em>:</p><span class="example">Lo loshe su feyali. <span class="gloss">This flower is red. (predicate — describes the flower)</span></span><span class="example">Feyali loshe su wauli. <span class="gloss">The red flower is beautiful. (attributive — modifies the flower)</span></span><p>When attributive, the color comes <strong>before</strong> the noun, like every adjective in Liru.</p>`},

  {id:"l112_vocab_color_cool",
   title:"Cool Colors",
   desc:"foshale (green), laumale (blue), roumale (purple)",
   icon:"💧",
   vocabKey:"l112_vocab_color_cool",
   xp:22,
   unit:19,
   intro:`<h3>💧 Three cool colors</h3><p>Same canvas as L111 — noun in <em>-ale</em>, adjective in <em>-ali</em>:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">noun</th><th style="padding:4px 12px;color:var(--dim)">adjective</th></tr><tr><td style="padding:4px 12px"><em>foshale</em></td><td style="padding:4px 12px"><em>foshali</em> — green</td></tr><tr><td style="padding:4px 12px"><em>laumale</em></td><td style="padding:4px 12px"><em>laumali</em> — blue</td></tr><tr><td style="padding:4px 12px"><em>roumale</em></td><td style="padding:4px 12px"><em>roumali</em> — purple</td></tr></table><h3>📝 In use</h3><span class="example">Laime su laumali. <span class="gloss">The sky is blue.</span></span><span class="example">Foshali moulea su apa wauli. <span class="gloss">Green trees are the most beautiful.</span></span><span class="example">Ki lo loiwe su roumali? <span class="gloss">Is this book purple?</span></span>`},

  {id:"l113_vocab_color_neutral",
   title:"Neutral Colors",
   desc:"lewale (white), noumale (black), felale (gray)",
   icon:"⚫",
   vocabKey:"l113_vocab_color_neutral",
   xp:22,
   unit:19,
   intro:`<h3>⚫ Three neutral colors</h3><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">noun</th><th style="padding:4px 12px;color:var(--dim)">adjective</th></tr><tr><td style="padding:4px 12px"><em>lewale</em></td><td style="padding:4px 12px"><em>lewali</em> — white</td></tr><tr><td style="padding:4px 12px"><em>noumale</em></td><td style="padding:4px 12px"><em>noumali</em> — black</td></tr><tr><td style="padding:4px 12px"><em>felale</em></td><td style="padding:4px 12px"><em>felali</em> — gray</td></tr></table><h3>⚖️ White and black aren't a <em>mo-</em> pair</h3><p>You might expect <em>lewale</em> and <em>noumale</em> to be linked by the <em>mo-</em> prefix the way <em>nawu</em>/<em>monawu</em> (love/hate) or <em>houli</em>/<em>mohouli</em> (happy/sad) are. They aren't — and that's deliberate. The <em>mo-</em> prefix marks a balanced opposite on a value axis (the joyful kind of opposite). White and black are a culturally paired set rather than that kind of opposition, so each one is its own root.</p><h3>📝 In use</h3><span class="example">Felume su lewali. <span class="gloss">The cloud is white.</span></span><span class="example">Lo kupe su noumali. <span class="gloss">This coffee is black.</span></span><span class="example">Felume su felali ata laime. <span class="gloss">The cloud is grayer than the sky.</span></span>`},

  {id:"l114_vocab_color_tertiary",
   title:"Tertiary Colors",
   desc:"niwale (pink), touhale (brown), huyale (orange)",
   icon:"🟠",
   vocabKey:"l114_vocab_color_tertiary",
   xp:22,
   unit:19,
   intro:`<h3>🟠 Three more colors — off the rainbow</h3><p>Pink, brown, and orange round out the color set. Same canvas pattern.</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">noun</th><th style="padding:4px 12px;color:var(--dim)">adjective</th></tr><tr><td style="padding:4px 12px"><em>niwale</em></td><td style="padding:4px 12px"><em>niwali</em> — pink</td></tr><tr><td style="padding:4px 12px"><em>touhale</em></td><td style="padding:4px 12px"><em>touhali</em> — brown</td></tr><tr><td style="padding:4px 12px"><em>huyale</em></td><td style="padding:4px 12px"><em>huyali</em> — orange</td></tr></table><h3>📝 In use</h3><span class="example">Maya wamu niwali loshea. <span class="gloss">Maya likes pink flowers.</span></span><span class="example">Ne wa tiru huyali haule. <span class="gloss">I saw an orange sun.</span></span><span class="example">Lo kupe su touhali. <span class="gloss">This coffee is brown.</span></span>`},

  // ── UNIT 21 (A7): NUMBERS BEYOND 10, ORDINALS & MONTHS (L116–L119) ──
  {id:"l116_vocab_big_numbers",
   title:"Big Numbers and Counting",
   desc:"woni (hundred), yoni (thousand), kiame (number / to count)",
   icon:"🔢",
   vocabKey:"l116_vocab_big_numbers",
   xp:18,
   unit:20,
   intro:`<h3>🔢 Big numbers and counting</h3><p>You already know numbers 1–10 (<em>fani, runi, teni, shani, kani, veni, meni, oni, yani, hani</em>) and how to combine them past ten (<em>hani-fani</em> 11, <em>runi-hani</em> 20). Two more anchors complete the system:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">word</th><th style="padding:4px 12px;color:var(--dim)">meaning</th></tr><tr><td style="padding:4px 12px"><em>woni</em></td><td style="padding:4px 12px">hundred</td></tr><tr><td style="padding:4px 12px"><em>yoni</em></td><td style="padding:4px 12px">thousand</td></tr></table><p>They compose the same way smaller numbers do:</p><span class="example">runi woni <span class="gloss">two hundred (200)</span></span><span class="example">kani woni teni-hani <span class="gloss">five hundred thirty (530)</span></span><span class="example">teni yoni <span class="gloss">three thousand (3000)</span></span><h3>📊 The word for "number"</h3><p>The Liru word for "number" itself is <em>kiame</em>. It's a full canvas root:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">form</th><th style="padding:4px 12px;color:var(--dim)">meaning</th></tr><tr><td style="padding:4px 12px"><em>kiame</em> (n.)</td><td style="padding:4px 12px">number</td></tr><tr><td style="padding:4px 12px"><em>kiami</em> (adj.)</td><td style="padding:4px 12px">numeric</td></tr><tr><td style="padding:4px 12px"><em>kiamu</em> (v.)</td><td style="padding:4px 12px">to count</td></tr></table><span class="example">Te kiamu loiwea. <span class="gloss">You count the books.</span></span>`},

  {id:"l117_vocab_ordinals_time_units",
   title:"Ordinals and Time Units",
   desc:"fanini, runini + the X+ni ordinal pattern, plus tohile / tohilele",
   icon:"🥇",
   vocabKey:"l117_vocab_ordinals_time_units",
   xp:22,
   unit:20,
   srsExtras:["tenini","shanini","kanini","venini","menini","onini","yanini","hanini"],
   intro:`<h3>🥇 Ordinals — the <em>-ni</em> pattern</h3><p>Add the suffix <em>-ni</em> to any number to make an ordinal. The pattern is fully productive — every number from 1 to 10 takes <em>-ni</em> the same way.</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">cardinal</th><th style="padding:4px 12px;color:var(--dim)">ordinal</th></tr><tr><td style="padding:4px 12px"><em>fani</em> (1)</td><td style="padding:4px 12px"><em>fanini</em> — first</td></tr><tr><td style="padding:4px 12px"><em>runi</em> (2)</td><td style="padding:4px 12px"><em>runini</em> — second</td></tr><tr><td style="padding:4px 12px"><em>teni</em> (3)</td><td style="padding:4px 12px"><em>tenini</em> — third</td></tr><tr><td style="padding:4px 12px"><em>shani</em> (4)</td><td style="padding:4px 12px"><em>shanini</em> — fourth</td></tr><tr><td style="padding:4px 12px"><em>kani</em> (5)</td><td style="padding:4px 12px"><em>kanini</em> — fifth</td></tr><tr><td style="padding:4px 12px"><em>veni</em> (6)</td><td style="padding:4px 12px"><em>venini</em> — sixth</td></tr><tr><td style="padding:4px 12px"><em>meni</em> (7)</td><td style="padding:4px 12px"><em>menini</em> — seventh</td></tr><tr><td style="padding:4px 12px"><em>oni</em> (8)</td><td style="padding:4px 12px"><em>onini</em> — eighth</td></tr><tr><td style="padding:4px 12px"><em>yani</em> (9)</td><td style="padding:4px 12px"><em>yanini</em> — ninth</td></tr><tr><td style="padding:4px 12px"><em>hani</em> (10)</td><td style="padding:4px 12px"><em>hanini</em> — tenth</td></tr></table><p>Ordinals are adjectives and precede the noun, like cardinals:</p><span class="example">Fanini loiwe <span class="gloss">the first book</span></span><span class="example">Runini lawe su runilawe <span class="gloss">the second day is Monday</span></span><h3>⏱️ Time units — minute and second</h3><p>Two new words for short durations:</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 12px;color:var(--dim)">noun</th><th style="padding:4px 12px;color:var(--dim)">adjective</th></tr><tr><td style="padding:4px 12px"><em>tohile</em> — minute</td><td style="padding:4px 12px"><em>tohili</em> — of a minute</td></tr><tr><td style="padding:4px 12px"><em>tohilele</em> — second</td><td style="padding:4px 12px"><em>tohileli</em> — momentary</td></tr></table><p><em>tohilele</em> is the diminutive of <em>tohile</em> (the <em>-le</em> suffix makes things smaller, like <em>komile</em> "pebble" from <em>kome</em> "stone"). So a second is literally "a tiny minute."</p><span class="example">Loime fani tohilele. <span class="gloss">Wait one second.</span></span><span class="example">Ne wu vanu shani tohilea wuhi. <span class="gloss">I will arrive in four minutes.</span></span>`},

  {id:"l118_vocab_months",
   title:"The Twelve Months",
   desc:"luone (moon/month) and the twelve compositional month names",
   icon:"📅",
   vocabKey:"l118_vocab_months",
   xp:25,
   unit:20,
   srsExtras:["teniluone","shaniluone","kaniluone","veniluone","meniluone","oniluone","yaniluone","haniluone","hanifaniluone"],
   intro:`<h3>🌙 The morpheme behind every month</h3><p>The Liru word <em>luone</em> carries both <strong>moon</strong> and <strong>month</strong> — context disambiguates. Its adjective form is <em>luoni</em> (lunar).</p><span class="example">Lo luone su laumali. <span class="gloss">This moon is blue.</span></span><span class="example">Faniluone su nauyi luone. <span class="gloss">January is a fun month.</span></span><h3>📅 The twelve months</h3><p>Month names follow a pattern you already know. They're formed from a <strong>number + <em>luone</em></strong> — the same shape as the day names you learned in core (<strong>number + <em>lawe</em></strong>).</p><table style="margin:10px auto;border-collapse:collapse;font-size:14px"><tr><th style="padding:4px 8px;color:var(--dim)">#</th><th style="padding:4px 12px;color:var(--dim)">month</th><th style="padding:4px 12px;color:var(--dim)">composition</th></tr><tr><td style="padding:4px 8px">1</td><td style="padding:4px 12px"><em>faniluone</em> — January</td><td style="padding:4px 12px"><em>fani</em> + <em>luone</em></td></tr><tr><td style="padding:4px 8px">2</td><td style="padding:4px 12px"><em>runiluone</em> — February</td><td style="padding:4px 12px"><em>runi</em> + <em>luone</em></td></tr><tr><td style="padding:4px 8px">3</td><td style="padding:4px 12px"><em>teniluone</em> — March</td><td style="padding:4px 12px"><em>teni</em> + <em>luone</em></td></tr><tr><td style="padding:4px 8px">4</td><td style="padding:4px 12px"><em>shaniluone</em> — April</td><td style="padding:4px 12px"><em>shani</em> + <em>luone</em></td></tr><tr><td style="padding:4px 8px">5</td><td style="padding:4px 12px"><em>kaniluone</em> — May</td><td style="padding:4px 12px"><em>kani</em> + <em>luone</em></td></tr><tr><td style="padding:4px 8px">6</td><td style="padding:4px 12px"><em>veniluone</em> — June</td><td style="padding:4px 12px"><em>veni</em> + <em>luone</em></td></tr><tr><td style="padding:4px 8px">7</td><td style="padding:4px 12px"><em>meniluone</em> — July</td><td style="padding:4px 12px"><em>meni</em> + <em>luone</em></td></tr><tr><td style="padding:4px 8px">8</td><td style="padding:4px 12px"><em>oniluone</em> — August</td><td style="padding:4px 12px"><em>oni</em> + <em>luone</em></td></tr><tr><td style="padding:4px 8px">9</td><td style="padding:4px 12px"><em>yaniluone</em> — September</td><td style="padding:4px 12px"><em>yani</em> + <em>luone</em></td></tr><tr><td style="padding:4px 8px">10</td><td style="padding:4px 12px"><em>haniluone</em> — October</td><td style="padding:4px 12px"><em>hani</em> + <em>luone</em></td></tr><tr><td style="padding:4px 8px">11</td><td style="padding:4px 12px"><em>hanifaniluone</em> — November</td><td style="padding:4px 12px"><em>hani-fani</em> (11) + <em>luone</em></td></tr><tr><td style="padding:4px 8px">12</td><td style="padding:4px 12px"><em>haniruniluone</em> — December</td><td style="padding:4px 12px"><em>hani-runi</em> (12) + <em>luone</em></td></tr></table><p>The pattern is fully productive — once you have the rule, you have all twelve. In derived words like these, the hyphens of compound numbers fuse (so it's <em>hanifaniluone</em>, not <em>hani-faniluone</em>).</p>`},

  {id:"l119_numbers_months_exam",
